<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>EPI do Operador de Efeitos · SMU PRO</title>
<style>
  :root{ --bg:#06080e; --panel:#0c111c; --panel2:#0f1626; --line:#25314c; --ink:#e8eef9; --mut:#8a9bb8; --acc:#ff7a1a; --ok:#39d98a; --bad:#ff4d4d; --warn:#ffc63b; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070c;color:var(--ink);font-family:system-ui,Segoe UI,Roboto,Arial;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  #app{position:fixed;top:0;left:0;width:100vw;height:var(--visH,100vh);display:flex;flex-direction:column;overflow:hidden;padding:9px;gap:8px}
  #hd{flex:none}#hd b{font-size:14px;font-weight:800}#hd span{display:block;font-size:11px;color:var(--mut)}
  #task{flex:none;background:#0e1626;border:1px solid var(--line);border-radius:10px;padding:8px 11px;font-size:12.5px}
  #task b{color:var(--acc)}
  #main{flex:1 1 auto;min-height:0;display:grid;grid-template-columns:1fr 240px;gap:8px}
  .box{background:var(--panel);border:1px solid var(--line);border-radius:11px;min-height:0;display:flex;flex-direction:column;overflow:hidden}
  .box h5{margin:0;padding:8px 10px 4px;font-size:10px;letter-spacing:.5px;text-transform:uppercase;color:var(--mut)}
  #figWrap{flex:1 1 auto;min-height:0;display:flex;align-items:center;justify-content:center;padding:6px}
  svg#op{height:100%;max-height:100%;width:auto}
  .zone{fill:#1a2233;stroke:#33405e;stroke-width:2}
  .zone.on{fill:#123a24;stroke:var(--ok)}
  .gear{opacity:0;transition:.15s}.gear.on{opacity:1}
  #tray{overflow:auto;padding:0 8px 8px}
  .epi{display:flex;align-items:center;gap:8px;background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:7px 9px;margin-bottom:5px;cursor:pointer}
  .epi:hover{border-color:#3a4a6e}
  .epi.on{border-color:var(--ok);background:#0f2318}
  .epi .ic{font-size:18px;width:24px;text-align:center}
  .epi .nm{font-size:12px;font-weight:600;flex:1}
  .epi .zn{font-size:9px;color:var(--mut)}
  #ctl{flex:none;display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:center;background:#0a0e18;border:1px solid var(--line);border-radius:11px;padding:8px 10px}
  select{background:#0e1626;color:var(--ink);border:1px solid var(--line);border-radius:8px;padding:8px;font-size:12.5px}
  .btn{border:1px solid var(--line);background:#141c2b;color:var(--ink);border-radius:9px;padding:10px 14px;font-size:13px;font-weight:800;cursor:pointer;min-height:42px}
  .btn.check{background:#123a24;border-color:#2b7a4e;color:#9af2c0}
  .btn.clr{background:#20283a}
  #obj{position:absolute;left:10px;bottom:76px;z-index:6;width:min(280px,60vw);background:#0c1220ee;border:1px solid var(--line);border-radius:11px;padding:9px 11px}
  #obj h4{margin:0 0 5px;font-size:11px;text-transform:uppercase;color:var(--acc)}
  #obj ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
  #obj li{display:flex;gap:7px;font-size:11.5px;color:#cdd8ea;align-items:flex-start}
  #obj li .bx{flex:none;width:15px;height:15px;border-radius:4px;border:1.5px solid #46567a;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#04140b}
  #obj li.done .bx{background:var(--ok);border-color:var(--ok)}#obj li.done{color:#8fb8a2}
  #obj.win{border-color:var(--ok);box-shadow:0 0 20px #39d98a44}
  #toast{position:absolute;left:50%;top:12px;transform:translateX(-50%) translateY(-60px);z-index:9;background:#0e1726f2;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:12.5px;font-weight:700;transition:transform .3s;max-width:82vw;text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.good{border-color:var(--ok);color:#bff5da}#toast.bad{border-color:var(--bad);color:#ffb3ab}#toast.warn{border-color:var(--warn);color:#ffe6a8}
  @media(max-width:820px){ #main{grid-template-columns:1fr} #obj{width:min(220px,72vw)} }
</style></head>
<body>
<div id="app">
  <div id="hd"><b>EPI do Operador de Efeitos</b><span>Equipamento de Proteção Individual certo para cada efeito</span></div>
  <div id="task">Tarefa: preparar o operador para <b id="taskFx">—</b>. Toque nos EPIs para vestir e confira.</div>
  <div id="main">
    <div class="box"><h5>Operador</h5><div id="figWrap"><svg id="op" viewBox="0 0 200 320" preserveAspectRatio="xMidYMid meet"></svg></div></div>
    <div class="box"><h5>Bancada de EPI (toque p/ vestir)</h5><div id="tray"></div></div>
  </div>
  <div id="ctl">
    <div style="display:flex;gap:5px;align-items:center"><span style="font-size:11px;color:var(--mut)">Efeito:</span>
      <select id="fxsel"></select></div>
    <button class="btn check" id="check">✔ Conferir EPI</button>
    <button class="btn clr" id="clr">↺ Tirar tudo</button>
  </div>
  <div id="obj"><h4>🎯 Objetivos</h4><ul id="objList"></ul></div>
  <div id="toast"></div>
</div>
<script>
(function(){
  const $=id=>document.getElementById(id);
  let tT; function toast(m,k){ const t=$('toast'); t.textContent=m; t.className='show '+(k||''); clearTimeout(tT); tT=setTimeout(()=>t.className=(k||''),2600); }

  // EPI: id, nome, ícone, zona
  const EPI={
    capacete:{n:'Capacete',ic:'⛑️',z:'head'},
    oculos:{n:'Óculos de proteção',ic:'🥽',z:'eyes'},
    auricular:{n:'Protetor auricular',ic:'🎧',z:'ears'},
    mascara:{n:'Máscara respiratória',ic:'😷',z:'face'},
    luva_termica:{n:'Luva térmica/criogênica',ic:'🧤',z:'hands'},
    luva_comum:{n:'Luva comum',ic:'🧤',z:'hands'},
    roupa:{n:'Roupa anti-chama (manga longa)',ic:'🧥',z:'torso'},
    botina:{n:'Botina de segurança',ic:'🥾',z:'feet'},
    colete:{n:'Colete refletivo',ic:'🦺',z:'torso'},
  };
  // efeitos e EPI exigido
  const FX={
    chama:{nome:'Lança-chamas (fogo real)', req:['oculos','auricular','luva_termica','roupa','botina'], note:'Fogo: proteção térmica, olhos, audição e roupa anti-chama. (Extintor é coletivo, sempre por perto.)'},
    pyro:{nome:'Pirotecnia (gerb/shell)', req:['capacete','oculos','auricular','luva_termica','roupa','botina'], note:'Pólvora + faíscas quentes: some o capacete e proteja tudo. Distância e continuidade também.'},
    co2:{nome:'Jato de CO₂', req:['oculos','auricular','luva_termica','roupa'], note:'−78 °C e ruído alto: luva criogênica, óculos e protetor auricular são essenciais.'},
    coldspark:{nome:'Faísca fria (cold spark)', req:['oculos','auricular','luva_comum'], note:'Efeito frio: proteção mais leve, mas óculos e audição sempre.'},
  };
  const worn=new Set(); let curFx='chama';

  // seletor
  Object.entries(FX).forEach(([k,v])=>{ const o=document.createElement('option'); o.value=k; o.textContent=v.nome; $('fxsel').appendChild(o); });
  $('fxsel').onchange=()=>{ curFx=$('fxsel').value; $('taskFx').textContent=FX[curFx].nome; };
  $('taskFx').textContent=FX['chama'].nome;

  // SVG operador
  const NS='http://www.w3.org/2000/svg', svg=$('op');
  function el(t,a){const e=document.createElementNS(NS,t);for(const k in a)e.setAttribute(k,a[k]);return e;}
  // corpo base
  svg.appendChild(el('rect',{x:78,y:120,width:44,height:80,rx:12,class:'zone',id:'z-torso'}));   // tronco
  svg.appendChild(el('rect',{x:82,y:196,width:15,height:70,rx:6,fill:'#141c2b',stroke:'#2a3550'})); // perna
  svg.appendChild(el('rect',{x:103,y:196,width:15,height:70,rx:6,fill:'#141c2b',stroke:'#2a3550'}));
  svg.appendChild(el('rect',{x:56,y:124,width:14,height:60,rx:6,fill:'#141c2b',stroke:'#2a3550',id:'z-hands'})); // braço L (mãos)
  svg.appendChild(el('rect',{x:130,y:124,width:14,height:60,rx:6,fill:'#141c2b',stroke:'#2a3550'}));
  svg.appendChild(el('circle',{cx:100,cy:86,r:26,class:'zone',id:'z-head'}));  // cabeça
  // gear overlays (aparecem quando vestidos)
  function gear(id,nodes){ const g=el('g',{class:'gear',id:'g-'+id}); nodes.forEach(n=>g.appendChild(n)); svg.appendChild(g); }
  gear('capacete',[el('path',{d:'M74,80 A26,26 0 0,1 126,80 L126,74 A26,20 0 0,0 74,74 Z',fill:'#ffcf5a',stroke:'#8a6a1e','stroke-width':2})]);
  gear('oculos',[el('rect',{x:80,y:82,width:40,height:12,rx:4,fill:'#54b3ff',opacity:.8,stroke:'#2b6a9a'})]);
  gear('auricular',[el('circle',{cx:74,cy:88,r:7,fill:'#e5590a'}),el('circle',{cx:126,cy:88,r:7,fill:'#e5590a'}),el('path',{d:'M74,82 A26,26 0 0,1 126,82',fill:'none',stroke:'#e5590a','stroke-width':3})]);
  gear('mascara',[el('rect',{x:84,y:92,width:32,height:16,rx:8,fill:'#cbd6ea',stroke:'#8a9bb8'})]);
  gear('luva_termica',[el('rect',{x:54,y:176,width:18,height:16,rx:5,fill:'#ff9a3b',stroke:'#8a4a1e'}),el('rect',{x:128,y:176,width:18,height:16,rx:5,fill:'#ff9a3b',stroke:'#8a4a1e'})]);
  gear('luva_comum',[el('rect',{x:54,y:176,width:18,height:16,rx:5,fill:'#9fb3d6',stroke:'#5a6478'}),el('rect',{x:128,y:176,width:18,height:16,rx:5,fill:'#9fb3d6',stroke:'#5a6478'})]);
  gear('roupa',[el('rect',{x:76,y:118,width:48,height:84,rx:12,fill:'none',stroke:'#39d98a','stroke-width':4}),el('line',{x1:100,y1:120,x2:100,y2:200,stroke:'#39d98a','stroke-width':2})]);
  gear('botina',[el('rect',{x:80,y:262,width:19,height:12,rx:3,fill:'#3a2a1a',stroke:'#7a5a2a'}),el('rect',{x:101,y:262,width:19,height:12,rx:3,fill:'#3a2a1a',stroke:'#7a5a2a'})]);
  gear('colete',[el('rect',{x:78,y:120,width:44,height:60,rx:6,fill:'none',stroke:'#ffe08a','stroke-width':3,'stroke-dasharray':'2 3'})]);

  // bancada
  const tray=$('tray');
  Object.entries(EPI).forEach(([id,e])=>{ const d=document.createElement('div'); d.className='epi'; d.id='epi-'+id;
    d.innerHTML='<span class="ic">'+e.ic+'</span><span class="nm">'+e.n+'</span><span class="zn">'+e.z+'</span>';
    d.onclick=()=>toggle(id); tray.appendChild(d); });
  function toggle(id){ if(worn.has(id)) worn.delete(id); else worn.add(id); redraw(); }
  function redraw(){
    Object.keys(EPI).forEach(id=>{ $('epi-'+id).classList.toggle('on',worn.has(id)); $('g-'+id).classList.toggle('on',worn.has(id)); });
    // zonas acesas
    ['head','eyes','ears','face','torso','hands','feet'].forEach(z=>{ const on=[...worn].some(id=>EPI[id].z===z); const el=$('z-'+z); if(el) el.classList.toggle('on',on); });
  }

  $('clr').onclick=()=>{ worn.clear(); redraw(); };
  $('check').onclick=()=>{
    const req=FX[curFx].req;
    const missing=req.filter(id=>!worn.has(id));
    if(missing.length){ toast('Falta EPI: '+missing.map(id=>EPI[id].n).join(', '),'bad'); return; }
    // exageros perigosos? luva comum onde exige térmica
    if(req.includes('luva_termica') && worn.has('luva_comum') && !worn.has('luva_termica')){ toast('Luva comum não protege do calor/frio — use a térmica/criogênica.','bad'); return; }
    toast('✓ EPI correto para '+FX[curFx].nome+'. '+FX[curFx].note,'good');
    done(curFx);
  };

  // objetivos: conferir EPI certo dos 4 efeitos
  const OBJ=Object.keys(FX).map(k=>({id:k,t:'EPI correto para '+FX[k].nome}));
  const objEls={},objDone={}; let won=false;
  (function(){ const ul=$('objList'); OBJ.forEach(o=>{ const li=document.createElement('li'); li.innerHTML='<span class="bx"></span><span>'+o.t+'</span>'; ul.appendChild(li); objEls[o.id]=li; }); })();
  function done(id){ if(!objDone[id]){ objDone[id]=true; objEls[id].classList.add('done'); objEls[id].querySelector('.bx').textContent='✓';
    if(OBJ.every(o=>objDone[o.id])&&!won){won=true;$('obj').classList.add('win');toast('Operador sempre com o EPI certo — segurança individual é inegociável.','good');} } }

  function setVisH(){ var vh=window.innerHeight, sh=(window.screen&&screen.height)||vh; var inflated=vh>sh+8, visH=Math.min(vh,sh), header=inflated?86:0;
    document.documentElement.style.setProperty('--visH', Math.max(300,visH-header)+'px'); }
  addEventListener('resize',setVisH); addEventListener('orientationchange',()=>setTimeout(setVisH,150));
  document.addEventListener('fullscreenchange',()=>[60,260,600].forEach(d=>setTimeout(setVisH,d)));
  document.addEventListener('webkitfullscreenchange',()=>[60,260,600].forEach(d=>setTimeout(setVisH,d)));
  window.__probe={worn,FX,EPI,equip:(id)=>toggle(id),check:()=>$('check').click(),setFx:(k)=>{curFx=k;$('fxsel').value=k;$('taskFx').textContent=FX[k].nome;},objDone,isWon:()=>won};
  setVisH(); redraw();
})();
</script>
</body></html>
