<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Delay & Antecipação · SMU PRO</title>
<style>
  :root{ --bg:#06080e; --panel:#0c111c; --panel2:#0f1626; --line:#25314c; --ink:#e8eef9; --mut:#8a9bb8; --acc:#ff7a1a; --ok:#39d98a; --bad:#ff4d4d; --warn:#ffc63b; --blue:#54b3ff; }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;background:#05070c;color:var(--ink);font-family:system-ui,Segoe UI,Roboto,Arial;overflow:hidden;-webkit-user-select:none;user-select:none;touch-action:manipulation}
  #app{position:fixed;top:0;left:0;width:100vw;height:var(--visH,100vh);display:flex;flex-direction:column;overflow:hidden;padding:9px;gap:8px}
  #hd{flex:none}#hd b{font-size:14px;font-weight:800}#hd span{display:block;font-size:11px;color:var(--mut)}
  #stageWrap{flex:1 1 auto;min-height:110px;position:relative;background:#04050a;border:1px solid var(--line);border-radius:10px;overflow:hidden}
  #stage{position:absolute;inset:0;width:100%;height:100%}
  #beatRing{position:absolute;left:50%;top:46%;transform:translate(-50%,-50%);width:120px;height:120px;border-radius:50%;border:3px solid #33405e;display:flex;align-items:center;justify-content:center;pointer-events:none}
  #beatRing.hot{border-color:var(--warn);box-shadow:0 0 22px #ffc63b66}
  #beatTxt{font-size:14px;font-weight:800;color:#cbd6ea;text-align:center;line-height:1.2}
  #shrink{position:absolute;border-radius:50%;border:2px solid var(--acc);opacity:.8;pointer-events:none}
  #msg{position:absolute;left:0;right:0;bottom:8px;text-align:center;font-size:13px;font-weight:700;color:var(--warn);text-shadow:0 1px 5px #000;pointer-events:none}
  #ctl{flex:none;display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:center;background:#0a0e18;border:1px solid var(--line);border-radius:11px;padding:9px 10px}
  .sl{display:flex;flex-direction:column;gap:3px;align-items:center;min-width:120px}
  .sl .v{font-size:13px;font-weight:800}.sl label{font-size:9.5px;color:var(--mut);text-transform:uppercase;letter-spacing:.4px}
  input[type=range]{-webkit-appearance:none;appearance:none;width:130px;height:24px;background:transparent;cursor:pointer}
  input[type=range]::-webkit-slider-runnable-track{height:5px;background:#243149;border-radius:3px}
  input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;margin-top:-8px;border-radius:50%;background:var(--acc);border:2px solid #ffd3a8}
  #go{border:1px solid #ffb070;background:linear-gradient(180deg,#ff8f36,#e5590a);color:#180a00;border-radius:12px;padding:14px 30px;font-size:16px;font-weight:900;cursor:pointer}
  #go:active{transform:translateY(1px)}
  #stat{flex:none;display:flex;gap:16px;justify-content:center;font-size:12.5px;padding:2px}
  #stat b{color:var(--ink)}.tag{color:var(--mut)}
  #obj{position:absolute;left:10px;bottom:78px;z-index:6;width:min(300px,64vw);background:#0c1220ee;border:1px solid var(--line);border-radius:11px;padding:9px 11px}
  #obj h4{margin:0 0 5px;font-size:11px;text-transform:uppercase;color:var(--acc)}
  #obj ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:4px}
  #obj li{display:flex;gap:7px;font-size:11.5px;color:#cdd8ea;align-items:flex-start}
  #obj li .bx{flex:none;width:15px;height:15px;border-radius:4px;border:1.5px solid #46567a;margin-top:1px;display:flex;align-items:center;justify-content:center;font-size:10px;color:#04140b}
  #obj li.done .bx{background:var(--ok);border-color:var(--ok)}#obj li.done{color:#8fb8a2}
  #obj.win{border-color:var(--ok);box-shadow:0 0 20px #39d98a44}
  #toast{position:absolute;left:50%;top:12px;transform:translateX(-50%) translateY(-60px);z-index:9;background:#0e1726f2;border:1px solid var(--line);border-radius:10px;padding:8px 14px;font-size:12.5px;font-weight:700;transition:transform .3s;max-width:82vw;text-align:center}
  #toast.show{transform:translateX(-50%) translateY(0)}
  #toast.good{border-color:var(--ok);color:#bff5da}#toast.bad{border-color:var(--bad);color:#ffb3ab}#toast.warn{border-color:var(--warn);color:#ffe6a8}
</style></head>
<body>
<div id="app">
  <div id="hd"><b>Delay & Antecipação</b><span>O efeito não sai na hora do GO — sai depois do delay. Aprenda a antecipar.</span></div>
  <div id="stageWrap"><canvas id="stage"></canvas>
    <div id="beatRing"><div id="beatTxt">—</div></div><div id="shrink" style="display:none"></div>
    <div id="msg">Ajuste o delay do efeito e toque GO na hora certa para o buquê cair no BEAT</div>
  </div>
  <div id="stat"><div><span class="tag">Delay do efeito:</span> <b id="s-delay">1.0 s</b></div><div><span class="tag">Acertos:</span> <b id="s-hit">0</b>/3</div><div><span class="tag">Último desvio:</span> <b id="s-err">—</b></div></div>
  <div id="ctl">
    <div class="sl"><div class="v" id="v-delay">1.0 s</div><input id="delay" type="range" min="3" max="20" value="10"><label>Delay (lift + estopim)</label></div>
    <button id="go">▶ GO</button>
  </div>
  <div id="obj"><h4>🎯 Objetivos</h4><ul id="objList"></ul></div>
  <div id="toast"></div>
</div>
<script>__ENGINE__</script>
<script>
(function(){
  const fx=new StageFX(document.getElementById('stage'),{ haze:0.12, ledWall:0.4, beams:true, performer:false, label:"" });
  window.__fx=fx;
  const $=id=>document.getElementById(id);
  let tT; function toast(m,k){ const t=$('toast'); t.textContent=m; t.className='show '+(k||''); clearTimeout(tT); tT=setTimeout(()=>t.className=(k||''),2400); }

  const BEAT=3.2;                 // s entre beats
  let clock=0, nextBeat=BEAT, delay=1.0, hits=0, pending=null, won=false;
  $('delay').oninput=function(){ delay=+this.value/10; $('v-delay').textContent=delay.toFixed(1)+' s'; $('s-delay').textContent=delay.toFixed(1)+' s'; step('delay'); };

  $('go').onclick=()=>{
    if(pending) return;
    const fireAt=clock+delay;                         // efeito só sai depois do delay
    pending={fireAt};
    toast('GO! O efeito sai em '+delay.toFixed(1)+' s (delay)…','warn');
  };

  const OBJ=[{id:'delay',t:'Entenda o delay: mude o slider e veja o atraso do efeito'},{id:'go',t:'Dispare e veja o buquê sair DEPOIS do GO'},{id:'hit',t:'Acerte o beat 3 vezes antecipando o delay'}];
  const objEls={},objDone={};
  (function(){ const ul=$('objList'); OBJ.forEach(o=>{ const li=document.createElement('li'); li.innerHTML='<span class="bx"></span><span>'+o.t+'</span>'; ul.appendChild(li); objEls[o.id]=li; }); })();
  function step(id){ if(objEls[id]&&!objDone[id]){ objDone[id]=true; objEls[id].classList.add('done'); objEls[id].querySelector('.bx').textContent='✓';
    if(OBJ.every(o=>objDone[o.id])&&!won){won=true;$('obj').classList.add('win');toast('Você antecipa o delay como profissional — o segredo do efeito no tempo.','good');} } }

  let last=performance.now();
  function loop(now){ const dt=Math.min(60,now-last)/1000; last=now; tick(dt); requestAnimationFrame(loop); }
  function tick(dt){ clock+=dt;
    // beat
    const toBeat=nextBeat-clock;
    const ring=$('beatRing');
    ring.classList.toggle('hot', toBeat<0.12 && toBeat>-0.12);
    $('beatTxt').innerHTML = toBeat>0? ('BEAT em<br>'+toBeat.toFixed(1)+' s') : 'BEAT!';
    if(clock>=nextBeat){ nextBeat+=BEAT; }
    // shrink ring visual (antecipação): mostra onde o efeito VAI cair se der GO agora
    // efeito pendente
    if(pending && clock>=pending.fireAt){
      fx.trigger('airburst',{x:640,y:150,burst:70,col:'#ffd24a'});
      setTimeout(()=>fx.trigger('airburst',{x:640,y:150,burst:44,col:'#54b3ff'}),120);
      step('go');
      // erro vs beat mais próximo
      const beats=[]; for(let b=Math.floor(pending.fireAt/BEAT)-1;b<=Math.floor(pending.fireAt/BEAT)+1;b++) beats.push(b*BEAT+BEAT);
      let bd=1e9; beats.forEach(bt=>{ const d=Math.abs(bt-pending.fireAt); if(d<bd)bd=d; });
      const errMs=Math.round(bd*1000);
      $('s-err').textContent=errMs+' ms';
      if(errMs<160){ hits++; $('s-hit').textContent=hits; toast('No beat! (desvio '+errMs+' ms) '+hits+'/3','good'); if(hits>=3) step('hit'); }
      else toast('O buquê caiu '+errMs+' ms fora do beat — antecipe o GO pelo delay ('+delay.toFixed(1)+' s antes).','warn');
      pending=null;
    }
  }
  requestAnimationFrame(loop);

  function setVisH(){ var vh=window.innerHeight, sh=(window.screen&&screen.height)||vh; var inflated=vh>sh+8, visH=Math.min(vh,sh), header=inflated?86:0;
    document.documentElement.style.setProperty('--visH', Math.max(320,visH-header)+'px'); if(fx.resize) fx.resize(); }
  addEventListener('resize',setVisH); addEventListener('orientationchange',()=>setTimeout(setVisH,150));
  document.addEventListener('fullscreenchange',()=>[60,260,600].forEach(d=>setTimeout(setVisH,d)));
  document.addEventListener('webkitfullscreenchange',()=>[60,260,600].forEach(d=>setTimeout(setVisH,d)));
  window.__probe={go:()=>$('go').click(),setDelay:(v)=>{$('delay').value=v;$('delay').oninput();},get clock(){return clock;},get pending(){return pending;},_step:(s)=>tick(s),objDone,isWon:()=>won,get hits(){return hits;}};
  setVisH();
})();
</script>
</body></html>
