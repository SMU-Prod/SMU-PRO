name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint-typecheck-build:
    name: Lint, Type Check, Test & Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type Check
        run: npx tsc --noEmit

      - name: Test
        run: npm test

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          NEXT_PUBLIC_HIGHLIGHT_PROJECT_ID: "placeholder"
          NEXT_PUBLIC_APP_URL: "https://example.com"
          # Placeholders para clients instanciados em escopo de módulo (OpenAI, etc.).
          # O build só instancia os clients — não faz chamadas — então a key não
          # precisa ser real; só não pode estar ausente (o construtor lança).
          OPENAI_API_KEY: "sk-placeholder-ci"
          GEMINI_API_KEY: "placeholder-ci"
          GOOGLE_GENAI_API_KEY: "placeholder-ci"
          ASAAS_API_KEY: "placeholder-ci"
          ASAAS_WEBHOOK_TOKEN: "placeholder-ci"
          ASAAS_ENVIRONMENT: "sandbox"
          RESEND_API_KEY: "re_placeholder_ci"
          CLERK_WEBHOOK_SECRET: "whsec_placeholder_ci"
