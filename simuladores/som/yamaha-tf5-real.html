<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Yamaha TF5 — Simulador fiel (SMU)</title>
<style>
  :root{
    --ink:#eef2f7; --muted:#9aa7b7; --amber:#f5a623; --green:#42d17a; --red:#e94b3f; --cyan:#39c6e6; --blue:#3b9be6;
    --scr:#0f1319;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%,#1a1c20,#0a0b0d 60%),#08090b;
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; overflow:hidden;
    display:flex; align-items:flex-start; justify-content:center;
  }
  /* ===== CONSOLE (TF is darker/flatter than CL graphite) ===== */
  .console{position:relative;width:1560px;height:940px;flex:0 0 auto;transform-origin:top center;
    display:flex;flex-direction:column;gap:8px;padding:12px;
    background:linear-gradient(180deg,#2b2d31,#1d1f22 8%,#16171a 60%,#131416);
    border:1px solid #050506;border-radius:14px;
    box-shadow:0 30px 80px #000a, inset 0 1px 0 #ffffff0c, inset 0 -2px 0 #0008;}
  .console::before{content:"";position:absolute;inset:0;border-radius:14px;pointer-events:none;
    background:linear-gradient(180deg,#ffffff06,transparent 6%);}

  /* utility/top bar */
  .util{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:linear-gradient(180deg,#1c1e22,#121316);border:1px solid #0a0b0d;border-radius:10px;padding:6px 10px}
  .util .brand{display:flex;align-items:baseline;gap:9px;margin-right:4px}
  .util .brand b{font-size:17px;letter-spacing:1px;color:#eef2f8}
  .util .brand .m{font-size:10px;letter-spacing:2px;color:#8a94a4;text-transform:uppercase}
  .util .brand .y{color:var(--amber);font-weight:800;letter-spacing:1px}
  .pill{font-size:10.5px;color:var(--muted);background:#0b0d10;border:1px solid #262b32;border-radius:16px;padding:4px 9px;display:flex;align-items:center;gap:6px;letter-spacing:.4px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.warn{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .btnp{font:inherit;font-size:11.5px;font-weight:700;border:0;border-radius:8px;padding:7px 12px;cursor:pointer}
  .spacer{flex:1}
  select.pill{cursor:pointer;color:var(--ink);font:inherit;font-size:11px;max-width:230px}
  .mission{display:flex;align-items:center;gap:9px;background:#0b0d10;border:1px solid #262b32;border-radius:9px;padding:5px 10px;flex:1 1 320px;min-width:0}
  .mission .idx{font-size:10px;color:var(--amber);font-weight:800;letter-spacing:1px;white-space:nowrap}
  .mission .txt{font-size:11px;line-height:1.25;min-width:0}
  .mission .txt small{color:var(--muted)}
  .mission .txt b{color:#fff}
  .ghost{background:transparent;color:var(--muted);border:1px solid #262b32}

  /* meter bridge */
  .bridge{background:linear-gradient(180deg,#0e0f12,#0a0b0d);border:1px solid #0a0b0d;border-radius:10px;padding:6px 10px 4px;
    box-shadow:inset 0 2px 6px #000a}
  #mbridge{display:block;width:100%;height:52px}

  /* ===== BACK: screen (star) + right control column ===== */
  .back{display:grid;grid-template-columns:1fr 322px;gap:10px;min-height:0}
  .panel{background:linear-gradient(180deg,#24262b,#1b1d21 30%,#151619);border:1px solid #0a0b0d;border-radius:12px;
    box-shadow:inset 0 1px 0 #ffffff0a, inset 0 -2px 4px #0006, 0 4px 12px #0006;padding:10px}
  .sect-title{font-size:9px;letter-spacing:2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin:0 0 7px}
  .sect-title b{color:var(--amber)}

  /* SCREEN column (touch screen is the star) */
  .screencol{display:flex;flex-direction:column;min-height:0;padding:8px}
  .tabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap}
  .tab{font:inherit;font-size:10px;font-weight:600;letter-spacing:.3px;color:#a9b6c8;cursor:pointer;
    background:linear-gradient(180deg,#2a2d33,#1e2025);border:1px solid #0c0d10;border-radius:6px;padding:5px 9px;box-shadow:inset 0 1px 0 #ffffff0c}
  .tab.active{color:#04140a;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33;font-weight:800}
  .tab.sof{margin-left:auto}
  .tab.sof.active{background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;color:#04121a}
  .screen-bezel{flex:1;min-height:0;border-radius:10px;padding:8px;background:linear-gradient(180deg,#0c0d10,#050607);
    border:1px solid #000;box-shadow:inset 0 3px 12px #000c, 0 0 0 2px #24262b}
  #screen{display:block;width:100%;height:100%;border-radius:6px;background:var(--scr);touch-action:none}

  /* RIGHT CONTROL COLUMN */
  .rack{display:flex;flex-direction:column;gap:8px;min-height:0}
  .rk{background:linear-gradient(180deg,#22242a,#181a1e);border:1px solid #0a0b0d;border-radius:10px;padding:8px 9px;
    box-shadow:inset 0 1px 0 #ffffff0a,0 3px 8px #0005}
  /* physical knob */
  .pk{--sz:38px;width:var(--sz);height:var(--sz);position:relative;touch-action:none;cursor:ns-resize}
  .pk .ring{position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(from 215deg, var(--led,#6cf) calc(var(--p,0)*270deg), #0c0e12 0 270deg, #16181d 0);
    -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px));
            mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px))}
  .pk .cap{position:absolute;inset:2px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%,#4d525b,#26292f 62%,#1c1e22);
    border:1px solid #0f1014;box-shadow:inset 0 2px 4px #0009, 0 1px 1px #ffffff10}
  .pk .cap::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:2px;background:#eef2f8;
    box-shadow:0 0 3px #fff8;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) translateY(calc(var(--sz)*-0.30))}
  .pk.tt{--sz:78px}
  .pk.tt .cap{background:radial-gradient(circle at 50% 30%,#5a606b,#2a2d34 60%,#1b1d22)}

  .tt-wrap{display:flex;gap:10px;align-items:center}
  .tt-read{flex:1;min-width:0;background:#0b0d10;border:1px solid #262b32;border-radius:8px;padding:7px 9px}
  .tt-read .l{font-size:8px;letter-spacing:1px;color:#8b95a4;text-transform:uppercase}
  .tt-read .v{font-size:19px;font-weight:800;color:#eef2f8;line-height:1.1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .tt-read .v small{font-size:10px;color:#9aa7b7;font-weight:600}

  .udk{display:flex;justify-content:space-between;gap:6px}
  .kwrap{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
  .klbl{font-size:7.5px;letter-spacing:.3px;color:#93a0b2;text-transform:uppercase;text-align:center;line-height:1.05}
  .kval{font-size:9px;font-weight:700;color:#e9eef6}
  .pk.sm{--sz:30px}
  .pbtn{font:inherit;font-size:8.5px;font-weight:700;letter-spacing:.3px;color:#b9c6d8;text-align:center;cursor:pointer;
    background:linear-gradient(180deg,#32363d,#1f2228);border:1px solid #0e1014;border-radius:5px;padding:6px 3px;
    box-shadow:inset 0 1px 0 #ffffff10, 0 1px 2px #0007;min-width:0}
  .pbtn:active{transform:translateY(1px)}
  .pbtn.lit{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f5a623);border-color:#7a4d06;box-shadow:0 0 8px #f5a62388}
  .pbtn.green.lit{background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33;box-shadow:0 0 8px #22b86688}
  .pbtn.red.lit{background:linear-gradient(180deg,#ff9a92,#e94b3f);border-color:#7a1611;box-shadow:0 0 8px #e94b3f88}
  .pbtn.cyan.lit{color:#04121a;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 8px #39c6e688}
  .ukeys{display:grid;grid-template-columns:repeat(3,1fr);gap:5px}
  .ukey{font:inherit;font-size:8px;font-weight:700;color:#cdd8e6;text-align:center;cursor:pointer;line-height:1.1;position:relative;
    background:linear-gradient(180deg,#32363d,#1f2228);border:1px solid #0e1014;border-radius:6px;padding:7px 2px;
    box-shadow:inset 0 1px 0 #ffffff10,0 1px 2px #0007;min-height:32px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .ukey .kk{font-size:7px;color:#f5a623;font-weight:800;letter-spacing:.5px}
  .ukey.on{color:#04121a;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 7px #39c6e666}
  .ukey.on .kk{color:#04121a}
  .grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:5px}
  .grid2{display:grid;grid-template-columns:1fr 1fr;gap:5px}
  .scene{display:flex;gap:9px;align-items:center}
  .scenum{background:#07130c;border:1px solid #1c3a26;border-radius:7px;padding:5px 10px;min-width:88px;text-align:center;box-shadow:inset 0 2px 6px #000}
  .scenum .n{font-family:"DS-Digital","Courier New",monospace;font-size:24px;font-weight:800;color:#37e08a;letter-spacing:2px;line-height:1;text-shadow:0 0 8px #37e08a66}
  .scenum .l{font-size:8px;color:#5f8a72;letter-spacing:1px}
  .scbtns{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}

  /* ===== FRONT: fader bay (32 + master) ===== */
  .front{background:linear-gradient(180deg,#1e2023,#151619);border:1px solid #0a0b0d;border-radius:12px;padding:8px;
    box-shadow:inset 0 1px 0 #ffffff08, 0 6px 16px #0006}
  .bayhead{display:flex;gap:5px;align-items:center;margin-bottom:6px;flex-wrap:wrap}
  .bhl{font-size:8.5px;letter-spacing:1.4px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin-right:2px}
  .bkey{font:inherit;font-size:8.5px;font-weight:700;color:#b9c6d8;cursor:pointer;
    background:linear-gradient(180deg,#2e323a,#1e2126);border:1px solid #0e1014;border-radius:5px;padding:4px 8px}
  .bkey.on{color:#04140a;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33}
  .bay{display:flex;gap:3px;align-items:stretch}
  .vsep{width:2px;align-self:stretch;background:linear-gradient(180deg,#0a0b0d,#2e323a,#0a0b0d);border-radius:2px;margin:0 4px}
  .strip{width:41px;flex:0 0 auto;background:linear-gradient(180deg,#191b1f,#121316);border:1px solid #0a0b0d;border-radius:7px;
    padding:4px 3px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:inset 0 1px 0 #ffffff08}
  .strip.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber) inset,0 0 8px #f5a62344}
  .lcd{width:100%;height:26px;border-radius:4px;position:relative;overflow:hidden;border:1px solid #000;cursor:pointer;
    box-shadow:inset 0 2px 4px #0008;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .lcd .cn{font-size:8px;font-weight:800;line-height:1.05;color:#0b0f14;text-align:center;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .lcd .cnum{font-size:6.5px;font-weight:700;color:#0b0f1499;line-height:1}
  .sbtn{width:100%;font:inherit;font-size:8px;font-weight:800;letter-spacing:.3px;color:#93a0b2;cursor:pointer;text-align:center;
    background:linear-gradient(180deg,#282c33,#191b20);border:1px solid #0a0b0d;border-radius:4px;padding:3px 0}
  .sbtn.cue.act{color:#04121a;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70}
  .sbtn.on.act{color:#0b0f14;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33}
  .fzone{display:flex;gap:4px;flex:1;width:100%;justify-content:center;min-height:150px}
  .meter{width:6px;border-radius:2px;background:#05070a;position:relative;overflow:hidden;border:1px solid #14171d}
  .meter i{position:absolute;left:0;right:0;bottom:0;height:0;background:linear-gradient(0deg,#37c86a,#37c86a 62%,#e8c33a 84%,#e94b3f);transition:height .05s linear}
  .fader{width:22px;flex:0 0 auto;position:relative;background:linear-gradient(90deg,#0a0b0d,#141519,#0a0b0d);border-radius:4px;border:1px solid #0a0b0d;cursor:ns-resize;touch-action:none}
  .fader .trk{position:absolute;left:50%;top:8px;bottom:8px;width:2px;transform:translateX(-50%);background:#000}
  .fader .u{position:absolute;left:2px;right:2px;height:1px;background:#39414f}
  .capf{position:absolute;left:-4px;right:-4px;height:20px;border-radius:3px;cursor:grab;
    background:linear-gradient(180deg,#20232a,#0e0f12 48%,#050506 52%,#16181d);border:1px solid #000;box-shadow:0 2px 4px #000a,inset 0 1px 0 #ffffff14}
  .capf::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#c9d2e0;border-radius:1px}
  .strip.master .lcd{background:#2a1e06}
  .strip.master .lcd .cn{color:#ffd27a}

  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px);
    background:#12151a;border:1px solid var(--amber);color:var(--ink);padding:10px 16px;border-radius:10px;
    font-size:12.5px;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 8px 30px #000a}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--amber)}
  .console:not(.stacked){touch-action:none}
  body:not(.stacked){touch-action:none}
  /* PHONE (stacked): full-width, touchscreen is the star, one page at a time on the
     canvas via the horizontally-scrollable tab bar; the fader bay scrolls INSIDE its own
     container so the page body never scrolls horizontally (no overflow at any width). */
  .console.stacked{width:100%;max-width:100%;height:auto;transform:none!important;zoom:1!important;touch-action:auto;padding:8px;gap:8px}
  .console.stacked .back{grid-template-columns:minmax(0,1fr)}
  .console.stacked .screencol,.console.stacked .rack,.console.stacked .rk{min-width:0}
  .console.stacked .brand .m{display:none}
  .console.stacked .util{gap:6px}
  .console.stacked .mission{flex:1 1 100%}
  .console.stacked .screencol{padding:6px}
  .console.stacked .screen-bezel{flex:none;height:min(58vh,360px)}
  .console.stacked .tabs{overflow-x:auto;flex-wrap:nowrap;-webkit-overflow-scrolling:touch}
  .console.stacked .tab{flex:0 0 auto}
  .console.stacked .front{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .console.stacked .bay{min-width:max-content}
  .console.stacked .strip{width:38px}
  body.stacked{overflow-x:hidden;overflow-y:auto}
</style>
</head>
<body>
<div class="console" id="console">

  <!-- UTILITY BAR -->
  <div class="util">
    <div class="brand"><b><span class="y">YAMAHA</span> TF5</b><span class="m">Digital Mixing Console · TouchFlow · Simulador SMU</span></div>
    <div class="pill"><span class="dot" id="danteLed"></span> DANTE <span id="danteTxt" style="color:var(--ink)">NY64-D</span></div>
    <div class="pill">48 kHz</div>
    <button class="btnp" id="playBtn" style="background:#22b866;color:#04121a">► Tocar base</button>
    <select id="songSel" class="pill"></select>
    <span class="pill" id="audioStatus" style="color:var(--muted)">áudio: —</span>
    <div class="spacer"></div>
    <div class="mission">
      <span class="idx" id="mIdx">MISSÃO 1/5</span>
      <span class="txt" id="mTxt">—</span>
      <button class="btnp ghost" id="mSkip">Pular</button>
    </div>
  </div>

  <!-- METER BRIDGE -->
  <div class="bridge"><canvas id="mbridge"></canvas></div>

  <!-- BACK: touch screen + right controls -->
  <div class="back">

    <!-- TOUCH SCREEN (the star) -->
    <div class="panel screencol">
      <div class="tabs" id="tabs">
        <button class="tab active" data-mode="chview">CH VIEW</button>
        <button class="tab" data-mode="overview">OVERVIEW</button>
        <button class="tab" data-mode="eq">EQ</button>
        <button class="tab" data-mode="gate">GATE</button>
        <button class="tab" data-mode="comp">COMP</button>
        <button class="tab" data-mode="sends">SEND TO AUX</button>
        <button class="tab" data-mode="fx">FX</button>
        <button class="tab" data-mode="dca">DCA</button>
        <button class="tab" data-mode="scenes">SCENE</button>
        <button class="tab" data-mode="meter">METER</button>
        <button class="tab sof" id="sofBtn">SENDS ON FADER</button>
      </div>
      <div class="screen-bezel"><canvas id="screen"></canvas></div>
    </div>

    <!-- RIGHT CONTROLS -->
    <div class="rack">
      <div class="rk">
        <div class="sect-title">USER DEFINED KEYS</div>
        <div class="ukeys" id="ukeys"></div>
      </div>
      <div class="rk">
        <div class="sect-title">TOUCH AND TURN</div>
        <div class="tt-wrap">
          <div class="pk tt" id="ttKnob"><div class="ring" style="--led:#f5c76a"></div><div class="cap"></div></div>
          <div class="tt-read"><div class="l" id="ttLabel">toque um parâmetro</div><div class="v" id="ttVal">—</div></div>
        </div>
      </div>
      <div class="rk">
        <div class="sect-title">USER DEFINED KNOBS</div>
        <div class="udk" id="udknobs"></div>
      </div>
      <div class="rk">
        <div class="sect-title">SCENE MEMORY</div>
        <div class="scene">
          <div class="scenum"><div class="n" id="scnNum">001</div><div class="l" id="scnName">— SCENE —</div></div>
          <div class="scbtns">
            <button class="pbtn" id="scStore">STORE</button>
            <button class="pbtn green" id="scRecall">RECALL</button>
            <button class="pbtn" id="scInc">INC ▲</button>
            <button class="pbtn" id="scDec">DEC ▼</button>
          </div>
        </div>
      </div>
      <div class="rk">
        <div class="sect-title">MUTE</div>
        <div class="grid2" id="mutes"></div>
      </div>
      <div class="rk" style="flex:1;min-height:0">
        <div class="sect-title">SECTION / MONITOR</div>
        <div class="grid3" style="margin-bottom:6px">
          <button class="pbtn" data-sec="chview">HOME</button>
          <button class="pbtn" data-sec="meter">METER</button>
          <button class="pbtn" data-sec="scenes">SCENE</button>
        </div>
        <div class="grid3" style="margin-bottom:6px">
          <button class="pbtn" id="secSof">SENDS ON F.</button>
          <button class="pbtn" id="tapKey">TAP</button>
          <button class="pbtn red" id="dimKey">DIM</button>
        </div>
        <div class="grid2">
          <button class="pbtn" id="monKey">PHONES</button>
          <button class="pbtn red" id="tbKey">TALKBACK</button>
        </div>
      </div>
    </div>
  </div>

  <!-- FRONT: fader bay -->
  <div class="front">
    <div class="bayhead">
      <span class="bhl">FADER BANK</span>
      <span id="bankKeys" style="display:flex;gap:5px;flex-wrap:wrap"></span>
      <div class="spacer"></div>
      <span class="pill" id="bankInfo" style="font-size:9px">CH 1-32</span>
    </div>
    <div class="bay" id="bay"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  /* ================= MODEL (TF5) ================= */
  const NCH=40;                 // 40 mono input channels (TF5)
  const N_AUX=20, N_DCA=8, N_SCENE=200;   // TF5: 20 AUX, 8 DCA, 200 scenes (Bank A/B)
  const AUX_NAMES=Array.from({length:N_AUX},(_,i)=>{
    const st=["Mon 1","Mon 2","IEM 1","IEM 2","IEM 3","IEM 4","FX Rev","FX Dly","Sub L","Sub R","Fill 1","Fill 2","Drum Sub","Voc Sub","FB 1","FB 2","Rec L","Rec R","Broadcast","Spare"];
    return "AUX "+(i+1)+" "+(st[i]||""); });
  const COLORS=["#e94b3f","#f97316","#f5a623","#eab308","#42d17a","#14b8a6","#39c6e6","#3b82f6","#6366f1","#a855f7","#ec4899","#f43f5e"];
  const NAMES=["CH 1","CH 2","CH 3","CH 4","CH 5","CH 6","CH 7","CH 8"];

  // 1-knob EQ presets (channel-type curves; the single knob scales intensity flat..2x)
  const ONE_EQ_PRESETS={
    "Vocal":   {bands:[{type:'lowshelf',f:120,g:-2.5,q:0.7},{type:'peaking',f:450,g:-2,q:1.1},{type:'peaking',f:3200,g:3,q:1.0},{type:'highshelf',f:11000,g:3,q:0.7}]},
    "E.Bass":  {bands:[{type:'lowshelf',f:80,g:3,q:0.7},{type:'peaking',f:250,g:-2.5,q:1.2},{type:'peaking',f:800,g:1.5,q:1.0},{type:'highshelf',f:4000,g:1,q:0.7}]},
    "Kick":    {bands:[{type:'lowshelf',f:60,g:4,q:0.7},{type:'peaking',f:400,g:-4,q:1.4},{type:'peaking',f:3000,g:3,q:1.0},{type:'highshelf',f:8000,g:2,q:0.7}]},

  const EQ_TYPES=Object.keys(ONE_EQ_PRESETS);

  function mkChannel(i){
    return { i, name:NAMES[i]||("CH "+(i+1)), color:COLORS[i%COLORS.length],
      gain:24, phase:false, phantom:false, hpfOn:false, hpf:100, lpfOn:false, lpf:18000,

  const CH=Array.from({length:NCH},(_,i)=>mkChannel(i));
  const state={ sel:0, mode:"chview", sof:-1, sofBus:0, sofType:'aux', master:-3, sub:-6,
    scene:0, monitor:-20, dim:false, talkback:false, phones:true,
    dcaGain:new Array(N_DCA).fill(0), dcaOn:new Array(N_DCA).fill(true),

  const scenes=new Array(N_SCENE).fill(null);

  /* ================= HELPERS ================= */
  const $=s=>document.querySelector(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const FMIN=-90,FMAX=10;
  function faderTxt(db){ return db<=FMIN?"−∞":(db>0?"+":"")+db.toFixed(1); }
  function panTxt(p){ if(Math.abs(p)<2)return"C"; return (p<0?"L"+Math.round(-p):"R"+Math.round(p)); }
  function pos2db(p){ if(p<=0.01)return FMIN; return clamp(-60+p*70,FMIN,FMAX); }

  function fx(f){ const mn=Math.log10(20),mx=Math.log10(20000); return (Math.log10(f)-mn)/(mx-mn); }
  function fInv(t){ const mn=Math.log10(20),mx=Math.log10(20000); return Math.pow(10,mn+clamp(t,0,1)*(mx-mn)); }
  function perf(){ return performance.now(); }
  function fmtFreq(f){ return f>=1000?(f/1000).toFixed(f>=10000?0:1)+"k":Math.round(f); }
  function pickInk(hex){ const h=hex.replace('#',''); if(h.length<6)return "#0b0f14";
    const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    return (0.299*r+0.587*g+0.114*b)>150?"#0b0f14":"#f4f8ff"; }

  /* ================= SCREEN COLOR THEME (TF dark) ================= */
  const SC={ bg0:"#0d0f13",bg1:"#161a21", panel:"#1c222b", panelHi:"#232a34", panelLo:"#161b22",
    border:"#333d4a", line:"#2a323d", grid:"#232a34",
    ink:"#eef2f7", mut:"#9aa7b7", dim:"#5f6b7a",
    amber:"#f5a623", green:"#42d17a", red:"#e94b3f", cyan:"#39c6e6", blue:"#3b9be6",
    band:["#e0554e","#e0b84e","#4ec0e0","#8f7dff"] };

  /* ================= biquad magnitude ================= */
  const FS=48000;
  function biquadDb(type,f0,gainDb,Q,f){
    f0=clamp(f0,10,FS/2-10);Q=Math.max(0.05,Q);
    const w0=2*Math.PI*f0/FS,cw=Math.cos(w0),sw=Math.sin(w0),A=Math.pow(10,gainDb/40),alpha=sw/(2*Q);
    let b0,b1,b2,a0,a1,a2;
    if(type==='peaking'){b0=1+alpha*A;b1=-2*cw;b2=1-alpha*A;a0=1+alpha/A;a1=-2*cw;a2=1-alpha/A;}
    else if(type==='lowshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)-(A-1)*cw+s2);b1=2*A*((A-1)-(A+1)*cw);b2=A*((A+1)-(A-1)*cw-s2);a0=(A+1)+(A-1)*cw+s2;a1=-2*((A-1)+(A+1)*cw);a2=(A+1)+(A-1)*cw-s2;}
    else if(type==='highshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)+(A-1)*cw+s2);b1=-2*A*((A-1)+(A+1)*cw);b2=A*((A+1)+(A-1)*cw-s2);a0=(A+1)-(A-1)*cw+s2;a1=2*((A-1)-(A+1)*cw);a2=(A+1)-(A-1)*cw-s2;}
    else if(type==='highpass'){b0=(1+cw)/2;b1=-(1+cw);b2=(1+cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    else {b0=(1-cw)/2;b1=1-cw;b2=(1-cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    const w=2*Math.PI*f/FS,phi=Math.pow(Math.sin(w/2),2);
    const num=Math.pow(b0+b1+b2,2)-4*(b0*b1+4*b0*b2+b1*b2)*phi+16*b0*b2*phi*phi;
    const den=Math.pow(a0+a1+a2,2)-4*(a0*a1+4*a0*a2+a1*a2)*phi+16*a0*a2*phi*phi;
    return 10*Math.log10(Math.max(1e-9,num)/Math.max(1e-9,den));
  }
  function eqMag(ch,f){ let g=0;
    for(const b of ch.eq){ if(b.g!==0) g+=biquadDb(b.type,b.f,b.g,b.q,f); }
    if(ch.hpfOn) g+=biquadDb('highpass',ch.hpf,0,0.707,f);
    if(ch.lpfOn) g+=biquadDb('lowpass',ch.lpf,0,0.707,f);
    return clamp(g,-30,20); }

  /* ================= 1-KNOB EQ / COMP mapping (TouchFlow) ================= */
  function applyOneEq(ch){
    const p=ONE_EQ_PRESETS[ch.oneEqType]||ONE_EQ_PRESETS.Vocal;
    const k=ch.oneEqMode==='vocal'? (ch.oneEqAmt/10) : (ch.oneEqAmt/5); // vocal(HPF-ish):0..1 ; intensity:0..2
    p.bands.forEach((bd,i)=>{ const e=ch.eq[i]; e.type=bd.type; e.f=bd.f; e.q=bd.q; e.g=+(bd.g*k).toFixed(2); });
  }
  function applyOneComp(ch){
    const a=clamp(ch.oneComp,0,10);
    ch.compOn = a>0.05;
    ch.compThr  = -(a*3.6);                 // 0→0dB … 10→-36dB
    ch.compRatio= 1 + a*0.42;               // 0→1 … 10→5.2
    ch.compGain = a*0.55;                   // auto make-up up to ~5.5dB
    ch.compAtk  = 15; ch.compRel=180; ch.compKnee=2;
  }

  /* ================= TOUCH AND TURN ================= */
  function ttDisplay(v){ const o=state.tt; if(!o)return;
    $("#ttLabel").textContent=o.label; $("#ttVal").innerHTML=o.fmt?o.fmt(v):(""+v);
    let p=o.log?(Math.log(Math.max(o.min,v))-Math.log(o.min))/(Math.log(o.max)-Math.log(o.min)):(v-o.min)/(o.max-o.min);
    setKnobPos($("#ttKnob"),clamp(p,0,1)); }
  function armTT(o){ state.tt=o; state.ttCur=o.get(); ttDisplay(state.ttCur); }
  // refreshTT re-syncs from the LIVE model (called by on-screen touch-drag handlers)
  function refreshTT(){ const o=state.tt;
    if(!o){ $("#ttLabel").textContent="toque um parâmetro"; $("#ttVal").innerHTML="—"; setKnobPos($("#ttKnob"),0); return; }
    state.ttCur=o.get(); ttDisplay(state.ttCur); }
  function setKnobPos(el,p){ el.style.setProperty('--p',p); el.style.setProperty('--rot',(-135+p*270)+'deg'); }
  function wireTT(){
    const el=$("#ttKnob"); let drag=false,lastY=0;
    el.addEventListener("pointerdown",e=>{ if(!state.tt)return; drag=true;lastY=e.clientY;try{el.setPointerCapture(e.pointerId);}catch(x){}; e.preventDefault(); });
    el.addEventListener("pointermove",e=>{ if(!drag||!state.tt)return; const o=state.tt; const dy=lastY-e.clientY; lastY=e.clientY;
      let v=state.ttCur;   // accumulate on our own running value (arm getters may not be live)
      if(o.log){ let p=(Math.log(Math.max(o.min,v))-Math.log(o.min))/(Math.log(o.max)-Math.log(o.min)); p=clamp(p+dy/170,0,1); v=o.min*Math.pow(o.max/o.min,p); }
      else { v=v+dy*(o.max-o.min)/170; }
      v=clamp(v,o.min,o.max); if(o.step)v=Math.round(v/o.step)*o.step;
      state.ttCur=v; o.set(v); ttDisplay(v); drawScreen(); e.preventDefault(); });
    const up=()=>drag=false; el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
  }

  function selectChannel(i){ if(i<0||i>=NCH)return; state.sel=i; state.pink=null; armGainFinder(); paintBay(); drawScreen(); checkMissions(); }
  function armGainFinder(){ const ch=CH[state.sel];
    armTT({label:"GAIN · "+ch.name,min:-6,max:65,get:()=>ch.gain,fmt:v=>((v>0?"+":"")+v.toFixed(0)+" <small>dB</small>"),
      set:v=>{ch.gain=v;applyChanAudio(ch.i);checkMissions();}}); }

  /* ================= forward decls ================= */
  let paintBay=function(){}, renderScreen=function(){}, applyChanAudio=function(){}, applyMonitor=function(){};
  // Redraw coalescing (iPad): a fader/knob drag fires many pointermove events; each must NOT
  // trigger a synchronous full-canvas repaint (that starves the main thread on iPad, making
  // faders lag and jump so the sound seems to cut instead of ride smoothly). drawScreen() now
  // just flags "dirty" and repaints at most once per animation frame; a setTimeout safety-net
  // guarantees a repaint even if requestAnimationFrame is throttled.
  let _drawReq=0,_drawTo=0;
  function _flushDraw(){ if(_drawReq){cancelAnimationFrame(_drawReq);_drawReq=0;} if(_drawTo){clearTimeout(_drawTo);_drawTo=0;} renderScreen(); }
  function drawScreen(){ if(_drawReq||_drawTo)return; _drawReq=requestAnimationFrame(_flushDraw); _drawTo=setTimeout(_flushDraw,60); }

  /* ================= FADER BAY ================= */
  const BAY=$("#bay"); let bayStrips=[];
  const NBAY=32;
  const faderBank={ cur:0, banks:[
    {t:'ch',from:0,label:'INPUT1',info:'CH 1-32'},
    {t:'ch',from:32,label:'INPUT2',info:'CH 33-40 · ST IN · FX'},
    {t:'aux',from:0,label:'OUTPUT',info:'AUX 1-20 · STEREO · SUB'},
    {t:'dca',from:0,label:'GROUP',info:'DCA 1-8'},
    {t:'custom',from:0,label:'CUSTOM',info:'CUSTOM FADER BANK'} ]};
  // CUSTOM fader bank: curated masters + key channels
  const CUSTOM=[['dca',0],['dca',1],['dca',2],['dca',3],['dca',4],['dca',5],['dca',6],['dca',7],
    ['aux',0],['aux',1],['aux',2],['aux',3],['aux',4],['aux',5],['aux',6],['aux',7]];

  function stripDesc(kind,idx){
    if(kind==='ch'){
      return { kind, get name(){return CH[idx].name;}, get color(){return CH[idx].color;}, get num(){return "CH"+(idx+1);},
        get sel(){return state.sel===idx;}, doSel(){ selectChannel(idx); }, get chIdx(){return idx;},
        get on(){ return state.sof>=0 ? CH[idx].sendOn[state.sofBus] : CH[idx].on; },
        toggleOn(){ const c=CH[idx]; if(state.sof>=0){ c.sendOn[state.sofBus]=!c.sendOn[state.sofBus]; } else { c.on=!c.on; applyChanAudio(idx); } },
        get fdb(){ return state.sof>=0 ? CH[idx].sends[state.sofBus] : CH[idx].fader; },
        setFdb(v){ const c=CH[idx]; if(state.sof>=0){ c.sends[state.sofBus]=v; if(v>FMIN)c.sendOn[state.sofBus]=true; } else { c.fader=v; applyChanAudio(idx); } },
        meter(){ return meterDbOf(idx); }, hasAudio(){return CH[idx].hasAudio;} };
    }

        get sel(){return false;}, doSel(){ setMode('dca'); },
        get on(){ return state.dcaOn[idx]; }, toggleOn(){ state.dcaOn[idx]=!state.dcaOn[idx]; for(let i=0;i<NCH;i++)if(CH[i].dca[idx])applyChanAudio(i); },
        get fdb(){ return state.dcaGain[idx]; }, setFdb(v){ state.dcaGain[idx]=v; for(let i=0;i<NCH;i++)if(CH[i].dca[idx])applyChanAudio(i); },

        get on(){ return state.auxOn[idx]; }, toggleOn(){ state.auxOn[idx]=!state.auxOn[idx]; },
        get fdb(){ return state.auxMaster[idx]; }, setFdb(v){ state.auxMaster[idx]=v; },
        meter(){return -90;}, hasAudio(){return true;} };
    }
    if(kind==='st'){
      return { kind, get name(){return "STEREO";}, get color(){return "#ffd27a";}, get num(){return "ST";},
        get sel(){return false;}, doSel(){}, get on(){return true;}, toggleOn(){},
        get fdb(){return state.master;}, setFdb(v){ state.master=v; applyMasterAudio(); },
        meter(){return playing?masterLevelDb():-90;}, hasAudio(){return true;} };

      return { kind, get name(){return "SUB";}, get color(){return "#ffd27a";}, get num(){return "SUB";},
        get sel(){return false;}, doSel(){}, get on(){return true;}, toggleOn(){},

  }
  function meterDbOf(i){ const ch=CH[i];

  function currentDescriptors(){
    const list=[]; const b=faderBank.banks[faderBank.cur];
    for(let s=0;s<NBAY;s++){
      if(b.t==='ch'){ const gi=b.from+s; list.push(gi<NCH?stripDesc('ch',gi):stripDesc('empty')); }
      else if(b.t==='aux'){ list.push(s<N_AUX?stripDesc('aux',s):stripDesc('empty')); }
      else if(b.t==='dca'){ list.push(s<N_DCA?stripDesc('dca',s):stripDesc('empty')); }
      else if(b.t==='custom'){ const c=CUSTOM[s]; list.push(c?stripDesc(c[0],c[1]):stripDesc('empty')); }
      else list.push(stripDesc('empty'));

    return list;
  }

  function buildBankKeys(){
    const host=$("#bankKeys"); host.innerHTML="";
    faderBank.banks.forEach((b,i)=>{ const el=document.createElement("button"); el.className="bkey"+(i===faderBank.cur?" on":"");
      el.textContent=b.label; el.onclick=()=>{ faderBank.cur=i; buildBankKeys(); paintBay(); $("#bankInfo").textContent=b.info; }; host.appendChild(el); });
    $("#bankInfo").textContent=faderBank.banks[faderBank.cur].info;

  function buildBay(){
    BAY.innerHTML=""; bayStrips=[];
    for(let s=0;s<NBAY;s++) bayStrips.push(mkStrip(BAY,false));
    const sep=document.createElement("div"); sep.className="vsep"; BAY.appendChild(sep);
    bayStrips.push(mkStrip(BAY,true)); bayStrips.push(mkStrip(BAY,true));
  }
  function mkStrip(host,master){
    const st=document.createElement("div"); st.className="strip"+(master?" master":"");
    st.innerHTML=`
      <div class="lcd"><div class="cn"></div><div class="cnum"></div></div>
      <button class="sbtn cue">CUE</button>
      <div class="fzone"><div class="meter"><i></i></div><div class="fader"><div class="trk"></div><div class="u"></div><div class="capf"></div></div></div>
      <button class="sbtn on">ON</button>`;
    host.appendChild(st);
    const o={ root:st, lcd:st.querySelector(".lcd"), cn:st.querySelector(".cn"), cnum:st.querySelector(".cnum"),
      cue:st.querySelector(".sbtn.cue"), on:st.querySelector(".sbtn.on"),
      meter:st.querySelector(".meter i"), fader:st.querySelector(".fader"), cap:st.querySelector(".capf"), ctl:null, cueOn:false };

  function wireStrip(o){
    let drag=false;
    const toDb=cy=>{ const r=o.fader.getBoundingClientRect(); return pos2db(1-(cy-r.top)/r.height); };
    const mv=e=>{ if(!drag||!o.ctl)return; o.ctl.setFdb(toDb(e.clientY)); paintOneStrip(o); if(state.mode!=="overview")drawScreen(); checkMissions(); e.preventDefault(); };
    o.fader.addEventListener("pointerdown",e=>{ drag=true; o.fader.setPointerCapture(e.pointerId); mv(e); e.preventDefault(); });
    o.fader.addEventListener("pointermove",mv);
    const up=()=>drag=false; o.fader.addEventListener("pointerup",up); o.fader.addEventListener("pointercancel",up);

    o.cue.onclick=()=>{ const c=o.ctl; if(c&&c.kind==='ch'){ CH[c.chIdx].cue=!CH[c.chIdx].cue; applyCue(); } };
    o.on.onclick=()=>{ if(o.ctl){ o.ctl.toggleOn(); paintBay(); if(state.mode!=="overview")drawScreen(); checkMissions(); } };
  }
  paintBay=function(){
    const descs=currentDescriptors();
    for(let i=0;i<bayStrips.length;i++){ const o=bayStrips[i], d=descs[i]; if(!d){continue;} o.ctl=d; paintOneStrip(o); }
  };
  // CUE = SOLO-in-place (AFL): se algum canal está em CUE, só os canais em CUE são ouvidos.
  function anyCue(){ for(let i=0;i<CH.length;i++){ if(CH[i].cue) return true; } return false; }
  function applyCue(){ for(let i=0;i<CH.length;i++) applyChanAudio(i); if(typeof paintBay==='function') paintBay(); if(state.mode!=="overview") drawScreen(); }
  function clearCue(){ for(let i=0;i<CH.length;i++) CH[i].cue=false; applyCue(); }
  function paintOneStrip(o){
    const c=o.ctl; if(!c){return;}

    o.cn.textContent=empty?"":c.name; o.cnum.textContent=empty?"":c.num;
    o.lcd.style.background=empty?"#15171b":c.color;

    o.root.classList.toggle("sel", !!c.sel);

    o.on.textContent = (state.sof>=0&&c.kind==='ch')? (c.on?"SEND":"OFF") : "ON";
    o.fader.style.opacity = empty?0.35:1;
  }

  function engageSof(type,bus){
    if(state.sof>=0 && state.sofType===type && state.sofBus===bus){ state.sof=-1; }
    else { state.sof=0; state.sofType=type; state.sofBus=bus; if(faderBank.banks[faderBank.cur].t!=='ch'){ faderBank.cur=0; buildBankKeys(); } }

  }
  function updateSofUi(){ const on=state.sof>=0; const btn=$("#sofBtn");
    btn.classList.toggle("active",on);
    btn.textContent = on ? ("SENDS ON FADER · AUX "+(state.sofBus+1)) : "SENDS ON FADER";
  }

  /* ================= SCREEN (canvas) ================= */
  const cv=$("#screen"), ctx=cv.getContext("2d"); let W=0,H=0,DPR=1;
  const mb=$("#mbridge"), mbx=mb.getContext("2d"); let MBW=0,MBH=0;
  function sizeCanvas(){ DPR=Math.min(2,window.devicePixelRatio||1);
    let r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=W*DPR; cv.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    r=mb.getBoundingClientRect(); MBW=r.width; MBH=r.height; mb.width=MBW*DPR; mb.height=MBH*DPR; mbx.setTransform(DPR,0,0,DPR,0,0);
    drawScreen(); }
  function roundRect(x,y,w,h,r){ ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
  let hitRegions=[], activeRegion=null, gesture=null; const dragBase={};
  function reg(o){ hitRegions.push(o); return o; }
  // CH VIEW "toque no campo p/ abrir a página" (TouchFlow: tocar o campo abre a tela).
  // Registrado ANTES dos controles do campo: o hit-test corre do último p/ o primeiro,
  // então knobs/botões desenhados depois mantêm prioridade. Só o fundo do campo navega.
  function navField(x,y,w,h,mode){ reg({x,y,w,h,nav:mode,onDown:()=>setMode(mode)}); }
  function inRegion(r,p){ if(r.hit==='circle')return Math.hypot(p.x-r.cx,p.y-r.cy)<=(r.rr||12); return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
  function evtPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
  cv.addEventListener("pointerdown",e=>{ const p=evtPos(e);
    for(let i=hitRegions.length-1;i>=0;i--){ const r=hitRegions[i]; if(inRegion(r,p)){
      if(r.arm){ armTT(r.arm()); state.pink = r.hit==='circle'?{x:r.cx-(r.rr||12),y:r.cy-(r.rr||12),w:(r.rr||12)*2,h:(r.rr||12)*2}:{x:r.x,y:r.y,w:r.w,h:r.h}; }
      if(r.onDown)r.onDown(p);
      if(r.onDrag||r.onFlick){ activeRegion=r; r._sx=p.x; r._sy=p.y; cv.setPointerCapture(e.pointerId); if(r.onDrag)r.onDrag(p); } drawScreen(); e.preventDefault(); return; } } });
  cv.addEventListener("pointermove",e=>{ if(!activeRegion)return; const p=evtPos(e); if(activeRegion.onDrag)activeRegion.onDrag(p); if(activeRegion.onFlick)activeRegion._ly=p.y; drawScreen(); e.preventDefault(); });
  const cvUp=e=>{ if(activeRegion&&activeRegion.onFlick){ const p=evtPos(e); const dy=activeRegion._sy-p.y; if(dy>36)activeRegion.onFlick(dy); } activeRegion=null; };
  cv.addEventListener("pointerup",cvUp); cv.addEventListener("pointercancel",()=>activeRegion=null);

  function scrBg(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,SC.bg1); g.addColorStop(1,SC.bg0); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  function panel(x,y,w,h,title,accent){ const g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,SC.panelHi); g.addColorStop(1,SC.panelLo);
    ctx.fillStyle=g; roundRect(x,y,w,h,7); ctx.fill(); ctx.strokeStyle=accent||SC.border; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,h-1,7); ctx.stroke();
    if(title){ ctx.fillStyle=SC.mut; ctx.font="700 9px Inter,system-ui"; ctx.textAlign="left"; ctx.textBaseline="alphabetic"; ctx.fillText(title,x+9,y+13); } }
  function shade(hex,amt){ const h=hex.replace('#',''); let r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255); return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }
  function scrBtn(x,y,w,h,label,active,onClick,col,small){ col=col||SC.amber;
    const g=ctx.createLinearGradient(0,y,0,y+h); if(active){ g.addColorStop(0,col); g.addColorStop(1,shade(col,-30)); } else { g.addColorStop(0,"#2b323d"); g.addColorStop(1,"#1c222b"); }
    ctx.fillStyle=g; roundRect(x,y,w,h,5); ctx.fill(); ctx.strokeStyle=active?shade(col,-40):"#3a4553"; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,h-1,5); ctx.stroke();
    ctx.fillStyle=active?"#0b1420":"#cfe0f0"; ctx.font="700 "+(small?9:10)+"px Inter,system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(label,x+w/2,y+h/2+.5); ctx.textBaseline="alphabetic";
    if(onClick) reg({x,y,w,h,onDown:()=>onClick()}); }
  function scrParam(x,y,w,label,val,min,max,fmt,onSet,opts){ opts=opts||{};
    if(label){ ctx.fillStyle=SC.mut; ctx.font="700 9px Inter,system-ui"; ctx.textAlign="left"; ctx.fillText(label,x,y-4); }
    ctx.textAlign="right"; ctx.fillStyle=SC.ink; ctx.font="800 11px Inter,system-ui"; ctx.fillText(fmt(val),x+w,y-4);
    const th=7; ctx.fillStyle="#0a0e14"; roundRect(x,y,w,th,4); ctx.fill(); ctx.strokeStyle=SC.line; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,th-1,4); ctx.stroke();
    let t=opts.log?Math.log(Math.max(min,val)/min)/Math.log(max/min):(val-min)/(max-min); t=clamp(t,0,1);
    ctx.fillStyle=opts.col||SC.cyan; roundRect(x,y,t*w,th,4); ctx.fill();
    ctx.fillStyle="#eef4fb"; ctx.beginPath(); ctx.arc(x+t*w,y+th/2,5.5,0,7); ctx.fill();
    const armObj=()=>({label:(label||"PARAM"),min,max,log:!!opts.log,step:opts.step,get:()=>val,fmt:v=>fmt(v),set:v=>onSet(v)});
    reg({x:x-4,y:y-14,w:w+8,h:th+22,arm:armObj,onDrag:p=>{ let tt=clamp((p.x-x)/w,0,1); let v=opts.log?min*Math.pow(max/min,tt):min+tt*(max-min); if(opts.step)v=Math.round(v/opts.step)*opts.step; onSet(clamp(v,min,max)); }}); }
  function vmeter(x,y,w,h,dbfs,peakLine){ ctx.fillStyle="#04101a"; ctx.fillRect(x,y,w,h);
    const t=clamp((dbfs+60)/60,0,1),hh=h*t; const g=ctx.createLinearGradient(0,y+h,0,y); g.addColorStop(0,"#2ea85a"); g.addColorStop(.6,"#37c86a"); g.addColorStop(.82,"#e8c33a"); g.addColorStop(1,"#e94b3f");
    ctx.fillStyle=g; ctx.fillRect(x,y+h-hh,w,hh);
    if(peakLine!==false){ const ty=y+h-h*((-18+60)/60); ctx.strokeStyle="#ffffff40"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x+w,ty); ctx.stroke(); } }

  function setMode(m){ state.mode=m; state.pink=null; document.querySelectorAll('.tab[data-mode]').forEach(t=>t.classList.toggle("active",t.dataset.mode===m)); drawScreen(); }
  document.querySelectorAll('.tab[data-mode]').forEach(t=>t.onclick=()=>setMode(t.dataset.mode));
  $("#sofBtn").onclick=()=>{ if(state.sof>=0){ state.sof=-1; updateSofUi(); paintBay(); drawScreen(); } else { engageSof('aux',0); } };

  renderScreen=function(){ if(!W)return; hitRegions=[]; ctx.clearRect(0,0,W,H); scrBg();
    switch(state.mode){
      case "chview": drawChView(); break; case "overview": drawOverview(); break;
      case "eq": drawEQ(); break; case "gate": drawGate(); break; case "comp": drawComp(); break;
      case "sends": drawSends(); break; case "dca": drawDCA(); break; case "fx": drawFX(); break;
      case "scenes": drawScenes(); break; case "meter": drawMeter(); break; default: drawChView();
    }
    // TF signature: pink selection box around the armed (TOUCH AND TURN) parameter
    if(state.pink){ const b=state.pink; ctx.save(); ctx.strokeStyle="#ff3ea5"; ctx.lineWidth=2; ctx.shadowColor="#ff3ea5"; ctx.shadowBlur=6; roundRect(b.x,b.y,b.w,b.h,6); ctx.stroke(); ctx.restore(); }
    ctx.fillStyle=SC.dim; ctx.font="700 8px Inter,system-ui"; ctx.textAlign="right"; ctx.fillText("SCENE "+String(state.scene+1).padStart(3,'0'),W-6,10); ctx.textAlign="left";
  };

  /* ---- GainFinder ring (signature TF gain guide) ---- */
  function drawGainFinder(cx,cy,rr,ch){
    const inDb=(playing&&ch.hasAudio)?chLevelDb(ch.i):(ch.src+ch.gain);
    // target zone around -18 dBFS; ring shows gain position, arc lights per input level
    ctx.lineWidth=7; ctx.lineCap="round";
    // background arc
    ctx.strokeStyle="#12202c"; ctx.beginPath(); ctx.arc(cx,cy,rr,Math.PI*0.75,Math.PI*2.25); ctx.stroke();
    // input-level fill arc (green in target, red if hot, blue if low)
    const lv=clamp((inDb+60)/60,0,1);
    let col = inDb>-6?SC.red : (inDb>=-22&&inDb<=-14)?SC.green : inDb>-14?"#e8c33a":SC.blue;
    ctx.strokeStyle=col; ctx.beginPath(); ctx.arc(cx,cy,rr,Math.PI*0.75,Math.PI*0.75+Math.PI*1.5*lv); ctx.stroke();
    // center "GainFinder" indicator: lights when input sits in target zone
    const inZone=inDb>=-22&&inDb<=-14;
    ctx.fillStyle=inZone?SC.green:"#0b141c"; ctx.beginPath(); ctx.arc(cx,cy,rr-13,0,7); ctx.fill();
    ctx.strokeStyle=inZone?shade(SC.green,-30):"#22333f"; ctx.lineWidth=2; ctx.beginPath(); ctx.arc(cx,cy,rr-13,0,7); ctx.stroke();
    ctx.fillStyle=inZone?"#06210f":SC.ink; ctx.font="800 16px Inter"; ctx.textAlign="center"; ctx.textBaseline="middle";
    ctx.fillText((ch.gain>0?"+":"")+ch.gain.toFixed(0),cx,cy-3);
    ctx.fillStyle=inZone?"#06210f":SC.mut; ctx.font="700 8px Inter"; ctx.fillText("dB GAIN",cx,cy+10); ctx.textBaseline="alphabetic";
    // gain marker knob on ring
    const gp=clamp((ch.gain+6)/(65+6),0,1); const ga=Math.PI*0.75+Math.PI*1.5*gp;
    const mx=cx+Math.cos(ga)*rr, my=cy+Math.sin(ga)*rr; ctx.fillStyle="#eef4fb"; ctx.beginPath(); ctx.arc(mx,my,5,0,7); ctx.fill();
    ctx.textAlign="left";
    // touch = arm gain to TOUCH AND TURN + vertical drag
    reg({hit:'circle',cx,cy,rr:rr+10, arm:()=>({label:"GAIN · "+ch.name,min:-6,max:65,get:()=>ch.gain,fmt:v=>((v>0?"+":"")+v.toFixed(0)+" <small>dB</small>"),set:v=>{ch.gain=v;applyChanAudio(ch.i);checkMissions();}}),
      onDown:p=>{dragBase.y=p.y; dragBase.v=ch.gain;}, onDrag:p=>{ ch.gain=clamp(Math.round(dragBase.v+(dragBase.y-p.y)*0.4),-6,65); applyChanAudio(ch.i); refreshTT(); checkMissions(); }});
    return inDb;
  }

  /* ---- 1-knob rotary (COMP / EQ) ---- */
  function drawOneKnob(cx,cy,rr,label,getV,col,onSet,armLabel){
    const amt=getV();
    ctx.lineWidth=6; ctx.lineCap="round"; ctx.strokeStyle="#12202c"; ctx.beginPath(); ctx.arc(cx,cy,rr,Math.PI*0.75,Math.PI*2.25); ctx.stroke();
    const p=clamp(amt/10,0,1); ctx.strokeStyle=col; ctx.beginPath(); ctx.arc(cx,cy,rr,Math.PI*0.75,Math.PI*0.75+Math.PI*1.5*p); ctx.stroke();
    ctx.fillStyle="#0b141c"; ctx.beginPath(); ctx.arc(cx,cy,rr-11,0,7); ctx.fill(); ctx.strokeStyle="#22333f"; ctx.lineWidth=1.5; ctx.stroke();
    ctx.fillStyle=SC.ink; ctx.font="800 15px Inter"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(amt.toFixed(1),cx,cy-2);
    ctx.fillStyle=SC.mut; ctx.font="700 7px Inter"; ctx.fillText(label,cx,cy+10); ctx.textBaseline="alphabetic"; ctx.textAlign="left";
    const ga=Math.PI*0.75+Math.PI*1.5*p, mx=cx+Math.cos(ga)*rr, my=cy+Math.sin(ga)*rr; ctx.fillStyle="#eef4fb"; ctx.beginPath(); ctx.arc(mx,my,4.5,0,7); ctx.fill();
    reg({hit:'circle',cx,cy,rr:rr+8, arm:()=>({label:armLabel,min:0,max:10,step:0.1,get:()=>getV(),fmt:v=>v.toFixed(1),set:v=>onSet(v)}),
      onDown:pp=>{dragBase.y=pp.y;dragBase.v=getV();}, onDrag:pp=>{ onSet(clamp(dragBase.v+(dragBase.y-pp.y)*0.06,0,10)); refreshTT(); }});
  }

  /* ---- shared EQ graph ---- */
  function drawEqGraph(gx,gy,gw,gh,ch,interactive){
    const g=ctx.createLinearGradient(0,gy,0,gy+gh); g.addColorStop(0,"#101820"); g.addColorStop(1,"#0b1219");
    ctx.fillStyle=g; roundRect(gx,gy,gw,gh,6); ctx.fill(); ctx.strokeStyle=SC.border; ctx.lineWidth=1; roundRect(gx+.5,gy+.5,gw-1,gh-1,6); ctx.stroke();
    ctx.save(); roundRect(gx,gy,gw,gh,6); ctx.clip();
    ctx.font="8px Inter"; ctx.textAlign="center";
    [30,100,300,1000,3000,10000].forEach(f=>{ const x=gx+fx(f)*gw; ctx.strokeStyle=SC.grid; ctx.lineWidth=1; ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.fillText(f>=1000?(f/1000)+"k":f,x,gy+gh-3); });
    for(let d=-18;d<=18;d+=6){ const yy=gy+gh/2-d/24*gh/2; ctx.strokeStyle=d===0?"#3a4553":"#1a222c"; ctx.beginPath();ctx.moveTo(gx,yy);ctx.lineTo(gx+gw,yy);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.textAlign="left"; ctx.fillText((d>0?"+":"")+d,gx+3,yy-2); ctx.textAlign="center"; }
    ch.eq.forEach((b,bi)=>{ if(b.g===0)return; ctx.beginPath();
      for(let px=0;px<=gw;px+=3){ const f=fInv(px/gw),gg=biquadDb(b.type,b.f,b.g,b.q,f),yy=gy+gh/2-gg/24*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }
      ctx.strokeStyle=SC.band[bi]+"55"; ctx.lineWidth=1; ctx.stroke(); });
    ctx.beginPath();
    for(let px=0;px<=gw;px+=2){ const f=fInv(px/gw),gg=eqMag(ch,f),yy=gy+gh/2-gg/24*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }
    ctx.strokeStyle=ch.color; ctx.lineWidth=2.2; ctx.stroke();
    ctx.lineTo(gx+gw,gy+gh/2); ctx.lineTo(gx,gy+gh/2); ctx.closePath(); ctx.fillStyle=ch.color+"1c"; ctx.fill();
    ctx.restore();
    if(ch.hpfOn){ const x=gx+fx(ch.hpf)*gw; ctx.strokeStyle=SC.amber; ctx.setLineDash([4,3]); ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=SC.amber; ctx.beginPath();ctx.arc(x,gy+gh-12,6,0,7);ctx.fill(); ctx.fillStyle="#0b1420";ctx.font="700 8px Inter";ctx.textAlign="center";ctx.fillText("H",x,gy+gh-9);
      if(interactive) reg({hit:'circle',cx:x,cy:gy+gh-12,rr:15, arm:()=>({label:"HPF",min:20,max:600,log:true,get:()=>ch.hpf,fmt:v=>Math.round(v)+" Hz",set:v=>{ch.hpf=Math.round(v);ch.hpfOn=true;applyChanAudio(ch.i);}}), onDrag:p=>{ ch.hpf=clamp(Math.round(fInv((p.x-gx)/gw)),20,600); applyChanAudio(ch.i); refreshTT(); checkMissions(); }}); }
    ch.eq.forEach((b,bi)=>{ const x=gx+fx(b.f)*gw, yy=gy+gh/2-b.g/24*gh/2;
      ctx.fillStyle=SC.band[bi]; ctx.beginPath();ctx.arc(x,yy,6.5,0,7);ctx.fill();
      ctx.fillStyle="#0b1420"; ctx.font="700 8px Inter"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(bi+1,x,yy); ctx.textBaseline="alphabetic";
      if(interactive) reg({hit:'circle',cx:x,cy:yy,rr:16, arm:()=>({label:"EQ"+(bi+1)+" GAIN",min:-18,max:18,get:()=>b.g,fmt:v=>(v>0?"+":"")+v.toFixed(1)+" dB",set:v=>{b.g=v;applyChanAudio(ch.i);checkMissions();}}),
        onDrag:p=>{ b.f=clamp(Math.round(fInv((p.x-gx)/gw)),20,20000); b.g=clamp(-(p.y-gy-gh/2)/(gh/2)*24,-18,18); applyChanAudio(ch.i); refreshTT(); checkMissions(); }}); });
  }

  /* ================= CH VIEW (TF home / channel strip) ================= */
  function drawChView(){
    const ch=CH[state.sel], m=8; let y=6;
    // header
    panel(m,y,W-2*m,38,null,ch.color);
    ctx.fillStyle=ch.color; roundRect(m+6,y+6,26,26,4); ctx.fill();
    ctx.fillStyle=pickInk(ch.color); ctx.font="800 12px Inter"; ctx.textAlign="center"; ctx.fillText(String(ch.i+1),m+19,y+23);
    ctx.textAlign="left"; ctx.fillStyle=SC.ink; ctx.font="800 15px Inter"; ctx.fillText(ch.name,m+40,y+17);
    ctx.fillStyle=SC.mut; ctx.font="700 9px Inter"; ctx.fillText("CH "+(ch.i+1)+"  ·  INPUT  ·  "+ch.oneEqType,m+40,y+30);
    scrBtn(m+178,y+6,26,15,"Ø",ch.phase,()=>{ch.phase=!ch.phase;applyChanAudio(ch.i);},SC.amber,true);
    scrBtn(m+178,y+22,26,13,"48V",ch.phantom,()=>{ch.phantom=!ch.phantom;},SC.red,true);
    ctx.textAlign="right"; ctx.fillStyle=ch.on?SC.green:SC.dim; ctx.font="800 13px Inter"; ctx.fillText(faderTxt(ch.fader)+" dB",W-m-66,y+24); ctx.textAlign="left";
    scrBtn(W-m-58,y+6,50,26,ch.on?"ON":"MUTE",ch.on,()=>{ch.on=!ch.on;applyChanAudio(ch.i);paintBay();checkMissions();},ch.on?SC.green:SC.red);
    y+=44;
    const colW=(W-2*m-10)/2;
    // LEFT column: GainFinder + HPF + EQ graph
    const lx=m, lw=colW;
    panel(lx,y,lw,86,"GAINFINDER");
    drawGainFinder(lx+52,y+46,32,ch);
    // input readout + HPF
    const rix=lx+100;
    const inDb=(playing&&ch.hasAudio)?chLevelDb(ch.i):(ch.src+ch.gain);
    ctx.fillStyle=SC.mut; ctx.font="700 8px Inter"; ctx.textAlign="left"; ctx.fillText("ENTRADA",rix,y+22);
    ctx.fillStyle=inDb>-6?SC.red:(inDb>=-22&&inDb<=-14?SC.green:SC.ink); ctx.font="800 15px Inter"; ctx.fillText(inDb<=-90?"−∞":inDb.toFixed(0)+" dB",rix,y+38);
    ctx.fillStyle=SC.dim; ctx.font="700 7.5px Inter"; ctx.fillText("alvo −18 dBFS (centro verde)",rix,y+50);
    vmeter(lx+lw-16,y+18,7,60,inDb);
    scrBtn(rix,y+58,58,18,"HPF "+(ch.hpfOn?"ON":"OFF"),ch.hpfOn,()=>{ch.hpfOn=!ch.hpfOn;applyChanAudio(ch.i);checkMissions();},SC.amber,true);
    ctx.fillStyle=ch.hpfOn?SC.amber:SC.dim; ctx.font="800 12px Inter"; ctx.fillText(ch.hpf+" Hz",rix+64,y+71);
    let ly=y+92;
    const eqH=H-ly-6;
    navField(lx,ly,lw,eqH,'eq');
    drawEqGraph(lx,ly,lw,eqH,ch,true);
    ctx.fillStyle=SC.mut; ctx.font="700 8px Inter"; ctx.textAlign="left"; ctx.fillText("EQUALIZER (arraste as bandas)",lx+6,ly+11);
    ctx.fillStyle=SC.dim; ctx.font="700 7px Inter"; ctx.textAlign="right"; ctx.fillText("TOQUE P/ ABRIR ▸",lx+lw-6,ly+11); ctx.textAlign="left";
    // RIGHT column: 1-knob EQ, 1-knob COMP, PAN, sends
    const rx=m+colW+10, rw=colW;
    // 1-knob EQ
    let ry=y;
    navField(rx,ry,rw,96,'eq');
    panel(rx,ry,rw,96,"1-KNOB EQ");
    drawOneKnob(rx+46,ry+52,30,"EQ",()=>ch.oneEqAmt,SC.cyan,v=>{ch.oneEqAmt=v;applyOneEq(ch);applyChanAudio(ch.i);checkMissions();},"1-KNOB EQ");
    scrBtn(rx+90,ry+20,rw-98,18,"TIPO: "+ch.oneEqType,false,()=>{ ch.oneEqType=EQ_TYPES[(EQ_TYPES.indexOf(ch.oneEqType)+1)%EQ_TYPES.length]; applyOneEq(ch); applyChanAudio(ch.i); },SC.amber,true);
    scrBtn(rx+90,ry+42,(rw-102)/2,18,"INTENSITY",ch.oneEqMode==='intensity',()=>{ch.oneEqMode='intensity';applyOneEq(ch);applyChanAudio(ch.i);},SC.cyan,true);
    scrBtn(rx+90+(rw-102)/2+6,ry+42,(rw-102)/2,18,"VOCAL",ch.oneEqMode==='vocal',()=>{ch.oneEqMode='vocal';applyOneEq(ch);applyChanAudio(ch.i);},SC.cyan,true);
    ctx.fillStyle=SC.dim; ctx.font="700 8px Inter"; ctx.textAlign="left"; ctx.fillText("gira 1 knob = curva pronta (flat → 2×)",rx+90,ry+76);
    ry+=102;
    // 1-knob COMP
    navField(rx,ry,rw,96,'comp');
    panel(rx,ry,rw,96,"1-KNOB COMP");
    drawOneKnob(rx+46,ry+52,30,"COMP",()=>ch.oneComp,SC.green,v=>{ch.oneComp=v;applyOneComp(ch);applyChanAudio(ch.i);checkMissions();},"1-KNOB COMP");
    let gr=0; if(ac&&aNodes[ch.i]&&ch.compOn) gr=-aNodes[ch.i].comp.reduction;
    ctx.fillStyle=SC.mut; ctx.font="700 8px Inter"; ctx.textAlign="left"; ctx.fillText("THR "+ch.compThr.toFixed(0)+" dB",rx+90,ry+26);
    ctx.fillText("RATIO "+ch.compRatio.toFixed(1)+":1",rx+90,ry+40);
    ctx.fillText("GAIN +"+ch.compGain.toFixed(1)+" dB",rx+90,ry+54);
    ctx.fillStyle=SC.mut; ctx.fillText("GR",rx+90,ry+72); ctx.fillStyle="#0a1a13"; ctx.fillRect(rx+108,ry+65,rw-118,8); ctx.fillStyle=SC.green; ctx.fillRect(rx+108,ry+65,clamp(gr/24,0,1)*(rw-118),8);
    ry+=102;
    // PAN + sends
    const restH=H-ry-6;
    navField(rx,ry,rw,restH,'sends');
    panel(rx,ry,rw,restH,"PAN · SEND TO AUX");
    // pan

    const pbx=rx+36,pbw=rw*0.5,pby=ry+22;

  /* ================= OVERVIEW (TouchFlow: flick channel up to send to AUX) ================= */
  function drawOverview(){

    for(let s=0;s<n;s++){ const ci=base+s; if(ci>=NCH){ continue; } const ch=CH[ci]; const x=pad+s*gw,yy=6,w=gw-5,h=H-18; const cx=x+5,cw=w-10;
      const g=ctx.createLinearGradient(0,yy,0,yy+h); g.addColorStop(0,SC.panelHi); g.addColorStop(1,SC.panelLo);

      // header = flick handle (TouchFlow gesture) + tap to select
      reg({x,y:yy,w,h:18, onDown:()=>selectChannel(ci), onFlick:dy=>{ ch.sendOn[sofBus]=true; if(ch.sends[sofBus]<=FMIN)ch.sends[sofBus]=-10; toast(ch.name+" ▸ "+AUX_NAMES[sofBus].split(" ").slice(0,2).join(" ")+" <b>ON</b>"); checkMissions(); } });
      reg({x,y:yy+18,w,h:h-18, onDown:()=>selectChannel(ci)});

      const eqY=yy+20,eqH=40; ctx.fillStyle="#0b1219"; roundRect(cx,eqY,cw,eqH,4); ctx.fill(); ctx.strokeStyle=SC.line; roundRect(cx+.5,eqY+.5,cw-1,eqH-1,4); ctx.stroke();
      const midE=eqY+eqH/2; ctx.strokeStyle=SC.grid; ctx.beginPath();ctx.moveTo(cx,midE);ctx.lineTo(cx+cw,midE);ctx.stroke();
      ctx.beginPath(); for(let px=0;px<=cw;px+=2){ const f=fInv(px/cw); const yv=clamp(midE-clamp(eqMag(ch,f)/18,-1,1)*(eqH*0.4),eqY+2,eqY+eqH-2); px===0?ctx.moveTo(cx,yv):ctx.lineTo(cx+px,yv); }
      ctx.strokeStyle=ch.color; ctx.lineWidth=1.5; ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.font="700 7px Inter"; ctx.textAlign="left"; ctx.fillText("EQ",cx+3,eqY+8);

    for(let i=0;i<n;i++){ const ch=CH[i],x=10+i*(bw+gapx); const db=meterDbOf(i);

      reg({x,y:top,w:bw,h:bot-top,onDown:()=>selectChannel(i)});
    }
    const mx=W-30; vmeter(mx,top,12,bot-top,playing?masterLevelDb():-90); vmeter(mx+15,top,12,bot-top,playing?masterLevelDb()-4:-90);

  function segMeter(x,y,w,h,db){ const segs=14; const t=clamp((db+60)/60,0,1), lit=Math.round(t*segs);
    for(let s=0;s<segs;s++){ const sy=y+h-(s+1)*(h/segs)+1, sh=h/segs-1; const on=s<lit;
      let col= s>=segs-2?"#e94b3f": s>=segs-4?"#e8c33a":"#37c86a"; mbx.fillStyle=on?col:"#111a12"; mbx.fillRect(x,sy,w,sh); } }

  function wireUDK(el,k){ let drag=false,ly=0;
    el.addEventListener("pointerdown",e=>{drag=true;ly=e.clientY;el.setPointerCapture(e.pointerId);e.preventDefault();});
    el.addEventListener("pointermove",e=>{ if(!drag)return; const dy=ly-e.clientY; ly=e.clientY; let v=k.get()+dy*(k.max-k.min)/170; k.set(clamp(v,k.min,k.max)); paintUDK(); drawScreen(); e.preventDefault(); });
    const up=()=>drag=false; el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
  }
  function paintUDK(){ UDK.forEach((k,i)=>{ const el=$(`.pk[data-udk="${i}"]`); if(el){ const p=(k.get()-k.min)/(k.max-k.min); setKnobPos(el,clamp(p,0,1)); }
    const v=$(`[data-udkv="${i}"]`); if(v)v.textContent=k.fmt(k.get()); }); }

    fxNodes:function(){try{return {revRet:+fxRack.revRet.gain.value.toFixed(4),dlyRet:+fxRack.dlyRet.gain.value.toFixed(4),dlyTime:+fxRack.dly.delayTime.value.toFixed(4),dlyFb:+fxRack.dfb.gain.value.toFixed(4)};}catch(e){return null;}},
    master:function(){try{return +masterGain.gain.value.toFixed(4);}catch(e){return null;}},
    aNodesLen:function(){try{return aNodes.length;}catch(e){return -1;}},
    songsLen:function(){try{return SONGS.length;}catch(e){return -1;}},
    stemCount:function(i){try{return SONGS[i]?SONGS[i].stems.length:-1;}catch(e){return -1;}},
    isPlaying:function(){try{return playing;}catch(e){return false;}},
    srcCount:function(){try{return realSources.length;}catch(e){return -1;}},
    getSongs:function(){try{return SONGS;}catch(e){return null;}},
    loadSong:function(i){try{return loadSong(i);}catch(e){return String(e);}},
    pushSong:function(s){try{SONGS.push(s);return SONGS.length-1;}catch(e){return -1;}},
    chLevel:function(i){try{return +chLevelDb(i).toFixed(1);}catch(e){return null;}},
    play:function(){try{return playSong();}catch(e){return String(e);}},
    stop:function(){try{return stopSong();}catch(e){}},
    resumeAudio:function(){try{return ac&&ac.resume()}catch(e){}},
    acState:function(){try{return ac?ac.state:'none'}catch(e){return 'none'}}};
  buildBankKeys(); buildBay(); loadSong(0); try{ buildAudioGraph(); }catch(e){}
  updateSofUi(); paintMission(); paintRightRack(); armGainFinder();
  window.addEventListener("resize",sizeCanvas); setTimeout(sizeCanvas,30); requestAnimationFrame(loop);
  setInterval(()=>{ const l=$("#danteLed"); if(l){ l.classList.toggle("warn"); setTimeout(()=>l.classList.remove("warn"),120); } },4000);

  /* ================= FIT (preserved) ================= */
  function fitConsole(){ const con=document.querySelector(".console"); if(!con)return;
    const DW=1560,DH=940,vw=window.innerWidth,vh=window.innerHeight;
    if(vw<560){ document.body.classList.add('stacked'); con.classList.add('stacked'); con.style.zoom=''; document.body.style.alignItems='flex-start'; }
    else{ document.body.classList.remove('stacked'); con.classList.remove('stacked'); con.style.zoom=''; const _DW=con.offsetWidth, _DH=con.offsetHeight;
      const scrH=(window.screen&&screen.height)||vh; const iframeTaller=vh>scrH+8; const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6); const effVh=Math.max(240,visH-headerAllow);
      document.body.style.alignItems=(iframeTaller||vh>700)?'flex-start':'center';
      let s=Math.min((vw-16)/(_DW||DW), effVh/(_DH||DH)); s=Math.max(0.35,Math.min(s,2.4)); con.style.zoom=s; }
    try{ sizeCanvas(); }catch(e){}
  }
  window.addEventListener('resize',fitConsole); setTimeout(fitConsole,45);
})();
</script>
