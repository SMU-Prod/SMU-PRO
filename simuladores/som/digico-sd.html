<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulador — Console DiGiCo SD / Quantum (SMU)</title>
<style>
  :root{--bg:#090b0f;--panel:#12151b;--panel2:#0c0f14;--line:#242a34;--ink:#e9edf4;--muted:#8792a3;
    --dg:#00a0e3;--amber:#f5a623;--green:#39d353;--red:#ff4d4d;--purple:#a855f7;--strip:#0e1218}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;-webkit-font-smoothing:antialiased;padding:6px;user-select:none;overflow-x:hidden;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .fit{width:1560px;flex:0 0 auto}
  @media(max-width:760px){ body{justify-content:flex-start} .fit{width:100%} }
  /* iOS/iPad: trava o pan (arraste não vira gesto de sair da tela cheia) em tablet/desktop */
  @media(min-width:760px){ body,.fit{touch-action:none} }
  .brandbar{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#0f1319,#0a0d12);border:1px solid var(--line);border-radius:10px;padding:8px 14px;margin-bottom:8px}
  .logo{font-weight:800;font-size:17px;letter-spacing:1px}.logo b{color:var(--dg)}
  .model{font-size:11px;color:var(--muted);letter-spacing:2px;border:1px solid var(--line);border-radius:5px;padding:3px 8px}
  .spacer{flex:1}
  .mission{display:flex;gap:9px;align-items:center;background:#0c0f14;border:1px solid var(--line);border-radius:8px;padding:6px 10px;max-width:58%}
  .mission .idx{font-size:9.5px;color:var(--dg);font-weight:800;white-space:nowrap}.mission .txt{font-size:11px;line-height:1.2}.mission .txt b{color:var(--dg)}
  .mission button{font:inherit;font-size:10px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:6px;padding:4px 7px;cursor:pointer}

  .console{display:grid;grid-template-columns:150px 1fr;gap:8px}
  @media(max-width:820px){.console{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:11px;padding:9px}

  /* fader bank (left) */
  .lyr{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:7px}
  .lb{font:inherit;font-size:9px;font-weight:700;padding:5px 7px;border-radius:6px;border:1px solid var(--line);background:#0c0f14;color:var(--muted);cursor:pointer}
  .lb.on{background:var(--dg);border-color:var(--dg);color:#02121a}
  .bank{display:flex;gap:3px;overflow-x:auto}
  .fst{flex:0 0 40px;display:flex;flex-direction:column;align-items:center;gap:3px}
  .fnm{width:100%;height:14px;border-radius:2px;font-size:7px;font-weight:800;color:#02121a;display:flex;align-items:center;justify-content:center;overflow:hidden;white-space:nowrap}
  .fw{display:flex;gap:2px;height:150px}
  .mt{width:4px;border-radius:2px;background:#05070d;border:1px solid #1a2030;position:relative;overflow:hidden}
  .mt i{position:absolute;left:0;right:0;bottom:0;height:0%;background:linear-gradient(0deg,var(--green),var(--green) 62%,var(--amber) 85%,var(--red))}
  .fd{width:20px;position:relative;background:linear-gradient(90deg,#080b10,#0b0f15,#080b10);border-radius:4px;border:1px solid #1a2030;cursor:ns-resize;touch-action:none}
  .fd .u{position:absolute;left:0;right:0;top:24%;height:1px;background:#333c4a}
  .cap{position:absolute;left:-3px;right:-3px;height:15px;border-radius:3px;background:linear-gradient(180deg,#eef1f6,#a7b1c2 46%,#586475 54%,#828fa2);border:1px solid #0006;cursor:grab}
  .cap::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#05070d;border-radius:2px}
  .fsel{font:inherit;font-size:7px;font-weight:800;width:100%;padding:2px 0;border-radius:3px;border:1px solid var(--line);background:#0c0f14;color:var(--muted);cursor:pointer}
  .fsel.on{background:var(--dg);border-color:var(--dg);color:#02121a}
  .mute{font:inherit;font-size:7px;font-weight:800;width:100%;padding:2px 0;border-radius:3px;border:1px solid var(--line);background:#0c0f14;color:var(--muted);cursor:pointer}
  .mute.on{background:var(--red);border-color:var(--red);color:#fff}
  .fdb2{font-size:7px;color:var(--muted)}

  /* main: touchscreen */
  .screen{background:#04070d;border:1px solid #1a2233;border-radius:10px;padding:8px}
  .tabs{display:flex;gap:5px;margin-bottom:7px;flex-wrap:wrap}
  .tab{font:inherit;font-size:10px;font-weight:700;padding:5px 10px;border-radius:6px;border:1px solid var(--line);background:#0a0e14;color:var(--muted);cursor:pointer}
  .tab.on{background:var(--dg);border-color:var(--dg);color:#02121a}
  .ov{display:flex;gap:4px;overflow-x:auto}
  .ovs{flex:0 0 92px;background:#0a0f17;border:1px solid #1a2233;border-radius:7px;padding:5px;cursor:pointer}
  .ovs.sel{border-color:var(--dg);box-shadow:0 0 0 1px var(--dg) inset}
  .ovh{height:15px;border-radius:3px;font-size:8.5px;font-weight:800;color:#02121a;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden}
  .ovc{width:100%;height:44px;display:block;margin-top:3px;background:#05090f;border-radius:3px}
  .ovmeta{display:flex;justify-content:space-between;font-size:7.5px;color:var(--muted);margin-top:3px}
  .ovdyn{display:flex;gap:3px;margin-top:3px}
  .ovdyn span{flex:1;font-size:6.5px;text-align:center;padding:2px 0;border-radius:2px;border:1px solid var(--line);color:#3a4658}
  .ovdyn span.on{color:#02121a}
  .ovaux{font-size:6.5px;color:var(--muted);margin-top:2px;line-height:1.2}

  /* selected channel */
  .selrow{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px}
  .eqbox{flex:1 1 380px;min-width:280px}
  .selhd{display:flex;align-items:center;gap:8px;margin-bottom:5px}
  .selhd .chip{width:9px;height:18px;border-radius:2px}.selhd .nm{font-size:13px;font-weight:800}
  #eq{width:100%;height:150px;background:#03060b;border:1px solid #16202e;border-radius:7px;display:block;touch-action:none}
  .dyncol{flex:1 1 200px;display:flex;flex-direction:column;gap:7px}
  .drow{display:flex;gap:8px;align-items:center}.drow label{font-size:10.5px;color:var(--muted);width:70px}
  .drow input[type=range]{flex:1;accent-color:var(--dg);height:20px}.drow .v{font-size:10px;font-weight:700;width:48px;text-align:right}
  .tgs{display:flex;gap:5px;flex-wrap:wrap}
  .tg{font:inherit;font-size:10px;font-weight:800;padding:6px 9px;border-radius:7px;border:1px solid var(--line);background:#0a0e14;color:var(--muted);cursor:pointer}
  .tg.on{background:var(--green);border-color:var(--green);color:#02120a}.tg.on.eq{background:var(--dg);border-color:var(--dg);color:#02121a}

  /* encoders + macros */
  .strip2{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
  .encs,.macros{flex:1 1 300px;background:linear-gradient(180deg,#12151b,#0c0f14);border:1px solid var(--line);border-radius:9px;padding:8px}
  .lbl{font-size:9px;color:var(--muted);letter-spacing:1.4px;text-transform:uppercase;margin-bottom:6px}
  .encgrid{display:grid;grid-template-columns:repeat(6,1fr);gap:6px}
  .enc{display:flex;flex-direction:column;align-items:center;gap:2px}
  .dial{width:34px;height:34px;border-radius:50%;position:relative;cursor:ns-resize;touch-action:none;background:radial-gradient(circle at 50% 30%,#28323f,#12161d 72%);border:2px solid var(--dg);box-shadow:0 0 5px #00a0e355}
  .dial::after{content:"";position:absolute;left:50%;top:3px;width:2px;height:11px;border-radius:2px;background:#eaf6ff;transform-origin:50% 14px;transform:translateX(-50%) rotate(var(--rot,0deg))}
  .el{font-size:7.5px;color:var(--muted)}.ev{font-size:8px;font-weight:800}
  .mgrid{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .mac{font:inherit;font-size:8.5px;font-weight:700;padding:8px 2px;border-radius:6px;border:1px solid var(--line);background:#0a0e14;color:var(--muted);cursor:pointer;text-align:center;line-height:1.1}
  .mac.on{color:#02121a}
  .toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(20px);background:#0c0f14;border:1px solid var(--dg);color:var(--ink);padding:9px 15px;border-radius:9px;font-size:12px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast b{color:var(--dg)}
</style>
</head>
<body>
 <div class="fit">
  <div class="brandbar">
    <div class="logo">Di<b>Gi</b>Co</div>
    <div class="model">SD / QUANTUM · SIMULADOR SMU</div>
    <div class="spacer"></div>
    <div class="mission"><span class="idx" id="mIdx">MISSÃO</span><span class="txt" id="mTxt">—</span><button id="mSkip">Pular</button></div>
  </div>

  <div class="console">
    <div class="card">
      <div class="lyr" id="lyr"></div>
      <div class="bank" id="bank"></div>
    </div>
    <div class="card">
      <div class="screen">
        <div class="tabs">
          <button class="tab on" data-mode="overview">Channel Overview</button>
          <button class="tab" data-mode="channel">Canal Selecionado</button>
          <span class="spacer" style="flex:1"></span>
          <span style="font-size:9.5px;color:var(--muted)" id="hint">toque um canal na tela para selecionar</span>
        </div>
        <div id="stage"></div>
      </div>
      <div class="strip2">
        <div class="encs"><div class="lbl">Encoders atribuíveis (canal selecionado)</div><div class="encgrid" id="encgrid"></div></div>
        <div class="macros"><div class="lbl">Macros / Snapshots</div><div class="mgrid" id="mgrid"></div></div>
      </div>
    </div>
  </div>
 </div>
  <div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const $=id=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const NAMES=["Kick","Snare","Hats","Tom 1","Tom 2","OH L","OH R","Bass","Gtr","Keys L","Keys R","Lead Vox","Vox 2","BV 1","BV 2","Perc","Sax","Playbk","FX Ret","Talk","Amb L","Amb R","Spare","Spare"];
  const COLS=["#ff4d4d","#f97316","#f5a623","#eab308","#84cc16","#39d353","#14b8a6","#00a0e3","#3b82f6","#6366f1","#818cf8","#a855f7","#c084fc","#d946ef","#ec4899","#f43f5e","#fb7185","#22d3ee","#4ade80","#60a5fa","#a5b4fc","#c4b5fd","#94a3b8","#94a3b8"];
  const CH=NAMES.map((nm,i)=>({i,nm,color:COLS[i],gain:30,hpfOn:i>4,hpf:80,gate:false,gateThr:-40,comp:i===11||i===7,compThr:-20,pan:0,
    peq:[{f:100,g:0,q:1},{f:400,g:0,q:1.4},{f:2500,g:0,q:1.4},{f:8000,g:0,q:1}],aux1:0,fader:72,mute:false}));
  const MASTER={fader:78};
  let sel=11, mode="overview";
  const LAYERS=[{k:"in1",label:"IN 1-12",r:[0,12]},{k:"in2",label:"IN 13-24",r:[12,24]},{k:"bus",label:"BUSSES"},{k:"vca",label:"VCAs"}];
  let layer="in1";
  const ENC=[{k:"gain",label:"GAIN",min:-5,max:60,fmt:v=>Math.round(v)},{k:"hpf",label:"HPF",min:20,max:400,log:true,fmt:v=>Math.round(v)},
    {k:"peq0",label:"LF",min:-18,max:18,fmt:v=>(v>0?"+":"")+Math.round(v)},{k:"peq1",label:"LM",min:-18,max:18,fmt:v=>(v>0?"+":"")+Math.round(v)},
    {k:"peq2",label:"HM",min:-18,max:18,fmt:v=>(v>0?"+":"")+Math.round(v)},{k:"peq3",label:"HF",min:-18,max:18,fmt:v=>(v>0?"+":"")+Math.round(v)},
    {k:"gate",label:"GATE",min:-70,max:0,fmt:v=>Math.round(v)},{k:"comp",label:"COMP",min:-40,max:0,fmt:v=>Math.round(v)},
    {k:"aux1",label:"AUX 1",min:0,max:100,fmt:v=>Math.round(v)},{k:"pan",label:"PAN",min:-63,max:63,fmt:v=>Math.abs(v)<2?"C":(v<0?"L":"R")+Math.round(Math.abs(v))}];
  const MAC=[["Snapshot ◀","<"],["Snapshot ▶",">"],["Store Snap","st"],["Mute Grp 1","mg1"],["Mute Grp 2","mg2"],["Tap Tempo","tap"],["Solo Clr","sc"],["Copy","cp"],["Paste","ps"],["A/B EQ","ab"],["Clear","cl"],["Home","hm"]];
  const macState={};

  function encVal(c,k){return{gain:c.gain,hpf:c.hpf,peq0:c.peq[0].g,peq1:c.peq[1].g,peq2:c.peq[2].g,peq3:c.peq[3].g,gate:c.gateThr,comp:c.compThr,aux1:c.aux1,pan:c.pan}[k];}
  function encSet(c,k,v){if(k==="gain")c.gain=v;else if(k==="hpf")c.hpf=Math.round(v);else if(k.startsWith("peq"))c.peq[+k.slice(3)].g=v;else if(k==="gate")c.gateThr=Math.round(v);else if(k==="comp")c.compThr=Math.round(v);else if(k==="aux1")c.aux1=Math.round(v);else if(k==="pan")c.pan=Math.round(v);}
  function encRot(e,v){let t;if(e.log)t=(Math.log(v)-Math.log(e.min))/(Math.log(e.max)-Math.log(e.min));else t=(v-e.min)/(e.max-e.min);return -140+t*280;}

  // ---- layers/faders ----
  function renderLayers(){const el=$("lyr");el.innerHTML="";LAYERS.forEach(l=>{const b=document.createElement("button");b.className="lb"+(l.k===layer?" on":"");b.textContent=l.label;b.onclick=()=>{layer=l.k;window.__usedLayer=window.__usedLayer||l.k!=="in1";renderLayers();renderBank();};el.appendChild(b);});}
  function bankChans(){const l=LAYERS.find(x=>x.k===layer);if(l&&l.r)return CH.slice(l.r[0],l.r[1]);return CH.slice(0,12).map((c,i)=>({...c,nm:(layer==="bus"?"Bus "+(i+1):"VCA "+(i+1)),ghost:true,i:c.i}));}
  function renderBank(){const b=$("bank");b.innerHTML="";
    bankChans().forEach(c=>{const d=document.createElement("div");d.className="fst";
      d.innerHTML=`<div class="fnm" style="background:${c.color}">${c.nm}</div>
        <button class="fsel ${c.i===sel&&!c.ghost?'on':''}" data-sel="${c.i}">SEL</button>
        <div class="fw"><div class="mt"><i id="m-${c.i}"></i></div><div class="fd" data-f="${c.i}"><div class="u"></div><div class="cap" id="cap-${c.i}"></div></div></div>
        <div class="fdb2" id="fdb-${c.i}">${c.fader}</div>
        <button class="mute ${c.mute?'on':''}" data-mute="${c.i}">MUTE</button>`;
      b.appendChild(d);});
    const m=document.createElement("div");m.className="fst";
    m.innerHTML=`<div class="fnm" style="background:var(--amber)">MASTER</div><button class="fsel">SEL</button>
      <div class="fw"><div class="mt"><i id="m-main"></i></div><div class="fd" data-master="1"><div class="u"></div><div class="cap" id="cap-main"></div></div></div>
      <div class="fdb2" id="fdb-main">${MASTER.fader}</div><button class="mute">MUTE</button>`;
    b.appendChild(m);placeCaps();}
  function placeCaps(){bankChans().forEach(c=>{const cap=$("cap-"+c.i);if(cap)cap.style.bottom="calc("+c.fader+"% - 7px)";});const cm=$("cap-main");if(cm)cm.style.bottom="calc("+MASTER.fader+"% - 7px)";}
  // Delegação (Pointer Events) no banco de faders — registrada UMA vez, sem vazamento a cada renderBank().
  let bankFaderDrag=null;
  function bankFaderSet(f,clientY){const r=f.getBoundingClientRect(),v=Math.round(clamp(1-(clientY-r.top)/r.height,0,1)*100);
    if(f.dataset.master){MASTER.fader=v;$("fdb-main").textContent=v;$("cap-main").style.bottom="calc("+v+"% - 7px)";}
    else{const c=CH[+f.dataset.f];c.fader=v;$("fdb-"+c.i).textContent=v;$("cap-"+c.i).style.bottom="calc("+v+"% - 7px)";}check();}
  function setupBank(){const bank=$("bank");
    bank.addEventListener("pointerdown",e=>{const f=e.target.closest(".fd");if(f){bankFaderDrag=f;bank.setPointerCapture(e.pointerId);bankFaderSet(f,e.clientY);e.preventDefault();}});
    bank.addEventListener("pointermove",e=>{if(bankFaderDrag){bankFaderSet(bankFaderDrag,e.clientY);e.preventDefault();}});
    const end=()=>bankFaderDrag=null;bank.addEventListener("pointerup",end);bank.addEventListener("pointercancel",end);
    bank.addEventListener("click",e=>{
      const s=e.target.closest("[data-sel]");if(s){sel=+s.dataset.sel;mode="channel";setTab();renderBank();renderStage();renderEncs();return;}
      const m=e.target.closest("[data-mute]");if(m){const c=CH[+m.dataset.mute];c.mute=!c.mute;m.classList.toggle("on",c.mute);check();return;}
    });}

  // ---- EQ math ----
  function bandDb(b,f){const rt=f/b.f;if(b.type==="hpf")return f<b.f?-24*Math.log10(b.f/f):0;const bw=b.g/(1+Math.pow((Math.log2(Math.max(0.001,rt)))*b.q*2,2));return bw;}
  function chDb(c,f){let db=0;if(c.hpfOn&&f<c.hpf)db+=-24*Math.log10(c.hpf/f);c.peq.forEach(b=>db+=bandDb(b,f));return db;}
  function fx(f,w){const mn=Math.log10(20),mx=Math.log10(20000);return (Math.log10(f)-mn)/(mx-mn)*w;}
  function xf(x,w){const mn=Math.log10(20),mx=Math.log10(20000);return Math.pow(10,mn+(x/w)*(mx-mn));}

  // ---- stage (overview / channel) ----
  function renderStage(){const s=$("stage");if(mode==="overview"){s.innerHTML='<div class="ov" id="ov"></div>';renderOverview();}else{renderChannel();}}
  function renderOverview(){const ov=$("ov");ov.innerHTML="";
    CH.slice(0,12).forEach(c=>{const d=document.createElement("div");d.className="ovs"+(c.i===sel?" sel":"");d.dataset.i=c.i;
      d.innerHTML=`<div class="ovh" style="background:${c.color}">${c.nm}</div><canvas class="ovc" id="ovc-${c.i}"></canvas>
        <div class="ovmeta"><span>G ${Math.round(c.gain)}</span><span>${c.pan===0?"C":(c.pan<0?"L":"R")+Math.abs(c.pan)}</span></div>
        <div class="ovdyn"><span class="${c.hpfOn?'on':''}" style="${c.hpfOn?'background:var(--amber)':''}">HPF</span><span class="${c.gate?'on':''}" style="${c.gate?'background:var(--green)':''}">GT</span><span class="${c.comp?'on':''}" style="${c.comp?'background:var(--dg)':''}">CP</span></div>
        <div class="ovaux">Aux1: ${c.aux1}</div>`;
      ov.appendChild(d);});
    ov.querySelectorAll(".ovs").forEach(el=>el.onclick=()=>{sel=+el.dataset.i;renderOverview();renderEncs();drawOVcurves();});
    drawOVcurves();
  }
  function drawOVcurves(){CH.slice(0,12).forEach(c=>{const cv=$("ovc-"+c.i);if(!cv)return;const w=cv.clientWidth,h=cv.clientHeight;cv.width=w*2;cv.height=h*2;const x=cv.getContext("2d");x.setTransform(2,0,0,2,0,0);x.clearRect(0,0,w,h);
    x.strokeStyle="#16202e";x.beginPath();x.moveTo(0,h/2);x.lineTo(w,h/2);x.stroke();
    x.beginPath();for(let px=0;px<=w;px+=2){const db=chDb(c,xf(px,w));const y=h/2-clamp(db,-15,15)/15*h/2;px?x.lineTo(px,y):x.moveTo(px,y);}x.strokeStyle=c.color;x.lineWidth=1.6;x.stroke();});}

  // selected channel EQ
  let handles=[],drag=null;
  function renderChannel(){const c=CH[sel];const s=$("stage");
    s.innerHTML=`<div class="selrow"><div class="eqbox"><div class="selhd"><span class="chip" style="background:${c.color}"></span><span class="nm">${c.nm}</span><span style="font-size:9.5px;color:var(--muted);margin-left:6px">EQ 4 bandas — arraste as bolinhas</span></div><canvas id="eq"></canvas></div>
      <div class="dyncol">
        <div class="tgs"><button class="tg eq" id="tHpf">HPF</button><button class="tg" id="tGate">GATE</button><button class="tg" id="tComp">COMP</button></div>
        <div class="drow"><label>Gain</label><input type="range" id="sGain" min="-5" max="60" value="${c.gain}"><span class="v" id="vGain">${Math.round(c.gain)}</span></div>
        <div class="drow"><label>Gate thr</label><input type="range" id="sGate" min="-70" max="0" value="${c.gateThr}"><span class="v" id="vGate">${c.gateThr}</span></div>
        <div class="drow"><label>Comp thr</label><input type="range" id="sComp" min="-40" max="0" value="${c.compThr}"><span class="v" id="vComp">${c.compThr}</span></div>
        <div class="drow"><label>Aux 1</label><input type="range" id="sAux" min="0" max="100" value="${c.aux1}"><span class="v" id="vAux">${c.aux1}</span></div>
        <div class="drow"><label>Pan</label><input type="range" id="sPan" min="-63" max="63" value="${c.pan}"><span class="v" id="vPan">${c.pan}</span></div>
      </div></div>`;
    $("tHpf").classList.toggle("on",c.hpfOn);$("tGate").classList.toggle("on",c.gate);$("tComp").classList.toggle("on",c.comp);
    $("tHpf").onclick=()=>{c.hpfOn=!c.hpfOn;$("tHpf").classList.toggle("on",c.hpfOn);drawEQ();renderEncs();check();};
    $("tGate").onclick=()=>{c.gate=!c.gate;$("tGate").classList.toggle("on",c.gate);check();};
    $("tComp").onclick=()=>{c.comp=!c.comp;$("tComp").classList.toggle("on",c.comp);check();};
    const bind=(idr,idv,set,suf)=>{$(idr).oninput=()=>{set(c,+$(idr).value);$(idv).textContent=$(idr).value+(suf||"");drawEQ();renderEncs();check();};};
    bind("sGain","vGain",(c,v)=>c.gain=v);bind("sGate","vGate",(c,v)=>c.gateThr=v);bind("sComp","vComp",(c,v)=>c.compThr=v);bind("sAux","vAux",(c,v)=>c.aux1=v);bind("sPan","vPan",(c,v)=>c.pan=v);
    setupEQ();drawEQ();
  }
  let cv2,cx2;
  // O canvas #eq é recriado a cada renderChannel; setupEQ só atualiza as refs.
  function setupEQ(){cv2=$("eq");cx2=cv2.getContext("2d");}
  function eqPosP(el,e){const r=el.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};}
  // Delegação (Pointer Events) no #stage — registrada UMA vez. As alças do EQ funcionam em mouse e toque.
  function setupStageEQ(){const stage=$("stage");
    stage.addEventListener("pointerdown",e=>{if(mode!=="channel"||!cv2)return;if(!e.target.closest("#eq"))return;const p=eqPosP(cv2,e);
      for(const h of handles){if(Math.hypot(p.x-h.x,p.y-h.y)<15){drag=h;stage.setPointerCapture(e.pointerId);e.preventDefault();return;}}});
    stage.addEventListener("pointermove",e=>{if(!drag||mode!=="channel"||!cv2)return;const c=CH[sel],b=c.peq[drag.i],p=eqPosP(cv2,e);
      b.f=clamp(xf(clamp(p.x,0,drag.w),drag.w),20,20000);b.g=clamp((drag.h/2-p.y)/(drag.h/2)*18,-18,18);drawEQ();renderEncs();check();e.preventDefault();});
    const end=()=>drag=null;stage.addEventListener("pointerup",end);stage.addEventListener("pointercancel",end);}
  // Redraw coalescing (iPad): dragging an EQ handle / gate / comp encoder fires many pointermove
  // events; each drawEQ() reallocates and repaints the canvas. Doing that per event starves the
  // main thread on iPad so controls lag. drawEQ() now coalesces to one repaint per animation frame
  // (rAF), with a setTimeout safety-net in case requestAnimationFrame is throttled.
  let _eqReq=0,_eqTo=0;
  function _flushEQ(){ if(_eqReq){cancelAnimationFrame(_eqReq);_eqReq=0;} if(_eqTo){clearTimeout(_eqTo);_eqTo=0;} renderEQ(); }
  function drawEQ(){ if(_eqReq||_eqTo)return; _eqReq=requestAnimationFrame(_flushEQ); _eqTo=setTimeout(_flushEQ,60); }
  function renderEQ(){if(!cv2)return;const c=CH[sel],rr=cv2.getBoundingClientRect(),w=rr.width,h=rr.height;if(w<2)return;cv2.width=w*2;cv2.height=h*2;cx2.setTransform(2,0,0,2,0,0);cx2.clearRect(0,0,w,h);
    cx2.strokeStyle="#12202e";cx2.fillStyle="#3a4a5e";cx2.font="9px system-ui";cx2.textAlign="center";[100,1000,10000].forEach(f=>{const x=fx(f,w);cx2.beginPath();cx2.moveTo(x,0);cx2.lineTo(x,h);cx2.stroke();cx2.fillText(f>=1000?f/1000+"k":f,x,h-1);});
    for(let d=-12;d<=12;d+=6){const y=h/2-d/18*h/2;cx2.strokeStyle=d===0?"#243447":"#101c28";cx2.beginPath();cx2.moveTo(0,y);cx2.lineTo(w,y);cx2.stroke();}
    cx2.beginPath();for(let px=0;px<=w;px+=2){const y=h/2-clamp(chDb(c,xf(px,w)),-16,16)/18*h/2;px?cx2.lineTo(px,y):cx2.moveTo(px,y);}cx2.strokeStyle=c.color;cx2.lineWidth=2.2;cx2.stroke();cx2.lineTo(w,h/2);cx2.lineTo(0,h/2);cx2.closePath();cx2.fillStyle=c.color+"16";cx2.fill();
    handles=[];const HN=["LF","LM","HM","HF"];c.peq.forEach((b,i)=>{const x=fx(b.f,w),y=h/2-clamp(b.g,-16,16)/18*h/2;cx2.fillStyle="#00a0e3";cx2.beginPath();cx2.arc(x,y,6,0,7);cx2.fill();cx2.fillStyle="#02121a";cx2.font="700 7px system-ui";cx2.fillText(HN[i],x,y+2);handles.push({x,y,i,w,h});});}

  // encoders + macros
  function renderEncs(){const g=$("encgrid");g.innerHTML="";const c=CH[sel];
    ENC.forEach(e=>{const el=document.createElement("div");el.className="enc";el.innerHTML=`<div class="dial" data-k="${e.k}"></div><div class="el">${e.label}</div><div class="ev" id="ev-${e.k}"></div>`;g.appendChild(el);});
    ENC.forEach(e=>{const d=g.querySelector('.dial[data-k="'+e.k+'"]');d.style.setProperty("--rot",encRot(e,clamp(encVal(c,e.k),e.min,e.max))+"deg");$("ev-"+e.k).textContent=e.fmt(encVal(c,e.k));});
  }
  // Delegação (Pointer Events) nos encoders — registrada UMA vez, sem vazamento a cada renderEncs().
  let encDrag=null,encLastY=0;
  function setupEncs(){const g=$("encgrid");
    g.addEventListener("pointerdown",e=>{const d=e.target.closest(".dial");if(!d)return;const en=ENC.find(x=>x.k===d.dataset.k);if(!en)return;
      encDrag={el:d,k:d.dataset.k,e:en};encLastY=e.clientY;g.setPointerCapture(e.pointerId);e.preventDefault();});
    g.addEventListener("pointermove",e=>{if(!encDrag)return;const dy=encLastY-e.clientY;encLastY=e.clientY;const cc=CH[sel],en=encDrag.e,k=encDrag.k;
      encSet(cc,k,clamp(encVal(cc,k)+dy*(en.max-en.min)/150,en.min,en.max));encDrag.el.style.setProperty("--rot",encRot(en,encVal(cc,k))+"deg");
      const ev=$("ev-"+k);if(ev)ev.textContent=en.fmt(encVal(cc,k));if(mode==="channel")drawEQ();check();e.preventDefault();});
    const end=()=>encDrag=null;g.addEventListener("pointerup",end);g.addEventListener("pointercancel",end);}
  function renderMacros(){const g=$("mgrid");g.innerHTML="";MAC.forEach(([lbl,k])=>{const b=document.createElement("button");b.className="mac"+(macState[k]?" on":"");if(macState[k])b.style.background=k.startsWith("mg")?"#ff4d4d":"#00a0e3";b.textContent=lbl;b.onclick=()=>{macState[k]=!macState[k];if(k==="tap")macState[k]=false;renderMacros();if(k.startsWith("mg"))toast("Mute Group "+lbl);check();};g.appendChild(b);});}

  document.querySelectorAll(".tab[data-mode]").forEach(t=>t.onclick=()=>{mode=t.dataset.mode;setTab();renderStage();});
  function setTab(){document.querySelectorAll(".tab[data-mode]").forEach(t=>t.classList.toggle("on",t.dataset.mode===mode));}

  // meters
  let t=0;function loop(){t+=0.05;bankChans().forEach(c=>{const el=$("m-"+c.i);if(el){const b=c.mute?0:(c.fader/100)*(0.4+0.4*Math.abs(Math.sin(t*1.3+c.i)));el.style.height=clamp(b*120,0,100)+"%";}});
    const mm=$("m-main");if(mm){let s=0;CH.forEach(c=>{if(!c.mute)s+=c.fader/100;});mm.style.height=clamp(s/CH.length*(MASTER.fader/100)*160,0,100)+"%";}requestAnimationFrame(loop);}

  const M=[
    {t:'Toque o canal <b>Lead Vox</b> na tela (Channel Overview) para selecioná-lo.',ok:()=>sel===11&&mode==="channel"},
    {t:'Na tela do canal, ligue o <b>HPF</b> e dê <b>brilho</b> (arraste a banda HF acima de +3).',ok:()=>CH[11].hpfOn&&CH[11].peq[3].g>=3},
    {t:'Ligue o <b>COMP</b> do Lead Vox e ajuste o threshold para ~−18.',ok:()=>CH[11].comp&&Math.abs(CH[11].compThr+18)<=5},
    {t:'Mande o Lead Vox para o <b>AUX 1</b> (monitor) acima de 30.',ok:()=>CH[11].aux1>=30},
    {t:'Troque de <b>camada</b> (ex.: IN 13-24) para entender os bancos de fader.',ok:()=>window.__usedLayer===true},
  ];
  let mi=0;
  function paintM(){const idx=$("mIdx"),txt=$("mTxt");if(mi>=M.length){idx.textContent="🎓";txt.innerHTML="<b>Boa!</b> Você operou a DiGiCo: overview, canal na tela, EQ, dinâmica, aux, encoders, camadas e macros.";$("mSkip").style.display="none";return;}idx.textContent="MISSÃO "+(mi+1)+"/"+M.length;txt.innerHTML=M[mi].t;}
  function check(){if(mi>=M.length)return;try{if(M[mi].ok()){mi++;toast(mi>=M.length?"Console dominado! 🎓":"✔");paintM();}}catch(e){}}
  let tt;function toast(m){const el=$("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>el.classList.remove("show"),1500);}
  $("mSkip").onclick=()=>{if(mi<M.length){mi++;paintM();}};

  setupBank();setupEncs();setupStageEQ();
  renderLayers();renderBank();renderStage();renderEncs();renderMacros();paintM();requestAnimationFrame(loop);

  // ---- FIT: escala o console para caber na tela (fullscreen e embed) ----
  function fitConsole(){
    const el=document.querySelector(".fit"); if(!el) return;
    const vw=window.innerWidth, vh=window.innerHeight;
    if(vw<760){ el.style.width="100%"; el.style.zoom=""; document.body.style.justifyContent="flex-start"; }
    else{
      el.style.width="1560px"; el.style.zoom="";
      const DW=el.offsetWidth, DH=el.offsetHeight;
      // Em fullscreen o iframe 16:9 do player fica MAIS ALTO que a tela real. Usamos screen.height
      // (altura real), não window.innerHeight (altura inflada do iframe), e alinhamos ao topo.
      const scrH=(window.screen&&screen.height)||vh;
      const iframeTaller=vh>scrH+8;
      const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6);
      const effVh=Math.max(240, visH-headerAllow);
      document.body.style.justifyContent=(iframeTaller||vh>700)?"flex-start":"center";
      let s=Math.min((vw-18)/DW, effVh/DH); s=Math.max(0.4, Math.min(s, 2.2));
      el.style.zoom=s;
    }
    try{ drawOVcurves(); }catch(e){}
    try{ drawEQ(); }catch(e){}
  }
  window.addEventListener("resize", fitConsole);
  setTimeout(fitConsole, 50);
})();
</script>
