<!doctype html>
<!--
  Simulador FIEL — PreSonus StudioLive Série III · aplicativo UC Surface (Universal Control)
  O simulador É o software UC Surface: tela cheia escura, azul PreSonus, navegação por abas.
  Fontes oficiais PreSonus:
   • UC Surface Software Reference Manual (fmicassets/PreSonus)
   • StudioLive Series III Owner's Manual — presonus.com
   • Fat Channel KB: support.presonus.com/hc/en-us/articles/210048633
  Framework invisível (responsivo desktop/tablet/phone, touch-drag, guarda iframe 16:9,
  leitura de sim_bases em runtime + fallback, botão play com progresso, click-abre-página,
  navegação sem beco, motor Web Audio) reutilizado do padrão CL5/DiGiCo. Nada visual da Yamaha.
-->
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>PreSonus StudioLive — UC Surface (Simulador fiel · SMU)</title>
<style>
  /* ============================================================
     PreSonus UC Surface — o simulador É o aplicativo de controle.
     Fundo grafite escuro + azul PreSonus. Sem cromo de janela.
     ============================================================ */
  :root{
    --bg:#0b0e12; --bg2:#0f131a; --pan:#161b22; --pan2:#1c222b; --line:#28303a; --edge:#05070a;
    --ink:#e6ecf3; --mut:#8a97a6; --dim:#59636f;
    --pblue:#12a5e5; --pbluehi:#5cc8f2; --green:#3ad07a; --amber:#e8b53a; --red:#e0483f; --purple:#8f7dff;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;height:100dvh}
  body{background:var(--bg);color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;user-select:none;overflow:hidden;touch-action:manipulation;
    display:flex;flex-direction:column}

  .app{position:fixed;inset:0;display:flex;flex-direction:column;min-height:0;
    background:radial-gradient(1400px 800px at 50% -20%,#12181f,#080a0e 62%),#080a0e}

  /* ===== TOP STATUS BAR (UC Surface) ===== */
  .topbar{flex:0 0 auto;display:flex;align-items:center;gap:10px;padding:6px 12px;min-height:46px;
    background:linear-gradient(180deg,#12171e,#0b0f14);border-bottom:1px solid var(--edge);box-shadow:0 2px 8px #0006}
  .brand{display:flex;align-items:center;gap:9px;flex:0 0 auto}
  .brand .logo{display:flex;align-items:baseline;gap:0;font-weight:900;letter-spacing:.2px}
  .brand .logo b{color:var(--ink);font-size:17px}
  .brand .logo i{color:var(--pblue);font-style:normal;font-size:17px;font-weight:900}
  .brand .model{font-size:11px;font-weight:800;color:#cdd8e4;letter-spacing:1px;
    background:linear-gradient(180deg,#101519,#080b0e);border:1px solid #1d3a49;border-radius:5px;padding:3px 8px}
  .brand .model b{color:var(--pblue)}
  .uc{font-size:9px;font-weight:800;letter-spacing:1.5px;color:var(--pblue);border:1px solid #1d3a49;border-radius:4px;padding:2px 6px;background:#08131a}
  .pill{display:flex;align-items:center;gap:6px;font-size:10px;letter-spacing:.5px;color:var(--mut);
    background:#0a1016;border:1px solid #20303a;border-radius:14px;padding:3px 9px;white-space:nowrap}
  .pill b{color:var(--ink);font-weight:700}
  .dot{width:7px;height:7px;border-radius:50%;background:var(--green);box-shadow:0 0 7px var(--green)}
  .dot.warn{background:var(--pblue);box-shadow:0 0 7px var(--pblue)}
  .bridge{width:150px;height:34px;flex:0 0 auto;background:#05080b;border:1px solid #17222c;border-radius:6px;box-shadow:inset 0 2px 6px #000a}
  #mbridge{display:block;width:100%;height:100%}
  .snap{display:flex;align-items:center;gap:8px;background:#08131a;border:1px solid #16394a;border-radius:7px;padding:3px 10px;flex:0 0 auto}
  .snap .n{font-family:"DS-Digital","Courier New",monospace;font-size:20px;font-weight:800;color:var(--pbluehi);letter-spacing:1.5px;line-height:1;text-shadow:0 0 8px #12a5e555}
  .snap .l{font-size:8px;color:#5e8195;letter-spacing:1px;line-height:1.1}
  .spacer{flex:1 1 auto;min-width:6px}
  .sb{font:inherit;font-size:12px;font-weight:800;border:0;border-radius:8px;padding:8px 14px;cursor:pointer;
    background:linear-gradient(180deg,#39d98a,#1fae63);color:#04140b;box-shadow:0 2px 6px #0007;white-space:nowrap}
  .sb:disabled{cursor:wait;background:linear-gradient(180deg,#5cc8f2,#12a5e5);color:#04141a;animation:pulseLoad 1s ease-in-out infinite}
  @keyframes pulseLoad{0%,100%{filter:brightness(1)}50%{filter:brightness(1.28)}}
  select#songSel{font:inherit;font-size:11px;color:var(--ink);background:#0a1016;border:1px solid #20303a;border-radius:7px;padding:6px 8px;max-width:210px;cursor:pointer}
  #audioStatus{font-size:10.5px;color:var(--mut);white-space:nowrap;min-width:96px}
  .mission{display:flex;align-items:center;gap:9px;background:#0a1016;border:1px solid #20303a;border-radius:8px;padding:5px 11px;flex:1 1 300px;min-width:0;max-width:560px}
  .mission .idx{font-size:10px;color:var(--pblue);font-weight:800;letter-spacing:.8px;white-space:nowrap}
  .mission .txt{font-size:11px;line-height:1.25;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
  .mission .txt b{color:#fff} .mission .txt small{color:var(--mut)}
  .ghost{font:inherit;font-size:10.5px;font-weight:700;color:var(--mut);background:transparent;border:1px solid #29333d;border-radius:6px;padding:5px 9px;cursor:pointer;white-space:nowrap}

  /* ===== UC SURFACE NAV TABS (persistente, nunca beco sem saída) ===== */
  .tabbar{flex:0 0 auto;display:flex;align-items:stretch;gap:3px;padding:5px 10px;overflow-x:auto;overflow-y:hidden;
    background:linear-gradient(180deg,#0d1218,#090d12);border-bottom:1px solid var(--edge);scrollbar-width:none}
  .tabbar::-webkit-scrollbar{height:0}
  .tab{flex:0 0 auto;font:inherit;font-size:11px;font-weight:700;letter-spacing:.4px;color:#aeb9c6;cursor:pointer;
    background:linear-gradient(180deg,#212934,#19202a);border:1px solid #0f141a;border-radius:7px;padding:8px 13px;
    box-shadow:inset 0 1px 0 #ffffff0a;white-space:nowrap}
  .tab:hover{background:linear-gradient(180deg,#28313d,#1e2530)}
  .tab.active{color:#04121a;background:linear-gradient(180deg,#5cc8f2,#12a5e5);border-color:#0a6088;box-shadow:0 0 10px #12a5e555}
  .tab.sof{margin-left:auto}
  .tab.sof.active{color:#04140b;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33}

  /* ===== TELA (o touchscreen UC Surface, full-bleed) ===== */
  .screenwrap{flex:1 1 auto;min-height:0;position:relative;padding:8px;display:flex}
  .bezel{flex:1;min-width:0;min-height:0;border-radius:10px;padding:6px;
    background:linear-gradient(180deg,#0b0f14,#05070a);border:1px solid #000;
    box-shadow:inset 0 3px 14px #000c, 0 0 0 2px #1a232c}
  #screen{display:block;width:100%;height:100%;border-radius:6px;background:linear-gradient(180deg,#11161d,#0c1015);touch-action:none}

  .toast{position:fixed;left:50%;bottom:20px;transform:translateX(-50%) translateY(18px);
    background:#0e141b;border:1px solid var(--pblue);color:var(--ink);padding:9px 15px;border-radius:9px;
    font-size:12.5px;opacity:0;transition:.24s;pointer-events:none;z-index:60;box-shadow:0 10px 32px #000a}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--pbluehi)}

  /* ===== RESPONSIVO ===== */
  body.tablet .tab{padding:9px 11px;font-size:11px}
  body.tablet .topbar{min-height:44px}
  body.phone .topbar{flex-wrap:wrap;gap:6px;padding:6px 8px}
  body.phone .brand .model{display:none}
  body.phone .uc{display:none}
  body.phone .bridge{display:none}
  body.phone .snap{display:none}
  body.phone .mission{order:5;flex:1 1 100%;max-width:none}
  body.phone .spacer{display:none}
  body.phone .tab{padding:10px 12px;font-size:12px}
  body.phone .tab.sof{margin-left:3px}
  body.phone select#songSel{max-width:150px}
  body.phone #audioStatus{display:none}
  body.phone .screenwrap{padding:5px}
</style>
</head>
<body>
<div class="app" id="app">

  <!-- ===== TOP STATUS BAR ===== -->
  <div class="topbar">
    <div class="brand">
      <span class="logo"><b>Pre</b><i>Sonus</i></span>
      <span class="model">StudioLive <b>32 · III</b></span>
      <span class="uc">UC&nbsp;SURFACE</span>
    </div>
    <span class="pill"><span class="dot" id="netLed"></span> AVB <b id="netTxt">REDE</b></span>
    <span class="pill">48 kHz · FLEX DSP</span>
    <div class="bridge"><canvas id="mbridge"></canvas></div>
    <div class="snap"><div><div class="n" id="snapNum">001</div></div><div class="l">SCENE<br><span id="snapName">EMPTY</span></div></div>
    <div class="spacer"></div>
    <button class="sb" id="playBtn">► Tocar base</button>
    <select id="songSel"></select>
    <span id="audioStatus">áudio: —</span>
    <div class="mission">
      <span class="idx" id="mIdx">MISSÃO 1/5</span>
      <span class="txt" id="mTxt">—</span>
      <button class="ghost" id="mSkip">Pular</button>
    </div>
  </div>

  <!-- ===== UC SURFACE TABS ===== -->
  <div class="tabbar" id="tabs">
    <button class="tab active" data-mode="overview">MIXER</button>
    <button class="tab" data-mode="selected">FAT CHANNEL</button>
    <button class="tab" data-mode="eq">EQ</button>
    <button class="tab" data-mode="gate">GATE</button>
    <button class="tab" data-mode="comp">COMP</button>
    <button class="tab" data-mode="limiter">LIMITER</button>
    <button class="tab" data-mode="sends">FLEXMIX</button>
    <button class="tab" data-mode="fx">FLEXFX</button>
    <button class="tab" data-mode="dca">DCA / MUTE</button>
    <button class="tab" data-mode="scenes">SCENES</button>
    <button class="tab" data-mode="meter">RTA · METERS</button>
    <button class="tab" data-mode="presets">PRESETS</button>
    <button class="tab sof" id="sofBtn">SENDS ON FADERS</button>
  </div>

  <!-- ===== TOUCHSCREEN ===== -->
  <div class="screenwrap"><div class="bezel"><canvas id="screen"></canvas></div></div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  /* ================= MODEL ================= */
  const MIX_NAMES=["FlexMix 1 Mon","FlexMix 2 Mon","FlexMix 3 IEM","FlexMix 4 IEM","FlexMix 5 Sub","FlexMix 6 Sub","FlexMix 7 FB","FlexMix 8 FB",
    "FlexMix 9","FlexMix 10","FlexMix 11","FlexMix 12","FlexMix 13","FlexMix 14","FlexMix 15","FlexMix 16",
    "AUX 17","AUX 18","AUX 19","AUX 20","AUX 21","AUX 22","AUX 23","AUX 24"];
  const N_MIX=24,N_MTX=8,N_DCA=24,N_MUTE=8,N_SCENE=10,N_FX=4;
  /* StudioLive Série III (32) = 40 canais de entrada no FLEX DSP; capado em MAXCH=40. */
  const MAXCH=40, NCH=MAXCH;
  const COLORS=["#e0483f","#f97316","#12a5e5","#eab308","#3ad07a","#14b8a6","#39c0e6","#3b82f6","#6366f1","#a855f7","#ec4899","#f43f5e"];
  const NAMES=["Kick In","Snare","Hat","Tom 1","Tom 2","OH L","OH R","Bass DI","Gtr L","Gtr R","Keys L","Keys R","Lead Voc","Voc 2","Voc 3","Coro","Sax","Trumpet","Perc","Play L","Play R","Amb L","Amb R","Talk"];
  const RAWSRC=[-42,-40,-48,-44,-45,-47,-47,-38,-41,-41,-39,-39,-34,-40,-41,-43,-43,-44,-46,-36,-36,-52,-52,-30];
  function mkChannel(i){
    return { i, name:NAMES[i]||("CH "+(i+1)), color:COLORS[i%COLORS.length],
      gain:20+((i*7)%10)-4, phase:false, phantom:false, hpfOn:false, hpf:80, lpfOn:false, lpf:18000,
      eq:[{type:'lowshelf',f:120,g:0,q:0.7},{type:'peaking',f:500,g:0,q:1.0},{type:'peaking',f:2500,g:0,q:1.0},{type:'highshelf',f:8000,g:0,q:0.7}],
      eqType:'STANDARD', eqOn:true,
      gateOn:false,gateThr:-40,gateRange:-60,gateAtk:1,gateHold:20,gateDecay:200,
      compOn:false,compThr:-12,compRatio:3,compAtk:20,compRel:150,compKnee:2,compGain:0,
      limOn:false,limThr:-1,
      pan:0, fader:-4-((i*5)%8), on:true, cue:false,
      sends:new Array(N_MIX).fill(-90), sendOn:new Array(N_MIX).fill(false), sendPre:new Array(N_MIX).fill(false),
      dca:new Array(N_DCA).fill(false), mute:new Array(N_MUTE).fill(false), muteSafe:false,
      fxSend:new Array(N_FX).fill(-90), fxSendOn:new Array(N_FX).fill(false), src:RAWSRC[i]||-42 };
  }
  const CH=Array.from({length:MAXCH},(_,i)=>mkChannel(i));

  /* ===== FlexFX: 4 processadores estéreo, cada um 1 de 9 tipos (4 rev + 4 delay + 1 mod).
     Todo canal manda p/ os 4 buses; retorno no Main. Ref: StudioLive Series III FLEX DSP. ===== */
  const FX_TYPES=[
    {id:'room',    name:'Small Room',      kind:'reverb'},
    {id:'hall',    name:'Large Hall',      kind:'reverb'},
    {id:'plate',   name:'Vintage Plate',   kind:'reverb'},
    {id:'ambience',name:'Ambience',        kind:'reverb'},
    {id:'mono',    name:'Mono Delay',      kind:'delay'},
    {id:'filter',  name:'Filter Delay',    kind:'delay'},
    {id:'stereo',  name:'Stereo Delay',    kind:'delay'},
    {id:'pingpong',name:'Ping-Pong Delay', kind:'delay'},
    {id:'chorus',  name:'Chorus',          kind:'mod'}
  ];
  function makeFlexFX(){ const start=[1,4,2,6]; // A=Large Hall · B=Mono Delay · C=Vintage Plate · D=Stereo Delay
    return start.map(t=>({ type:t, on:true, ret:0.35,
      size:2.2, predelay:20,          // reverb
      time:0.38, fb:0.35 })); }        // delay/mod

  const state={ sel:12, mode:"overview", sof:-1, sofBus:0, sofType:'mix', master:-3, mono:-3, eqBand:3,
    knobMode:'gain', scene:0, monitor:-20, dim:false, talkback:false,
    dcaGain:new Array(N_DCA).fill(0), dcaOn:new Array(N_DCA).fill(true),
    mixMaster:new Array(N_MIX).fill(0), mixOn:new Array(N_MIX).fill(true),
    mtxMaster:new Array(N_MTX).fill(0), mtxOn:new Array(N_MTX).fill(true),
    muteActive:new Array(N_MUTE).fill(false),
    fxSel:0, flexfx:makeFlexFX() };
  const scenes=new Array(N_SCENE).fill(null);

  /* ================= HELPERS ================= */
  const $=s=>document.querySelector(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const FMIN=-90,FMAX=10;
  function faderTxt(db){ return db<=FMIN?"−∞":(db>0?"+":"")+db.toFixed(1); }
  function panTxt(p){ if(Math.abs(p)<2)return"C"; return (p<0?"L"+Math.round(-p):"R"+Math.round(p)); }
  function pos2db(p){ if(p<=0.01)return FMIN; return clamp(-60+p*70,FMIN,FMAX); }
  function db2pos(db){ if(db<=FMIN)return 0; return clamp((db+60)/70,0,1); }
  function fx(f){ const mn=Math.log10(20),mx=Math.log10(20000); return (Math.log10(f)-mn)/(mx-mn); }
  function fInv(t){ const mn=Math.log10(20),mx=Math.log10(20000); return Math.pow(10,mn+clamp(t,0,1)*(mx-mn)); }
  function perf(){ return performance.now(); }

  /* ================= SCREEN COLOR THEME (UC Surface grafite + azul PreSonus) ================= */
  const SC={ bg0:"#0d1015",bg1:"#151a21", panel:"#1e232b", panelHi:"#262c35", panelLo:"#181c22",
    border:"#333c47", line:"#2a323c", grid:"#212831",
    ink:"#e9eef5", mut:"#8b97a6", dim:"#5c6675",
    amber:"#12a5e5", green:"#3ad07a", red:"#e0483f", cyan:"#39c0e6", purple:"#8f7dff",
    band:["#e0554e","#e0b84e","#4ec0e0","#8f7dff"] };

  /* ================= biquad magnitude (bate com Web Audio) ================= */
  const FS=48000;
  function biquadDb(type,f0,gainDb,Q,f){
    f0=clamp(f0,10,FS/2-10);Q=Math.max(0.05,Q);
    const w0=2*Math.PI*f0/FS,cw=Math.cos(w0),sw=Math.sin(w0),A=Math.pow(10,gainDb/40),alpha=sw/(2*Q);
    let b0,b1,b2,a0,a1,a2;
    if(type==='peaking'){b0=1+alpha*A;b1=-2*cw;b2=1-alpha*A;a0=1+alpha/A;a1=-2*cw;a2=1-alpha/A;}
    else if(type==='lowshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)-(A-1)*cw+s2);b1=2*A*((A-1)-(A+1)*cw);b2=A*((A+1)-(A-1)*cw-s2);a0=(A+1)+(A-1)*cw+s2;a1=-2*((A-1)+(A+1)*cw);a2=(A+1)+(A-1)*cw-s2;}
    else if(type==='highshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)+(A-1)*cw+s2);b1=-2*A*((A-1)+(A+1)*cw);b2=A*((A+1)+(A-1)*cw-s2);a0=(A+1)-(A-1)*cw+s2;a1=2*((A-1)-(A+1)*cw);a2=(A+1)-(A-1)*cw-s2;}
    else if(type==='highpass'){b0=(1+cw)/2;b1=-(1+cw);b2=(1+cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    else {b0=(1-cw)/2;b1=1-cw;b2=(1-cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    const w=2*Math.PI*f/FS,phi=Math.pow(Math.sin(w/2),2);
    const num=Math.pow(b0+b1+b2,2)-4*(b0*b1+4*b0*b2+b1*b2)*phi+16*b0*b2*phi*phi;
    const den=Math.pow(a0+a1+a2,2)-4*(a0*a1+4*a0*a2+a1*a2)*phi+16*a0*a2*phi*phi;
    return 10*Math.log10(Math.max(1e-9,num)/Math.max(1e-9,den));
  }
  function eqTypeFactor(t){ return t==='MODERN'?1.45:t==='PASSIVE'?0.6:t==='VINTAGE'?0.82:1; }
  function eqMag(ch,f){ let g=0; const kf=eqTypeFactor(ch.eqType||'STANDARD');
    for(const b of ch.eq){ if(b.g!==0) g+=biquadDb(b.type,b.f,b.g,b.q*kf,f); }
    if(ch.hpfOn) g+=biquadDb('highpass',ch.hpf,0,0.707,f);
    if(ch.lpfOn) g+=biquadDb('lowpass',ch.lpf,0,0.707,f);
    return clamp(g,-30,20); }

  const KDEF={ gain:{min:-6,max:60}, hpf:{min:24,max:1000,log:true}, gate:{min:-84,max:0}, comp:{min:-56,max:0}, pan:{min:-63,max:63},
    monitor:{min:-60,max:0}, eqQ:{min:0.1,max:10,log:true}, eqF:{min:20,max:20000,log:true}, eqG:{min:-15,max:15} };

  function selectChannel(i){ state.sel=i; paintSelected(); drawScreen(); checkMissions(); }
  let paintSelected=function(){ paintTopHud(); };
  function paintTopHud(){ var el=document.getElementById('snapNum'); if(el)el.textContent=String(state.scene+1).padStart(3,'0');
    var nm=document.getElementById('snapName'); if(nm)nm.textContent=scenes[state.scene]?'STORED':'EMPTY'; }

  let renderScreen=function(){}, applyChanAudio=function(){}, applyMonitor=function(){};
  let _drawReq=0; function drawScreen(){ if(_drawReq)return; _drawReq=requestAnimationFrame(function(){ _drawReq=0; renderScreen(); }); }

  function meterDbOf(i){ const ch=CH[i];
    if(playing&&ch.hasAudio) return chLevelDb(i)+(ch.on?0:-90);
    if(!ch.hasAudio) return -90;
    return ch.src+ch.gain+(ch.on?Math.min(0,ch.fader):-90); }

  function pickInk(hex){ const h=hex.replace('#',''); if(h.length<6)return "#0b0f14";
    const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    return (0.299*r+0.587*g+0.114*b)>150?"#0b0f14":"#f4f8ff"; }

  /* ================= SCREEN (canvas) ================= */
  const cv=$("#screen"), ctx=cv.getContext("2d"); let W=0,H=0,DPR=1;
  const mb=$("#mbridge"), mbx=mb?mb.getContext("2d"):null; let MBW=0,MBH=0;
  function sizeCanvas(){ DPR=Math.min(2,window.devicePixelRatio||1);
    let r=cv.getBoundingClientRect(); W=r.width; H=r.height; cv.width=Math.round(W*DPR); cv.height=Math.round(H*DPR); ctx.setTransform(DPR,0,0,DPR,0,0);
    if(mb){ r=mb.getBoundingClientRect(); MBW=r.width; MBH=r.height; mb.width=Math.round(MBW*DPR); mb.height=Math.round(MBH*DPR); mbx.setTransform(DPR,0,0,DPR,0,0); }
    drawScreen(); }
  function roundRect(x,y,w,h,r){ r=Math.max(0,Math.min(r,w/2,h/2)); ctx.beginPath();ctx.moveTo(x+r,y);ctx.arcTo(x+w,y,x+w,y+h,r);ctx.arcTo(x+w,y+h,x,y+h,r);ctx.arcTo(x,y+h,x,y,r);ctx.arcTo(x,y,x+w,y,r);ctx.closePath(); }
  let hitRegions=[], activeRegion=null;
  function reg(o){ hitRegions.push(o); return o; }
  function inRegion(r,p){ if(r.hit==='circle')return Math.hypot(p.x-r.cx,p.y-r.cy)<=(r.rr||12); return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
  function evtPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
  cv.addEventListener("pointerdown",e=>{ const p=evtPos(e);
    for(let i=hitRegions.length-1;i>=0;i--){ const r=hitRegions[i]; if(inRegion(r,p)){ if(r.onDown)r.onDown(p);
      if(r.onDrag){ activeRegion=r; cv.setPointerCapture(e.pointerId); r.onDrag(p); } drawScreen(); e.preventDefault(); return; } } });
  cv.addEventListener("pointermove",e=>{ if(!activeRegion)return; activeRegion.onDrag(evtPos(e)); drawScreen(); e.preventDefault(); });
  const cvUp=()=>{activeRegion=null;}; cv.addEventListener("pointerup",cvUp); cv.addEventListener("pointercancel",cvUp);

  function shade(hex,amt){ const h=hex.replace('#',''); let r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255); return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }
  function scrBg(){ const g=ctx.createLinearGradient(0,0,0,H); g.addColorStop(0,SC.bg1); g.addColorStop(1,SC.bg0); ctx.fillStyle=g; ctx.fillRect(0,0,W,H); }
  function panel(x,y,w,h,title,accent){ const g=ctx.createLinearGradient(0,y,0,y+h); g.addColorStop(0,SC.panelHi); g.addColorStop(1,SC.panelLo);
    ctx.fillStyle=g; roundRect(x,y,w,h,7); ctx.fill(); ctx.strokeStyle=accent||SC.border; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,h-1,7); ctx.stroke();
    if(title){ ctx.fillStyle=SC.mut; ctx.font="700 9px Inter,system-ui"; ctx.textAlign="left"; ctx.textBaseline="alphabetic"; ctx.fillText(title,x+9,y+13); } }
  function scrBtn(x,y,w,h,label,active,onClick,col,small){ col=col||SC.amber;
    const g=ctx.createLinearGradient(0,y,0,y+h); if(active){ g.addColorStop(0,shade(col,20)); g.addColorStop(1,shade(col,-30)); } else { g.addColorStop(0,"#2f3742"); g.addColorStop(1,"#20262e"); }
    ctx.fillStyle=g; roundRect(x,y,w,h,5); ctx.fill(); ctx.strokeStyle=active?shade(col,-40):"#434b55"; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,h-1,5); ctx.stroke();
    ctx.fillStyle=active?pickInk(col):"#cfe0f0"; ctx.font="700 "+(small?9:10)+"px Inter,system-ui"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(label,x+w/2,y+h/2+.5); ctx.textBaseline="alphabetic";
    if(onClick) reg({x,y,w,h,onDown:()=>onClick()}); }
  function scrParam(x,y,w,label,val,min,max,fmt,onSet,opts){ opts=opts||{};
    if(label){ ctx.fillStyle=SC.mut; ctx.font="700 9px Inter,system-ui"; ctx.textAlign="left"; ctx.fillText(label,x,y-4); }
    ctx.textAlign="right"; ctx.fillStyle=SC.ink; ctx.font="800 11px Inter,system-ui"; ctx.fillText(fmt(val),x+w,y-4);
    const th=7; ctx.fillStyle="#12151a"; roundRect(x,y,w,th,4); ctx.fill(); ctx.strokeStyle=SC.line; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,th-1,4); ctx.stroke();
    let t=opts.log?Math.log(Math.max(min,val)/min)/Math.log(max/min):(val-min)/(max-min); t=clamp(t,0,1);
    ctx.fillStyle=opts.col||SC.amber; roundRect(x,y,t*w,th,4); ctx.fill();
    ctx.fillStyle="#eef4fb"; ctx.beginPath(); ctx.arc(x+t*w,y+th/2,5.5,0,7); ctx.fill();
    reg({x:x-4,y:y-10,w:w+8,h:th+20,onDrag:p=>{ let tt=clamp((p.x-x)/w,0,1); let v=opts.log?min*Math.pow(max/min,tt):min+tt*(max-min); if(opts.step)v=Math.round(v/opts.step)*opts.step; onSet(clamp(v,min,max)); }}); }
  function vmeter(x,y,w,h,dbfs,peakLine){ ctx.fillStyle="#0a0d11"; ctx.fillRect(x,y,w,h);
    const t=clamp((dbfs+60)/60,0,1),hh=h*t; const g=ctx.createLinearGradient(0,y+h,0,y); g.addColorStop(0,"#2ea85a"); g.addColorStop(.6,"#37c86a"); g.addColorStop(.82,"#e8c33a"); g.addColorStop(1,"#e0483f");
    ctx.fillStyle=g; ctx.fillRect(x,y+h-hh,w,hh);
    if(peakLine!==false){ const ty=y+h-h*((-18+60)/60); ctx.strokeStyle="#ffffff40"; ctx.lineWidth=1; ctx.beginPath(); ctx.moveTo(x,ty); ctx.lineTo(x+w,ty); ctx.stroke(); } }

  };

  /* ---- shared: EQ graph ---- */
  function drawEqGraph(gx,gy,gw,gh,ch,interactive){
    const g=ctx.createLinearGradient(0,gy,0,gy+gh); g.addColorStop(0,"#181d25"); g.addColorStop(1,"#121820");
    ctx.fillStyle=g; roundRect(gx,gy,gw,gh,6); ctx.fill(); ctx.strokeStyle=SC.border; ctx.lineWidth=1; roundRect(gx+.5,gy+.5,gw-1,gh-1,6); ctx.stroke();
    ctx.save(); roundRect(gx,gy,gw,gh,6); ctx.clip();
    ctx.font="8px Inter"; ctx.textAlign="center";
    [30,100,300,1000,3000,10000].forEach(f=>{ const x=gx+fx(f)*gw; ctx.strokeStyle=SC.grid; ctx.lineWidth=1; ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.fillText(f>=1000?(f/1000)+"k":f,x,gy+gh-3); });
    for(let d=-15;d<=15;d+=5){ const yy=gy+gh/2-d/20*gh/2; ctx.strokeStyle=d===0?"#3a424b":"#1f262e"; ctx.beginPath();ctx.moveTo(gx,yy);ctx.lineTo(gx+gw,yy);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.textAlign="left"; ctx.fillText((d>0?"+":"")+d,gx+3,yy-2); ctx.textAlign="center"; }
    ch.eq.forEach((b,bi)=>{ if(b.g===0)return; ctx.beginPath();
      for(let px=0;px<=gw;px+=3){ const f=fInv(px/gw),gg=biquadDb(b.type,b.f,b.g,b.q*eqTypeFactor(ch.eqType),f),yy=gy+gh/2-gg/20*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }
      ctx.strokeStyle=SC.band[bi]+"55"; ctx.lineWidth=1; ctx.stroke(); });
    ctx.beginPath();
    for(let px=0;px<=gw;px+=2){ const f=fInv(px/gw),gg=eqMag(ch,f),yy=gy+gh/2-gg/20*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }
    ctx.strokeStyle=ch.color; ctx.lineWidth=2.2; ctx.stroke();
    ctx.lineTo(gx+gw,gy+gh/2); ctx.lineTo(gx,gy+gh/2); ctx.closePath(); ctx.fillStyle=ch.color+"1c"; ctx.fill();
    ctx.restore();
    if(ch.hpfOn){ const x=gx+fx(ch.hpf)*gw; ctx.strokeStyle=SC.amber; ctx.setLineDash([4,3]); ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=SC.amber; ctx.beginPath();ctx.arc(x,gy+gh-12,6,0,7);ctx.fill(); ctx.fillStyle="#0b1420";ctx.font="700 8px Inter";ctx.textAlign="center";ctx.fillText("H",x,gy+gh-9);
      if(interactive) reg({hit:'circle',cx:x,cy:gy+gh-12,rr:15,onDrag:p=>{ ch.hpf=clamp(Math.round(fInv((p.x-gx)/gw)),24,1000); applyChanAudio(ch.i); paintSelected(); checkMissions(); }}); }
    ch.eq.forEach((b,bi)=>{ const x=gx+fx(b.f)*gw, yy=gy+gh/2-b.g/20*gh/2, selb=state.eqBand===bi;
      ctx.fillStyle=SC.band[bi]; ctx.beginPath();ctx.arc(x,yy,selb?8:6.5,0,7);ctx.fill();
      if(selb){ ctx.strokeStyle="#fff"; ctx.lineWidth=1.6; ctx.stroke(); }
      ctx.fillStyle="#0b1420"; ctx.font="700 8px Inter"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(bi+1,x,yy); ctx.textBaseline="alphabetic";
      if(interactive) reg({hit:'circle',cx:x,cy:yy,rr:16,onDown:()=>{state.eqBand=bi;paintSelected();},
        onDrag:p=>{ b.f=clamp(Math.round(fInv((p.x-gx)/gw)),20,20000); b.g=clamp(-(p.y-gy-gh/2)/(gh/2)*15,-15,15); applyChanAudio(ch.i); paintSelected(); checkMissions(); }}); });
  }

  /* ---- shared: dynamics mini graph ---- */
  function drawDynMini(x,y,w,h,ch,which){
    const isGate=which===1; const on=isGate?ch.gateOn:ch.compOn; const col=isGate?SC.green:SC.cyan;
    panel(x,y,w,h, null, on?col:SC.border);
    ctx.fillStyle=on?col:SC.mut; ctx.font="800 9px Inter"; ctx.textAlign="left"; ctx.textBaseline="alphabetic";
    ctx.fillText(isGate?"NOISE GATE ▸":"COMPRESSOR ▸", x+8, y+13);
    reg({x:x+2,y:y+2,w:w-46,h:16,onDown:()=>setMode(isGate?'gate':'comp')});
    scrBtn(x+w-40,y+4,34,15,on?"ON":"OFF",on,()=>{ if(isGate)ch.gateOn=!ch.gateOn; else ch.compOn=!ch.compOn; applyChanAudio(ch.i); paintSelected(); checkMissions(); }, col,true);
    const px0=x+10,py0=y+24,pw=w*0.52,ph=h-34;
    ctx.strokeStyle=SC.line; ctx.strokeRect(px0,py0,pw,ph);
    ctx.strokeStyle="#343b43"; ctx.setLineDash([3,3]); ctx.beginPath();ctx.moveTo(px0,py0+ph);ctx.lineTo(px0+pw,py0);ctx.stroke(); ctx.setLineDash([]);
    if(isGate){ const X=d=>px0+clamp((d+72)/72,0,1)*pw, Y=o=>py0+ph-clamp((o+72)/72,0,1)*ph;
      ctx.beginPath(); for(let d=-72;d<=0;d+=2){ const o=d>ch.gateThr?d:d+ch.gateRange; const xx=X(d),yy=Y(clamp(o,-72,0)); d===-72?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy); }
      ctx.strokeStyle=SC.green; ctx.lineWidth=2; ctx.stroke();
      const tx=X(ch.gateThr); ctx.strokeStyle=SC.red; ctx.setLineDash([3,2]); ctx.beginPath();ctx.moveTo(tx,py0);ctx.lineTo(tx,py0+ph);ctx.stroke(); ctx.setLineDash([]);
      reg({x:tx-12,y:py0,w:24,h:ph,onDrag:p=>{ ch.gateThr=clamp(Math.round((p.x-px0)/pw*72-72),-72,0); applyChanAudio(ch.i); paintSelected(); }});
    } else { const ratio=ch.compRatio>=40?40:ch.compRatio; const X=d=>px0+clamp((d+60)/60,0,1)*pw, Y=o=>py0+ph-clamp((o+60)/60,0,1)*ph;
      ctx.beginPath(); for(let d=-60;d<=0;d+=2){ let o=d>ch.compThr?ch.compThr+(d-ch.compThr)/ratio:d; o+=ch.compGain; const xx=X(d),yy=Y(clamp(o,-60,6)); d===-60?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy); }
      ctx.strokeStyle=SC.cyan; ctx.lineWidth=2; ctx.stroke();
      const tx=X(ch.compThr); ctx.strokeStyle=SC.red; ctx.setLineDash([3,2]); ctx.beginPath();ctx.moveTo(tx,py0);ctx.lineTo(tx,py0+ph);ctx.stroke(); ctx.setLineDash([]);
      reg({x:tx-12,y:py0,w:24,h:ph,onDrag:p=>{ ch.compThr=clamp(Math.round((p.x-px0)/pw*60-60),-54,0); applyChanAudio(ch.i); paintSelected(); }});
    }
    const ix=px0+pw+12, iw=x+w-ix-8; let iy=py0+4;
    ctx.textAlign="left"; ctx.font="700 8px Inter";
    if(isGate){ ctx.fillStyle=SC.mut; ctx.fillText("THR",ix,iy+3); ctx.fillStyle=SC.ink; ctx.textAlign="right"; ctx.fillText(ch.gateThr+" dB",ix+iw,iy+3); iy+=15;
      ctx.textAlign="left"; ctx.fillStyle=SC.mut; ctx.fillText("RANGE",ix,iy+3); ctx.fillStyle=SC.ink; ctx.textAlign="right"; ctx.fillText(ch.gateRange+" dB",ix+iw,iy+3); iy+=17;
      const gr=ch._gr||0, open=gr<0.5; ctx.textAlign="left"; ctx.fillStyle=open?SC.green:SC.red; ctx.beginPath();ctx.arc(ix+5,iy+2,4,0,7);ctx.fill();
      ctx.fillStyle=SC.ink; ctx.fillText(open?"OPEN":"CLOSED",ix+14,iy+5);
    } else { const r=ch.compRatio>=40?"∞":ch.compRatio.toFixed(1);
      ctx.fillStyle=SC.mut; ctx.fillText("THR",ix,iy+3); ctx.fillStyle=SC.ink; ctx.textAlign="right"; ctx.fillText(ch.compThr+" dB",ix+iw,iy+3); iy+=15;
      ctx.textAlign="left"; ctx.fillStyle=SC.mut; ctx.fillText("RATIO",ix,iy+3); ctx.fillStyle=SC.ink; ctx.textAlign="right"; ctx.fillText(r+":1",ix+iw,iy+3); iy+=17;
      let gr=0; if(ac&&aNodes[ch.i]&&ch.compOn) gr=-aNodes[ch.i].comp.reduction;
      ctx.textAlign="left"; ctx.fillStyle=SC.mut; ctx.fillText("GR "+gr.toFixed(1),ix,iy+5);
      ctx.fillStyle="#12151a"; ctx.fillRect(ix,iy+9,iw,6); ctx.fillStyle=SC.cyan; ctx.fillRect(ix,iy+9,clamp(gr/24,0,1)*iw,6);
    }
  }

  /* ---- Fat Channel signal-chain strip (HPF ▸ GATE ▸ COMP ▸ EQ ▸ LIMITER) ---- */
  function drawChainStrip(x,y,w,h,ch){
    const tiles=[
      {id:'selected',lbl:'HPF',on:ch.hpfOn,col:SC.amber,nav:null,tog:()=>{ch.hpfOn=!ch.hpfOn;}},
      {id:'gate',lbl:'GATE',on:ch.gateOn,col:SC.green,tog:()=>{ch.gateOn=!ch.gateOn;}},
      {id:'comp',lbl:'COMP',on:ch.compOn,col:SC.cyan,tog:()=>{ch.compOn=!ch.compOn;}},
      {id:'eq',lbl:'EQ',on:ch.eqOn!==false,col:SC.band[2],tog:()=>{ch.eqOn=(ch.eqOn===false);}},
      {id:'limiter',lbl:'LIMITER',on:ch.limOn,col:SC.red,tog:()=>{ch.limOn=!ch.limOn;}}
    ];
    const n=tiles.length, arrowW=14, tw=(w-(n-1)*arrowW)/n;
    tiles.forEach((t,ti)=>{ const tx=x+ti*(tw+arrowW);
      const g=ctx.createLinearGradient(0,y,0,y+h); if(t.on){ g.addColorStop(0,shade(t.col,15)); g.addColorStop(1,shade(t.col,-40)); } else { g.addColorStop(0,"#242a33"); g.addColorStop(1,"#1a1f27"); }
      ctx.fillStyle=g; roundRect(tx,y,tw,h,6); ctx.fill();
      ctx.strokeStyle=t.on?shade(t.col,-30):SC.border; ctx.lineWidth=state.mode===t.id?2:1; roundRect(tx+.5,y+.5,tw-1,h-1,6); ctx.stroke();
      ctx.fillStyle=t.on?pickInk(t.col):SC.mut; ctx.font="800 10px Inter"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(t.lbl,tx+tw/2,y+h/2-4);
      ctx.font="700 7px Inter"; ctx.fillStyle=t.on?pickInk(t.col):SC.dim; ctx.fillText(t.on?"ON · abrir ▸":"abrir ▸",tx+tw/2,y+h/2+9); ctx.textBaseline="alphabetic";
      // whole tile opens its page; a small corner toggles ON/OFF
      reg({x:tx,y,w:tw,h,onDown:()=>setMode(t.id)});
      if(t.tog){ ctx.fillStyle=t.on?SC.green:"#556"; ctx.beginPath();ctx.arc(tx+tw-9,y+9,4,0,7);ctx.fill();
        reg({x:tx+tw-20,y:y,w:20,h:20,onDown:()=>{ t.tog(); applyChanAudio(ch.i); paintSelected(); checkMissions(); }}); }
      if(ti<n-1){ ctx.fillStyle=SC.dim; ctx.font="800 12px Inter"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText("▸",tx+tw+arrowW/2,y+h/2); ctx.textBaseline="alphabetic"; }
    });
  }

  /* ================= FAT CHANNEL (home do canal) ================= */
  function drawFatChannel(){
    const ch=CH[state.sel], m=8; let y=6; const HH=50;
    panel(m,y,W-2*m,HH,null,ch.color);
    ctx.fillStyle=ch.color; roundRect(m+6,y+6,24,22,4); ctx.fill();
    ctx.fillStyle=pickInk(ch.color); ctx.font="800 12px Inter"; ctx.textAlign="center"; ctx.textBaseline="alphabetic"; ctx.fillText(String(ch.i+1),m+18,y+21);
    ctx.textAlign="left"; ctx.fillStyle=SC.ink; ctx.font="800 14px Inter"; ctx.fillText(ch.name,m+38,y+16);
    ctx.fillStyle=SC.mut; ctx.font="700 8px Inter"; ctx.fillText("FAT CHANNEL  ·  CH "+(ch.i+1),m+38,y+27);
    ctx.textAlign="right"; ctx.fillStyle=ch.on?SC.green:SC.dim; ctx.font="800 12px Inter"; ctx.fillText(faderTxt(ch.fader)+" dB",W-m-118,y+15); ctx.textAlign="left";
    scrBtn(W-m-112,y+6,34,18,"SEL",true,()=>{},SC.amber,true);
    scrBtn(W-m-74,y+6,32,18,ch.cue?"SOLO":"SOLO",ch.cue,()=>{ch.cue=!ch.cue;applyCue();},SC.amber,true);
    scrBtn(W-m-38,y+6,32,18,ch.on?"ON":"MUTE",ch.on,()=>{ch.on=!ch.on;applyChanAudio(ch.i);checkMissions();},ch.on?SC.green:SC.red,true);
    // input strip: GAIN + polarity + 48V
    const gRowY=y+30;
    ctx.fillStyle=SC.amber; ctx.font="800 9px Inter"; ctx.textAlign="left"; ctx.fillText("INPUT GAIN",m+6,gRowY+9);
    const bxPh=W-m-18, bx48=bxPh-6-30, gsx=m+70, gsw=(bx48-8)-gsx;
    scrParam(gsx,gRowY+9,gsw,"",ch.gain,-6,60,v=>(v>0?"+":"")+Math.round(v)+" dB",v=>{ch.gain=v;applyChanAudio(ch.i);paintSelected();checkMissions();},{col:SC.amber});
    scrBtn(bx48,gRowY+1,30,15,"48V",ch.phantom,()=>{ch.phantom=!ch.phantom;paintSelected();},SC.red,true);
    scrBtn(bxPh,gRowY+1,16,15,"Ø",ch.phase,()=>{ch.phase=!ch.phase;applyChanAudio(ch.i);paintSelected();},SC.amber,true);
    y+=HH+6;
    // signal-chain strip
    const chainH=42; drawChainStrip(m,y,W-2*m,chainH,ch); y+=chainH+6;
    // main: EQ (left) + Gate/Comp minis (right)
    const mainH=H-y-6, gx=m, gw=W*0.545-m;
    drawEqGraph(gx,y,gw,mainH*0.62,ch,true);
    ctx.fillStyle=SC.mut; ctx.font="700 8px Inter"; ctx.textAlign="left"; ctx.fillText("EQUALIZER · 4-BAND · "+ch.eqType,gx+6,y+11);
    scrBtn(gx+gw-52,y+2,48,14,"EQ ▸",false,()=>setMode('eq'),SC.band[2],true);
    // HPF + Limiter + pan below EQ
    let by=y+mainH*0.62+6; const rowH=(mainH*0.38-12)/2;
    panel(gx,by,gw,rowH,null);
    scrBtn(gx+6,by+(rowH-18)/2,54,18,"HPF "+(ch.hpfOn?"ON":"OFF"),ch.hpfOn,()=>{ch.hpfOn=!ch.hpfOn;applyChanAudio(ch.i);paintSelected();checkMissions();},SC.amber,true);
    scrParam(gx+72,by+rowH/2+3,gw*0.42,"HPF",ch.hpf,24,1000,v=>Math.round(v)+" Hz",v=>{ch.hpf=Math.round(v);ch.hpfOn=true;applyChanAudio(ch.i);paintSelected();checkMissions();},{log:true,col:SC.amber});
    ctx.fillStyle=SC.mut; ctx.font="700 8px Inter"; ctx.textAlign="left"; ctx.fillText("PAN",gx+gw*0.60,by+rowH/2-4);
    const pbx=gx+gw*0.60+26,pbw=gw*0.34,pby=by+rowH/2+2;
    ctx.fillStyle="#12151a"; ctx.fillRect(pbx,pby-3,pbw,6); ctx.fillStyle="#3a424b"; ctx.fillRect(pbx+pbw/2-0.5,pby-6,1,12);
    const pn=clamp((ch.pan+63)/126,0,1); ctx.fillStyle=ch.color; ctx.beginPath();ctx.arc(pbx+pn*pbw,pby,5,0,7);ctx.fill();
    reg({x:pbx-4,y:pby-10,w:pbw+8,h:20,onDrag:p=>{ ch.pan=clamp(Math.round(((p.x-pbx)/pbw)*126-63),-63,63); applyChanAudio(ch.i); paintSelected(); }});
    ctx.fillStyle=SC.ink; ctx.font="800 9px Inter"; ctx.textAlign="right"; ctx.fillText(panTxt(ch.pan),pbx+pbw+22,pby+3); ctx.textAlign="left";
    by+=rowH+6;
    panel(gx,by,gw,rowH,null,ch.limOn?SC.red:SC.border);
    scrBtn(gx+6,by+(rowH-18)/2,66,18,"LIMITER "+(ch.limOn?"ON":"OFF"),ch.limOn,()=>{ch.limOn=!ch.limOn;applyChanAudio(ch.i);paintSelected();checkMissions();},SC.red,true);
    scrParam(gx+84,by+rowH/2+3,gw*0.42,"THRESHOLD",ch.limThr,-30,0,v=>v.toFixed(0)+" dB",v=>{ch.limThr=Math.round(v);ch.limOn=true;applyChanAudio(ch.i);paintSelected();},{col:SC.red});
    scrBtn(gx+gw-58,by+(rowH-18)/2,52,18,"LIMIT ▸",false,()=>setMode('limiter'),SC.red,true);

  function applyPreset(ch,d){
    ch.hpfOn=!!d.hpfOn; if(d.hpf!=null)ch.hpf=d.hpf;

    if(d.eq){ d.eq.forEach((g,bi)=>{ ch.eq[bi].g=g; }); ch.eqOn=true; }  // a preset that carries an EQ curve must put the EQ in circuit
    if(d.eqType)ch.eqType=d.eqType;

    for(let i=0;i<NCH;i++){ const st=song.stems[i],c=CH[i];
      if(st){ c.name=st.n; c.color=st.c; c.file=st.f; c.pan=st.p; c.hpfOn=st.h; c.hpf=st.h?100:80; c.hasAudio=true; c.on=true; c.fader=-3; c.gain=16; c.phase=false; c.phantom=false; }
      else { c.name="—"; c.color="#334155"; c.file=null; c.hasAudio=false; c.on=false; } }
    paintSelected(); drawScreen(); if(ac){ for(let i=0;i<NCH;i++)applyChanAudio(i); } }
  function setPlayBtn(){ const b=$("#playBtn"); if(!b)return; b.disabled=loading;
    b.textContent = loading? "CARREGANDO…" : (playing?"⏸ Parar":"► Tocar base");
    if(!loading) b.style.background = playing? "#e0483f" : ""; }
  async function playSong(){ if(loading)return; if(playing){ stopSong(); return; }
    if(!ac)buildAudioGraph(); if(ac.state==="suspended"){ try{await ac.resume();}catch(e){} }
    const song=SONGS[curSong],base=SB+song.folder+"/",tok=++loadTok; loading=true; setPlayBtn(); setStatus("carregando "+song.label+"…","#12a5e5");
    let bufs; try{ bufs=await Promise.all(song.stems.map(st=>loadBuf(base+st.f))); }catch(e){ loading=false; setPlayBtn(); setStatus("erro: "+e.message,"#e0483f"); return; }
    if(tok!==loadTok){ loading=false; setPlayBtn(); return; } stopSong(true); const t0=ac.currentTime+0.12;
    song.stems.forEach((st,i)=>{ if(i>=MAXCH||!aNodes[i])return; const src=ac.createBufferSource(); src.buffer=bufs[i]; src.loop=true; src.connect(aNodes[i].trim); src.start(t0); realSources.push(src); });
    for(let i=0;i<NCH;i++)applyChanAudio(i); playing=true; loading=false; setPlayBtn(); setStatus("tocando ♪ "+song.label,"#3ad07a"); }
  function stopSong(keep){ realSources.forEach(s=>{try{s.stop();}catch(e){}}); realSources=[]; playing=false; if(!loading)setPlayBtn(); if(!keep)setStatus("parado"); }

  /* ================= LOOP ================= */
  function loop(){ processGates(); drawScreen(); drawTopMeter(); requestAnimationFrame(loop); }

  /* ================= INIT ================= */
  (function initAudioUI(){ const sel=$("#songSel"); if(sel){ SONGS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.label; sel.appendChild(o); }); sel.value=0; sel.onchange=()=>{ const w=playing; stopSong(true); loadSong(+sel.value); if(w)playSong(); }; }
    const pb=$("#playBtn"); if(pb){ pb.onclick=()=>{ playSong(); }; } })();
  loadSong(0); try{ buildAudioGraph(); }catch(e){}
  updateSofUi(); paintMission(); paintTopHud();

  /* ===== hook de verificação (headless QA; sem efeito no áudio) ===== */
  window.__ps={
    CH, state, MAXCH, N_DCA, N_MUTE, N_FX, FX_TYPES,
    hitRegions:()=>hitRegions, FAT_PRESETS, applyPreset:(i,p)=>applyPreset(CH[i],FAT_PRESETS[p].d),
    hpfFreq:i=>(aNodes[i]&&aNodes[i].hpf)?aNodes[i].hpf.frequency.value:null,
    limReduction:i=>(aNodes[i]&&aNodes[i].lim)?aNodes[i].lim.reduction:null,
    panVal:i=>(aNodes[i]&&aNodes[i].pan)?aNodes[i].pan.pan.value:null,
    chainOrder:i=>{ const n=aNodes[i]; if(!n)return null;
      return {trim:!!n.trim,hpf:!!n.hpf,gate:!!n.gate,comp:!!n.comp,eq:!!n.eq,lim:!!n.lim,fdr:!!n.fdr}; },
    nScene:()=>N_SCENE, sceneAt:k=>scenes[k], storeScn:k=>storeScene(k), recallScn:k=>recallScene(k),
    setPlaying:v=>{playing=v;}, processGates:()=>processGates(), srcCount:()=>realSources.length,
    curLayerBank:()=>ovBank, setSongs:a=>{ SONGS=a; loadSong(0); }, songs:()=>SONGS,
    chHasAudio:i=>CH[i].hasAudio, flexTime:b=>fxBuses[b]?fxBuses[b].dly.delayTime.value:null,
    aN:i=>aNodes[i], apply:i=>applyChanAudio(i), applyFX, selectChannel, setMode,
    sel:()=>state.sel, curMode:()=>state.mode, maxch:()=>CH.length,
    chFdrGain:i=>(aNodes[i]&&aNodes[i].fdr)?aNodes[i].fdr.gain.value:null,
    chTrim:i=>(aNodes[i]&&aNodes[i].trim)?aNodes[i].trim.gain.value:null,
    eqGain:(i,b)=>(aNodes[i]&&aNodes[i].eq[b])?aNodes[i].eq[b].gain.value:null,
    eqFreq:(i,b)=>(aNodes[i]&&aNodes[i].eq[b])?aNodes[i].eq[b].frequency.value:null,
    gateGain:i=>(aNodes[i]&&aNodes[i].gate)?aNodes[i].gate.gain.value:null,
    compReduction:i=>(aNodes[i]&&aNodes[i].comp)?aNodes[i].comp.reduction:null,
    limThr:i=>(aNodes[i]&&aNodes[i].lim)?aNodes[i].lim.threshold.value:null,
    limRatio:i=>(aNodes[i]&&aNodes[i].lim)?aNodes[i].lim.ratio.value:null,
    flexSendGain:(i,b)=>(aNodes[i]&&aNodes[i].fxS[b])?aNodes[i].fxS[b].gain.value:null,
    flexRetGain:b=>fxBuses[b]?fxBuses[b].ret.gain.value:null,
    flexBusDb:b=>fxBusDb(b),
    setFlexType:(b,t)=>{state.flexfx[b].type=t;applyFX();},
    assignDCA:(i,g,on)=>{CH[i].dca[g]=on;applyChanAudio(i);},
    setDCAgain:(g,db)=>{state.dcaGain[g]=db;for(let i=0;i<NCH;i++)if(CH[i].dca[g])applyChanAudio(i);},
    dcaOn:(g,on)=>{state.dcaOn[g]=on;for(let i=0;i<NCH;i++)if(CH[i].dca[g])applyChanAudio(i);},
    assignMute:(i,g,on)=>{CH[i].mute[g]=on;applyChanAudio(i);},
    muteGroup:(g,on)=>{state.muteActive[g]=on;for(let i=0;i<NCH;i++)if(CH[i].mute[g])applyChanAudio(i);},
    muteSafe:(i,on)=>{CH[i].muteSafe=on;applyChanAudio(i);},
    play:()=>playSong(), stop:()=>stopSong(), isPlaying:()=>playing, isLoading:()=>loading,
    masterDb:()=>masterLevelDb(), chDb:i=>chLevelDb(i), ac:()=>ac,
    ovBankSet:i=>{ovBank=i;drawScreen();}, ovBanks:()=>N_OVBANK, songsLen:()=>SONGS.length };

  window.addEventListener("resize",sizeCanvas); setTimeout(sizeCanvas,30); requestAnimationFrame(loop);
  setInterval(()=>{ const l=$("#netLed"); if(l){ l.classList.toggle("warn"); setTimeout(()=>l.classList.remove("warn"),120); } },4000);

  /* ================= FIT — tela cheia fluida + classes responsivas + guarda iframe 16:9 ================= */
  function fitConsole(){ const vw=window.innerWidth, vh=window.innerHeight;
    document.body.classList.toggle('phone', vw<620);
    document.body.classList.toggle('tablet', vw>=620 && vw<1080);
    const app=document.getElementById('app');
    const scrH=(window.screen&&screen.height)||vh; const visH=Math.min(vh,scrH);
    if(app) app.style.height=visH+"px";   // guarda iframe-mais-alto: nunca ultrapassa a altura visível
    try{ sizeCanvas(); }catch(e){}
  }
  window.addEventListener('resize',fitConsole); setTimeout(fitConsole,45); setTimeout(fitConsole,180);
})();
</script>
</body>
