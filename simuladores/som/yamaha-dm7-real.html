<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" href="data:,">
<title>Yamaha DM7 — Simulador fiel (SMU)</title>
<style>
  :root{
    --ink:#e7ecf5; --muted:#93a3ba; --amber:#f4a02a; --green:#3ad07a; --red:#e0483f; --cyan:#39c0e6;
    --scr:#0a1622;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%,#181b20,#090a0c 60%),#070809;
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; overflow:hidden;
    display:flex; align-items:flex-start; justify-content:center;
  }
  /* ===== CONSOLE: fixed design, scaled to fit ===== */
  .console{position:relative;width:1580px;height:966px;flex:0 0 auto;transform-origin:top center;
    display:flex;flex-direction:column;gap:8px;padding:12px;
    background:
      linear-gradient(180deg,#2f333a,#212329 8%,#1a1c21 60%,#151619);
    border:1px solid #08090b;border-radius:16px;
    box-shadow:0 30px 80px #000a, inset 0 1px 0 #ffffff10, inset 0 -2px 0 #0008;}
  .console::before{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(180deg,#ffffff08,transparent 6%);}

  /* utility/top bar */
  .util{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:linear-gradient(180deg,#1d2026,#131519);border:1px solid #0b0c0e;border-radius:10px;padding:6px 10px}
  .util .brand{display:flex;align-items:baseline;gap:9px;margin-right:4px}
  .util .brand b{font-size:17px;letter-spacing:1px;color:#eef2f8}
  .util .brand .m{font-size:10px;letter-spacing:2px;color:#8a94a4;text-transform:uppercase}
  .util .brand .y{color:var(--amber);font-weight:800;letter-spacing:1px}
  .pill{font-size:10.5px;color:var(--muted);background:#0c0e12;border:1px solid #2a2f37;border-radius:16px;padding:4px 9px;display:flex;align-items:center;gap:6px;letter-spacing:.4px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.warn{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .btnp{font:inherit;font-size:11.5px;font-weight:700;border:0;border-radius:8px;padding:7px 12px;cursor:pointer}
  .spacer{flex:1}
  select.pill{cursor:pointer;color:var(--ink);font:inherit;font-size:11px;max-width:210px}
  .mission{display:flex;align-items:center;gap:9px;background:#0c0e12;border:1px solid #2a2f37;border-radius:9px;padding:5px 10px;flex:1 1 320px;min-width:0}
  .mission .idx{font-size:10px;color:var(--amber);font-weight:800;letter-spacing:1px;white-space:nowrap}
  .mission .txt{font-size:11px;line-height:1.25;min-width:0}
  .mission .txt small{color:var(--muted)}
  .mission .txt b{color:#fff}
  .ghost{background:transparent;color:var(--muted);border:1px solid #2a2f37}

  /* meter bridge */
  .bridge{background:linear-gradient(180deg,#0f1115,#090a0c);border:1px solid #0b0c0e;border-radius:10px;padding:6px 10px 4px;
    box-shadow:inset 0 2px 6px #000a}
  #mbridge{display:block;width:100%;height:54px}

  /* ===== BACK SECTION: screen A | screen B | right rack (touch-first DM7, no physical sel-ch bay) ===== */
  .back{display:grid;grid-template-columns:1fr 1fr 340px;gap:9px;min-height:0}
  .panel{background:linear-gradient(180deg,#282b31,#1e2126 30%,#17181c);border:1px solid #0b0c0e;border-radius:12px;
    box-shadow:inset 0 1px 0 #ffffff0c, inset 0 -2px 4px #0006, 0 4px 12px #0006;padding:10px}
  .sect-title{font-size:9px;letter-spacing:2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin:0 0 7px}
  .sect-title b{color:var(--amber)}

  /* Selected Channel physical knobs */
  .selhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .selhead .cc{width:9px;height:30px;border-radius:3px;background:var(--amber);box-shadow:0 0 6px #0006}
  .selhead .nm{font-size:15px;font-weight:800;line-height:1.05;color:#f0f4fa}
  .selhead .nn{font-size:9.5px;color:var(--muted);letter-spacing:.6px}
  .knobrow{display:flex;gap:5px;align-items:flex-end;flex-wrap:wrap}
  .kwrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:50px}
  .klbl{font-size:8px;letter-spacing:.4px;color:#93a0b2;text-transform:uppercase;text-align:center;line-height:1.05}
  .kval{font-size:9.5px;font-weight:700;color:#e9eef6}
  .pk{--sz:36px;width:var(--sz);height:var(--sz);position:relative;touch-action:none;cursor:ns-resize}
  .pk .ring{position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(from 215deg, var(--led,#6cf) calc(var(--p,0)*270deg), #0d0f13 0 270deg, #17191e 0);
    -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px));
            mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px))}
  .pk .cap{position:absolute;inset:2px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%,#4f545d,#26292f 62%,#1c1e22);
    border:1px solid #111216;box-shadow:inset 0 2px 4px #0009, 0 1px 1px #ffffff10}
  .pk .cap::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:2px;background:#eef2f8;
    box-shadow:0 0 3px #fff8;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) translateY(calc(var(--sz)*-0.30))}
  .pk.sm{--sz:30px}
  .pbtn{font:inherit;font-size:8.5px;font-weight:700;letter-spacing:.4px;color:#b9c6d8;text-align:center;cursor:pointer;
    background:linear-gradient(180deg,#363b43,#212429);border:1px solid #111318;border-radius:5px;padding:5px 3px;
    box-shadow:inset 0 1px 0 #ffffff12, 0 1px 2px #0007;min-width:0}
  .pbtn:active{transform:translateY(1px)}
  .pbtn.lit{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06;box-shadow:0 0 8px #f4a02a88}
  .pbtn.green.lit{background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33;box-shadow:0 0 8px #22b86688}
  .pbtn.red.lit{background:linear-gradient(180deg,#ff9a92,#e0483f);border-color:#7a1611;box-shadow:0 0 8px #e0483f88}
  .pbtn.nav{border-color:#2a3550}
  .pbtn.nav.on{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 8px #39c0e688}
  .brow{display:flex;gap:4px}
  .eqbands{display:flex;gap:4px;margin-top:8px}
  .eqband{flex:1;background:#181a1f;border:1px solid #0b0c0f;border-radius:7px;padding:5px 3px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .eqband .bt{font-size:8px;font-weight:800;letter-spacing:.5px;padding:2px 0;width:100%;text-align:center;border-radius:3px;color:#0b0f14}

  /* SCREEN columns */
  .screencol{display:flex;flex-direction:column;min-height:0;padding:8px}
  .tabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap}
  .tab{font:inherit;font-size:9.5px;font-weight:600;letter-spacing:.2px;color:#a9b6c8;cursor:pointer;
    background:linear-gradient(180deg,#2c3038,#202329);
    border:1px solid #111318;border-radius:6px;padding:5px 8px;box-shadow:inset 0 1px 0 #ffffff10}
  .tab.active{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06;font-weight:800}
  .tab.sof{margin-left:auto}
  .tab.sof.active{background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;color:#04121a}
  .tab.bt.active{background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;color:#04121a}
  .screen-bezel{flex:1;min-height:0;border-radius:10px;padding:8px;background:linear-gradient(180deg,#0e1014,#040506);
    border:1px solid #000;box-shadow:inset 0 3px 12px #000c, 0 0 0 2px #282b31}
  .screen-bezel canvas{display:block;width:100%;height:100%;border-radius:6px;background:var(--scr);touch-action:none}
  .scrlab{font-size:8px;letter-spacing:1.5px;color:#6f7d90;text-transform:uppercase;font-weight:700;margin:5px 2px 0;text-align:center}

  /* RIGHT RACK */
  .rack{display:flex;flex-direction:column;gap:7px;min-height:0}
  .rk{background:linear-gradient(180deg,#282b31,#1c1e23);border:1px solid #0b0c0e;border-radius:10px;padding:7px 9px;
    box-shadow:inset 0 1px 0 #ffffff0c,0 3px 8px #0005}
  .udk{display:flex;justify-content:space-between;gap:5px}
  .udk .kwrap{width:auto;flex:1}
  .utilbezel{flex:1;min-height:96px;border-radius:9px;padding:6px;background:linear-gradient(180deg,#0e1014,#040506);
    border:1px solid #000;box-shadow:inset 0 3px 10px #000c, 0 0 0 2px #282b31}
  #screenU{display:block;width:100%;height:100%;border-radius:5px;background:var(--scr);touch-action:none}
  .scene{display:flex;gap:9px;align-items:center}
  .scenum{background:#07130c;border:1px solid #1c3a26;border-radius:7px;padding:5px 9px;min-width:88px;text-align:center;
    box-shadow:inset 0 2px 6px #000}
  .scenum .n{font-family:"DS-Digital","Courier New",monospace;font-size:24px;font-weight:800;color:#37e08a;letter-spacing:2px;line-height:1;text-shadow:0 0 8px #37e08a66}
  .scenum .l{font-size:8px;color:#5f8a72;letter-spacing:1px}
  .scbtns{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
  .ukeys{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
  .ukey{font:inherit;font-size:7.5px;font-weight:700;color:#cdd8e6;text-align:center;cursor:pointer;line-height:1.05;position:relative;
    background:linear-gradient(180deg,#363b43,#212429);border:1px solid #111318;border-radius:6px;padding:7px 2px;
    box-shadow:inset 0 1px 0 #ffffff12,0 1px 2px #0007;min-height:30px;display:flex;align-items:center;justify-content:center}
  .ukey.on{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 7px #39c0e666}
  .monrow{display:flex;align-items:center;gap:10px}

  /* ===== FRONT SECTION: fader bay ===== */
  .front{background:linear-gradient(180deg,#202329,#161719);border:1px solid #0b0c0e;border-radius:12px;padding:8px;
    box-shadow:inset 0 1px 0 #ffffff0a, 0 6px 16px #0006}
  .bay{display:flex;gap:6px;align-items:stretch;justify-content:center}
  .block{display:flex;flex-direction:column;gap:5px;min-width:0}
  .block .bhead{display:flex;gap:4px;align-items:center;flex-wrap:wrap;min-height:20px}
  .block .btitle{font-size:8.5px;letter-spacing:1.2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin-right:2px}
  .bkey{font:inherit;font-size:8px;font-weight:700;color:#b9c6d8;cursor:pointer;
    background:linear-gradient(180deg,#31353d,#1f2126);border:1px solid #111318;border-radius:5px;padding:3px 6px}
  .bkey.on{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06}
  .strips{display:flex;gap:4px;flex:1}
  .vsep{width:2px;align-self:stretch;background:linear-gradient(180deg,#0a0b0d,#31353d,#0a0b0d);border-radius:2px;margin:0 3px}

  .strip{width:42px;flex:0 0 auto;background:linear-gradient(180deg,#191b20,#121317);border:1px solid #0a0b0d;border-radius:7px;
    padding:4px 3px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:inset 0 1px 0 #ffffff08}
  .strip.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber) inset,0 0 8px #f4a02a44}
  .strip .knob-s{margin-top:1px}
  .lcd{width:100%;height:24px;border-radius:4px;position:relative;overflow:hidden;border:1px solid #000;
    box-shadow:inset 0 2px 4px #0008;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .lcd .cn{font-size:8px;font-weight:800;line-height:1;color:#0b0f14;text-align:center;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .lcd .cnum{font-size:6.5px;font-weight:700;color:#0b0f1499;line-height:1}
  .sbtn{width:100%;font:inherit;font-size:8px;font-weight:800;letter-spacing:.3px;color:#93a0b2;cursor:pointer;text-align:center;
    background:linear-gradient(180deg,#2a2e35,#1a1d22);border:1px solid #0a0b0d;border-radius:4px;padding:3px 0}
  .row2{display:flex;gap:3px;width:100%}
  .sbtn.sel.act{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06}
  .sbtn.cue.act{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70}
  .sbtn.on.act{color:#0b0f14;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33}
  .fzone{display:flex;gap:4px;flex:1;width:100%;justify-content:center;min-height:150px}
  .meter{width:6px;border-radius:2px;background:#05070a;position:relative;overflow:hidden;border:1px solid #14171d}
  .meter i{position:absolute;left:0;right:0;bottom:0;height:0;background:linear-gradient(0deg,#37c86a,#37c86a 62%,#e8c33a 84%,#e0483f);transition:height .05s linear}
  .fader{width:22px;flex:0 0 auto;position:relative;background:linear-gradient(90deg,#0a0b0d,#141519,#0a0b0d);border-radius:4px;border:1px solid #0a0b0d;cursor:ns-resize;touch-action:none}
  .fader .trk{position:absolute;left:50%;top:8px;bottom:8px;width:2px;transform:translateX(-50%);background:#000}
  .fader .u{position:absolute;left:2px;right:2px;height:1px;background:#39414f}
  .cap{position:absolute;left:-4px;right:-4px;height:20px;border-radius:3px;cursor:grab;
    background:linear-gradient(180deg,#20232a,#0e0f12 48%,#050506 52%,#16181d);border:1px solid #000;box-shadow:0 2px 4px #000a,inset 0 1px 0 #ffffff14}
  .cap::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#c9d2e0;border-radius:1px}
  .db{font-size:8px;font-weight:700;color:#c9d2e0;letter-spacing:.2px}
  .db small{color:#7f8b9c;font-weight:600}
  .strip.master .lcd{background:#2a1e06}
  .strip.master .lcd .cn{color:#ffd27a}

  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px);
    background:#101319;border:1px solid var(--amber);color:var(--ink);padding:10px 16px;border-radius:10px;
    font-size:12.5px;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 8px 30px #000a}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--amber)}
  .console:not(.stacked){touch-action:none}
  body:not(.stacked){touch-action:none}
  /* stacked (phone) — everything fits the viewport width; the wide fader bay scrolls inside .front */
  .console.stacked{width:100%;max-width:100%;height:auto;transform:none!important;touch-action:auto}
  .console.stacked .util,.console.stacked .bridge,.console.stacked .back,.console.stacked .front{width:100%;max-width:100%}
  .console.stacked .back{grid-template-columns:1fr}
  .console.stacked .strip{width:38px}
  .console.stacked .front{overflow-x:auto;-webkit-overflow-scrolling:touch}
  .console.stacked .bay{justify-content:flex-start;min-width:max-content}
  body.stacked{overflow:auto;overflow-x:hidden}
  /* ===== iPad EM PÉ / tela estreita (561–900px) =====================================
     PROBLEMA MEDIDO: o zoom-fit encolhia a mesa inteira p/ zoom=0.47 em 768x1024 e os
     rótulos de função caíam para ~3.7px renderizados — ilegível (era a queixa do dono).
     SOLUÇÃO: nesta faixa a mesa roda FLUIDA (zoom=1, via .stacked) e o espaço vertical
     é repartido dando a MAIOR fatia aos CANAIS — canais 52vh x menu 36vh.
     Faixa fechada em 900px: desktop (>=901px) não passa por aqui. Telefone (<=560px)
     também não — continua exatamente como estava. */
  @media (min-width:561px) and (max-width:900px){
    /* MENU (telas + rack) = fatia menor; rola por dentro, nada fica inalcançável */
    .console.stacked .back{max-height:36vh;overflow-y:auto;overscroll-behavior:contain}
    /* CANAIS = fatia maior. .fzone é flex:1, então o fader cresce junto com a bay */
    .console.stacked .bay{min-height:52vh}
    /* 62px: o nome do canal a 11px precisa de ~54px úteis, senão vira "Surd…" */
    .console.stacked .strip{width:62px}
    .console.stacked .lcd{height:30px}
    .console.stacked .sbtn{padding:4px 0}
    .console.stacked .bkey{padding:4px 7px}
    /* rótulos de função a >=11px. Lista extraída do PRÓPRIO skin da DM7
       (ferramentas/_ref-cl-editor/_font-scan.mjs lista toda regra <11px) — nada
       inventado, e o desktop não vê nenhuma destas linhas. */
    .console.stacked .ukey{font-size:11px}
    .console.stacked .klbl{font-size:11px}
    .console.stacked .eqband .bt{font-size:11px}
    .console.stacked .scrlab{font-size:11px}
    .console.stacked .scenum .l{font-size:11px}
    .console.stacked .bkey{font-size:11px}
    .console.stacked .lcd .cn{font-size:11px}
    .console.stacked .sbtn{font-size:11px}
    .console.stacked .db{font-size:11px}
    .console.stacked .pbtn{font-size:11px}
    .console.stacked .block .btitle{font-size:11px}
    .console.stacked .sect-title{font-size:11px}
    .console.stacked .selhead .nn{font-size:11px}
    .console.stacked .kval{font-size:11px}
    .console.stacked .tab{font-size:11px}
    .console.stacked .util .brand .m{font-size:11px}
    .console.stacked .mission .idx{font-size:11px}
    .console.stacked .pill{font-size:11px}
    /* nº do canal é sub-rótulo dentro do LCD, ao lado do nome: 9px chega */
    .console.stacked .lcd .cnum{font-size:9px}
  }
</style>
</head>
<body>
<div class="console" id="console">

  <!-- UTILITY BAR -->
  <div class="util">
    <div class="brand"><b><span class="y">YAMAHA</span> DM7</b><span class="m">Digital Mixing Console · Simulador SMU</span></div>
    <div class="pill"><span class="dot" id="danteLed"></span> DANTE <span id="danteTxt" style="color:var(--ink)">144×144</span></div>
    <div class="pill">96 kHz</div>
    <button class="btnp" id="playBtn" style="background:#22b866;color:#04121a">► Tocar base</button>
    <select id="songSel" class="pill"></select>
    <span class="pill" id="audioStatus" style="color:var(--muted)">áudio: —</span>
    <div class="spacer"></div>
    <div class="mission">
      <span class="idx" id="mIdx">MISSÃO 1/5</span>
      <span class="txt" id="mTxt">—</span>
      <button class="btnp ghost" id="mSkip">Pular</button>
    </div>
  </div>

  <!-- METER BRIDGE -->
  <div class="bridge"><canvas id="mbridge"></canvas></div>

  <!-- BACK SECTION -->
  <div class="back">

    <!-- SCREEN A (12.1") -->
    <div class="panel screencol">
      <div class="tabs" id="tabsA">
        <button class="tab tabA active" data-mode="selected">SEL CH VIEW</button>
        <button class="tab tabA" data-mode="overview">OVERVIEW</button>
        <button class="tab tabA" data-mode="eq">EQ</button>
        <button class="tab tabA" data-mode="gate">DYN1</button>
        <button class="tab tabA" data-mode="comp">DYN2</button>
        <button class="tab tabA" data-mode="sends">SENDS</button>
        <button class="tab tabA" data-mode="fx">RACK</button>
        <button class="tab tabA sof" id="sofBtn">SENDS ON FADER</button>
      </div>
      <div class="screen-bezel"><canvas id="screenA"></canvas></div>
      <div class="scrlab">Touch Screen A · 12,1"</div>
    </div>

    <!-- SCREEN B (12.1") -->
    <div class="panel screencol">
      <div class="tabs" id="tabsB">
        <button class="tab tabB bt active" data-mode="overview">OVERVIEW</button>
        <button class="tab tabB bt" data-mode="meter">METER</button>
        <button class="tab tabB bt" data-mode="dca">DCA/MUTE</button>
        <button class="tab tabB bt" data-mode="scenes">SCENE</button>
        <button class="tab tabB bt" data-mode="sends">SENDS</button>
        <button class="tab tabB bt" data-mode="fx">RACK/FX</button>
      </div>
      <div class="screen-bezel"><canvas id="screenB"></canvas></div>
      <div class="scrlab">Touch Screen B · 12,1"</div>
    </div>

    <!-- RIGHT RACK -->
    <div class="rack">
      <div class="rk">
        <div class="sect-title">TOUCH &amp; TURN · USER DEFINED KNOBS</div>
        <div class="udk" id="udknobs"></div>
      </div>
      <div class="rk" style="flex:1;min-height:0;display:flex;flex-direction:column;gap:5px">
        <div class="sect-title">UTILITY · 7"</div>
        <div class="utilbezel"><canvas id="screenU"></canvas></div>
      </div>
      <div class="rk">
        <div class="sect-title">SCENE MEMORY</div>
        <div class="scene">

<script>
"use strict";
(function(){
  /* ================= MODEL (DM7 counts) ================= */
  const MAXCH=120, N_MIX=48,N_MTX=12,N_DCA=24,N_MUTE=12,N_SCENE=500;
  const MIX_NAMES=Array.from({length:N_MIX},(_,i)=>{
    const base=["MIX 1 Mon","MIX 2 Mon","MIX 3 IEM","MIX 4 IEM","MIX 5 FX","MIX 6 FX","MIX 7 Sub","MIX 8 FB"];
    return base[i]||("MIX "+(i+1)); });
  const COLORS=["#e0483f","#f97316","#f4a02a","#eab308","#3ad07a","#14b8a6","#39c0e6","#3b82f6","#6366f1","#a855f7","#ec4899","#f43f5e"];
  const NAMES=["Kick In","Snare","Hat","Tom 1","Tom 2","OH L","OH R","Bass DI","Gtr L","Gtr R","Keys L","Keys R","Lead Voc","Voc 2","Voc 3","Coro","Sax","Trumpet","Perc","Play L","Play R","Amb L","Amb R","Talk"];
  const RAWSRC=[-42,-40,-48,-44,-45,-47,-47,-38,-41,-41,-39,-39,-34,-40,-41,-43,-43,-44,-46,-36,-36,-52,-52,-30];
  function mkChannel(i){
    return { i, name:NAMES[i]||("CH "+(i+1)), color:COLORS[i%COLORS.length],
      gain:20+((i*7)%10)-4, phase:false, phantom:false, hpfOn:false, hpf:80, lpfOn:false, lpf:18000,
      eq:[{type:'lowshelf',f:120,g:0,q:0.7},{type:'peaking',f:500,g:0,q:1.0},{type:'peaking',f:2500,g:0,q:1.0},{type:'highshelf',f:8000,g:0,q:0.7}],
      eqType:'PRECISE',
      gateOn:false,gateThr:-40,gateRange:-60,gateAtk:1,gateHold:20,gateDecay:200,
      compOn:false,compThr:-12,compRatio:3,compAtk:20,compRel:150,compKnee:2,compGain:0,
      pan:0, fader:-4-((i*5)%8), on:true, cue:false,
      sends:new Array(N_MIX).fill(-90), sendOn:new Array(N_MIX).fill(false), sendPre:new Array(N_MIX).fill(false),
      dca:new Array(N_DCA).fill(false), mute:new Array(N_MUTE).fill(false), muteSafe:false,
      fxRev:-90, fxDly:-90, src:RAWSRC[i]||-42 };
  }
  const CH=Array.from({length:MAXCH},(_,i)=>mkChannel(i));
  const state={ sel:12, mode:"selected", modeB:"overview", sof:-1, sofBus:0, sofType:'mix', master:-3, masterB:-3, mono:-3, eqBand:3,
    knobMode:'gain', scene:0, monitor:-20, dim:false, talkback:false,
    dcaGain:new Array(N_DCA).fill(0), dcaOn:new Array(N_DCA).fill(true),
    mixMaster:new Array(N_MIX).fill(0), mixOn:new Array(N_MIX).fill(true),
    mtxMaster:new Array(N_MTX).fill(0), mtxOn:new Array(N_MTX).fill(true),
    muteActive:new Array(N_MUTE).fill(false),
    fx:{revMix:0.35,revSize:2.2,dlyTime:0.38,dlyFb:0.35,dlyMix:0.3,revOn:true,dlyOn:true} };
  const scenes=new Array(N_SCENE).fill(null);

  /* ================= HELPERS ================= */
  const $=s=>document.querySelector(s);
  const qsa=s=>document.querySelectorAll(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const FMIN=-90,FMAX=10;
  function faderTxt(db){ return db<=FMIN?"−∞":(db>0?"+":"")+db.toFixed(1); }
  function panTxt(p){ if(Math.abs(p)<2)return"C"; return (p<0?"L"+Math.round(-p):"R"+Math.round(p)); }
  function pos2db(p){ if(p<=0.01)return FMIN; return clamp(-60+p*70,FMIN,FMAX); }
  function db2pos(db){ if(db<=FMIN)return 0; return clamp((db+60)/70,0,1); }
  function fx(f){ const mn=Math.log10(20),mx=Math.log10(20000); return (Math.log10(f)-mn)/(mx-mn); }
  function fInv(t){ const mn=Math.log10(20),mx=Math.log10(20000); return Math.pow(10,mn+clamp(t,0,1)*(mx-mn)); }
  function perf(){ return performance.now(); }

  /* ================= SCREEN COLOR THEME (Yamaha navy) ================= */
  const SC={ bg0:"#0a1826",bg1:"#0e2338", panel:"#132c44", panelHi:"#1a3a58", panelLo:"#0d2035",
    border:"#2c5478", line:"#1f4467", grid:"#173352",
    ink:"#e7eff8", mut:"#8fabc7", dim:"#5f7b98",
    amber:"#f4a02a", green:"#3ad07a", red:"#e0483f", cyan:"#39c0e6",
    band:["#e0554e","#e0b84e","#4ec0e0","#8f7dff"] };

  /* ================= biquad magnitude (matches Web Audio) ================= */
  const FS=96000;
  function biquadDb(type,f0,gainDb,Q,f){
    f0=clamp(f0,10,FS/2-10);Q=Math.max(0.05,Q);
    const w0=2*Math.PI*f0/FS,cw=Math.cos(w0),sw=Math.sin(w0),A=Math.pow(10,gainDb/40),alpha=sw/(2*Q);
    let b0,b1,b2,a0,a1,a2;
    if(type==='peaking'){b0=1+alpha*A;b1=-2*cw;b2=1-alpha*A;a0=1+alpha/A;a1=-2*cw;a2=1-alpha/A;}
    else if(type==='lowshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)-(A-1)*cw+s2);b1=2*A*((A-1)-(A+1)*cw);b2=A*((A+1)-(A-1)*cw-s2);a0=(A+1)+(A-1)*cw+s2;a1=-2*((A-1)+(A+1)*cw);a2=(A+1)+(A-1)*cw-s2;}
    else if(type==='highshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)+(A-1)*cw+s2);b1=-2*A*((A-1)+(A+1)*cw);b2=A*((A+1)+(A-1)*cw-s2);a0=(A+1)-(A-1)*cw+s2;a1=2*((A-1)-(A+1)*cw);a2=(A+1)-(A-1)*cw-s2;}
    else if(type==='highpass'){b0=(1+cw)/2;b1=-(1+cw);b2=(1+cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    else {b0=(1-cw)/2;b1=1-cw;b2=(1-cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    const w=2*Math.PI*f/FS,phi=Math.pow(Math.sin(w/2),2);
    const num=Math.pow(b0+b1+b2,2)-4*(b0*b1+4*b0*b2+b1*b2)*phi+16*b0*b2*phi*phi;
    const den=Math.pow(a0+a1+a2,2)-4*(a0*a1+4*a0*a2+a1*a2)*phi+16*a0*a2*phi*phi;
    return 10*Math.log10(Math.max(1e-9,num)/Math.max(1e-9,den));
  }
  function eqTypeFactor(t){ return t==='AGGRESSIVE'?1.55:t==='SMOOTH'?0.6:t==='LEGACY'?0.82:1; }
  function eqMag(ch,f){ let g=0; const kf=eqTypeFactor(ch.eqType||'PRECISE');
    for(const b of ch.eq){ if(b.g!==0) g+=biquadDb(b.type,b.f,b.g,b.q*kf,f); }
    if(ch.hpfOn) g+=biquadDb('highpass',ch.hpf,0,0.707,f);
    if(ch.lpfOn) g+=biquadDb('lowpass',ch.lpf,0,0.707,f);
    return clamp(g,-30,20); }

  /* ================= SELECTED CHANNEL PHYSICAL KNOBS ================= */
  const KDEF={ gain:{min:-6,max:70}, hpf:{min:20,max:600,log:true}, gate:{min:-72,max:0}, comp:{min:-54,max:0}, pan:{min:-63,max:63},
    monitor:{min:-60,max:0}, eqQ:{min:0.1,max:10,log:true}, eqF:{min:20,max:20000,log:true}, eqG:{min:-18,max:18} };
  function knobP(def,v){ if(def.log) return clamp((Math.log(Math.max(def.min,v))-Math.log(def.min))/(Math.log(def.max)-Math.log(def.min)),0,1); return clamp((v-def.min)/(def.max-def.min),0,1); }
  function setPK(el,def,v){ if(!el)return; const p=knobP(def,v); el.style.setProperty('--p',p); el.style.setProperty('--rot',(-135+p*270)+'deg'); }
  function pkVal(ch,k){ return {gain:ch.gain,hpf:ch.hpf,gate:ch.gateThr,comp:ch.compThr,pan:ch.pan,monitor:state.monitor}[k]; }
  function pkSet(ch,k,v){ const d=KDEF[k]; v=clamp(v,d.min,d.max);
    if(k==='gain')ch.gain=v; else if(k==='hpf')ch.hpf=Math.round(v); else if(k==='gate')ch.gateThr=Math.round(v);
    else if(k==='comp')ch.compThr=Math.round(v); else if(k==='pan')ch.pan=Math.round(v);
    else if(k==='monitor'){ state.monitor=Math.round(v); applyMonitor(); } }

  // (removed) buildEqBands: the DM7 has no physical 4-band EQ knob grid — EQ is edited on the
  // touchscreen (drawEQ) and Touch&Turn. Function kept as a no-op for call-site safety.
  function buildEqBands(){}
  function fmtFreq(f){ return f>=1000?(f/1000).toFixed(f>=10000?0:1)+"k":Math.round(f); }
  function wirePKDrag(el,getV,setV,def){
    let drag=false,lastY=0;
    el.addEventListener("pointerdown",e=>{drag=true;lastY=e.clientY;el.setPointerCapture(e.pointerId);e.preventDefault();});
    el.addEventListener("pointermove",e=>{ if(!drag)return; const dy=lastY-e.clientY; lastY=e.clientY;
      const span=def.log?1:(def.max-def.min); let v=getV();
      if(def.log){ let p=knobP(def,v)+dy/180; p=clamp(p,0,1); v=def.min*Math.pow(def.max/def.min,p); }
      else v=v+dy*span/180;
      setV(clamp(v,def.min,def.max)); e.preventDefault(); });
    const up=()=>drag=false; el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
  }
  // (removed) wireSelectedKnobs: no physical selected-channel / EQ knob column on the DM7.
  // Phase, +48V, HA, HPF, EQ, GATE and COMP are all touched on the screens (drawSelCh/drawEQ/
  // drawGate/drawComp) and adjusted via Touch&Turn. Kept as a no-op for call-site safety.
  function wireSelectedKnobs(){}
  // DM7 is touch-first: the selected-channel strip (name/EQ/GATE/COMP/HA/PAN) lives on the
  // touchscreens (drawSelCh/drawEQ/…) and the Touch&Turn encoders — there is NO physical
  // selected-channel EQ-knob bay. paintSelected() now only refreshes the surviving DOM
  // read-outs (monitor level in the MONITOR rack) and the Touch&Turn right rack; all
  // channel visuals are repainted on the screens by drawScreen().
  function paintSelected(){
    const mon=$("#scMon"); if(mon) mon.textContent=state.monitor;
    setPK($('.pk[data-k="monitor"]'),KDEF.monitor,state.monitor);
    if(typeof paintRightRack==='function') paintRightRack();
  }
  function selectChannel(i){ state.sel=i; paintSelected(); paintBay(); drawScreen(); checkMissions(); }

  /* ================= placeholder forward decls ================= */
  let paintBay=function(){}, paintScreens=function(){}, applyChanAudio=function(){}, applyMonitor=function(){};
  // Redraw coalescing (iPad): a fader/knob drag fires many pointermove events; each must NOT
  // trigger a synchronous full-canvas repaint (that starves the main thread on iPad, making
  // faders lag and jump so the sound seems to cut instead of ride smoothly). drawScreen() now
  // just flags "dirty" and repaints all screens at most once per animation frame; a setTimeout
  // safety-net guarantees a repaint even if requestAnimationFrame is throttled.
  let _drawReq=0,_drawTo=0;
  function _flushDraw(){ if(_drawReq){cancelAnimationFrame(_drawReq);_drawReq=0;} if(_drawTo){clearTimeout(_drawTo);_drawTo=0;} paintScreens(); }
  function drawScreen(){ if(_drawReq||_drawTo)return; _drawReq=requestAnimationFrame(_flushDraw); _drawTo=setTimeout(_flushDraw,60); }

  /* ================= FADER BAY (DM7: 12 + 12 + 4) ================= */
  const BAY=$("#bay"); let bayStrips=[];
  function chBanks(){ const a=[]; for(let f=0;f<MAXCH;f+=12){ a.push({t:'ch',from:f,n:12,label:'CH '+(f+1)+'-'+Math.min(MAXCH,f+12)}); } return a; }
  const leftBank={cur:0, banks:[ ...chBanks(), {t:'dca',from:0,n:12,label:'DCA 1-12'},{t:'dca',from:12,n:12,label:'DCA 13-24'} ]};
  const centerLayer={cur:1, layers:[
    ...chBanks(),
    {t:'mix',from:0,label:'MIX 1-12'},{t:'mix',from:12,label:'MIX 13-24'},{t:'mix',from:24,label:'MIX 25-36'},{t:'mix',from:36,label:'MIX 37-48'},
    {t:'mtx',from:0,label:'MATRIX 1-12'},{t:'dca',from:0,label:'DCA 1-12'},{t:'dca',from:12,label:'DCA 13-24'} ]};

  function stripDesc(kind,idx){
    if(kind==='ch'){
      return { kind, get name(){return CH[idx].name;}, get color(){return CH[idx].color;}, get num(){return "CH"+(idx+1);},
        get sel(){return state.sel===idx;}, doSel(){ selectChannel(idx); }, get chIdx(){return idx;},
        get on(){ return state.sof>=0 ? CH[idx].sendOn[state.sofBus] : CH[idx].on; },
        toggleOn(){ const c=CH[idx]; if(state.sof>=0){ c.sendOn[state.sofBus]=!c.sendOn[state.sofBus]; } else { c.on=!c.on; applyChanAudio(idx); } },
        get fdb(){ return state.sof>=0 ? CH[idx].sends[state.sofBus] : CH[idx].fader; },
        setFdb(v){ const c=CH[idx]; if(state.sof>=0){ c.sends[state.sofBus]=v; if(v>FMIN)c.sendOn[state.sofBus]=true; } else { c.fader=v; applyChanAudio(idx); } },
        get knobVal(){ return state.knobMode==='pan'?CH[idx].pan:CH[idx].gain; },
        setKnob(dy){ const c=CH[idx]; if(state.knobMode==='pan'){ c.pan=clamp(Math.round(c.pan+dy),-63,63);} else { c.gain=clamp(c.gain+dy*0.4,-6,70);} applyChanAudio(idx); },
        meter(){ return meterDbOf(idx); }, sofActive(){return false;}, hasAudio(){return CH[idx].hasAudio;} };
    }
    if(kind==='dca'){
      return { kind, get name(){return "DCA "+(idx+1);}, get color(){return "#f4a02a";}, get num(){return "DCA";},
        get sel(){return false;}, doSel(){ setModeB('dca'); },
        get on(){ return state.dcaOn[idx]; }, toggleOn(){ state.dcaOn[idx]=!state.dcaOn[idx]; for(let i=0;i<MAXCH;i++)if(CH[i].dca[idx])applyChanAudio(i); },
        get fdb(){ return state.dcaGain[idx]; }, setFdb(v){ state.dcaGain[idx]=v; for(let i=0;i<MAXCH;i++)if(CH[i].dca[idx])applyChanAudio(i); },
        get knobVal(){return 0;}, setKnob(){}, meter(){return -90;}, sofActive(){return false;}, hasAudio(){return true;} };
    }
    if(kind==='mix'){
      return { kind, get name(){return MIX_NAMES[idx];}, get color(){return "#39c0e6";}, get num(){return "MIX"+(idx+1);},
        get sel(){ return state.sof>=0&&state.sofType==='mix'&&state.sofBus===idx; },
        doSel(){ engageSof('mix',idx); },
        get on(){ return state.mixOn[idx]; }, toggleOn(){ state.mixOn[idx]=!state.mixOn[idx]; },
        get fdb(){ return state.mixMaster[idx]; }, setFdb(v){ state.mixMaster[idx]=v; },
        get knobVal(){return 0;}, setKnob(){}, meter(){return -90;}, sofActive(){return true;}, hasAudio(){return true;} };
    }
    if(kind==='mtx'){
      return { kind, get name(){return "MATRIX "+(idx+1);}, get color(){return "#a855f7";}, get num(){return "MTX"+(idx+1);},
        get sel(){ return state.sof>=0&&state.sofType==='mtx'&&state.sofBus===idx; }, doSel(){ engageSof('mtx',idx); },
        get on(){ return state.mtxOn[idx]; }, toggleOn(){ state.mtxOn[idx]=!state.mtxOn[idx]; },
        get fdb(){ return state.mtxMaster[idx]; }, setFdb(v){ state.mtxMaster[idx]=v; },
        get knobVal(){return 0;}, setKnob(){}, meter(){return -90;}, sofActive(){return true;}, hasAudio(){return true;} };
    }
    if(kind==='stA'){
      return { kind, get name(){return "STEREO A";}, get color(){return "#ffd27a";}, get num(){return "ST A";},
        get sel(){return false;}, doSel(){}, get on(){return true;}, toggleOn(){},
        get fdb(){return state.master;}, setFdb(v){ state.master=v; applyMasterAudio(); },
        get knobVal(){return 0;}, setKnob(){}, meter(){return playing?masterLevelDb():-90;}, sofActive(){return false;}, hasAudio(){return true;} };
    }
    if(kind==='stB'){
      return { kind, get name(){return "STEREO B";}, get color(){return "#ffd27a";}, get num(){return "ST B";},
        get sel(){return false;}, doSel(){}, get on(){return true;}, toggleOn(){},
        get fdb(){return state.masterB;}, setFdb(v){ state.masterB=v; },
        get knobVal(){return 0;}, setKnob(){}, meter(){return playing?masterLevelDb()-1:-90;}, sofActive(){return false;}, hasAudio(){return true;} };
    }
    if(kind==='mono'){
      return { kind, get name(){return "MONO";}, get color(){return "#ffd27a";}, get num(){return "M/C";},
        get sel(){return false;}, doSel(){}, get on(){return true;}, toggleOn(){},
        get fdb(){return state.mono;}, setFdb(v){ state.mono=v; applyMasterAudio(); },
        get knobVal(){return 0;}, setKnob(){}, meter(){return playing?masterLevelDb()-2:-90;}, sofActive(){return false;}, hasAudio(){return true;} };
    }
    if(kind==='monitor'){
      return { kind, get name(){return "MONITOR";}, get color(){return "#8fd8ff";}, get num(){return "MON";},
        get sel(){return false;}, doSel(){}, get on(){return !state.dim;}, toggleOn(){ state.dim=!state.dim; applyMonitor(); $("#dimKey").classList.toggle("on",state.dim); },
        get fdb(){return state.monitor;}, setFdb(v){ state.monitor=clamp(Math.round(v),-60,0); applyMonitor(); paintSelected(); paintRightRack(); },
        get knobVal(){return 0;}, setKnob(){}, meter(){return -90;}, sofActive(){return false;}, hasAudio(){return false;} };
    }
    return { kind:'empty', name:"—", color:"#26292f", num:"", sel:false, doSel(){}, on:false, toggleOn(){}, fdb:FMIN, setFdb(){}, knobVal:0, setKnob(){}, meter(){return -90;}, sofActive(){return false;}, hasAudio(){return false;} };
  }
  function nAudioCh(){ let n=0; for(let i=0;i<MAXCH;i++) if(CH[i].hasAudio) n=i+1; return n; }
  function meterDbOf(i){ const ch=CH[i];
    if(playing&&ch.hasAudio) return chLevelDb(i)+(ch.on?0:-90);
    if(!ch.hasAudio) return -90;
    return ch.src+ch.gain+(ch.on?Math.min(0,ch.fader):-90); }

  function currentDescriptors(){
    const list=[];
    const lb=leftBank.banks[leftBank.cur];
    for(let s=0;s<12;s++){ let d; const gi=lb.from+s;
      if(lb.t==='ch') d= gi<MAXCH?stripDesc('ch',gi):stripDesc('empty');
      else if(lb.t==='dca') d= gi<N_DCA?stripDesc('dca',gi):stripDesc('empty');
      else d=stripDesc('empty');
      list.push({block:'L',ctl:d}); }
    const cl=centerLayer.layers[centerLayer.cur];
    for(let s=0;s<12;s++){ const gi=cl.from+s; let d;
      if(cl.t==='ch') d= gi<MAXCH?stripDesc('ch',gi):stripDesc('empty');
      else if(cl.t==='mix') d= gi<N_MIX?stripDesc('mix',gi):stripDesc('empty');
      else if(cl.t==='mtx') d= gi<N_MTX?stripDesc('mtx',gi):stripDesc('empty');
      else if(cl.t==='dca') d= gi<N_DCA?stripDesc('dca',gi):stripDesc('empty');
      else d=stripDesc('empty');
      list.push({block:'C',ctl:d}); }
    list.push({block:'M',ctl:stripDesc('stA')}); list.push({block:'M',ctl:stripDesc('stB')});
    list.push({block:'M',ctl:stripDesc('mono')}); list.push({block:'M',ctl:stripDesc('monitor')});
    return list;
  }

  function buildBay(){
    BAY.innerHTML=""; bayStrips=[];
    const mkBlock=(title,keys,onKey,curIdx)=>{
      const blk=document.createElement("div"); blk.className="block";
      const head=document.createElement("div"); head.className="bhead";
      const bt=document.createElement("span"); bt.className="btitle"; bt.textContent=title; head.appendChild(bt);
      if(keys.length>1){
        const prev=document.createElement("button"); prev.className="bkey"; prev.textContent="‹";
        prev.onclick=()=>onKey((curIdx-1+keys.length)%keys.length);
        const lab=document.createElement("button"); lab.className="bkey on"; lab.textContent=keys[curIdx]; lab.style.minWidth="70px";
        lab.onclick=()=>onKey((curIdx+1)%keys.length);
        const next=document.createElement("button"); next.className="bkey"; next.textContent="›";
        next.onclick=()=>onKey((curIdx+1)%keys.length);
        head.appendChild(prev); head.appendChild(lab); head.appendChild(next);
      } else if(keys.length===1){
        const lab=document.createElement("button"); lab.className="bkey"; lab.textContent=keys[0]; lab.onclick=()=>onKey(0); head.appendChild(lab);
      }
      const strips=document.createElement("div"); strips.className="strips";
      blk.appendChild(head); blk.appendChild(strips);
      return {blk,strips,head};
    };
    // LEFT BAY A (12)
    const L=mkBlock("BAY A", leftBank.banks.map(b=>b.label), i=>{ leftBank.cur=i; buildBay(); paintBay(); }, leftBank.cur);
    BAY.appendChild(L.blk);
    for(let s=0;s<12;s++) bayStrips.push(mkStrip(L.strips));
    const sep1=document.createElement("div"); sep1.className="vsep"; BAY.appendChild(sep1);
    // CENTER BAY B (12)
    const C=mkBlock("BAY B", centerLayer.layers.map(l=>l.label), i=>{ centerLayer.cur=i; buildBay(); paintBay(); }, centerLayer.cur);
    BAY.appendChild(C.blk);
    for(let s=0;s<12;s++) bayStrips.push(mkStrip(C.strips));
    const sep2=document.createElement("div"); sep2.className="vsep"; BAY.appendChild(sep2);
    // MASTER (4)

  function mkStrip(host,master){

  function wireStrip(o){
    let drag=false;
    const toDb=cy=>{ const r=o.fader.getBoundingClientRect(); return pos2db(1-(cy-r.top)/r.height); };
    const mv=e=>{ if(!drag||!o.ctl)return; o.ctl.setFdb(toDb(e.clientY)); paintOneStrip(o); drawScreen(); checkMissions(); e.preventDefault(); };
    o.fader.addEventListener("pointerdown",e=>{ drag=true; o.fader.setPointerCapture(e.pointerId); mv(e); e.preventDefault(); });
    o.fader.addEventListener("pointermove",mv);
    const up=()=>drag=false; o.fader.addEventListener("pointerup",up); o.fader.addEventListener("pointercancel",up);
    let kd=false,ky=0;
    o.knob.addEventListener("pointerdown",e=>{kd=true;ky=e.clientY;o.knob.setPointerCapture(e.pointerId);e.preventDefault();});
    o.knob.addEventListener("pointermove",e=>{ if(!kd||!o.ctl)return; const dy=ky-e.clientY; ky=e.clientY; o.ctl.setKnob(dy); paintOneStrip(o); paintSelected(); e.preventDefault(); });
    const kup=()=>kd=false; o.knob.addEventListener("pointerup",kup); o.knob.addEventListener("pointercancel",kup);
    o.sel.onclick=()=>{ if(o.ctl){ o.ctl.doSel(); paintBay(); } };
    o.cue.onclick=()=>{ const c=o.ctl; if(c&&c.kind==='ch'){ CH[c.chIdx].cue=!CH[c.chIdx].cue; applyCue(); } };
    o.cue.oncontextmenu=(e)=>{ e.preventDefault(); clearCue(); toast("CUE limpo"); };
    o.on.onclick=()=>{ if(o.ctl){ o.ctl.toggleOn(); paintBay(); drawScreen(); checkMissions(); } };
  }

  };
  // CUE = SOLO-in-place (AFL): se algum canal está em CUE, só os canais em CUE são ouvidos.
  function anyCue(){ for(let i=0;i<CH.length;i++){ if(CH[i].cue) return true; } return false; }
  function applyCue(){ for(let i=0;i<CH.length;i++) applyChanAudio(i); if(typeof paintBay==='function') paintBay(); if(state.mode!=="overview") drawScreen(); }
  function clearCue(){ for(let i=0;i<CH.length;i++) CH[i].cue=false; applyCue(); }
  function paintOneStrip(o){
    const c=o.ctl; if(!c){return;}
    const empty=c.kind==='empty';
    o.cn.textContent=empty?"":c.name; o.cnum.textContent=empty?"":c.num;
    o.lcd.style.background=empty?"#15171b":c.color;

    o.root.classList.toggle("sel", !!c.sel);

    o.sel.classList.toggle("act", !!c.sel);
    o.on.classList.toggle("act", !!c.on);
    o.cue.classList.toggle("act", c.kind==='ch' && CH[c.chIdx] && !!CH[c.chIdx].cue);
    o.on.textContent = (state.sof>=0&&c.kind==='ch')? (c.on?"SEND":"OFF") : "ON";
    o.knob.style.visibility = (c.kind==='ch')?'visible':'hidden';

  function pickInk(hex){
    const h=hex.replace('#',''); if(h.length<6)return "#0b0f14";
    const r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    return (0.299*r+0.587*g+0.114*b)>150?"#0b0f14":"#f4f8ff"; }

  function engageSof(type,bus){

  /* ================= SCREENS (dual 12" + 7" utility) ================= */

  function reg(o){ hitRegions.push(o); return o; }
  // CH VIEW "touch a field to open its page" (igual ao DM7 real).
  // Registrado ANTES dos controles do painel: o hit-test corre do último p/ o primeiro,
  // então qualquer botão/thumb desenhado depois continua tendo prioridade. Só o
  // fundo do campo navega.
  function navField(x,y,w,h,mode){ reg({x,y,w,h,nav:mode,onDown:()=>setMode(mode)}); }
  function inRegion(r,p){ if(r.hit==='circle')return Math.hypot(p.x-r.cx,p.y-r.cy)<=(r.rr||12); return p.x>=r.x&&p.x<=r.x+r.w&&p.y>=r.y&&p.y<=r.y+r.h; }
  function evtPos(e){ const r=cv.getBoundingClientRect(); return {x:e.clientX-r.left,y:e.clientY-r.top}; }
  function makeScreen(id,getMode){ const c=document.getElementById(id), cx=c.getContext("2d");
    const s={cv:c,ctx:cx,W:0,H:0,DPR:1,hitRegions:[],active:null,getMode};
    c.addEventListener("pointerdown",e=>{ bindScreen(s); const p=evtPos(e);
      for(let i=s.hitRegions.length-1;i>=0;i--){ const r=s.hitRegions[i]; if(inRegion(r,p)){ if(r.onDown)r.onDown(p);
        if(r.onDrag){ s.active=r; c.setPointerCapture(e.pointerId); r.onDrag(p); } drawScreen(); e.preventDefault(); return; } } });
    c.addEventListener("pointermove",e=>{ if(!s.active)return; bindScreen(s); s.active.onDrag(evtPos(e)); drawScreen(); e.preventDefault(); });
    const up=()=>{ s.active=null; }; c.addEventListener("pointerup",up); c.addEventListener("pointercancel",up);
    return s;
  }
  const screenA=makeScreen("screenA",()=>state.mode);
  const screenB=makeScreen("screenB",()=>state.modeB);
  const screenU=makeScreen("screenU",()=>'util');
  const mb=$("#mbridge"), mbx=mb.getContext("2d"); let MBW=0,MBH=0;

  function sizeCanvas(){ const dpr=Math.min(2,window.devicePixelRatio||1);
    [screenA,screenB,screenU].forEach(s=>{ const r=s.cv.getBoundingClientRect(); s.W=r.width; s.H=r.height; s.DPR=dpr; s.cv.width=s.W*dpr; s.cv.height=s.H*dpr; s.ctx.setTransform(dpr,0,0,dpr,0,0); });
    const r=mb.getBoundingClientRect(); MBW=r.width; MBH=r.height; mb.width=MBW*dpr; mb.height=MBH*dpr; mbx.setTransform(dpr,0,0,dpr,0,0);

    ctx.fillStyle=g; roundRect(x,y,w,h,7); ctx.fill(); ctx.strokeStyle=accent||SC.border; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,h-1,7); ctx.stroke();

    ctx.fillStyle=g; roundRect(x,y,w,h,5); ctx.fill(); ctx.strokeStyle=active?shade(col,-40):"#3a6188"; ctx.lineWidth=1; roundRect(x+.5,y+.5,w-1,h-1,5); ctx.stroke();

  function shade(hex,amt){ const h=hex.replace('#',''); let r=parseInt(h.substr(0,2),16),g=parseInt(h.substr(2,2),16),b=parseInt(h.substr(4,2),16);
    r=clamp(r+amt,0,255);g=clamp(g+amt,0,255);b=clamp(b+amt,0,255); return "#"+[r,g,b].map(v=>v.toString(16).padStart(2,'0')).join(''); }
  function scrParam(x,y,w,label,val,min,max,fmt,onSet,opts){ opts=opts||{};
    if(label){ ctx.fillStyle=SC.mut; ctx.font="700 9px Inter,system-ui"; ctx.textAlign="left"; ctx.fillText(label,x,y-4); }
    ctx.textAlign="right"; ctx.fillStyle=SC.ink; ctx.font="800 11px Inter,system-ui"; ctx.fillText(fmt(val),x+w,y-4);

  function vmeter(x,y,w,h,dbfs,peakLine){ ctx.fillStyle="#04101a"; ctx.fillRect(x,y,w,h);
    const t=clamp((dbfs+60)/60,0,1),hh=h*t; const g=ctx.createLinearGradient(0,y+h,0,y); g.addColorStop(0,"#2ea85a"); g.addColorStop(.6,"#37c86a"); g.addColorStop(.82,"#e8c33a"); g.addColorStop(1,"#e0483f");

  /* ---- shared: EQ graph ---- */
  function drawEqGraph(gx,gy,gw,gh,ch,interactive){
    const g=ctx.createLinearGradient(0,gy,0,gy+gh); g.addColorStop(0,"#0a1d30"); g.addColorStop(1,"#071624");
    ctx.fillStyle=g; roundRect(gx,gy,gw,gh,6); ctx.fill(); ctx.strokeStyle=SC.border; ctx.lineWidth=1; roundRect(gx+.5,gy+.5,gw-1,gh-1,6); ctx.stroke();
    ctx.save(); roundRect(gx,gy,gw,gh,6); ctx.clip();
    ctx.font="8px Inter"; ctx.textAlign="center";
    [30,100,300,1000,3000,10000].forEach(f=>{ const x=gx+fx(f)*gw; ctx.strokeStyle=SC.grid; ctx.lineWidth=1; ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.fillText(f>=1000?(f/1000)+"k":f,x,gy+gh-3); });
    for(let d=-18;d<=18;d+=6){ const yy=gy+gh/2-d/24*gh/2; ctx.strokeStyle=d===0?"#2b4d70":"#12293f"; ctx.beginPath();ctx.moveTo(gx,yy);ctx.lineTo(gx+gw,yy);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.textAlign="left"; ctx.fillText((d>0?"+":"")+d,gx+3,yy-2); ctx.textAlign="center"; }
    ch.eq.forEach((b,bi)=>{ if(b.g===0)return; ctx.beginPath();
      for(let px=0;px<=gw;px+=3){ const f=fInv(px/gw),gg=biquadDb(b.type,b.f,b.g,b.q*eqTypeFactor(ch.eqType),f),yy=gy+gh/2-gg/24*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }

    ctx.beginPath();
    for(let px=0;px<=gw;px+=2){ const f=fInv(px/gw),gg=eqMag(ch,f),yy=gy+gh/2-gg/24*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }
    ctx.strokeStyle=ch.color; ctx.lineWidth=2.2; ctx.stroke();
    ctx.lineTo(gx+gw,gy+gh/2); ctx.lineTo(gx,gy+gh/2); ctx.closePath(); ctx.fillStyle=ch.color+"1c"; ctx.fill();
    ctx.restore();
    if(ch.hpfOn){ const x=gx+fx(ch.hpf)*gw; ctx.strokeStyle=SC.amber; ctx.setLineDash([4,3]); ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke(); ctx.setLineDash([]);
      ctx.fillStyle=SC.amber; ctx.beginPath();ctx.arc(x,gy+gh-12,6,0,7);ctx.fill(); ctx.fillStyle="#0b1420";ctx.font="700 8px Inter";ctx.textAlign="center";ctx.fillText("H",x,gy+gh-9);

    ch.eq.forEach((b,bi)=>{ const x=gx+fx(b.f)*gw, yy=gy+gh/2-b.g/24*gh/2, selb=state.eqBand===bi;
      ctx.fillStyle=SC.band[bi]; ctx.beginPath();ctx.arc(x,yy,selb?8:6.5,0,7);ctx.fill();

      if(interactive) reg({hit:'circle',cx:x,cy:yy,rr:16,onDown:()=>{state.eqBand=bi;paintSelected();},
        onDrag:p=>{ b.f=clamp(Math.round(fInv((p.x-gx)/gw)),20,20000); b.g=clamp(-(p.y-gy-gh/2)/(gh/2)*24,-18,18); applyChanAudio(ch.i); paintSelected(); checkMissions(); }}); });
  }
  /* ---- shared: dynamics mini graph ---- */

      const gr=ch._gr||0, open=gr<0.5; ctx.textAlign="left"; ctx.fillStyle=open?SC.green:SC.red; ctx.beginPath();ctx.arc(ix+5,iy+2,4,0,7);ctx.fill();

    const ch=CH[state.sel],m=8,gx=m,gy=6,gw=W*0.52-m,gh=H-12;
    panel(gx,gy,gw,gh,"DYNAMICS 2 · COMPRESSOR — "+ch.name);
    const px0=gx+34,py0=gy+26,pw=gw-58,ph=gh-56;
    const X=d=>px0+clamp((d+60)/60,0,1)*pw, Y=o=>py0+ph-clamp((o+60)/60,0,1)*ph;

    const kneeDb=(ch.compKnee==='HARD'||ch.compKnee===0)?0:ch.compKnee*4, ratio=ch.compRatio>=40?40:ch.compRatio;
    const compFn=d=>{ const t=ch.compThr; let o; if(kneeDb>0&&d>t-kneeDb/2&&d<t+kneeDb/2){ const xk=d-(t-kneeDb/2); o=d+(1/ratio-1)*xk*xk/(2*kneeDb); } else o=d>t?t+(d-t)/ratio:d; return o+ch.compGain; };
    ctx.beginPath(); for(let d=-60;d<=0;d+=1){ const xx=X(d),yy=Y(clamp(compFn(d),-60,6)); d===-60?ctx.moveTo(xx,yy):ctx.lineTo(xx,yy); }
    ctx.strokeStyle=SC.cyan; ctx.lineWidth=2.2; ctx.stroke();
    const tx=X(ch.compThr); ctx.strokeStyle=SC.red; ctx.setLineDash([4,3]); ctx.beginPath();ctx.moveTo(tx,py0);ctx.lineTo(tx,py0+ph);ctx.stroke(); ctx.setLineDash([]);
    ctx.fillStyle=SC.red; ctx.font="700 9px Inter"; ctx.textAlign="center"; ctx.fillText("THR",tx,py0-2);

      uk.appendChild(w); }
    qsa('.pk[data-ud]').forEach(el=>{ const i=+el.dataset.ud;
      const defs=[KDEF.monitor,KDEF.gain,KDEF.hpf,{min:0,max:1}];
      wirePKDrag(el, ()=>udGet(i), v=>{ udSet(i,v); paintRightRack(); }, defs[i]); });

    $("#scPrev").onclick=()=>{ toast("PREVIEW: veja a cena sem aplicar"); };
    const uks=$("#ukeys"); uks.innerHTML="";
    UKEYS.forEach((k,i)=>{ const b=document.createElement("button"); b.className="ukey"; b.dataset.uk=i;
      b.innerHTML=`<span>${k.label}</span>`; b.onclick=()=>k.act(b); uks.appendChild(b); });
    $("#tbKey").onclick=()=>{ state.talkback=!state.talkback; $("#tbKey").classList.toggle("lit",state.talkback); drawScreen(); toast(state.talkback?"<b>TALKBACK</b> ON":"Talkback OFF"); };
    $("#dimKey").onclick=()=>{ state.dim=!state.dim; $("#dimKey").classList.toggle("on",state.dim); applyMonitor(); toast(state.dim?"MONITOR <b>DIM</b> -20dB":"Dim OFF"); };
  }
  function udGet(i){ return [state.monitor, CH[state.sel].gain, CH[state.sel].hpf, state.fx.revMix][i]; }
  function udSet(i,v){ if(i===0){state.monitor=Math.round(v);applyMonitor();}
    else if(i===1){CH[state.sel].gain=v;applyChanAudio(state.sel);paintSelected();}
    else if(i===2){CH[state.sel].hpf=Math.round(v);CH[state.sel].hpfOn=true;applyChanAudio(state.sel);paintSelected();}
    else if(i===3){state.fx.revMix=v;applyFX();} drawScreen(); }

    $("#scnName").textContent=scenes[state.scene]?"ARMAZENADA":"— VAZIA —";

  function snapCh(c){ return JSON.parse(JSON.stringify({gain:c.gain,phase:c.phase,phantom:c.phantom,hpfOn:c.hpfOn,hpf:c.hpf,lpfOn:c.lpfOn,lpf:c.lpf,eq:c.eq,eqType:c.eqType,gateOn:c.gateOn,gateThr:c.gateThr,gateRange:c.gateRange,gateAtk:c.gateAtk,gateHold:c.gateHold,gateDecay:c.gateDecay,compOn:c.compOn,compThr:c.compThr,compRatio:c.compRatio,compAtk:c.compAtk,compRel:c.compRel,compKnee:c.compKnee,compGain:c.compGain,pan:c.pan,fader:c.fader,on:c.on,sends:c.sends,sendOn:c.sendOn,sendPre:c.sendPre,dca:c.dca,mute:c.mute,muteSafe:c.muteSafe,fxRev:c.fxRev,fxDly:c.fxDly})); }
  function storeScene(slot){ scenes[slot]={ ch:CH.map(snapCh), master:state.master, mono:state.mono, dcaGain:state.dcaGain.slice(), dcaOn:state.dcaOn.slice(), muteActive:state.muteActive.slice(), fx:JSON.parse(JSON.stringify(state.fx)), ts:Date.now() }; toast("Cena "+(slot+1)+" <b>armazenada</b> ✔"); }
  function recallScene(slot){ const s=scenes[slot]; if(!s){ toast("Cena "+(slot+1)+" vazia"); return; }
    s.ch.forEach((sc,i)=>Object.assign(CH[i],JSON.parse(JSON.stringify(sc)))); state.master=s.master; if(s.mono!=null)state.mono=s.mono;
    state.dcaGain=s.dcaGain.slice(); state.dcaOn=s.dcaOn.slice(); state.muteActive=s.muteActive.slice(); state.fx=JSON.parse(JSON.stringify(s.fx));
    if(fxRack)fxRack.conv.buffer=makeImpulse(state.fx.revSize);
    for(let i=0;i<MAXCH;i++)applyChanAudio(i); applyMasterAudio(); applyFX();
    paintBay(); paintSelected(); paintRightRack(); drawScreen(); toast("Cena "+(slot+1)+" <b>recuperada</b> ▸ faders atualizados"); }
  function chLevelDb(i){ if(!ac||!aNodes[i])return -90; const n=aNodes[i]; n.an.getFloatTimeDomainData(n.buf); let s=0; for(let k=0;k<n.buf.length;k++)s+=n.buf[k]*n.buf[k]; const rms=Math.sqrt(s/n.buf.length); return rms>1e-5?20*Math.log10(rms):-90; }
  function masterLevelDb(){ if(!masterAn)return -90; masterAn.getFloatTimeDomainData(masterAn._buf); let s=0; for(let k=0;k<masterAn._buf.length;k++)s+=masterAn._buf[k]*masterAn._buf[k]; const rms=Math.sqrt(s/masterAn._buf.length); return rms>1e-5?20*Math.log10(rms):-90; }
  async function loadBuf(url){ if(bufCache[url])return bufCache[url]; const r=await fetch(url); if(!r.ok)throw new Error("HTTP "+r.status); const ab=await r.arrayBuffer(); const b=await ac.decodeAudioData(ab); bufCache[url]=b; return b; }
  function setStatus(txt,col){ const el=$("#audioStatus"); if(el){ el.textContent="áudio: "+txt; el.style.color=col||"var(--muted)"; } }
  function loadSong(idx){ curSong=idx; const song=SONGS[idx];
    for(let i=0;i<MAXCH;i++){ const st=song.stems[i],c=CH[i];
      if(st){ c.name=st.n; c.color=st.c; c.file=st.f; c.pan=st.p; c.hpfOn=st.h; c.hpf=st.h?100:80; c.hasAudio=true; c.on=true; c.fader=-3; c.gain=16; c.phase=false; c.phantom=false; }
      else { c.name="—"; c.color="#334155"; c.file=null; c.hasAudio=false; c.on=false; } }
    buildBay(); paintBay(); paintSelected(); paintRightRack(); drawScreen(); if(ac){ for(let i=0;i<MAXCH;i++)applyChanAudio(i); } }
  function setPlayBtn(on){ const b=$("#playBtn"); if(b){ b.textContent=on?"⏸ Parar":"► Tocar base"; b.style.background=on?"#e0483f":"#22b866"; } }
  async function playSong(){ if(!ac)buildAudioGraph(); if(ac.state==="suspended"){ try{await ac.resume();}catch(e){} }
    const song=SONGS[curSong],base=SB+song.folder+"/",tok=++loadTok; setStatus("carregando "+song.label+"…","#f4a02a");
    let bufs; try{ bufs=await Promise.all(song.stems.slice(0,MAXCH).map(st=>loadBuf(base+st.f))); }catch(e){ setStatus("erro: "+e.message,"#e0483f"); return; }
    if(tok!==loadTok)return; stopSong(true); const t0=ac.currentTime+0.12;
    song.stems.forEach((st,i)=>{ if(i>=MAXCH||!aNodes[i]||!bufs[i])return; const src=ac.createBufferSource(); src.buffer=bufs[i]; src.loop=true; src.connect(aNodes[i].trim); src.start(t0); realSources.push(src); });
    for(let i=0;i<MAXCH;i++)applyChanAudio(i); playing=true; setPlayBtn(true); setStatus("tocando ♪ "+song.label,"#3ad07a"); }
  function stopSong(keep){ realSources.forEach(s=>{try{s.stop();}catch(e){}}); realSources=[]; playing=false; setPlayBtn(false); if(!keep)setStatus("parado"); }

  /* ================= LOOP / METERS ================= */
  function loop(){ const now=perf(); processGates();
    for(let i=0;i<bayStrips.length;i++){ const o=bayStrips[i]; if(!o.ctl){continue;} let db=o.ctl.meter?o.ctl.meter():-90; let t;
      if(playing){ t=clamp((db+48)/48,0,1); if(o.ctl.kind!=='ch'&&o.ctl.kind!=='stA'&&o.ctl.kind!=='stB'&&o.ctl.kind!=='mono')t=0; }
      else { if(o.ctl.kind==='ch'&&o.ctl.hasAudio()){ const c=CH_fromCtl(o.ctl); const env=0.5+0.5*Math.sin(now/(260+(c?c.i*23:0))+(c?c.i:0)); let post=(c?c.src+c.gain:-60)+(o.ctl.on?(o.ctl.fdb<=FMIN?-90:o.ctl.fdb):-90)+env*8-4; t=clamp((post+50)/50,0,1); } else t=0; }
      o.meter.style.height=(t*100)+"%"; }
    const dyn = playing || state.mode==='overview'||state.mode==='meter'||state.modeB==='overview'||state.modeB==='meter';
    if(dyn) drawScreen();
    drawBridge();
    requestAnimationFrame(loop);
  }
  function CH_fromCtl(ctl){ for(let i=0;i<MAXCH;i++) if(CH[i].hasAudio&&CH[i].name===ctl.name) return CH[i]; return null; }

  /* ================= INIT ================= */
  buildRightRack();
  (function initAudioUI(){ const sel=$("#songSel"); if(sel){ SONGS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.label; sel.appendChild(o); }); sel.value=0; sel.onchange=()=>{ const w=playing; stopSong(true); loadSong(+sel.value); if(w)playSong(); }; }
    const pb=$("#playBtn"); if(pb){ pb.onclick=()=>{ if(playing)stopSong(); else playSong(); }; } })();
  window.__dbg={CH,state,effLin,applyChanAudio,applyFX,tapTempo,selectChannel,N_DCA,N_MUTE,MAXCH,nAudioCh,loadSong,setMode,setModeB,engageSof,recallScene,storeScene,
    screens:function(){return {A:screenA,B:screenB,U:screenU}},
    fx:function(){return fxRack},
    hits:function(){return screenA.hitRegions},
    nBanks:function(){return leftBank.banks.length},
    setBank:function(i){ leftBank.cur=i; buildBay(); paintBay(); },
    bankInfo:function(){ const b=leftBank.banks[leftBank.cur]; return {cur:leftBank.cur,label:b.label,kind:b.t,from:b.from}; },
    stripSel:function(s){ const st=bayStrips[s]; if(st&&st.sel) st.sel.click(); return state.sel; },
    apply:function(i){return applyChanAudio(i)}, aN:function(i){return aNodes[i]}, ac:function(){return ac},
    chLevelDb:function(i){return chLevelDb(i)}, masterDb:function(){return masterLevelDb()}, isPlaying:function(){return playing},
    getTrim:function(i){try{return aNodes&&aNodes[i]?aNodes[i].trim.gain.value:null}catch(e){return null}},
    chFdr:function(i){try{return aNodes&&aNodes[i]?aNodes[i].fdr.gain.value:null}catch(e){return null}},
    eqGain:function(i,b){try{return aNodes&&aNodes[i]?aNodes[i].eq[b].gain.value:null}catch(e){return null}},
    revSend:function(i){try{return aNodes&&aNodes[i]?aNodes[i].revSend.gain.value:null}catch(e){return null}},
    revRet:function(){try{return fxRack?fxRack.revRet.gain.value:null}catch(e){return null}},
    gateGain:function(i){try{return aNodes&&aNodes[i]?aNodes[i].gate.gain.value:null}catch(e){return null}},
    compReduction:function(i){try{return aNodes&&aNodes[i]?aNodes[i].comp.reduction:null}catch(e){return null}},
    aNodesLen:function(){try{return aNodes.length}catch(e){return 0}},
    realSrcCount:function(){try{return realSources.length}catch(e){return 0}},
    // build a synthetic base with n stems (reuses SONGS[0] files) to prove the desk models past ch24
    loadBig:function(n){ const s=SONGS[0]; const big={label:'TEST '+n,folder:s.folder,stems:[]};
      for(let i=0;i<n;i++){ const st=s.stems[i%s.stems.length]; big.stems.push({n:'CH'+(i+1),c:st.c,f:st.f,p:0,h:false}); }
      SONGS.push(big); loadSong(SONGS.length-1);
      return {stems:n, ch30HasAudio: CH[29]?CH[29].hasAudio:false, ch30Fdr:this.chFdr(29), nAudio:nAudioCh()}; },
    resumeAudio:function(){try{return ac&&ac.resume()}catch(e){}},
    acState:function(){try{return ac?ac.state:'none'}catch(e){return 'none'}}};
  buildBay(); loadSong(0); try{ buildAudioGraph(); }catch(e){}
  updateSofUi(); paintMission(); paintRightRack();
  window.addEventListener("resize",sizeCanvas); setTimeout(sizeCanvas,30); requestAnimationFrame(loop);
  setInterval(()=>{ const l=$("#danteLed"); if(l){ l.classList.toggle("warn"); setTimeout(()=>l.classList.remove("warn"),120); } },4000);

  /* ================= FIT (preserved) ================= */
  function fitConsole(){ const con=document.querySelector(".console"); if(!con)return;
    const DW=1580,DH=966,vw=window.innerWidth,vh=window.innerHeight;
    // <900: iPad em pé também entra no modo fluido. Acima disso, zoom-fit como sempre.
    if(vw<900){ document.body.classList.add('stacked'); con.classList.add('stacked'); con.style.zoom=''; document.body.style.alignItems='flex-start'; }
    else{ document.body.classList.remove('stacked'); con.classList.remove('stacked'); con.style.zoom=''; const _DW=con.offsetWidth, _DH=con.offsetHeight;
      const scrH=(window.screen&&screen.height)||vh; const iframeTaller=vh>scrH+8; const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6); const effVh=Math.max(240,visH-headerAllow);
      document.body.style.alignItems=(iframeTaller||vh>700)?'flex-start':'center';
      let s=Math.min((vw-16)/(_DW||DW), effVh/(_DH||DH)); s=Math.max(0.35,Math.min(s,2.4)); con.style.zoom=s; }
    try{ sizeCanvas(); }catch(e){}
  }
  window.addEventListener('resize',fitConsole); setTimeout(fitConsole,45);
})();
</script>
