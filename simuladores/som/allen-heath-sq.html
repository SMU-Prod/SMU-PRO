<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Simulador — Console Allen &amp; Heath SQ (SMU)</title>
<style>
  :root{--bg:#0a0d13;--panel:#141922;--panel2:#0d1119;--line:#232c3a;--ink:#e9edf4;--muted:#8b97a8;
    --sq:#00b3d7;--amber:#f5a623;--green:#39d353;--red:#ff4d4d;--purple:#a855f7;--strip:#10151e}
  *{box-sizing:border-box}html,body{margin:0}
  body{background:var(--bg);color:var(--ink);font-family:"Space Grotesk",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased;padding:6px;user-select:none;overflow-x:hidden;
    min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .fit{width:1400px;flex:0 0 auto}
  @media(max-width:760px){ body{justify-content:flex-start} .fit{width:100%} }
  /* iOS/iPad: trava o pan (arraste não vira gesto de sair da tela cheia) em tablet/desktop */
  @media(min-width:760px){ body,.fit{touch-action:none} }
  .brandbar{display:flex;align-items:center;gap:12px;background:linear-gradient(180deg,#11161f,#0b0f16);border:1px solid var(--line);border-radius:10px;padding:8px 14px;margin-bottom:8px}
  .logo{font-weight:800;font-size:16px;letter-spacing:.5px}.logo b{color:var(--sq)}
  .model{font-size:11px;color:var(--muted);letter-spacing:2px;border:1px solid var(--line);border-radius:5px;padding:3px 8px}
  .spacer{flex:1}
  .mission{display:flex;gap:9px;align-items:center;background:#0c1119;border:1px solid var(--line);border-radius:8px;padding:6px 10px;max-width:56%}
  .mission .idx{font-size:9.5px;color:var(--sq);font-weight:800;white-space:nowrap}.mission .txt{font-size:11px;line-height:1.2}.mission .txt b{color:var(--sq)}
  .mission button{font:inherit;font-size:10px;color:var(--muted);background:transparent;border:1px solid var(--line);border-radius:6px;padding:4px 7px;cursor:pointer}

  .console{display:grid;grid-template-columns:1fr 360px;gap:8px}
  @media(max-width:900px){.console{grid-template-columns:1fr}}
  .card{background:linear-gradient(180deg,var(--panel),var(--panel2));border:1px solid var(--line);border-radius:11px;padding:9px}

  /* fader bay */
  .layers{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:8px}
  .lyr{font:inherit;font-size:10px;font-weight:700;padding:6px 9px;border-radius:7px;border:1px solid var(--line);background:#0c1119;color:var(--muted);cursor:pointer}
  .lyr.on{background:var(--sq);border-color:var(--sq);color:#04121a}
  .bay{display:flex;gap:4px;overflow-x:auto}
  .strip{flex:0 0 66px;background:linear-gradient(180deg,var(--strip),#0c121b);border:1px solid var(--line);border-radius:8px;padding:5px 4px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .strip.sel{border-color:var(--sq);box-shadow:0 0 0 1px var(--sq) inset}
  .strip.master{flex-basis:72px;border-color:var(--amber)}
  .cn{width:100%;height:16px;border-radius:3px;color:#04121a;font-size:8.5px;font-weight:800;display:flex;align-items:center;justify-content:center;white-space:nowrap;overflow:hidden}
  .cnum{font-size:7px;color:var(--muted)}
  .selbtn{font:inherit;font-size:8px;font-weight:800;width:100%;padding:3px 0;border-radius:4px;border:1px solid var(--line);background:#0c1119;color:var(--muted);cursor:pointer}
  .selbtn.on{background:var(--sq);border-color:var(--sq);color:#04121a}
  .fw{display:flex;gap:3px;height:120px;align-items:stretch}
  .mtr{width:5px;border-radius:2px;background:#05070d;border:1px solid #1a2333;position:relative;overflow:hidden}
  .mtr i{position:absolute;left:0;right:0;bottom:0;height:0%;background:linear-gradient(0deg,var(--green),var(--green) 62%,var(--amber) 85%,var(--red))}
  .fdr{width:22px;position:relative;background:linear-gradient(90deg,#090d14,#0c111a,#090d14);border-radius:4px;border:1px solid #1a2333;cursor:ns-resize;touch-action:none}
  .fdr .u{position:absolute;left:0;right:0;top:24%;height:1px;background:#39455c}
  .cap{position:absolute;left:-4px;right:-4px;height:16px;border-radius:3px;background:linear-gradient(180deg,#eef1f6,#aab4c6 46%,#5a6982 54%,#8391a6);border:1px solid #0006;cursor:grab}
  .cap::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#05070d;border-radius:2px}
  .fdb{font-size:8px;color:var(--muted);font-weight:700}
  .row2{display:flex;gap:3px;width:100%}
  .kb{flex:1;font:inherit;font-size:8px;font-weight:800;padding:3px 0;border-radius:4px;border:1px solid var(--line);background:#0c1119;color:var(--muted);cursor:pointer}
  .kb.pafl.on{background:var(--green);border-color:var(--green);color:#04121a}
  .kb.mute.on{background:var(--red);border-color:var(--red);color:#fff}

  /* right: screen + superstrip + softkeys */
  .screenwrap{display:flex;flex-direction:column;gap:8px}
  .scr{background:#05080d;border:1px solid #1a2333;border-radius:9px;padding:8px}
  .scrhead{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .scrhead .chip{width:9px;height:18px;border-radius:2px;background:var(--sq)}
  .scrhead .nm{font-size:13px;font-weight:800}.scrhead .sub{font-size:9px;color:var(--muted)}
  #eq{width:100%;height:120px;background:#03060b;border:1px solid #16202e;border-radius:6px;display:block;touch-action:none}
  .dynrow{display:flex;gap:8px;margin-top:6px}
  .dyncell{flex:1;background:#0a0f17;border:1px solid #16202e;border-radius:6px;padding:5px 7px}
  .dyncell .t{font-size:8.5px;color:var(--muted);letter-spacing:.5px}
  .dyncell .grbar{height:7px;border-radius:3px;background:#05070d;margin-top:3px;overflow:hidden}.dyncell .grbar i{display:block;height:100%;width:0%;background:var(--sq)}

  .superstrip{background:linear-gradient(180deg,#12171f,#0c1119);border:1px solid var(--line);border-radius:9px;padding:8px}
  .sslabel{font-size:9px;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:6px}
  .ssgrid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px 4px}
  .enc{display:flex;flex-direction:column;align-items:center;gap:2px}
  .dial{width:40px;height:40px;border-radius:50%;position:relative;cursor:ns-resize;touch-action:none;background:radial-gradient(circle at 50% 30%,#2b3a52,#141b26 72%);border:2px solid var(--sq);box-shadow:0 0 6px #00b3d766}
  .dial.eq{border-color:var(--amber);box-shadow:0 0 6px #f5a62366}
  .dial.dyn{border-color:var(--purple);box-shadow:0 0 6px #a855f766}
  .dial::after{content:"";position:absolute;left:50%;top:4px;width:2.5px;height:13px;border-radius:2px;background:#eaf6ff;transform-origin:50% 16px;transform:translateX(-50%) rotate(var(--rot,0deg))}
  .el{font-size:8px;color:var(--muted);text-align:center}.ev{font-size:8.5px;font-weight:800}
  .ssbtns{display:flex;gap:5px;margin-top:8px;flex-wrap:wrap}
  .ssb{font:inherit;font-size:9px;font-weight:800;padding:6px 9px;border-radius:6px;border:1px solid var(--line);background:#0c1119;color:var(--muted);cursor:pointer}
  .ssb.on{background:var(--sq);border-color:var(--sq);color:#04121a}

  .softkeys{background:linear-gradient(180deg,#12171f,#0c1119);border:1px solid var(--line);border-radius:9px;padding:8px}
  .skgrid{display:grid;grid-template-columns:repeat(8,1fr);gap:4px}
  .sk{font:inherit;font-size:8px;font-weight:700;padding:6px 2px;border-radius:5px;border:1px solid var(--line);background:#0c1119;color:var(--muted);cursor:pointer;text-align:center;line-height:1}
  .sk.on{color:#04121a}
  .toast{position:fixed;left:50%;bottom:14px;transform:translateX(-50%) translateY(20px);background:#0c1119;border:1px solid var(--sq);color:var(--ink);padding:9px 15px;border-radius:9px;font-size:12px;opacity:0;transition:.25s;pointer-events:none;z-index:50}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}.toast b{color:var(--sq)}
</style>
</head>
<body>
 <div class="fit">
  <div class="brandbar">
    <div class="logo">ALLEN &amp; <b>HEATH</b></div>
    <div class="model">SQ-6 · SIMULADOR SMU</div>
    <div class="spacer"></div>
    <div class="mission"><span class="idx" id="mIdx">MISSÃO</span><span class="txt" id="mTxt">—</span><button id="mSkip">Pular</button></div>
  </div>

  <div class="console">
    <!-- FADER BAY -->
    <div class="card">
      <div class="layers" id="layers"></div>
      <div class="bay" id="bay"></div>
    </div>

    <!-- SCREEN + SUPERSTRIP + SOFTKEYS -->
    <div class="screenwrap">
      <div class="scr">
        <div class="scrhead"><span class="chip" id="scrChip"></span><div><div class="nm" id="scrName">—</div><div class="sub" id="scrSub">Processing · PEQ 4 bandas</div></div></div>
        <canvas id="eq"></canvas>
        <div class="dynrow">
          <div class="dyncell"><div class="t">GATE</div><div class="grbar"><i id="gateBar"></i></div></div>
          <div class="dyncell"><div class="t">COMP · GR</div><div class="grbar"><i id="compBar"></i></div></div>
        </div>
      </div>

      <div class="superstrip">
        <div class="sslabel">SuperStrip — canal selecionado</div>
        <div class="ssgrid" id="ssgrid"></div>
        <div class="ssbtns">
          <button class="ssb" id="bPol">Ø POL</button>
          <button class="ssb" id="bHpf">HPF</button>
          <button class="ssb" id="bGate">GATE</button>
          <button class="ssb" id="bComp">COMP</button>
        </div>
      </div>

      <div class="softkeys">
        <div class="sslabel">16 SoftKeys</div>
        <div class="skgrid" id="skgrid"></div>
      </div>
    </div>
  </div>
 </div>
  <div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  const $=id=>document.getElementById(id);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  // ---- canais (nomes de banda p/ casar com o áudio depois) ----
  const NAMES=["Kick","Snare","Hi-Hat","OH L","OH R","Bass","Gtr L","Gtr R","Keys L","Keys R","Lead Voc","Voc 2","Sax","Trumpet","Perc","Playback","Amb L","Amb R","Talk","Click","Spare 1","Spare 2","Spare 3","Spare 4"];
  const COLS=["#ff4d4d","#f97316","#f5a623","#eab308","#84cc16","#39d353","#14b8a6","#00b3d7","#3b82f6","#6366f1","#a855f7","#ec4899","#f43f5e","#fb7185","#22d3ee","#4ade80","#60a5fa","#818cf8","#c084fc","#f472b6","#94a3b8","#94a3b8","#94a3b8","#94a3b8"];
  const CH=NAMES.map((nm,i)=>({i,nm,color:COLS[i],trim:28,hpfOn:i>3,hpf:100,gateOn:false,gate:-40,comp:false,compThr:-22,pol:false,pan:0,
    peq:[{f:120,g:0,q:1,type:"lowshelf"},{f:450,g:0,q:1.2,type:"peaking"},{f:2500,g:0,q:1.2,type:"peaking"},{f:8000,g:0,q:1,type:"highshelf"}],
    fader:70,pafl:false,mute:false}));
  const MASTER={fader:78};
  let sel=10; // Lead Voc
  const LAYERS=[{k:"a",label:"Ch 1–12",range:[0,12]},{k:"b",label:"Ch 13–24",range:[12,24]},{k:"mix",label:"Mixes"},{k:"fx",label:"FX"},{k:"dca",label:"DCA"},{k:"midi",label:"MIDI"}];
  let layer="a";

  // ---- SuperStrip encoders ----
  const ENC=[
    {k:"trim",label:"TRIM",cls:"",min:-5,max:60,fmt:v=>Math.round(v)},
    {k:"hpf",label:"HPF",cls:"",min:20,max:400,log:true,fmt:v=>Math.round(v)+""},
    {k:"peq0",label:"LF",cls:"eq",min:-15,max:15,fmt:v=>(v>0?"+":"")+Math.round(v)},
    {k:"peq1",label:"LM",cls:"eq",min:-15,max:15,fmt:v=>(v>0?"+":"")+Math.round(v)},
    {k:"peq2",label:"HM",cls:"eq",min:-15,max:15,fmt:v=>(v>0?"+":"")+Math.round(v)},
    {k:"peq3",label:"HF",cls:"eq",min:-15,max:15,fmt:v=>(v>0?"+":"")+Math.round(v)},
    {k:"gate",label:"GATE",cls:"dyn",min:-70,max:0,fmt:v=>Math.round(v)},
    {k:"comp",label:"COMP",cls:"dyn",min:-40,max:0,fmt:v=>Math.round(v)},
    {k:"pan",label:"PAN",cls:"",min:-63,max:63,fmt:v=>Math.abs(v)<2?"C":(v<0?"L":"R")+Math.round(Math.abs(v))},
    {k:"dly",label:"DELAY",cls:"",min:0,max:200,fmt:v=>Math.round(v)+"ms"},
  ];
  function encVal(c,k){return {trim:c.trim,hpf:c.hpf,peq0:c.peq[0].g,peq1:c.peq[1].g,peq2:c.peq[2].g,peq3:c.peq[3].g,gate:c.gate,comp:c.compThr,pan:c.pan,dly:c.dly||0}[k];}
  function encSet(c,k,v){if(k==="trim")c.trim=v;else if(k==="hpf")c.hpf=Math.round(v);else if(k.startsWith("peq"))c.peq[+k.slice(3)].g=v;else if(k==="gate")c.gate=Math.round(v);else if(k==="comp")c.compThr=Math.round(v);else if(k==="pan")c.pan=Math.round(v);else if(k==="dly")c.dly=Math.round(v);}
  function encRot(e,v){let t;if(e.log){t=(Math.log(v)-Math.log(e.min))/(Math.log(e.max)-Math.log(e.min));}else t=(v-e.min)/(e.max-e.min);return -140+t*280;}

  // ---- SOFTKEYS ----
  const SK=[["Mute Bat","mg0"],["Mute Voz","mg1"],["Mute FX","mg2"],["Mute All","mgA"],["Scene ◀","scL"],["Scene ▶","scR"],["Store","st"],["Tap","tap"],
            ["PAFL Clr","pc"],["Copy","cp"],["Paste","ps"],["Reset","rs"],["Talk","tk"],["FX Mute","fx"],["View","vw"],["Home","hm"]];
  const skState={};

  // ---------- RENDER ----------
  function renderLayers(){const el=$("layers");el.innerHTML="";LAYERS.forEach(l=>{const b=document.createElement("button");b.className="lyr"+(l.k===layer?" on":"");b.textContent=l.label;b.onclick=()=>{layer=l.k;renderLayers();renderBay();};el.appendChild(b);});}
  function bayChannels(){const l=LAYERS.find(x=>x.k===layer);if(l&&l.range)return CH.slice(l.range[0],l.range[1]);
    // camadas não-input: mostra rótulos genéricos reaproveitando a área
    return CH.slice(0,12).map((c,i)=>({...c,nm:(layer==="mix"?"Mix "+(i+1):layer==="fx"?"FX "+(i+1):layer==="dca"?"DCA "+(i+1):"MIDI "+(i+1)),ghost:true,i:c.i}));}
  function renderBay(){
    const bay=$("bay");bay.innerHTML="";
    bayChannels().forEach(c=>{
      const d=document.createElement("div");d.className="strip"+(c.i===sel&&!c.ghost?" sel":"");d.dataset.i=c.i;
      d.innerHTML=`<div class="cn" style="background:${c.color}">${c.nm}</div><div class="cnum">CH ${c.i+1}</div>
        <button class="selbtn ${c.i===sel&&!c.ghost?'on':''}" data-sel="${c.i}">SEL</button>
        <div class="fw"><div class="mtr"><i id="m-${c.i}"></i></div><div class="fdr" data-f="${c.i}"><div class="u"></div><div class="cap" id="cap-${c.i}"></div></div></div>
        <div class="fdb" id="fdb-${c.i}">${c.fader}</div>
        <div class="row2"><button class="kb pafl ${c.pafl?'on':''}" data-pafl="${c.i}">PAFL</button><button class="kb mute ${c.mute?'on':''}" data-mute="${c.i}">MUTE</button></div>`;
      bay.appendChild(d);
    });
    // master
    const m=document.createElement("div");m.className="strip master";
    m.innerHTML=`<div class="cn" style="background:var(--amber)">LR MAIN</div><div class="cnum">MASTER</div><div class="selbtn">SEL</div>
      <div class="fw"><div class="mtr"><i id="m-main"></i></div><div class="fdr" data-master="1"><div class="u"></div><div class="cap" id="cap-main"></div></div></div>
      <div class="fdb" id="fdb-main">${MASTER.fader}</div><div class="row2"><button class="kb pafl">PAFL</button></div>`;
    bay.appendChild(m);
    placeCaps();
  }
  function placeCaps(){bayChannels().forEach(c=>{const cap=$("cap-"+c.i);if(cap)cap.style.bottom="calc("+c.fader+"% - 8px)";});const cm=$("cap-main");if(cm)cm.style.bottom="calc("+MASTER.fader+"% - 8px)";}
  // Delegação (Pointer Events) na fader bay — registrada UMA vez, sem vazamento a cada renderBay().
  let bayFaderDrag=null;
  function bayFaderSet(f,clientY){const r=f.getBoundingClientRect(),v=Math.round(clamp(1-(clientY-r.top)/r.height,0,1)*100);
    if(f.dataset.master){MASTER.fader=v;$("fdb-main").textContent=v;$("cap-main").style.bottom="calc("+v+"% - 8px)";}
    else{const c=CH[+f.dataset.f];c.fader=v;$("fdb-"+c.i).textContent=v;$("cap-"+c.i).style.bottom="calc("+v+"% - 8px)";}check();}
  function setupBay(){const bay=$("bay");
    bay.addEventListener("pointerdown",e=>{const f=e.target.closest(".fdr");if(f){bayFaderDrag=f;bay.setPointerCapture(e.pointerId);bayFaderSet(f,e.clientY);e.preventDefault();}});
    bay.addEventListener("pointermove",e=>{if(bayFaderDrag){bayFaderSet(bayFaderDrag,e.clientY);e.preventDefault();}});
    const end=()=>bayFaderDrag=null;bay.addEventListener("pointerup",end);bay.addEventListener("pointercancel",end);
    bay.addEventListener("click",e=>{
      const s=e.target.closest("[data-sel]");if(s){sel=+s.dataset.sel;renderBay();renderStrip();drawEQ();return;}
      const p=e.target.closest("[data-pafl]");if(p){const c=CH[+p.dataset.pafl];c.pafl=!c.pafl;p.classList.toggle("on",c.pafl);return;}
      const m=e.target.closest("[data-mute]");if(m){const c=CH[+m.dataset.mute];c.mute=!c.mute;m.classList.toggle("on",c.mute);check();return;}
    });}

  function renderStrip(){
    const c=CH[sel];$("scrChip").style.background=c.color;$("scrName").textContent=c.nm+"  ·  CH "+(c.i+1);
    const g=$("ssgrid");g.innerHTML="";
    ENC.forEach(e=>{const el=document.createElement("div");el.className="enc";
      el.innerHTML=`<div class="dial ${e.cls}" data-k="${e.k}"></div><div class="el">${e.label}</div><div class="ev" id="ev-${e.k}"></div>`;g.appendChild(el);});
    ENC.forEach(e=>{const d=g.querySelector('.dial[data-k="'+e.k+'"]');d.style.setProperty("--rot",encRot(e,clamp(encVal(c,e.k),e.min,e.max))+"deg");$("ev-"+e.k).textContent=e.fmt(encVal(c,e.k));});
    $("bPol").classList.toggle("on",c.pol);$("bHpf").classList.toggle("on",c.hpfOn);$("bGate").classList.toggle("on",c.gateOn);$("bComp").classList.toggle("on",c.comp);
  }
  // Delegação (Pointer Events) nos encoders do SuperStrip — registrada UMA vez, sem vazamento a cada renderStrip().
  let strEncDrag=null,strLastY=0;
  function setupStrip(){const g=$("ssgrid");
    g.addEventListener("pointerdown",e=>{const d=e.target.closest(".dial");if(!d)return;const en=ENC.find(x=>x.k===d.dataset.k);if(!en)return;
      strEncDrag={el:d,k:d.dataset.k,e:en};strLastY=e.clientY;g.setPointerCapture(e.pointerId);e.preventDefault();});
    g.addEventListener("pointermove",e=>{if(!strEncDrag)return;const dy=strLastY-e.clientY;strLastY=e.clientY;const c=CH[sel],en=strEncDrag.e,k=strEncDrag.k;
      encSet(c,k,clamp(encVal(c,k)+dy*(en.max-en.min)/150,en.min,en.max));strEncDrag.el.style.setProperty("--rot",encRot(en,encVal(c,k))+"deg");
      const ev=$("ev-"+k);if(ev)ev.textContent=en.fmt(encVal(c,k));drawEQ();check();e.preventDefault();});
    const end=()=>strEncDrag=null;g.addEventListener("pointerup",end);g.addEventListener("pointercancel",end);}
  $("bPol").onclick=()=>{CH[sel].pol=!CH[sel].pol;$("bPol").classList.toggle("on",CH[sel].pol);};
  $("bHpf").onclick=()=>{CH[sel].hpfOn=!CH[sel].hpfOn;$("bHpf").classList.toggle("on",CH[sel].hpfOn);drawEQ();check();};
  $("bGate").onclick=()=>{CH[sel].gateOn=!CH[sel].gateOn;$("bGate").classList.toggle("on",CH[sel].gateOn);check();};
  $("bComp").onclick=()=>{CH[sel].comp=!CH[sel].comp;$("bComp").classList.toggle("on",CH[sel].comp);check();};

  // ---- SoftKeys ----
  function renderSK(){const g=$("skgrid");g.innerHTML="";SK.forEach(([lbl,k])=>{const b=document.createElement("button");b.className="sk"+(skState[k]?" on":"");if(skState[k])b.style.background=k.startsWith("mg")?"#ff4d4d":"#00b3d7";b.textContent=lbl;
    b.onclick=()=>{skState[k]=!skState[k];if(k==="tap")skState[k]=false;renderSK();if(k.startsWith("mg"))toast("Mute group: "+lbl);check();};g.appendChild(b);});}

  // ---- EQ screen (PEQ 4 bandas) ----
  const cv=$("eq"),cx=cv.getContext("2d");
  const fx=f=>{const mn=Math.log10(20),mx=Math.log10(20000);return (Math.log10(f)-mn)/(mx-mn);};
  const xf=(x,w)=>{const mn=Math.log10(20),mx=Math.log10(20000);return Math.pow(10,mn+(x/w)*(mx-mn));};
  // resposta aproximada (sem AudioContext): soma de sinos/shelves
  function bandDb(b,f){const rt=f/b.f;if(b.type==="peaking"){const bw=b.g/(1+Math.pow((Math.log2(Math.max(0.001,rt)))*b.q*2,2));return bw;}
    if(b.type==="lowshelf")return b.g/(1+Math.pow(f/b.f,2));return b.g/(1+Math.pow(b.f/f,2));}
  let handles=[];
  // Redraw coalescing (iPad): dragging an EQ handle / gate / comp encoder fires many pointermove
  // events; each drawEQ() reallocates and repaints the canvas. Doing that per event starves the
  // main thread on iPad so controls lag. drawEQ() now coalesces to one repaint per animation frame
  // (rAF), with a setTimeout safety-net in case requestAnimationFrame is throttled.
  let _eqReq=0,_eqTo=0;
  function _flushEQ(){ if(_eqReq){cancelAnimationFrame(_eqReq);_eqReq=0;} if(_eqTo){clearTimeout(_eqTo);_eqTo=0;} renderEQ(); }
  function drawEQ(){ if(_eqReq||_eqTo)return; _eqReq=requestAnimationFrame(_flushEQ); _eqTo=setTimeout(_flushEQ,60); }
  function renderEQ(){const c=CH[sel];const rr=cv.getBoundingClientRect();const w=rr.width,h=rr.height;if(w<2)return;cv.width=w*2;cv.height=h*2;cx.setTransform(2,0,0,2,0,0);cx.clearRect(0,0,w,h);
    cx.strokeStyle="#12202e";cx.fillStyle="#3a4a5e";cx.font="8px system-ui";cx.textAlign="center";[100,1000,10000].forEach(f=>{const x=fx(f)*w;cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,h);cx.stroke();cx.fillText(f>=1000?f/1000+"k":f,x,h-1);});
    for(let d=-12;d<=12;d+=6){const y=h/2-d/16*h/2;cx.strokeStyle=d===0?"#243447":"#101c28";cx.beginPath();cx.moveTo(0,y);cx.lineTo(w,y);cx.stroke();}
    cx.beginPath();for(let px=0;px<=w;px+=2){const f=xf(px,w);let db=0;if(c.hpfOn&&f<c.hpf)db+=-24*Math.log10(c.hpf/f);c.peq.forEach(b=>db+=bandDb(b,f));const y=h/2-clamp(db,-14,14)/16*h/2;px?cx.lineTo(px,y):cx.moveTo(px,y);}
    cx.strokeStyle=c.color;cx.lineWidth=2;cx.stroke();cx.lineTo(w,h/2);cx.lineTo(0,h/2);cx.closePath();cx.fillStyle=c.color+"18";cx.fill();
    handles=[];const HN=["LF","LM","HM","HF"];const HC=["#f5a623","#f5a623","#f5a623","#f5a623"];
    c.peq.forEach((b,i)=>{const x=fx(b.f)*w,y=h/2-clamp(b.g,-14,14)/16*h/2;cx.fillStyle=HC[i];cx.beginPath();cx.arc(x,y,6,0,7);cx.fill();cx.fillStyle="#04121a";cx.font="700 7px system-ui";cx.fillText(HN[i],x,y+2);handles.push({x,y,i,w,h});});}
  let drag=null;
  const pos=e=>{const r=cv.getBoundingClientRect();return{x:e.clientX-r.left,y:e.clientY-r.top};};
  // Alças do EQ via Pointer Events + pointer capture (mouse + toque unificados).
  cv.addEventListener("pointerdown",e=>{const p=pos(e);for(const h of handles){if(Math.hypot(p.x-h.x,p.y-h.y)<14){drag=h;cv.setPointerCapture(e.pointerId);e.preventDefault();return;}}});
  cv.addEventListener("pointermove",e=>{if(!drag)return;const c=CH[sel],b=c.peq[drag.i],p=pos(e);b.f=clamp(xf(clamp(p.x,0,drag.w),drag.w),20,20000);b.g=clamp((drag.h/2-p.y)/(drag.h/2)*16,-15,15);
    renderStrip();drawEQ();check();e.preventDefault();});
  const eqEnd=()=>drag=null;cv.addEventListener("pointerup",eqEnd);cv.addEventListener("pointercancel",eqEnd);

  // meters (placeholder até stems)
  let t=0;function loop(){t+=0.05;bayChannels().forEach(c=>{const el=$("m-"+c.i);if(el){const base=c.mute?0:(c.fader/100)*(0.4+0.4*Math.abs(Math.sin(t*1.3+c.i)));el.style.height=clamp(base*120,0,100)+"%";}});
    const mm=$("m-main");if(mm){let s=0;CH.forEach(c=>{if(!c.mute)s+=c.fader/100;});mm.style.height=clamp(s/CH.length*(MASTER.fader/100)*160,0,100)+"%";}requestAnimationFrame(loop);}

  // missões
  const M=[
    {t:'Selecione o <b>Lead Voc</b> (aperte SEL no canal) e ligue o <b>HPF</b> no SuperStrip.',ok:()=>sel===10&&CH[10].hpfOn},
    {t:'Na tela, dê <b>brilho na voz</b>: arraste a banda <b>HF</b> para cima (+3 ou mais).',ok:()=>CH[10].peq[3].g>=3},
    {t:'Ligue o <b>COMP</b> do Lead Voc (botão COMP) e ajuste o threshold para ~−18.',ok:()=>CH[10].comp&&Math.abs(CH[10].compThr+18)<=5},
    {t:'Troque para a camada <b>Ch 13–24</b> e volte — entenda as <b>camadas</b> de fader.',ok:()=>window.__usedLayerB===true},
    {t:'Use uma <b>SoftKey de Mute</b> (ex.: Mute Voz) e veja o LED acender.',ok:()=>Object.keys(skState).some(k=>k.startsWith("mg")&&skState[k])},
  ];
  let mi=0;
  function paintM(){const idx=$("mIdx"),txt=$("mTxt");if(mi>=M.length){idx.textContent="🎓";txt.innerHTML="<b>Boa!</b> Você operou a A&H SQ: SEL, SuperStrip, EQ na tela, dinâmica, camadas e SoftKeys. Com os stems, você mixa ouvindo.";$("mSkip").style.display="none";return;}idx.textContent="MISSÃO "+(mi+1)+"/"+M.length;txt.innerHTML=M[mi].t;}
  function check(){if(layer==="b")window.__usedLayerB=true;if(mi>=M.length)return;try{if(M[mi].ok()){mi++;toast(mi>=M.length?"Console dominado! 🎓":"✔");paintM();}}catch(e){}}
  let tt;function toast(m){const el=$("toast");el.innerHTML=m;el.classList.add("show");clearTimeout(tt);tt=setTimeout(()=>el.classList.remove("show"),1500);}
  $("mSkip").onclick=()=>{if(mi<M.length){mi++;paintM();}};

  setupBay();setupStrip();
  renderLayers();renderBay();renderStrip();renderSK();drawEQ();paintM();requestAnimationFrame(loop);

  // ---- FIT: escala o console para caber na tela (fullscreen e embed) ----
  function fitConsole(){
    const el=document.querySelector(".fit"); if(!el) return;
    const vw=window.innerWidth, vh=window.innerHeight;
    if(vw<760){ el.style.width="100%"; el.style.zoom=""; document.body.style.justifyContent="flex-start"; }
    else{
      el.style.width="1400px"; el.style.zoom="";
      const DW=el.offsetWidth, DH=el.offsetHeight;
      // Em fullscreen o iframe 16:9 do player fica MAIS ALTO que a tela real. Usamos screen.height
      // (altura real), não window.innerHeight (altura inflada do iframe), e alinhamos ao topo.
      const scrH=(window.screen&&screen.height)||vh;
      const iframeTaller=vh>scrH+8;
      const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6);
      const effVh=Math.max(240, visH-headerAllow);
      document.body.style.justifyContent=(iframeTaller||vh>700)?"flex-start":"center";
      let s=Math.min((vw-18)/DW, effVh/DH); s=Math.max(0.4, Math.min(s, 2.2));
      el.style.zoom=s;
    }
    try{ drawEQ(); }catch(e){}
  }
  window.addEventListener("resize", fitConsole);
  setTimeout(fitConsole, 50);
})();
</script>
