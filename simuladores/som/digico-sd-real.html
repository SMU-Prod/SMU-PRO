<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>DiGiCo Quantum 338 — Simulador fiel (SMU)</title>
<style>
  :root{
    --ink:#e7ecf5; --muted:#93a3ba; --amber:#22a8c0; --green:#3ad07a; --red:#e0483f; --cyan:#39c0e6;
    --brand:#e2231a; /* DiGiCo logo red */
    /* screen (touchscreen) DiGiCo charcoal palette */
    --scr:#15181d;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%,#1a1d22,#0a0b0d 60%),#08090b;
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; overflow:hidden;
    display:flex; align-items:flex-start; justify-content:center;
  }
  /* ===== CONSOLE: fixed design, scaled to fit ===== */
  .console{position:relative;width:1520px;height:940px;flex:0 0 auto;transform-origin:top center;
    display:flex;flex-direction:column;gap:8px;padding:12px;
    background:
      linear-gradient(180deg,#2a2c30,#1c1e21 8%,#161719 60%,#111214);
    border:1px solid #050506;border-radius:16px;
    box-shadow:0 30px 80px #000a, inset 0 1px 0 #ffffff10, inset 0 -2px 0 #0008;}
  .console::before{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(180deg,#ffffff08,transparent 6%);}

  /* utility/top bar (play + song + missions) */
  .util{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:linear-gradient(180deg,#202329,#15171b);border:1px solid #0c0d0f;border-radius:10px;padding:6px 10px}
  .util .brand{display:flex;align-items:center;gap:9px;margin-right:4px}
  .util .brand b{font-size:17px;letter-spacing:1px;color:#eef2f8}
  .util .brand .m{font-size:10px;letter-spacing:2px;color:#8a94a4;text-transform:uppercase}
  .util .brand .y{color:var(--brand);font-weight:900;letter-spacing:0px}
  /* DiGiCo Quantum logo plate */
  .util .brand .dgclogo{background:linear-gradient(180deg,#101418,#05070a);border:1px solid #2a5560;color:#eef4f6;
    font-weight:800;font-size:13px;letter-spacing:.3px;padding:4px 10px;border-radius:5px;white-space:nowrap;
    box-shadow:0 1px 3px #000a, inset 0 1px 0 #ffffff12}
  .util .brand .dgclogo b{color:var(--amber);font-size:13px;font-weight:800}
  .util .brand .model{font-size:15px;font-weight:800;color:#eef2f8;letter-spacing:1.5px}
  .pill{font-size:10.5px;color:var(--muted);background:#0c0e12;border:1px solid #2a2f37;border-radius:16px;padding:4px 9px;display:flex;align-items:center;gap:6px;letter-spacing:.4px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.warn{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .btnp{font:inherit;font-size:11.5px;font-weight:700;border:0;border-radius:8px;padding:7px 12px;cursor:pointer}
  .spacer{flex:1}
  select.pill{cursor:pointer;color:var(--ink);font:inherit;font-size:11px;max-width:210px}
  .mission{display:flex;align-items:center;gap:9px;background:#0c0e12;border:1px solid #2a2f37;border-radius:9px;padding:5px 10px;flex:1 1 320px;min-width:0}
  .mission .idx{font-size:10px;color:var(--amber);font-weight:800;letter-spacing:1px;white-space:nowrap}
  .mission .txt{font-size:11px;line-height:1.25;min-width:0}
  .mission .txt small{color:var(--muted)}
  .mission .txt b{color:#fff}
  .ghost{background:transparent;color:var(--muted);border:1px solid #2a2f37}

  /* meter bridge */
  .bridge{background:linear-gradient(180deg,#101216,#0a0b0d);border:1px solid #0b0c0e;border-radius:10px;padding:6px 10px 4px;
    box-shadow:inset 0 2px 6px #000a}
  #mbridge{display:block;width:100%;height:58px}

  /* ===== BACK (angled) SECTION: selected-channel | screen | right rack ===== */
  .back{display:grid;grid-template-columns:342px 1fr 300px;gap:10px;min-height:0}
  .panel{background:linear-gradient(180deg,#2b2e34,#212429 30%,#191b1f);border:1px solid #0c0d0f;border-radius:12px;
    box-shadow:inset 0 1px 0 #ffffff0c, inset 0 -2px 4px #0006, 0 4px 12px #0006;padding:10px}
  .sect-title{font-size:9px;letter-spacing:2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin:0 0 7px}
  .sect-title b{color:var(--amber)}

  /* Selected Channel physical knobs */
  .selhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .selhead .cc{width:9px;height:30px;border-radius:3px;background:var(--amber);box-shadow:0 0 6px #0006}
  .selhead .nm{font-size:15px;font-weight:800;line-height:1.05;color:#f0f4fa}
  .selhead .nn{font-size:9.5px;color:var(--muted);letter-spacing:.6px}
  .knobrow{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap}
  .kwrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:52px}
  .klbl{font-size:8px;letter-spacing:.4px;color:#93a0b2;text-transform:uppercase;text-align:center;line-height:1.05}
  .kval{font-size:9.5px;font-weight:700;color:#e9eef6}
  /* physical knob with LED collar */
  .pk{--sz:36px;width:var(--sz);height:var(--sz);position:relative;touch-action:none;cursor:ns-resize}
  .pk .ring{position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(from 215deg, var(--led,#6cf) calc(var(--p,0)*270deg), #0d0f13 0 270deg, #17191e 0);
    -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px));
            mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px))}
  .pk .cap{position:absolute;inset:2px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%,#565b64,#2b2e34 62%,#202329);
    border:1px solid #121317;box-shadow:inset 0 2px 4px #0009, 0 1px 1px #ffffff10}
  .pk .cap::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:2px;background:#eef2f8;
    box-shadow:0 0 3px #fff8;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) translateY(calc(var(--sz)*-0.30))}
  .pk.sm{--sz:30px}
  /* small square panel buttons */
  .pbtn{font:inherit;font-size:8.5px;font-weight:700;letter-spacing:.4px;color:#b9c6d8;text-align:center;cursor:pointer;
    background:linear-gradient(180deg,#3a3f47,#23262c);border:1px solid #12141a;border-radius:5px;padding:5px 3px;
    box-shadow:inset 0 1px 0 #ffffff12, 0 1px 2px #0007;min-width:0}
  .pbtn:active{transform:translateY(1px)}
  .pbtn.lit{color:#0b0f14;background:linear-gradient(180deg,#63d6e8,#22a8c0);border-color:#0b5561;box-shadow:0 0 8px #22a8c088}
  .pbtn.green.lit{background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33;box-shadow:0 0 8px #22b86688}
  .pbtn.red.lit{background:linear-gradient(180deg,#ff9a92,#e0483f);border-color:#7a1611;box-shadow:0 0 8px #e0483f88}
  .pbtn.nav{border-color:#2a3550}
  .pbtn.nav.on{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 8px #39c0e688}
  .brow{display:flex;gap:4px}
  .eqbands{display:flex;gap:4px;margin-top:8px}
  .eqband{flex:1;background:#191b20;border:1px solid #0c0d10;border-radius:7px;padding:5px 3px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .eqband .bt{font-size:8px;font-weight:800;letter-spacing:.5px;padding:2px 0;width:100%;text-align:center;border-radius:3px;color:#0b0f14}

  /* SCREEN column */
  .screencol{display:flex;flex-direction:column;min-height:0;padding:8px}
  .tabs{display:flex;gap:4px;margin-bottom:7px;flex-wrap:wrap}
  .tab{font:inherit;font-size:10px;font-weight:600;letter-spacing:.3px;color:#a9b6c8;cursor:pointer;
    background:linear-gradient(180deg,#2f3views,#22252b);background:linear-gradient(180deg,#2f333b,#22252b);
    border:1px solid #12141a;border-radius:6px;padding:5px 9px;box-shadow:inset 0 1px 0 #ffffff10}
  .tab.active{color:#0b0f14;background:linear-gradient(180deg,#63d6e8,#22a8c0);border-color:#0b5561;font-weight:800}
  .tab.sof{margin-left:auto}
  .tab.sof.active{background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;color:#04121a}
  .screen-bezel{flex:1;min-height:0;border-radius:10px;padding:8px;background:linear-gradient(180deg,#101216,#050607);
    border:1px solid #000;box-shadow:inset 0 3px 12px #000c, 0 0 0 2px #2a2d33}
  #screen{display:block;width:100%;height:100%;border-radius:6px;background:var(--scr);touch-action:none}

  /* RIGHT RACK: user knobs / scene / user keys / monitor */
  .rack{display:flex;flex-direction:column;gap:8px;min-height:0}
  .rk{background:linear-gradient(180deg,#2b2e34,#1e2126);border:1px solid #0c0d0f;border-radius:10px;padding:8px 9px;
    box-shadow:inset 0 1px 0 #ffffff0c,0 3px 8px #0005}
  .udk{display:flex;justify-content:space-between;gap:6px}
  .udk .kwrap{width:auto;flex:1}
  .scene{display:flex;gap:9px;align-items:center}
  .scenum{background:#07130c;border:1px solid #1c3a26;border-radius:7px;padding:5px 10px;min-width:96px;text-align:center;
    box-shadow:inset 0 2px 6px #000}
  .scenum .n{font-family:"DS-Digital","Courier New",monospace;font-size:26px;font-weight:800;color:#37e08a;letter-spacing:2px;line-height:1;text-shadow:0 0 8px #37e08a66}
  .scenum .l{font-size:8px;color:#5f8a72;letter-spacing:1px}
  .scbtns{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
  .ukeys{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .ukey{font:inherit;font-size:8px;font-weight:700;color:#cdd8e6;text-align:center;cursor:pointer;line-height:1.1;
    background:linear-gradient(180deg,#3a3f47,#23262c);border:1px solid #12141a;border-radius:6px;padding:8px 2px;
    box-shadow:inset 0 1px 0 #ffffff12,0 1px 2px #0007;min-height:34px;display:flex;align-items:center;justify-content:center}
  .ukey .num{position:absolute}
  .ukey.on{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 7px #39c0e666}
  .monrow{display:flex;align-items:center;gap:10px}

  /* ===== FRONT SECTION: fader bay ===== */
  .front{background:linear-gradient(180deg,#232629,#191b1f);border:1px solid #0c0d0f;border-radius:12px;padding:8px;
    box-shadow:inset 0 1px 0 #ffffff0a, 0 6px 16px #0006}
  .bay{display:flex;gap:6px;align-items:stretch}
  .block{display:flex;flex-direction:column;gap:5px;min-width:0}
  .block .bhead{display:flex;gap:4px;align-items:center;flex-wrap:wrap;min-height:20px}
  .block .btitle{font-size:8.5px;letter-spacing:1.2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin-right:2px}
  .bkey{font:inherit;font-size:8px;font-weight:700;color:#b9c6d8;cursor:pointer;
    background:linear-gradient(180deg,#33373f,#212429);border:1px solid #12141a;border-radius:5px;padding:3px 6px}
  .bkey.on{color:#0b0f14;background:linear-gradient(180deg,#63d6e8,#22a8c0);border-color:#0b5561}
  .strips{display:flex;gap:4px;flex:1}
  .vsep{width:2px;align-self:stretch;background:linear-gradient(180deg,#0a0b0d,#33373f,#0a0b0d);border-radius:2px;margin:0 3px}

  .strip{width:42px;flex:0 0 auto;background:linear-gradient(180deg,#1b1d22,#141519);border:1px solid #0b0c0e;border-radius:7px;
    padding:4px 3px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:inset 0 1px 0 #ffffff08}
  .strip.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber) inset,0 0 8px #22a8c044}
  .strip .knob-s{margin-top:1px}
  /* DiGiCo signature: tall per-channel TFT display above each fader */
  .lcd{width:100%;height:40px;border-radius:5px;position:relative;overflow:hidden;border:1px solid #000;
    box-shadow:inset 0 2px 5px #0009, 0 1px 0 #ffffff10;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px}
  .lcd::after{content:"";position:absolute;left:0;right:0;top:0;height:46%;background:linear-gradient(180deg,#ffffff38,#ffffff00);pointer-events:none}
  .lcd .cn{font-size:9px;font-weight:800;line-height:1.05;color:#0b0f14;text-align:center;padding:0 3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;position:relative;z-index:1}
  .lcd .cnum{font-size:7px;font-weight:800;color:#0b0f14bb;line-height:1;letter-spacing:.5px;position:relative;z-index:1}
  .sbtn{width:100%;font:inherit;font-size:8px;font-weight:800;letter-spacing:.3px;color:#93a0b2;cursor:pointer;text-align:center;
    background:linear-gradient(180deg,#2b2f37,#1c1f25);border:1px solid #0b0c0e;border-radius:4px;padding:3px 0}
  .row2{display:flex;gap:3px;width:100%}
  .sbtn.sel.act{color:#0b0f14;background:linear-gradient(180deg,#63d6e8,#22a8c0);border-color:#0b5561}
  .sbtn.cue.act{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70}
  .sbtn.on.act{color:#0b0f14;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33}
  .fzone{display:flex;gap:4px;flex:1;width:100%;justify-content:center;min-height:150px}
  .meter{width:6px;border-radius:2px;background:#05070a;position:relative;overflow:hidden;border:1px solid #14171d}
  .meter i{position:absolute;left:0;right:0;bottom:0;height:0;background:linear-gradient(0deg,#37c86a,#37c86a 62%,#e8c33a 84%,#e0483f);transition:height .05s linear}
  .fader{width:22px;flex:0 0 auto;position:relative;background:linear-gradient(90deg,#0a0b0d,#141519,#0a0b0d);border-radius:4px;border:1px solid #0b0c0e;cursor:ns-resize;touch-action:none}
  .fader .trk{position:absolute;left:50%;top:8px;bottom:8px;width:2px;transform:translateX(-50%);background:#000}
  .fader .u{position:absolute;left:2px;right:2px;height:1px;background:#39414f}
  .cap{position:absolute;left:-4px;right:-4px;height:20px;border-radius:3px;cursor:grab;
    background:linear-gradient(180deg,#20232a,#0e0f12 48%,#050506 52%,#16181d);border:1px solid #000;box-shadow:0 2px 4px #000a,inset 0 1px 0 #ffffff14}
  .cap::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#c9d2e0;border-radius:1px}
  .db{font-size:8px;font-weight:700;color:#c9d2e0;letter-spacing:.2px}
  .db small{color:#7f8b9c;font-weight:600}
  .strip.master .lcd{background:#2a1e06}
  .strip.master .lcd .cn{color:#63d6e8}

  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px);
    background:#12151a;border:1px solid var(--amber);color:var(--ink);padding:10px 16px;border-radius:10px;
    font-size:12.5px;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 8px 30px #000a}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--amber)}
  .console:not(.stacked){touch-action:none}
  body:not(.stacked){touch-action:none}
  /* stacked (phone) */
  .console.stacked{width:100%;max-width:100vw;height:auto;transform:none!important;touch-action:auto;overflow-x:hidden}
  .console.stacked .back{grid-template-columns:1fr}
  .console.stacked .strip{width:38px}
  body.stacked{overflow:auto}

  /* ===================================================================
     DiGiCo Quantum 338 WORKSURFACE — three big multitouch screens on top,
     a 12-fader bank directly beneath each, master/control section at right.
     =================================================================== */
  .worksurface{flex:1;min-height:0;display:grid;
    grid-template-columns:minmax(0,1fr) minmax(0,1fr) minmax(0,1fr);
    grid-template-rows:minmax(0,1fr) 224px 174px;gap:8px;}
  /* three EQUAL screens spanning the whole top edge */
  .scrpanel{display:flex;flex-direction:column;min-height:0;gap:6px;
    background:linear-gradient(180deg,#22252b,#15171b);border:1px solid #0a0b0d;border-radius:12px;padding:8px;
    box-shadow:inset 0 1px 0 #ffffff0c,0 5px 14px #0007}
  .scrL{grid-column:1;grid-row:1} .scrC{grid-column:2;grid-row:1} .scrR{grid-column:3;grid-row:1}
  /* fixed-height header so all three canvas bezels are identical size */
  .scrhd{display:flex;align-items:center;gap:8px;height:24px;min-height:24px}
  .scrhd .st{font-size:9px;letter-spacing:1.6px;color:#8b95a4;text-transform:uppercase;font-weight:800}
  .scrhd .st b{color:var(--amber)}
  .scrhd .sp{flex:1}
  .scrhd .tftdot{width:7px;height:7px;border-radius:50%;background:#2fbf86;box-shadow:0 0 6px #2fbf86}
  .canvas-bz{flex:1;min-height:0;border-radius:8px;padding:6px;
    background:linear-gradient(180deg,#0e1014,#050607);border:1px solid #000;
    box-shadow:inset 0 3px 12px #000c,0 0 0 2px #2a2d33}
  .canvas-bz canvas{display:block;width:100%;height:100%;border-radius:6px;background:var(--scr);touch-action:none}
  /* soft-tab strip (DiGiCo touch menu) lives in the centre screen header — one scrollable row */
  .scrC .tabs{margin:0;height:24px;min-height:24px;flex-wrap:nowrap;overflow-x:auto;overflow-y:hidden;align-items:center;gap:3px}
  .scrC .tabs::-webkit-scrollbar{height:0}
  .scrC .tab{flex:0 0 auto;padding:3px 7px;font-size:9px}
  .scrC .tab.sof{margin-left:4px}
  /* MASTER / CONTROL footer strip spans all three columns beneath the fader banks */
  .mfooter{grid-column:1 / span 3;grid-row:3;display:flex;gap:8px;align-items:stretch;min-height:0}
  .mfooter .rk{flex:0 0 auto;display:flex;flex-direction:column;gap:6px}
  .mfooter .rk.masters-rk{flex:0 0 auto}
  .mfooter .rk.macros{flex:1 1 auto;min-width:0}
  .mfooter .sect-title{margin:0 0 4px}
  .mfooter .scene{flex-direction:column;align-items:stretch;gap:6px}
  .mfooter .scbtns{grid-template-columns:1fr 1fr 1fr}
  .mfooter .ukeys{grid-template-columns:repeat(8,1fr)}
  .mstrips{display:flex;gap:8px;justify-content:flex-start}
  .mstrips .strip{width:50px}
  .mstrips .strip .lcd{height:22px}
  .mstrips .strip .knob-s{--sz:18px}
  .mstrips .fzone{min-height:34px}
  .mfooter .udk{gap:8px}
  .mfooter .masters-rk .mainrow{display:flex;gap:8px;align-items:flex-start}
  .mfooter .selchip{padding:5px 8px;align-self:stretch}
  .mfooter .selchip .cc{height:22px}
  .mfooter .scenum{min-width:78px;padding:4px 8px}
  .mfooter .scenum .n{font-size:20px}
  .mfooter .ukey{min-height:26px;padding:5px 2px}

  /* FADER BANKS beneath the screens */
  .fbank{display:flex;flex-direction:column;gap:5px;min-height:0;
    background:linear-gradient(180deg,#202225,#161719);border:1px solid #0a0b0d;border-radius:12px;padding:7px;
    box-shadow:inset 0 1px 0 #ffffff0a,0 6px 16px #0006}
  #fbankA{grid-column:1;grid-row:2} #fbankB{grid-column:2;grid-row:2} #fbankC{grid-column:3;grid-row:2}
  .fbank .bhead{display:flex;gap:4px;align-items:center;flex-wrap:wrap;min-height:18px}
  .fbank .btitle{font-size:8.5px;letter-spacing:1.4px;color:#8b95a4;text-transform:uppercase;font-weight:800;margin-right:3px}
  .fbank .strips{display:flex;gap:3px;flex:1;justify-content:center}
  /* compact DiGiCo channel strips (12 per bank) */
  .fbank .strip{width:29px;padding:4px 2px;gap:3px}
  .fbank .strips{gap:2px}
  .fbank .strip .knob-s{--sz:22px}
  .fbank .strip .lcd{height:28px}
  .fbank .strip .lcd .cn{font-size:8px}
  .fbank .strip .fader{width:15px}
  .fbank .strip .fzone{min-height:84px}
  .fbank .strip .meter{width:5px}
  .fbank .strip .sbtn{font-size:7.5px;padding:2px 0}
  /* selected-channel readout chip in the side master section */
  .selchip{display:flex;align-items:center;gap:8px;background:#0c0e12;border:1px solid #2a2f37;border-radius:8px;padding:6px 9px}
  .selchip .cc{width:8px;height:26px;border-radius:3px;background:var(--amber)}
  .selchip .nm{font-size:13px;font-weight:800;color:#f0f4fa;line-height:1.05}
  .selchip .nn{font-size:9px;color:var(--muted);letter-spacing:.5px}

  /* stacked (phone) */
  .console.stacked .worksurface{display:block}
  .console.stacked .scrpanel,.console.stacked .fbank,.console.stacked .mfooter{margin-bottom:8px}
  .console.stacked .mfooter{flex-wrap:wrap}
  .console.stacked .fbank .strip{width:34px}
  /* phone: a 12-fader bank is wider than the screen — swipe it at full size instead of
     squeezing labels. Each row scrolls inside itself; the PAGE never scrolls sideways. */
  .console.stacked .fbank .strips{overflow-x:auto;overflow-y:hidden;justify-content:flex-start;flex:0 0 auto}
  .console.stacked .fbank .strips::-webkit-scrollbar{height:3px}
  .console.stacked .mstrips{overflow-x:auto;overflow-y:hidden}
  .console.stacked .mfooter .rk.macros{min-width:0}
</style>
</head>
<body>
<div class="console" id="console">

  <!-- UTILITY BAR (play + song + missions) -->
  <div class="util">
    <div class="brand"><span class="dgclogo">Di<b>Gi</b>Co</span><span class="model">Quantum 338</span><span class="m">Digital Mixing System · Simulador SMU</span></div>
    <div class="pill"><span class="dot" id="danteLed"></span> OPTOCORE <span id="danteTxt" style="color:var(--ink)">LOOP</span></div>
    <div class="pill">96 kHz</div>
    <button class="btnp" id="playBtn" style="background:#22b866;color:#04121a">► Tocar base</button>
    <select id="songSel" class="pill"></select>
    <span class="pill" id="audioStatus" style="color:var(--muted)">áudio: —</span>
    <div class="spacer"></div>
    <div class="mission">
      <span class="idx" id="mIdx">MISSÃO 1/5</span>
      <span class="txt" id="mTxt">—</span>
      <button class="btnp ghost" id="mSkip">Pular</button>
    </div>
  </div>

  <!-- METER BRIDGE -->
  <div class="bridge"><canvas id="mbridge"></canvas></div>

  <!-- ===== WORKSURFACE: 3 multitouch screens on top, a 12-fader bank beneath each ===== -->

      <div class="canvas-bz"><canvas id="screenL"></canvas></div>

    <!-- SCREEN 2 (centre = main channel-processing screen, with soft menu) -->

      <div class="tabs" id="tabs">
        <button class="tab active" data-mode="overview">OVERVIEW</button>
        <button class="tab" data-mode="selected">CHANNEL</button>
        <button class="tab" data-mode="eq">EQ</button>
        <button class="tab" data-mode="gate">DYN1</button>
        <button class="tab" data-mode="comp">DYN2</button>

    <!-- SCREEN 3 (right = master / output screen) -->
    <div class="scrpanel scrR">
      <div class="scrhd"><span class="st">TFT 3 · <b>MASTER</b></span><span class="sp"></span><span class="tftdot"></span></div>
      <div class="canvas-bz"><canvas id="screenR"></canvas></div>
    </div>

    <!-- FADER BANKS (12 faders each, one under each screen) -->
    <div class="fbank" id="fbankA"></div>
    <div class="fbank" id="fbankB"></div>
    <div class="fbank" id="fbankC"></div>

    <!-- MASTER / CONTROL footer strip — spans full width beneath the fader banks -->
    <div class="mfooter">
      <div class="rk masters-rk">
        <div class="sect-title"><b>MAIN</b> · ST / MONO + CANAL SEL.</div>
        <div class="mainrow">
          <div class="selchip"><div class="cc" id="scCC"></div><div><div class="nm" id="scNM">—</div><div class="nn" id="scNN">CH</div></div></div>
          <div class="mstrips" id="masterstrips"></div>
        </div>
      </div>
      <div class="rk">
        <div class="sect-title">ENCODERS · SEGUEM O CANAL</div>
        <div class="udk" id="udknobs"></div>
      </div>
      <div class="rk">
        <div class="sect-title">SNAPSHOTS</div>
        <div class="scene">
          <div class="scenum"><div class="n" id="scnNum">001</div><div class="l" id="scnName">— SCENE —</div></div>
          <div class="scbtns">
            <button class="pbtn" id="scStore">STORE</button>
            <button class="pbtn green" id="scRecall">RECALL</button>
            <button class="pbtn" id="scInc">INC ▲</button>
            <button class="pbtn" id="scDec">DEC ▼</button>

      <div class="rk">
        <div class="sect-title">MONITOR / TALKBACK</div>
        <div class="monrow">
          <div class="kwrap" style="width:46px"><div class="pk sm" data-k="monitor"><div class="ring" style="--led:#5ecdd9"></div><div class="cap"></div></div><div class="klbl">MONITOR</div><div class="kval" id="scMon">-20</div></div>
          <button class="pbtn red" id="tbKey" style="flex:1;min-height:40px">TALKBACK</button>
          <button class="pbtn nav" id="dimKey" style="flex:1;min-height:40px">DIMMER</button>
        </div>
      </div>

</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  /* ================= MODEL ================= */
  const MIX_NAMES=["MIX 1 Mon","MIX 2 Mon","MIX 3 IEM","MIX 4 IEM","MIX 5 FX","MIX 6 FX","MIX 7 Sub","MIX 8 FB",
    "MIX 9","MIX 10","MIX 11","MIX 12","MIX 13","MIX 14","MIX 15","MIX 16","MIX 17","MIX 18","MIX 19","MIX 20","MIX 21","MIX 22","MIX 23","MIX 24"];
  const N_MIX=24,N_MTX=8,N_DCA=24,N_MUTE=8,N_SCENE=10;  // DiGiCo Quantum: 24 Control Groups (VCA-style)
  const N_CH=96;   // Quantum 338 input capacity (spec). The console does 96 -> the simulator does 96.
  const COLORS=["#e0483f","#f97316","#22a8c0","#eab308","#3ad07a","#14b8a6","#39c0e6","#3b82f6","#6366f1","#a855f7","#ec4899","#f43f5e"];
  const NAMES=["Kick In","Snare","Hat","Tom 1","Tom 2","OH L","OH R","Bass DI","Gtr L","Gtr R","Keys L","Keys R","Lead Voc","Voc 2","Voc 3","Coro","Sax","Trumpet","Perc","Play L","Play R","Amb L","Amb R","Talk"];
  const RAWSRC=[-42,-40,-48,-44,-45,-47,-47,-38,-41,-41,-39,-39,-34,-40,-41,-43,-43,-44,-46,-36,-36,-52,-52,-30];
  function mkChannel(i){
    return { i, name:NAMES[i]||("CH "+(i+1)), color:COLORS[i%COLORS.length],
      gain:20+((i*7)%10)-4, phase:false, phantom:false, hpfOn:false, hpf:80, lpfOn:false, lpf:18000,
      eq:[{type:'lowshelf',f:120,g:0,q:0.7},{type:'peaking',f:500,g:0,q:1.0},{type:'peaking',f:2500,g:0,q:1.0},{type:'highshelf',f:8000,g:0,q:0.7}],
      eqType:'PRECISE',
      gateOn:false,gateThr:-40,gateRange:-60,gateAtk:1,gateHold:20,gateDecay:200,
      compOn:false,compThr:-12,compRatio:3,compAtk:20,compRel:150,compKnee:2,compGain:0,
      pan:0, fader:-4-((i*5)%8), on:true, cue:false,
      sends:new Array(N_MIX).fill(-90), sendOn:new Array(N_MIX).fill(false), sendPre:new Array(N_MIX).fill(false),
      dca:new Array(N_DCA).fill(false), mute:new Array(N_MUTE).fill(false), muteSafe:false,
      fxRev:-90, fxDly:-90, src:RAWSRC[i]||-42 };
  }
  const CH=Array.from({length:N_CH},(_,i)=>mkChannel(i));
  const state={ sel:12, mode:"overview", sof:-1, sofBus:0, sofType:'mix', master:-3, mono:-3, eqBand:3,
    knobMode:'gain', scene:0, monitor:-20, dim:false, talkback:false,
    dcaGain:new Array(N_DCA).fill(0), dcaOn:new Array(N_DCA).fill(true),
    mixMaster:new Array(N_MIX).fill(0), mixOn:new Array(N_MIX).fill(true),
    mtxMaster:new Array(N_MTX).fill(0), mtxOn:new Array(N_MTX).fill(true),
    muteActive:new Array(N_MUTE).fill(false),
    fx:{revMix:0.35,revSize:2.2,revOn:true,dlyTime:0.38,dlyFb:0.35,dlyMix:0.3,dlyOn:true} };
  const _tap={rev:[],dly:[]}; // tap-tempo timestamp history per FX rack
  const scenes=new Array(N_SCENE).fill(null);
  const ukState={}; // user key toggles

  /* ================= HELPERS ================= */
  const $=s=>document.querySelector(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const FMIN=-90,FMAX=10;
  function faderTxt(db){ return db<=FMIN?"−∞":(db>0?"+":"")+db.toFixed(1); }
  function panTxt(p){ if(Math.abs(p)<2)return"C"; return (p<0?"L"+Math.round(-p):"R"+Math.round(p)); }
  function pos2db(p){ if(p<=0.01)return FMIN; return clamp(-60+p*70,FMIN,FMAX); }
  function db2pos(db){ if(db<=FMIN)return 0; return clamp((db+60)/70,0,1); }
  function fx(f){ const mn=Math.log10(20),mx=Math.log10(20000); return (Math.log10(f)-mn)/(mx-mn); }
  function fInv(t){ const mn=Math.log10(20),mx=Math.log10(20000); return Math.pow(10,mn+clamp(t,0,1)*(mx-mn)); }
  function perf(){ return performance.now(); }

  /* ================= SCREEN COLOR THEME (DiGiCo charcoal touchscreen) ================= */
  const SC={ bg0:"#0f1114",bg1:"#181b1f", panel:"#23272d", panelHi:"#2b3037", panelLo:"#1a1d22",
    border:"#3b424a", line:"#2c333b", grid:"#242a31",
    ink:"#e8ecf1", mut:"#9aa6b3", dim:"#616c78",
    amber:"#22a8c0", green:"#46c98a", red:"#e5424a", cyan:"#35b8c4",
    band:["#e0554e","#e6b34e","#5cc98a","#4ea6e0"] };

  /* ================= biquad magnitude (matches Web Audio) ================= */
  const FS=48000;
  function biquadDb(type,f0,gainDb,Q,f){
    f0=clamp(f0,10,FS/2-10);Q=Math.max(0.05,Q);
    const w0=2*Math.PI*f0/FS,cw=Math.cos(w0),sw=Math.sin(w0),A=Math.pow(10,gainDb/40),alpha=sw/(2*Q);
    let b0,b1,b2,a0,a1,a2;
    if(type==='peaking'){b0=1+alpha*A;b1=-2*cw;b2=1-alpha*A;a0=1+alpha/A;a1=-2*cw;a2=1-alpha/A;}
    else if(type==='lowshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)-(A-1)*cw+s2);b1=2*A*((A-1)-(A+1)*cw);b2=A*((A+1)-(A-1)*cw-s2);a0=(A+1)+(A-1)*cw+s2;a1=-2*((A-1)+(A+1)*cw);a2=(A+1)+(A-1)*cw-s2;}
    else if(type==='highshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)+(A-1)*cw+s2);b1=-2*A*((A-1)+(A+1)*cw);b2=A*((A+1)+(A-1)*cw-s2);a0=(A+1)-(A-1)*cw+s2;a1=2*((A-1)-(A+1)*cw);a2=(A+1)-(A-1)*cw-s2;}
    else if(type==='highpass'){b0=(1+cw)/2;b1=-(1+cw);b2=(1+cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    else {b0=(1-cw)/2;b1=1-cw;b2=(1-cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    const w=2*Math.PI*f/FS,phi=Math.pow(Math.sin(w/2),2);
    const num=Math.pow(b0+b1+b2,2)-4*(b0*b1+4*b0*b2+b1*b2)*phi+16*b0*b2*phi*phi;
    const den=Math.pow(a0+a1+a2,2)-4*(a0*a1+4*a0*a2+a1*a2)*phi+16*a0*a2*phi*phi;
    return 10*Math.log10(Math.max(1e-9,num)/Math.max(1e-9,den));
  }
  function eqTypeFactor(t){ return t==='AGGRESSIVE'?1.55:t==='SMOOTH'?0.6:t==='LEGACY'?0.82:1; }
  function eqMag(ch,f){ let g=0; const kf=eqTypeFactor(ch.eqType||'PRECISE');
    for(const b of ch.eq){ if(b.g!==0) g+=biquadDb(b.type,b.f,b.g,b.q*kf,f); }
    if(ch.hpfOn) g+=biquadDb('highpass',ch.hpf,0,0.707,f);
    if(ch.lpfOn) g+=biquadDb('lowpass',ch.lpf,0,0.707,f);
    return clamp(g,-30,20); }

  /* ================= SELECTED CHANNEL PHYSICAL KNOBS ================= */
  const KDEF={ gain:{min:-6,max:45}, hpf:{min:20,max:600,log:true}, gate:{min:-72,max:0}, comp:{min:-54,max:0}, pan:{min:-63,max:63},
    monitor:{min:-60,max:0}, eqQ:{min:0.1,max:10,log:true}, eqF:{min:20,max:20000,log:true}, eqG:{min:-18,max:18} };
  function knobP(def,v){ if(def.log) return clamp((Math.log(Math.max(def.min,v))-Math.log(def.min))/(Math.log(def.max)-Math.log(def.min)),0,1); return clamp((v-def.min)/(def.max-def.min),0,1); }
  function setPK(el,def,v){ const p=knobP(def,v); el.style.setProperty('--p',p); el.style.setProperty('--rot',(-135+p*270)+'deg'); }
  function pkVal(ch,k){ return {gain:ch.gain,hpf:ch.hpf,gate:ch.gateThr,comp:ch.compThr,pan:ch.pan,monitor:state.monitor}[k]; }
  function pkSet(ch,k,v){ const d=KDEF[k]; v=clamp(v,d.min,d.max);
    if(k==='gain')ch.gain=v; else if(k==='hpf')ch.hpf=Math.round(v); else if(k==='gate')ch.gateThr=Math.round(v);
    else if(k==='comp')ch.compThr=Math.round(v); else if(k==='pan')ch.pan=Math.round(v);
    else if(k==='monitor'){ state.monitor=Math.round(v); applyMonitor(); } }

  // build EQ 4-band knob columns
  function buildEqBands(){
    const host=$("#eqbands"); if(!host)return; host.innerHTML="";
    const nm=["LOW","LO-MID","HI-MID","HIGH"];
    for(let b=0;b<4;b++){
      const col=document.createElement("div"); col.className="eqband";
      col.innerHTML=`<div class="bt" style="background:${SC.band[b]}">${nm[b]}</div>
        <div class="pk sm" data-eq="${b}" data-p="g"><div class="ring" style="--led:${SC.band[b]}"></div><div class="cap"></div></div><div class="klbl">GAIN</div><div class="kval" data-v="g${b}">0.0</div>
        <div class="pk sm" data-eq="${b}" data-p="f"><div class="ring" style="--led:${SC.band[b]}"></div><div class="cap"></div></div><div class="klbl">FREQ</div><div class="kval" data-v="f${b}">1k</div>
        <div class="pk sm" data-eq="${b}" data-p="q"><div class="ring" style="--led:${SC.band[b]}"></div><div class="cap"></div></div><div class="klbl">Q</div><div class="kval" data-v="q${b}">1.0</div>`;
      host.appendChild(col);
    }
  }
  function fmtFreq(f){ return f>=1000?(f/1000).toFixed(f>=10000?0:1)+"k":Math.round(f); }
  function wirePKDrag(el,getV,setV,def){
    let drag=false,lastY=0;
    el.addEventListener("pointerdown",e=>{drag=true;lastY=e.clientY;el.setPointerCapture(e.pointerId);e.preventDefault();});
    el.addEventListener("pointermove",e=>{ if(!drag)return; const dy=lastY-e.clientY; lastY=e.clientY;
      const span=def.log?1:(def.max-def.min); let v=getV();
      if(def.log){ let p=knobP(def,v)+dy/180; p=clamp(p,0,1); v=def.min*Math.pow(def.max/def.min,p); }
      else v=v+dy*span/180;
      setV(clamp(v,def.min,def.max)); e.preventDefault(); });
    const up=()=>drag=false; el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
  }
  function wireSelectedKnobs(){
    document.querySelectorAll('.pk[data-k]').forEach(el=>{ const k=el.dataset.k; const def=KDEF[k];
      wirePKDrag(el, ()=>pkVal(CH[state.sel],k), v=>{ pkSet(CH[state.sel],k,v); if(k!=='monitor')applyChanAudio(state.sel); paintSelected(); drawScreen(); checkMissions(); }, def);
    });
    document.querySelectorAll('.pk[data-eq]').forEach(el=>{ const b=+el.dataset.eq, p=el.dataset.p;
      const def=p==='g'?KDEF.eqG:p==='f'?KDEF.eqF:KDEF.eqQ;
      wirePKDrag(el, ()=>{ const bd=CH[state.sel].eq[b]; return p==='g'?bd.g:p==='f'?bd.f:bd.q; },
        v=>{ const bd=CH[state.sel].eq[b]; if(p==='g')bd.g=v; else if(p==='f')bd.f=Math.round(v); else bd.q=v; state.eqBand=b; applyChanAudio(state.sel); paintSelected(); drawScreen(); checkMissions(); }, def);
    });
    // legacy phase/phantom/nav buttons no longer on the surface (DiGiCo edits on the touchscreen)
    const ph=$("#scPhase"); if(ph)ph.onclick=()=>{ const c=CH[state.sel]; c.phase=!c.phase; applyChanAudio(c.i); paintSelected(); };
    const pp=$("#scPhantom"); if(pp)pp.onclick=()=>{ const c=CH[state.sel]; c.phantom=!c.phantom; paintSelected(); };
    document.querySelectorAll('.pbtn.nav[data-nav]').forEach(el=>{ el.onclick=()=>setMode(el.dataset.nav); });
  }
  // Updates the "selected channel" readout in the MASTER section + the assignable encoders.
  function paintSelected(){
    const ch=CH[state.sel];
    const cc=$("#scCC"); if(cc)cc.style.background=ch.color;
    const nm=$("#scNM"); if(nm)nm.textContent=ch.name;
    const nn=$("#scNN"); if(nn)nn.textContent="CH "+(ch.i+1);
    const mon=$("#scMon"); if(mon)mon.textContent=state.monitor;
    const mk=$('.pk[data-k="monitor"]'); if(mk)setPK(mk,KDEF.monitor,state.monitor);
    if(typeof paintRightRack==='function') paintRightRack();
  }
  function selectChannel(i){ state.sel=i; paintSelected(); paintBay(); drawScreen(); drawBanks(); checkMissions(); }

  /* ================= placeholder forward decls upgraded below ================= */
  let paintBay=function(){}, renderScreen=function(){}, applyChanAudio=function(){}, applyMonitor=function(){};
  // Redraw coalescing: many pointermove events during a fader/knob drag must NOT each
  // trigger a full synchronous canvas repaint (that starves the main thread on iPad and
  // makes faders lag and jump). drawScreen() just flags "dirty"; the rAF loop paints once/frame.
  let _drawReq=0; function drawScreen(){ if(_drawReq)return; _drawReq=requestAnimationFrame(function(){ _drawReq=0; renderScreen(); }); }

  /* ================= FADER BAY ================= */
  let bayStrips=[];
  function scrTag(){ const el=$("#scrLtag"); if(el) el.textContent=bankA.banks[bankA.cur].label; }
  // block layer configuration
  // Quantum 338 worksurface: 3 blocks of 12 faders (+ ST/MONO masters in the side section).
  // Pages 3..8 of the input banks (IN 25-36 … IN 85-96). APPENDED to the two pages that already
  // existed, in the same {from,label} shape and rendered by the same .bkey component — the first two
  // entries of each list stay byte-for-byte what they were, so the TFT quick-selects that draw
  // banks[0]/banks[1] keep painting exactly the same pixels.
  const inPagesFrom24=()=>Array.from({length:Math.ceil(N_CH/12)-2},(_,j)=>{ const from=24+j*12; return {from,label:'IN '+(from+1)+'-'+(from+12)}; });
  const bankA={cur:0, banks:[ {from:0,label:'IN 1-12'}, {from:12,label:'IN 13-24'}, ...inPagesFrom24() ]};
  const bankB={cur:0, banks:[ {from:12,label:'IN 13-24'}, {from:0,label:'IN 1-12'}, ...inPagesFrom24() ]};
  const bankC={cur:0, layers:[ {t:'dca',from:0,n:12,label:'CG 1-12'}, {t:'dca',from:12,n:12,label:'CG 13-24'}, {t:'mix',from:0,n:12,label:'MIX 1-12'}, {t:'mix',from:12,n:12,label:'MIX 13-24'}, {t:'mtx',from:0,n:8,label:'MATRIX 1-8'} ]};

  function stripDesc(kind,idx){
    // returns interface object per strip
    if(kind==='ch'){
      return { kind, get name(){return CH[idx].name;}, get color(){return CH[idx].color;}, get num(){return "CH"+(idx+1);},
        get sel(){return state.sel===idx;}, doSel(){ selectChannel(idx); }, get chIdx(){return idx;},
        get on(){ return state.sof>=0 ? CH[idx].sendOn[state.sofBus] : CH[idx].on; },
        toggleOn(){ const c=CH[idx]; if(state.sof>=0){ c.sendOn[state.sofBus]=!c.sendOn[state.sofBus]; applyChanSends(idx); } else { c.on=!c.on; applyChanAudio(idx); } },
        get fdb(){ return state.sof>=0 ? CH[idx].sends[state.sofBus] : CH[idx].fader; },
        setFdb(v){ const c=CH[idx]; if(state.sof>=0){ c.sends[state.sofBus]=v; if(v>FMIN)c.sendOn[state.sofBus]=true; applyChanSends(idx); } else { c.fader=v; applyChanAudio(idx); } },
        get knobVal(){ return state.knobMode==='pan'?CH[idx].pan:CH[idx].gain; },
        setKnob(dy){ const c=CH[idx]; if(state.knobMode==='pan'){ c.pan=clamp(Math.round(c.pan+dy),-63,63);} else { c.gain=clamp(c.gain+dy*0.4,-6,45);} applyChanAudio(idx); },
        meter(){ return meterDbOf(idx); }, sofActive(){return false;}, hasAudio(){return CH[idx].hasAudio;} };
    }
    if(kind==='dca'){
      return { kind, get name(){return "CG "+(idx+1);}, get color(){return "#22a8c0";}, get num(){return "CG";},
        get sel(){return false;}, doSel(){ setMode('dca'); },
        get on(){ return state.dcaOn[idx]; }, toggleOn(){ state.dcaOn[idx]=!state.dcaOn[idx]; for(let i=0;i<N_CH;i++)if(CH[i].dca[idx])applyChanAudio(i); },
        get fdb(){ return state.dcaGain[idx]; }, setFdb(v){ state.dcaGain[idx]=v; for(let i=0;i<N_CH;i++)if(CH[i].dca[idx])applyChanAudio(i); },
        get knobVal(){return 0;}, setKnob(){}, meter(){return -90;}, sofActive(){return false;}, hasAudio(){return true;} };
    }
    if(kind==='mix'){
      return { kind, get name(){return MIX_NAMES[idx];}, get color(){return "#39c0e6";}, get num(){return "MIX"+(idx+1);},
        get sel(){ return state.sof>=0&&state.sofType==='mix'&&state.sofBus===idx; },
        doSel(){ engageSof('mix',idx); },
        get on(){ return state.mixOn[idx]; }, toggleOn(){ state.mixOn[idx]=!state.mixOn[idx]; applyMixMaster(idx); },
        get fdb(){ return state.mixMaster[idx]; }, setFdb(v){ state.mixMaster[idx]=v; applyMixMaster(idx); },
        get knobVal(){return 0;}, setKnob(){}, meter(){return -90;}, sofActive(){return true;}, hasAudio(){return true;} };
    }

      const g=ctx.createLinearGradient(0,y,0,y+gh); g.addColorStop(0,SC.panelHi); g.addColorStop(1,SC.panelLo);

  /* ================= DYN1 GATE (full) ================= */

  /* =================================================================

  let sideHitsL=[];               // touch regions on the LEFT screen

    g.addColorStop(0,"#2ea85a");g.addColorStop(.6,"#37c86a");g.addColorStop(.82,"#e8c33a");g.addColorStop(1,"#e0483f");

    cx.fillStyle=g; _rr(cx,x,y,w,h,4); cx.fill(); cx.strokeStyle=active?shade(col,-40):"#454c54"; cx.lineWidth=1; _rr(cx,x+.5,y+.5,w-1,h-1,4); cx.stroke();
    cx.fillStyle=active?"#0b1420":"#cfe0f0"; cx.font="700 9px Inter,system-ui"; cx.textAlign="center"; cx.textBaseline="middle"; cx.fillText(label,x+w/2,y+h/2+.5); cx.textBaseline="alphabetic"; }

    const n=Math.max(1,idx.length), top=20, botH=20, gh=H-top-botH-6, gap=3, cw=(W-12-(n-1)*gap)/n;

    revSendGain:i=>(aNodes[i]&&aNodes[i].revSend)?aNodes[i].revSend.gain.value:null,
    dlySendGain:i=>(aNodes[i]&&aNodes[i].dlySend)?aNodes[i].dlySend.gain.value:null,
    revRetGain:()=>fxRack?fxRack.revRet.gain.value:null,
    dlyRetGain:()=>fxRack?fxRack.dlyRet.gain.value:null,
    dlyTime:()=>fxRack?fxRack.dly.delayTime.value:null,
    assignCG:(i,g,on)=>{CH[i].dca[g]=on;applyChanAudio(i);},
    setCGgain:(g,db)=>{state.dcaGain[g]=db;for(let i=0;i<N_CH;i++)if(CH[i].dca[g])applyChanAudio(i);},
    cgOn:(g,on)=>{state.dcaOn[g]=on;for(let i=0;i<N_CH;i++)if(CH[i].dca[g])applyChanAudio(i);},
    assignMute:(i,g,on)=>{CH[i].mute[g]=on;applyChanAudio(i);},
    muteGroup:(g,on)=>{state.muteActive[g]=on;for(let i=0;i<N_CH;i++)if(CH[i].mute[g])applyChanAudio(i);},
    muteSafe:(i,on)=>{CH[i].muteSafe=on;applyChanAudio(i);},
    setSend:(i,which,db)=>{if(which==='rev')CH[i].fxRev=db;else CH[i].fxDly=db;applyChanAudio(i);},
    fxOn:(which,on)=>{if(which==='rev')state.fx.revOn=on;else state.fx.dlyOn=on;applyFX();},
    tap:which=>tapTempo(which),
    sel:()=>state.sel,
    chGain:i=>CH[i]?CH[i].gain:null,                                   // selected-channel HA gain (dB)
    haTrim:i=>(aNodes[i]&&aNodes[i].trim)?aNodes[i].trim.gain.value:null, // audio: trim node = dbToLin(gain-16)
    curMode:()=>state.mode,
    N_DCA, N_MUTE,
    /* ===== QA measurement accessors (read-only; NO UI, layout or behaviour change) =====
       Added so the automated suite can drive real pointer events and read the real Web Audio
       node values instead of assuming them. Nothing here is called by the console itself. */
    CH, state, N_MIX, N_MTX, N_SCENE, N_CH,
    maxch:()=>CH.length, nScene:()=>N_SCENE, scenes:()=>scenes, sceneAt:s=>scenes[s],
    /* MIX/AUX send bus (real nodes) */
    mixSendGain:(i,b)=>(aNodes[i]&&aNodes[i].mxS[b])?aNodes[i].mxS[b].gain.value:null,
    mixSendTap:(i,b)=>{ const n=aNodes[i]; if(!n||!n.mxSrc[b])return null; return n.mxSrc[b]===n.mk?'pre':(n.mxSrc[b]===n.fdr?'post':'?'); },
    mixBusDb:b=>{ const n=mixBuses[b]; if(!n)return -90; const buf=n.an._buf; n.an.getFloatTimeDomainData(buf);
      let s=0; for(let k=0;k<buf.length;k++)s+=buf[k]*buf[k]; const rms=Math.sqrt(s/buf.length); return rms>1e-5?20*Math.log10(rms):-90; },
    mixMasterGain:b=>mixBuses[b]?mixBuses[b].out.gain.value:null,
    applyMixMaster:b=>applyMixMaster(b), applySends:i=>applyChanSends(i),
    ac:()=>ac, aN:i=>aNodes[i], aNodesLen:()=>aNodes.length,
    apply:i=>applyChanAudio(i), applyFX:()=>applyFX(),
    buildAudio:()=>{ if(!ac) buildAudioGraph(); },
    resume:()=>{ try{ return ac?ac.resume():Promise.resolve(); }catch(e){ return Promise.resolve(); } },
    hitRegions:()=>hitRegions, sideHitsL:()=>sideHitsL,
    setMode:m=>setMode(m), selectChannel:i=>selectChannel(i),
    storeScene:s=>storeScene(s), recallScene:s=>recallScene(s),
    isPlaying:()=>playing, setPlaying:v=>{ playing=v; }, processGates:()=>processGates(),
    play:()=>playSong(), stopIt:()=>stopSong(), loadSong:i=>loadSong(i),
    songs:()=>SONGS, curSong:()=>curSong, realSrcCount:()=>realSources.length,
    chLevelDb:i=>chLevelDb(i), masterDb:()=>masterLevelDb(),
    getTrim:i=>(aNodes[i]?aNodes[i].trim.gain.value:null),
    panVal:i=>(aNodes[i]?aNodes[i].pan.pan.value:null),
    eqGain:(i,b)=>(aNodes[i]?aNodes[i].eq[b].gain.value:null),
    eqFreq:(i,b)=>(aNodes[i]?aNodes[i].eq[b].frequency.value:null),
    hpfFreq:i=>(aNodes[i]?aNodes[i].hpf.frequency.value:null),
    gateGain:i=>(aNodes[i]?aNodes[i].gate.gain.value:null),
    compReduction:i=>(aNodes[i]?aNodes[i].comp.reduction:null),
    banksA:()=>bankA.banks.length, banksB:()=>bankB.banks.length, banksC:()=>bankC.layers.length,
    bankLabels:()=>({A:bankA.banks.map(b=>b.label), B:bankB.banks.map(b=>b.label), C:bankC.layers.map(b=>b.label)}),
    setBankA:v=>{ bankA.cur=v; buildBay(); paintBay(); drawBanks(); return bankA.cur; },
    setBankB:v=>{ bankB.cur=v; buildBay(); paintBay(); drawBanks(); return bankB.cur; },
    setBankC:v=>{ bankC.cur=v; buildBay(); paintBay(); drawBanks(); return bankC.cur; },
    stripKinds:()=>currentDescriptors().map(d=>d.ctl.kind),
    stripNames:()=>currentDescriptors().map(d=>d.ctl.name),
    stripBlocks:()=>currentDescriptors().map(d=>d.block),
    stripFdb:()=>currentDescriptors().map(d=>d.ctl.fdb),
    canvasSizes:()=>({L:{w:cvL.width,h:cvL.height}, C:{w:cv.width,h:cv.height}, R:{w:cvR.width,h:cvR.height}}) };
  window.addEventListener("resize",sizeCanvas); setTimeout(sizeCanvas,30); requestAnimationFrame(loop);
  setInterval(()=>{ const l=$("#danteLed"); if(l){ l.classList.toggle("warn"); setTimeout(()=>l.classList.remove("warn"),120); } },4000);

  /* ================= FIT (preserved) ================= */
  function fitConsole(){ const con=document.querySelector('.console'); if(!con)return;
    const vw=window.innerWidth,vh=window.innerHeight;
    if(vw<560){ document.body.classList.add('stacked'); con.classList.add('stacked'); con.style.zoom=''; document.body.style.alignItems='flex-start'; }
    else{ document.body.classList.remove('stacked'); con.classList.remove('stacked'); con.style.zoom=''; const _DW=con.offsetWidth, _DH=con.offsetHeight;
      con.style.zoom=''; const DW=con.offsetWidth||1520, DH=con.offsetHeight||940;   // mede o tamanho REAL
      const scrH=(window.screen&&screen.height)||vh; const iframeTaller=vh>scrH+8; const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6); const effVh=Math.max(240,visH-headerAllow);
      document.body.style.alignItems=(iframeTaller||vh>700)?'flex-start':'center';
      let s=Math.min((vw-16)/DW,effVh/DH); s=Math.max(0.3,Math.min(s,2.4)); con.style.zoom=s; }
    try{ sizeCanvas(); }catch(e){}
  }
  window.addEventListener('resize',fitConsole); setTimeout(fitConsole,45);
})();
</script>
