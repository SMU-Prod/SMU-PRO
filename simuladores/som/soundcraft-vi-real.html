<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" href="data:,">
<title>Soundcraft Vi3000 — Virtual Vi / Vistonics II (SMU)</title>
<style>
  :root{
    --ink:#eef1f6; --muted:#98a1b0; --amber:#ff8a1e; --green:#43c96b; --red:#e2352b; --cyan:#38b6c9;
    /* Soundcraft brand orange-red */
    --sc-orange:#ff7a1a; --sc-red:#e2352b;
    /* FaderGlow palette (by function) */
    --fg-input:#c7ced8; --fg-aux:#ff9a2e; --fg-vca:#2f7bff; --fg-vca2:#d13bd1; --fg-mtx:#ff3b3b; --fg-bus:#43c96b; --fg-master:#eef1f6;
    /* screen (Vistonics) graphite palette */
    --scr:#101216;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%,#1a1d22,#0a0b0d 60%),#08090b;
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; overflow:hidden;
    display:flex; align-items:flex-start; justify-content:center;
  }
  /* ===== CONSOLE: fixed design, scaled to fit ===== */
  .console{position:relative;width:1520px;height:940px;flex:0 0 auto;transform-origin:top center;
    display:flex;flex-direction:column;gap:8px;padding:12px;
    background:
      linear-gradient(180deg,#34383f,#25282d 8%,#1e2126 60%,#191b1f);
    border:1px solid #0b0c0e;border-radius:16px;
    box-shadow:0 30px 80px #000a, inset 0 1px 0 #ffffff10, inset 0 -2px 0 #0008;}
  .console::before{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(180deg,#ffffff08,transparent 6%);}

  /* utility/top bar (play + song + missions) */
  .util{display:flex;align-items:center;gap:8px;flex-wrap:wrap;
    background:linear-gradient(180deg,#202329,#15171b);border:1px solid #0c0d0f;border-radius:10px;padding:6px 10px}
  .util .brand{display:flex;align-items:baseline;gap:9px;margin-right:4px}
  .util .brand b{font-size:17px;letter-spacing:1px;color:#eef2f8}
  .util .brand .m{font-size:10px;letter-spacing:2px;color:#8a94a4;text-transform:uppercase}
  .util .brand .y{color:var(--amber);font-weight:800;letter-spacing:1px}
  .pill{font-size:10.5px;color:var(--muted);background:#0c0e12;border:1px solid #2a2f37;border-radius:16px;padding:4px 9px;display:flex;align-items:center;gap:6px;letter-spacing:.4px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .dot.warn{background:var(--amber);box-shadow:0 0 8px var(--amber)}
  .btnp{font:inherit;font-size:11.5px;font-weight:700;border:0;border-radius:8px;padding:7px 12px;cursor:pointer}
  .spacer{flex:1}
  select.pill{cursor:pointer;color:var(--ink);font:inherit;font-size:11px;max-width:210px}
  .mission{display:flex;align-items:center;gap:9px;background:#0c0e12;border:1px solid #2a2f37;border-radius:9px;padding:5px 10px;flex:1 1 320px;min-width:0}
  .mission .idx{font-size:10px;color:var(--amber);font-weight:800;letter-spacing:1px;white-space:nowrap}
  .mission .txt{font-size:11px;line-height:1.25;min-width:0}
  .mission .txt small{color:var(--muted)}
  .mission .txt b{color:#fff}
  .ghost{background:transparent;color:var(--muted);border:1px solid #2a2f37}

  /* meter bridge */
  .bridge{background:linear-gradient(180deg,#101216,#0a0b0d);border:1px solid #0b0c0e;border-radius:10px;padding:6px 10px 4px;
    box-shadow:inset 0 2px 6px #000a}
  #mbridge{display:block;width:100%;height:58px}

  /* ===== BACK = the Vi3000 signature: ONE sweeping glossy-black screen bay ===== */
  /* holds the Vistonics touchscreen (centre) with encoders hugging it, the INPUT/access */
  /* column recessed at left and the MASTER bay recessed at right. */
  .back{display:grid;grid-template-columns:290px 1fr 350px;gap:12px;min-height:0;position:relative;
    background:linear-gradient(180deg,#0c0d10,#050506 55%,#090a0c);border:1px solid #000;border-radius:16px;
    padding:12px;box-shadow:inset 0 1px 0 #ffffff12, inset 0 -4px 14px #000, 0 10px 26px #0009}
  .back::before{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(180deg,#ffffff14,transparent 9%,transparent 90%,#ffffff08)}
  .inbay{display:flex;flex-direction:column;gap:8px;align-content:flex-start;padding:9px;border-radius:11px;position:relative;z-index:1;
    background:linear-gradient(180deg,#191b20,#0f1013);border:1px solid #000;box-shadow:inset 0 1px 0 #ffffff0c,0 3px 8px #0006}
  .vbay{display:flex;flex-direction:column;min-height:0;position:relative;z-index:1}
  .mbay{display:flex;flex-direction:column;gap:8px;min-height:0;position:relative;z-index:1}
  .chid{display:flex;align-items:center;gap:8px;background:#0b0d11;border:1px solid #23262d;border-radius:8px;padding:6px 8px}
  .chid .cc{width:9px;height:32px;border-radius:3px;background:var(--sc-orange);box-shadow:0 0 6px #0006}
  .chid .nm{font-size:14px;font-weight:800;color:#f0f4fa;line-height:1.05;display:block}
  .chid .nn{font-size:9px;color:var(--muted);letter-spacing:.6px}
  .inprow{display:flex;gap:14px;justify-content:center;margin:2px 0 0}
  .faccess{display:flex;flex-direction:column;gap:5px}
  .faccess .pbtn{padding:8px 6px;font-size:9.5px;letter-spacing:.7px}
  .panel{background:linear-gradient(180deg,#2b2e34,#212429 30%,#191b1f);border:1px solid #0c0d0f;border-radius:12px;
    box-shadow:inset 0 1px 0 #ffffff0c, inset 0 -2px 4px #0006, 0 4px 12px #0006;padding:10px}
  .sect-title{font-size:9px;letter-spacing:2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin:0 0 7px}
  .sect-title b{color:var(--amber)}

  /* Selected Channel physical knobs */
  .selhead{display:flex;align-items:center;gap:8px;margin-bottom:8px}
  .selhead .cc{width:9px;height:30px;border-radius:3px;background:var(--amber);box-shadow:0 0 6px #0006}
  .selhead .nm{font-size:15px;font-weight:800;line-height:1.05;color:#f0f4fa}
  .selhead .nn{font-size:9.5px;color:var(--muted);letter-spacing:.6px}
  .knobrow{display:flex;gap:6px;align-items:flex-end;flex-wrap:wrap}
  .kwrap{display:flex;flex-direction:column;align-items:center;gap:3px;width:52px}
  .klbl{font-size:8px;letter-spacing:.4px;color:#93a0b2;text-transform:uppercase;text-align:center;line-height:1.05}
  .kval{font-size:9.5px;font-weight:700;color:#e9eef6}
  /* physical knob with LED collar */
  .pk{--sz:36px;width:var(--sz);height:var(--sz);position:relative;touch-action:none;cursor:ns-resize}
  .pk .ring{position:absolute;inset:-4px;border-radius:50%;
    background:conic-gradient(from 215deg, var(--led,#6cf) calc(var(--p,0)*270deg), #0d0f13 0 270deg, #17191e 0);
    -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px));
            mask:radial-gradient(farthest-side,#0000 calc(100% - 4.5px),#000 calc(100% - 4px))}
  .pk .cap{position:absolute;inset:2px;border-radius:50%;
    background:radial-gradient(circle at 50% 32%,#565b64,#2b2e34 62%,#202329);
    border:1px solid #121317;box-shadow:inset 0 2px 4px #0009, 0 1px 1px #ffffff10}
  .pk .cap::after{content:"";position:absolute;left:50%;top:50%;width:3px;height:3px;border-radius:2px;background:#eef2f8;
    box-shadow:0 0 3px #fff8;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) translateY(calc(var(--sz)*-0.30))}
  .pk.sm{--sz:30px}
  /* small square panel buttons */
  .pbtn{font:inherit;font-size:8.5px;font-weight:700;letter-spacing:.4px;color:#b9c6d8;text-align:center;cursor:pointer;
    background:linear-gradient(180deg,#3a3f47,#23262c);border:1px solid #12141a;border-radius:5px;padding:5px 3px;
    box-shadow:inset 0 1px 0 #ffffff12, 0 1px 2px #0007;min-width:0}
  .pbtn:active{transform:translateY(1px)}
  .pbtn.lit{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06;box-shadow:0 0 8px #f4a02a88}
  .pbtn.green.lit{background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33;box-shadow:0 0 8px #22b86688}
  .pbtn.red.lit{background:linear-gradient(180deg,#ff9a92,#e0483f);border-color:#7a1611;box-shadow:0 0 8px #e0483f88}
  .pbtn.nav{border-color:#2a3550}
  .pbtn.nav.on{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 8px #39c0e688}
  .brow{display:flex;gap:4px}
  .eqbands{display:flex;gap:4px;margin-top:8px}
  .eqband{flex:1;background:#191b20;border:1px solid #0c0d10;border-radius:7px;padding:5px 3px;display:flex;flex-direction:column;align-items:center;gap:4px}
  .eqband .bt{font-size:8px;font-weight:800;letter-spacing:.5px;padding:2px 0;width:100%;text-align:center;border-radius:3px;color:#0b0f14}

  /* SCREEN column */
  .screencol{display:flex;flex-direction:column;min-height:0;padding:8px}
  /* Vistonics top menu bar (Virtual Vi look): a dark strip fixed to the top of the glass */
  .tabs{display:flex;gap:2px;flex-wrap:nowrap;overflow:hidden;
    background:linear-gradient(180deg,#141619,#0a0c0e);border:1px solid #000;border-bottom:0;
    border-radius:9px 9px 0 0;padding:5px 5px 6px}
  .tab{font:inherit;font-size:9px;font-weight:700;letter-spacing:.2px;color:#9aa6b6;cursor:pointer;flex:1 1 0;min-width:0;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-align:center;
    background:linear-gradient(180deg,#22262c,#171a1f);border:1px solid #05060a;border-radius:4px;padding:5px 4px}
  .tab.active{color:#160a02;background:linear-gradient(180deg,#ffb454,#ff8a1e);border-color:#7a4406;font-weight:800;box-shadow:0 0 8px #ff8a1e55}
  .tab.sof{flex:1.3 1 0}
  .tab.sof.active{background:linear-gradient(180deg,#7fe0f0,#38c0d8);border-color:#0a5866;color:#04141a}
  .screen-bezel{flex:1;min-height:0;border-radius:0;padding:7px;background:linear-gradient(180deg,#0c0e11,#050607);
    border:1px solid #000;border-top:0;box-shadow:inset 0 3px 12px #000c, 0 0 0 2px #23262b}
  #screen{display:block;width:100%;height:100%;border-radius:6px;background:var(--scr);touch-action:none}

  /* RIGHT RACK: user knobs / scene / user keys / monitor */
  .rack{display:flex;flex-direction:column;gap:8px;min-height:0}
  .rk{background:linear-gradient(180deg,#2b2e34,#1e2126);border:1px solid #0c0d0f;border-radius:10px;padding:8px 9px;
    box-shadow:inset 0 1px 0 #ffffff0c,0 3px 8px #0005}
  .udk{display:flex;justify-content:space-between;gap:6px}
  .udk .kwrap{width:auto;flex:1}
  .scene{display:flex;gap:9px;align-items:center}
  .scenum{background:#07130c;border:1px solid #1c3a26;border-radius:7px;padding:5px 10px;min-width:96px;text-align:center;
    box-shadow:inset 0 2px 6px #000}
  .scenum .n{font-family:"DS-Digital","Courier New",monospace;font-size:26px;font-weight:800;color:#37e08a;letter-spacing:2px;line-height:1;text-shadow:0 0 8px #37e08a66}
  .scenum .l{font-size:8px;color:#5f8a72;letter-spacing:1px}
  .scbtns{display:grid;grid-template-columns:1fr 1fr;gap:5px;flex:1}
  .ukeys{display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
  .ukey{font:inherit;font-size:8px;font-weight:700;color:#cdd8e6;text-align:center;cursor:pointer;line-height:1.1;
    background:linear-gradient(180deg,#3a3f47,#23262c);border:1px solid #12141a;border-radius:6px;padding:8px 2px;
    box-shadow:inset 0 1px 0 #ffffff12,0 1px 2px #0007;min-height:34px;display:flex;align-items:center;justify-content:center}
  .ukey .num{position:absolute}
  .ukey.on{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70;box-shadow:0 0 7px #39c0e666}
  .monrow{display:flex;align-items:center;gap:10px}

  /* ===== FRONT SECTION: fader bay ===== */
  .front{background:linear-gradient(180deg,#232629,#191b1f);border:1px solid #0c0d0f;border-radius:12px;padding:8px;
    box-shadow:inset 0 1px 0 #ffffff0a, 0 6px 16px #0006}
  .bay{display:flex;gap:6px;align-items:stretch}
  .block{display:flex;flex-direction:column;gap:5px;min-width:0}
  .block .bhead{display:flex;gap:4px;align-items:center;flex-wrap:wrap;min-height:20px}
  .block .btitle{font-size:8.5px;letter-spacing:1.2px;color:#8b95a4;text-transform:uppercase;font-weight:700;margin-right:2px}
  .bkey{font:inherit;font-size:8px;font-weight:700;color:#b9c6d8;cursor:pointer;
    background:linear-gradient(180deg,#33373f,#212429);border:1px solid #12141a;border-radius:5px;padding:3px 6px}
  .bkey.on{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06}
  .strips{display:flex;gap:4px;flex:1}
  .vsep{width:2px;align-self:stretch;background:linear-gradient(180deg,#0a0b0d,#33373f,#0a0b0d);border-radius:2px;margin:0 3px}

  .strip{width:42px;flex:0 0 auto;background:linear-gradient(180deg,#1b1d22,#141519);border:1px solid #0b0c0e;border-radius:7px;
    padding:4px 3px;display:flex;flex-direction:column;align-items:center;gap:4px;box-shadow:inset 0 1px 0 #ffffff08}
  .strip.sel{border-color:var(--amber);box-shadow:0 0 0 1px var(--amber) inset,0 0 8px #f4a02a44}
  .strip .knob-s{margin-top:1px}
  .lcd{width:100%;height:24px;border-radius:4px;position:relative;overflow:hidden;border:1px solid #000;
    box-shadow:inset 0 2px 4px #0008;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0}
  .lcd .cn{font-size:8px;font-weight:800;line-height:1;color:#0b0f14;text-align:center;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .lcd .cnum{font-size:6.5px;font-weight:700;color:#0b0f1499;line-height:1}
  .sbtn{width:100%;font:inherit;font-size:8px;font-weight:800;letter-spacing:.3px;color:#93a0b2;cursor:pointer;text-align:center;
    background:linear-gradient(180deg,#2b2f37,#1c1f25);border:1px solid #0b0c0e;border-radius:4px;padding:3px 0}
  .row2{display:flex;gap:3px;width:100%}
  .sbtn.sel.act{color:#0b0f14;background:linear-gradient(180deg,#ffd27a,#f4a02a);border-color:#7a4d06}
  .sbtn.cue.act{color:#0b0f14;background:linear-gradient(180deg,#8fd8ff,#39a8e6);border-color:#0d4d70}
  .sbtn.on.act{color:#0b0f14;background:linear-gradient(180deg,#7ff0ac,#22b866);border-color:#0c5e33}
  .fzone{display:flex;gap:4px;flex:1;width:100%;justify-content:center;min-height:150px}
  .meter{width:6px;border-radius:2px;background:#05070a;position:relative;overflow:hidden;border:1px solid #14171d}
  .meter i{position:absolute;left:0;right:0;bottom:0;height:0;background:linear-gradient(0deg,#37c86a,#37c86a 62%,#e8c33a 84%,#e0483f);transition:height .05s linear}
  .fader{width:22px;flex:0 0 auto;position:relative;background:linear-gradient(90deg,#0a0b0d,#141519,#0a0b0d);border-radius:4px;border:1px solid #0b0c0e;cursor:ns-resize;touch-action:none}
  .fader .trk{position:absolute;left:50%;top:8px;bottom:8px;width:2px;transform:translateX(-50%);background:#000}
  .fader .u{position:absolute;left:2px;right:2px;height:1px;background:#39414f}
  .cap{position:absolute;left:-4px;right:-4px;height:20px;border-radius:3px;cursor:grab;
    background:linear-gradient(180deg,#20232a,#0e0f12 48%,#050506 52%,#16181d);border:1px solid #000;box-shadow:0 2px 4px #000a,inset 0 1px 0 #ffffff14}
  .cap::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#c9d2e0;border-radius:1px}
  .db{font-size:8px;font-weight:700;color:#c9d2e0;letter-spacing:.2px}
  .db small{color:#7f8b9c;font-weight:600}
  .strip.master .lcd{background:#2a1e06}
  .strip.master .lcd .cn{color:#ffd27a}

  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px);
    background:#12151a;border:1px solid var(--amber);color:var(--ink);padding:10px 16px;border-radius:10px;
    font-size:12.5px;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 8px 30px #000a}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--amber)}
  .console:not(.stacked){touch-action:none}
  body:not(.stacked){touch-action:none}
  /* stacked (phone) */
  .console.stacked{width:100%;max-width:100vw;height:auto;transform:none!important;touch-action:auto;overflow-x:hidden}
  .console.stacked .back{grid-template-columns:1fr}
  .console.stacked .strip{width:46px}
  /* phone: SEL/CUE share one row on desktop (~18px each). Stack them so each is the full
     strip width (>=24px) and comfortably tappable; ON already spans the strip. */
  .console.stacked .strip .row2{flex-direction:column;gap:3px}
  .console.stacked .strip .sbtn{min-height:24px;font-size:9px}
  body.stacked{overflow:auto}
  /* phone: the 24-fader deck is wider than the screen — swipe it at full size instead of
     zooming the whole console to thumbnail scale. The bay scrolls inside itself; the PAGE
     never scrolls sideways, and touch targets stay full-size (>=24px). */
  .console.stacked .bay{overflow-x:auto;overflow-y:hidden;justify-content:flex-start}
  .console.stacked .bay::-webkit-scrollbar{height:3px}
  .console.stacked .bay > .block{flex:0 0 auto}
  .console.stacked .lower .mbay{flex:0 0 auto;width:100%;max-width:320px}

  /* ===== SOUNDCRAFT brand / surface ===== */
  .util .brand b{font-weight:800}
  .scmark{display:inline-flex;align-items:center;gap:6px}
  .scmark .sq{width:15px;height:15px;border-radius:3px;background:linear-gradient(150deg,#ff8a1e,#e2352b);
    box-shadow:0 0 8px #e2352b66;display:inline-block}
  .scmark b{font-size:17px;letter-spacing:.3px;color:#f4f6fa;font-weight:800}
  .scmark .model{color:var(--sc-orange);font-weight:800;letter-spacing:.5px}
  .sect-title b{color:var(--sc-orange)}

  /* ===== VISTONICS II — 16 rotary encoders mounted ON THE GLASS, flush to the screen ===== */
  .vist{display:grid;grid-template-columns:repeat(16,minmax(0,1fr));gap:0;margin-top:-1px;min-width:0;
    background:linear-gradient(180deg,#0b0d10,#050608);border:1px solid #000;border-top:1px solid #ff8a1e40;
    border-radius:0 0 8px 8px;padding:6px 5px 7px;box-shadow:inset 0 6px 12px #000a,0 4px 10px #0008}
  .venc{display:flex;flex-direction:column;align-items:center;gap:2px;padding:0 1px;border-right:1px solid #ffffff08;min-width:0;overflow:hidden}
  .venc:last-child{border-right:0}
  .venc .vlbl{font-size:6.5px;letter-spacing:.2px;color:#8b95a4;text-transform:uppercase;text-align:center;line-height:1.02;
    min-height:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .venc .vval{font-size:8px;font-weight:800;color:#eef4fb;line-height:1}
  .venc .pk{--sz:26px}
  .venc .pk .cap{background:radial-gradient(circle at 50% 32%,#3a3e46,#1c1f24 62%,#141619)}
  .venc .vsw{font:inherit;font-size:6px;font-weight:800;letter-spacing:.2px;color:#93a0b2;cursor:pointer;width:100%;
    background:linear-gradient(180deg,#20242b,#14171c);border:1px solid #000;border-radius:3px;padding:2px 0;text-align:center}
  .venc .vsw.on{color:#0b0f14;background:linear-gradient(180deg,#ffc07a,#ff8a1e);border-color:#8a4a06}
  .venc .vsw.blank{visibility:hidden}
  .vhint{font-size:8px;color:#5c636f;letter-spacing:.4px;text-align:center;margin-top:5px}

  /* ===== FaderGlow ===== */
  .fglow{position:absolute;left:2px;right:2px;bottom:2px;top:2px;border-radius:3px;pointer-events:none;
    background:linear-gradient(180deg,transparent,var(--fg,transparent));opacity:.0;transition:opacity .15s}
  .fglow.lit{opacity:.5;box-shadow:0 0 10px var(--fg,transparent) inset}
  .strip .fader{box-shadow:0 0 0 1px #0b0c0e inset}
  .strip .fader.glow{box-shadow:0 0 7px var(--fg,transparent), 0 0 0 1px var(--fg,#0b0c0e) inset}

  /* ===== VI3000 MACRO LAYOUT: FOUR Vistonics screens across the full top ===== */
  /* the sweeping black screen panel — four touchscreen units side by side */
  .screens{display:flex;gap:9px;flex:1 1 auto;min-height:0;position:relative;
    background:linear-gradient(180deg,#0c0d10,#050506 55%,#090a0c);border:1px solid #000;border-radius:16px;
    padding:11px;box-shadow:inset 0 1px 0 #ffffff12, inset 0 -4px 14px #000, 0 10px 26px #0009;overflow:hidden}
  .screens::before{content:"";position:absolute;inset:0;border-radius:16px;pointer-events:none;
    background:linear-gradient(180deg,#ffffff14,transparent 9%,transparent 90%,#ffffff08)}

  /* ===== LOWER DECK: three 8-fader input bays + a separate master bay ===== */

    border:1px solid #0c0d0f;border-radius:12px;padding:8px;box-shadow:inset 0 1px 0 #ffffff0a,0 6px 16px #0006}
  .console.stacked .screens{flex-direction:column}

    <div class="pill"><span class="dot" id="danteLed"></span> DANTE <span id="danteTxt" style="color:var(--ink)">PRI</span></div>

  <!-- ===== LOWER DECK: three 8-fader input bays + a separate master bay ===== -->
  <div class="lower">
    <!-- 3 input bays (built by buildBay: BAY 1 · BAY 2 · BAY 3 + MASTER strips) -->

    <!-- MASTER BAY utilities: snapshots/cues, user knobs & keys, monitor/talkback -->

          <button class="pbtn red" id="tbKey" style="flex:1;min-height:40px">TALKBACK</button>

<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  /* ================= MODEL ================= */
  const MIX_NAMES=["BUS 1 Mon","BUS 2 Mon","BUS 3 IEM","BUS 4 IEM","BUS 5 FX","BUS 6 FX","BUS 7 Sub","BUS 8 FB",
    "BUS 9","BUS 10","BUS 11","BUS 12","BUS 13","BUS 14","BUS 15","BUS 16","BUS 17","BUS 18","BUS 19","BUS 20","BUS 21","BUS 22","BUS 23","BUS 24"];
  const N_MIX=24,N_MTX=8,N_DCA=16,N_MUTE=4,N_SCENE=10;
  const MAXCH=96; /* Vi3000 = 96 input channels */
  const COLORS=["#e0483f","#f97316","#f4a02a","#eab308","#3ad07a","#14b8a6","#39c0e6","#3b82f6","#6366f1","#a855f7","#ec4899","#f43f5e"];
  const NAMES=["Kick In","Snare","Hat","Tom 1","Tom 2","OH L","OH R","Bass DI","Gtr L","Gtr R","Keys L","Keys R","Lead Voc","Voc 2","Voc 3","Coro","Sax","Trumpet","Perc","Play L","Play R","Amb L","Amb R","Talk"];
  const RAWSRC=[-42,-40,-48,-44,-45,-47,-47,-38,-41,-41,-39,-39,-34,-40,-41,-43,-43,-44,-46,-36,-36,-52,-52,-30];
  function mkChannel(i){
    return { i, name:NAMES[i]||("CH "+(i+1)), color:COLORS[i%COLORS.length],
      gain:20+((i*7)%10)-4, phase:false, phantom:false, hpfOn:false, hpf:80, lpfOn:false, lpf:18000,
      eq:[{type:'lowshelf',f:120,g:0,q:0.7},{type:'peaking',f:500,g:0,q:1.0},{type:'peaking',f:2500,g:0,q:1.0},{type:'highshelf',f:8000,g:0,q:0.7}],
      eqType:'PRECISE',
      gateOn:false,gateThr:-40,gateRange:-60,gateAtk:1,gateHold:20,gateDecay:200,
      compOn:false,compThr:-12,compRatio:3,compAtk:20,compRel:150,compKnee:2,compGain:0,
      pan:0, fader:-4-((i*5)%8), on:true, cue:false,
      sends:new Array(N_MIX).fill(-90), sendOn:new Array(N_MIX).fill(false), sendPre:new Array(N_MIX).fill(false),
      dca:new Array(N_DCA).fill(false), mute:new Array(N_MUTE).fill(false), muteSafe:false,
      fxRev:-90, fxDly:-90, src:RAWSRC[i]||-42 };
  }
  const CH=Array.from({length:MAXCH},(_,i)=>mkChannel(i));
  const state={ sel:12, mode:"selected", sof:-1, sofBus:0, sofType:'mix', master:-3, mono:-3, eqBand:3,
    knobMode:'gain', scene:0, monitor:-20, dim:false, talkback:false,
    chBank:0, dcaGain:new Array(N_DCA).fill(0), dcaOn:new Array(N_DCA).fill(true),
    mixMaster:new Array(N_MIX).fill(0), mixOn:new Array(N_MIX).fill(true),
    mtxMaster:new Array(N_MTX).fill(0), mtxOn:new Array(N_MTX).fill(true),
    muteActive:new Array(N_MUTE).fill(false),
    fx:{revMix:0.35,revSize:2.2,revOn:true,dlyTime:0.38,dlyFb:0.35,dlyMix:0.3,dlyOn:true} };
  let lastTap=0;
  const scenes=new Array(N_SCENE).fill(null);
  const ukState={}; // user key toggles
  let chClip=null;   // Vi3000 Copy/Paste channel clipboard

  /* ================= HELPERS ================= */
  const $=s=>document.querySelector(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const FMIN=-90,FMAX=10;
  function faderTxt(db){ return db<=FMIN?"−∞":(db>0?"+":"")+db.toFixed(1); }
  function panTxt(p){ if(Math.abs(p)<2)return"C"; return (p<0?"L"+Math.round(-p):"R"+Math.round(p)); }
  function pos2db(p){ if(p<=0.01)return FMIN; return clamp(-60+p*70,FMIN,FMAX); }
  function db2pos(db){ if(db<=FMIN)return 0; return clamp((db+60)/70,0,1); }
  function fx(f){ const mn=Math.log10(20),mx=Math.log10(20000); return (Math.log10(f)-mn)/(mx-mn); }
  function fInv(t){ const mn=Math.log10(20),mx=Math.log10(20000); return Math.pow(10,mn+clamp(t,0,1)*(mx-mn)); }
  function perf(){ return performance.now(); }

  /* ================= SCREEN COLOR THEME (Soundcraft Vistonics graphite) ================= */
  const SC={ bg0:"#0b0c0f",bg1:"#141619", panel:"#1b1e24", panelHi:"#22262d", panelLo:"#141619",
    border:"#3a3f48", line:"#2b3038", grid:"#23272e",
    ink:"#eef1f6", mut:"#9aa3b2", dim:"#5c636f",
    amber:"#ff8a1e", green:"#43c96b", red:"#e2352b", cyan:"#38b6c9",
    band:["#ff7a1a","#ffce3a","#38c0d8","#b07dff"] };

  /* ================= biquad magnitude (matches Web Audio) ================= */
  const FS=48000;
  function biquadDb(type,f0,gainDb,Q,f){
    f0=clamp(f0,10,FS/2-10);Q=Math.max(0.05,Q);
    const w0=2*Math.PI*f0/FS,cw=Math.cos(w0),sw=Math.sin(w0),A=Math.pow(10,gainDb/40),alpha=sw/(2*Q);
    let b0,b1,b2,a0,a1,a2;
    if(type==='peaking'){b0=1+alpha*A;b1=-2*cw;b2=1-alpha*A;a0=1+alpha/A;a1=-2*cw;a2=1-alpha/A;}
    else if(type==='lowshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)-(A-1)*cw+s2);b1=2*A*((A-1)-(A+1)*cw);b2=A*((A+1)-(A-1)*cw-s2);a0=(A+1)+(A-1)*cw+s2;a1=-2*((A-1)+(A+1)*cw);a2=(A+1)+(A-1)*cw-s2;}
    else if(type==='highshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)+(A-1)*cw+s2);b1=-2*A*((A-1)+(A+1)*cw);b2=A*((A+1)+(A-1)*cw-s2);a0=(A+1)-(A-1)*cw+s2;a1=2*((A-1)-(A+1)*cw);a2=(A+1)-(A-1)*cw-s2;}
    else if(type==='highpass'){b0=(1+cw)/2;b1=-(1+cw);b2=(1+cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    else {b0=(1-cw)/2;b1=1-cw;b2=(1-cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    const w=2*Math.PI*f/FS,phi=Math.pow(Math.sin(w/2),2);
    const num=Math.pow(b0+b1+b2,2)-4*(b0*b1+4*b0*b2+b1*b2)*phi+16*b0*b2*phi*phi;
    const den=Math.pow(a0+a1+a2,2)-4*(a0*a1+4*a0*a2+a1*a2)*phi+16*a0*a2*phi*phi;
    return 10*Math.log10(Math.max(1e-9,num)/Math.max(1e-9,den));
  }
  function eqTypeFactor(t){ return t==='AGGRESSIVE'?1.55:t==='SMOOTH'?0.6:t==='LEGACY'?0.82:1; }
  function eqMag(ch,f){ let g=0; const kf=eqTypeFactor(ch.eqType||'PRECISE');
    for(const b of ch.eq){ if(b.g!==0) g+=biquadDb(b.type,b.f,b.g,b.q*kf,f); }
    if(ch.hpfOn) g+=biquadDb('highpass',ch.hpf,0,0.707,f);
    if(ch.lpfOn) g+=biquadDb('lowpass',ch.lpf,0,0.707,f);
    return clamp(g,-30,20); }

  /* ================= SELECTED CHANNEL PHYSICAL KNOBS ================= */
  const KDEF={ gain:{min:-6,max:45}, hpf:{min:20,max:600,log:true}, gate:{min:-72,max:0}, comp:{min:-54,max:0}, pan:{min:-63,max:63},
    monitor:{min:-60,max:0}, eqQ:{min:0.1,max:10,log:true}, eqF:{min:20,max:20000,log:true}, eqG:{min:-18,max:18} };
  function knobP(def,v){ if(def.log) return clamp((Math.log(Math.max(def.min,v))-Math.log(def.min))/(Math.log(def.max)-Math.log(def.min)),0,1); return clamp((v-def.min)/(def.max-def.min),0,1); }
  function setPK(el,def,v){ const p=knobP(def,v); el.style.setProperty('--p',p); el.style.setProperty('--rot',(-135+p*270)+'deg'); }
  function pkVal(ch,k){ return {gain:ch.gain,hpf:ch.hpf,gate:ch.gateThr,comp:ch.compThr,pan:ch.pan,monitor:state.monitor}[k]; }
  function pkSet(ch,k,v){ const d=KDEF[k]; v=clamp(v,d.min,d.max);
    if(k==='gain')ch.gain=v; else if(k==='hpf')ch.hpf=Math.round(v); else if(k==='gate')ch.gateThr=Math.round(v);
    else if(k==='comp')ch.compThr=Math.round(v); else if(k==='pan')ch.pan=Math.round(v);
    else if(k==='monitor'){ state.monitor=Math.round(v); applyMonitor(); } }

  // build EQ 4-band knob columns
  function buildEqBands(){
    const host=$("#eqbands"); if(!host)return; host.innerHTML="";
    const nm=["LOW","LO-MID","HI-MID","HIGH"];
    for(let b=0;b<4;b++){
      const col=document.createElement("div"); col.className="eqband";
      col.innerHTML=`<div class="bt" style="background:${SC.band[b]}">${nm[b]}</div>
        <div class="pk sm" data-eq="${b}" data-p="g"><div class="ring" style="--led:${SC.band[b]}"></div><div class="cap"></div></div><div class="klbl">GAIN</div><div class="kval" data-v="g${b}">0.0</div>
        <div class="pk sm" data-eq="${b}" data-p="f"><div class="ring" style="--led:${SC.band[b]}"></div><div class="cap"></div></div><div class="klbl">FREQ</div><div class="kval" data-v="f${b}">1k</div>
        <div class="pk sm" data-eq="${b}" data-p="q"><div class="ring" style="--led:${SC.band[b]}"></div><div class="cap"></div></div><div class="klbl">Q</div><div class="kval" data-v="q${b}">1.0</div>`;
      host.appendChild(col);
    }
  }
  function fmtFreq(f){ return f>=1000?(f/1000).toFixed(f>=10000?0:1)+"k":Math.round(f); }
  function wirePKDrag(el,getV,setV,def){
    let drag=false,lastY=0;
    el.addEventListener("pointerdown",e=>{drag=true;lastY=e.clientY;el.setPointerCapture(e.pointerId);e.preventDefault();});
    el.addEventListener("pointermove",e=>{ if(!drag)return; const dy=lastY-e.clientY; lastY=e.clientY;
      const span=def.log?1:(def.max-def.min); let v=getV();
      if(def.log){ let p=knobP(def,v)+dy/180; p=clamp(p,0,1); v=def.min*Math.pow(def.max/def.min,p); }
      else v=v+dy*span/180;
      setV(clamp(v,def.min,def.max)); e.preventDefault(); });
    const up=()=>drag=false; el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
  }
  function wireSelectedKnobs(){
    document.querySelectorAll('.pk[data-k]').forEach(el=>{ const k=el.dataset.k; const def=KDEF[k];
      wirePKDrag(el, ()=>pkVal(CH[state.sel],k), v=>{ pkSet(CH[state.sel],k,v); if(k!=='monitor')applyChanAudio(state.sel); paintSelected(); drawScreen(); checkMissions(); }, def);
    });
    document.querySelectorAll('.pk[data-eq]').forEach(el=>{ const b=+el.dataset.eq, p=el.dataset.p;
      const def=p==='g'?KDEF.eqG:p==='f'?KDEF.eqF:KDEF.eqQ;
      wirePKDrag(el, ()=>{ const bd=CH[state.sel].eq[b]; return p==='g'?bd.g:p==='f'?bd.f:bd.q; },
        v=>{ const bd=CH[state.sel].eq[b]; if(p==='g')bd.g=v; else if(p==='f')bd.f=Math.round(v); else bd.q=v; state.eqBand=b; applyChanAudio(state.sel); paintSelected(); drawScreen(); checkMissions(); }, def);
    });
    // phase / phantom
    const bPhase=$("#scPhase"); if(bPhase) bPhase.onclick=()=>{ const c=CH[state.sel]; c.phase=!c.phase; applyChanAudio(c.i); paintSelected(); toast(c.phase?"Fase Ø <b>invertida</b>":"Fase normal"); };
    const bPhan=$("#scPhantom"); if(bPhan) bPhan.onclick=()=>{ const c=CH[state.sel]; c.phantom=!c.phantom; paintSelected(); toast(c.phantom?"<b>+48V</b> phantom ON":"+48V OFF"); };
    // Vi3000 Copy / Paste channel keys
    const bCopy=$("#btnCopy"); if(bCopy) bCopy.onclick=()=>{ chClip=snapCh(CH[state.sel]); toast("CH"+(state.sel+1)+" <b>copiado</b> — processamento na área de transferência"); };
    const bPaste=$("#btnPaste"); if(bPaste) bPaste.onclick=()=>{ if(!chClip){ toast("Nada copiado"); return; }
      const c=CH[state.sel], keepN=c.name, keepC=c.color; Object.assign(c,JSON.parse(JSON.stringify(chClip))); c.name=keepN; c.color=keepC;
      applyChanAudio(c.i); paintSelected(); paintBay(); drawScreen(); checkMissions(); toast("Colado em <b>CH"+(state.sel+1)+"</b>"); };
    // nav (access) buttons -> open screens
    document.querySelectorAll('.pbtn.nav[data-nav]').forEach(el=>{ el.onclick=()=>setMode(el.dataset.nav); });
  }
  function paintSelected(){
    // Null-safe: on the faithful Vi3000 surface the only physical channel controls are the
    // HA input stage (GAIN/HPF/Ø/48V); everything else (EQ/DYN/PAN/…) lives on the Vistonics
    // glass, so those elements may not exist in the DOM. Guard every access.
    const ch=CH[state.sel];
    const S=id=>document.getElementById(id), setTxt=(id,v)=>{const e=S(id); if(e)e.textContent=v;};
    const setpk=(sel,def,v)=>{const e=$(sel); if(e)setPK(e,def,v);};
    const el=S("scCC"); if(el)el.style.background=ch.color;
    setTxt("scNM",ch.name); setTxt("scNN","CH "+(ch.i+1));
    setTxt("scGain",(ch.gain>0?"+":"")+ch.gain.toFixed(0));
    setTxt("scHpf",ch.hpf); setTxt("scGate",ch.gateThr); setTxt("scComp",ch.compThr); setTxt("scPan",panTxt(ch.pan));
    setTxt("scMon",state.monitor);
    setpk('.pk[data-k="gain"]',KDEF.gain,ch.gain); setpk('.pk[data-k="hpf"]',KDEF.hpf,ch.hpf);
    setpk('.pk[data-k="gate"]',KDEF.gate,ch.gateThr); setpk('.pk[data-k="comp"]',KDEF.comp,ch.compThr);
    setpk('.pk[data-k="pan"]',KDEF.pan,ch.pan); setpk('.pk[data-k="monitor"]',KDEF.monitor,state.monitor);
    ch.eq.forEach((b,bi)=>{
      setpk(`.pk[data-eq="${bi}"][data-p="g"]`,KDEF.eqG,b.g);
      setpk(`.pk[data-eq="${bi}"][data-p="f"]`,KDEF.eqF,b.f);
      setpk(`.pk[data-eq="${bi}"][data-p="q"]`,KDEF.eqQ,b.q);
      const g=$(`[data-v="g${bi}"]`); if(g)g.textContent=(b.g>0?"+":"")+b.g.toFixed(1);
      const f=$(`[data-v="f${bi}"]`); if(f)f.textContent=fmtFreq(b.f);
      const q=$(`[data-v="q${bi}"]`); if(q)q.textContent=b.q.toFixed(2);
    });
    const ph=S("scPhase"); if(ph)ph.classList.toggle("lit",ch.phase);
    const pp=S("scPhantom"); if(pp){ pp.classList.toggle("red",true); pp.classList.toggle("lit",ch.phantom); }
    // nav highlight
    document.querySelectorAll('.pbtn.nav[data-nav]').forEach(el=>el.classList.toggle("on",el.dataset.nav===state.mode));
    paintVist();
  }
  function selectChannel(i){ state.sel=i; paintSelected(); paintBay(); paintVist(); drawScreen(); drawInputScreens(); checkMissions(); }

  /* ================= VISTONICS II — encoders-around-screen ================= */
  // The 8 physical encoders beneath the screen map to 8 on-screen "tiles".
  // The active processing block (CHANNEL / D-EQ / GATE·COMP / BUS SENDS) reassigns them.
  function fmtMs(v){ return v>=1000?(v/1000).toFixed(1)+"s":Math.round(v)+"ms"; }
  const VBAND=48; // on-glass Vistonics II 16-encoder control zone (px) — mounted ON the screen
  const NVENC=16; // Vistonics II: 16 encoders + push-switches embedded in the glass
  function vistCells(){
    const c=CH[state.sel]; if(!c) return [];
    const cell=(label,val,get,set,def,sw,color)=>({label,val,get,set,def,sw,color});
    const M=state.mode; const bn=["LF","LMF","HMF","HF"];

      cell("HF F", fmtFreq(c.eq[3].f), ()=>c.eq[3].f, v=>{c.eq[3].f=Math.round(v);state.eqBand=3;}, KDEF.eqF, null, SC.band[3]),
      cell("HF G", (c.eq[3].g>0?"+":"")+c.eq[3].g.toFixed(1), ()=>c.eq[3].g, v=>{c.eq[3].g=v;state.eqBand=3;}, KDEF.eqG, null, SC.band[3]),
      cell("COMP", c.compThr+"", ()=>c.compThr, v=>{c.compThr=Math.round(v);}, KDEF.comp, swComp, SC.cyan),
      cell("GATE", c.gateThr+"", ()=>c.gateThr, v=>{c.gateThr=Math.round(v);}, KDEF.gate, swGate, SC.green),

  function vistCommit(){ applyChanAudio(state.sel); paintSelected(); paintVist(); drawScreen(); checkMissions(); }
  function buildVist(){
    const host=$("#vist"); if(!host)return; host.innerHTML="";
    for(let i=0;i<NVENC;i++){ const el=document.createElement("div"); el.className="venc";
      el.innerHTML=`<div class="vlbl" data-vl="${i}">—</div>
        <div class="pk" data-v="${i}"><div class="ring" style="--led:#ff9a2e"></div><div class="cap"></div></div>
        <div class="vval" data-vv="${i}">—</div>
        <div class="vsw" data-vsw="${i}">·</div>`;
      host.appendChild(el);
    }
    document.querySelectorAll('.pk[data-v]').forEach(el=>{ const i=+el.dataset.v;
      let drag=false,lastY=0;
      el.addEventListener("pointerdown",e=>{drag=true;lastY=e.clientY;el.setPointerCapture(e.pointerId);e.preventDefault();});
      el.addEventListener("pointermove",e=>{ if(!drag)return; const c=vistCells()[i]; if(!c)return; const def=c.def;
        const dy=lastY-e.clientY; lastY=e.clientY; let v=c.get();
        if(def.log){ let p=knobP(def,v)+dy/180; p=clamp(p,0,1); v=def.min*Math.pow(def.max/def.min,p); }
        else v=v+dy*(def.max-def.min)/180;
        c.set(clamp(v,def.min,def.max)); vistCommit(); e.preventDefault(); });
      const up=()=>drag=false; el.addEventListener("pointerup",up); el.addEventListener("pointercancel",up);
    });
    document.querySelectorAll('.vsw[data-vsw]').forEach(el=>{ const i=+el.dataset.vsw;
      el.onclick=()=>{ const c=vistCells()[i]; if(c&&c.sw){ c.sw.tgl(); vistCommit(); } }; });
    paintVist();
  }
  function paintVist(){
    const cells=vistCells();
    for(let i=0;i<NVENC;i++){ const c=cells[i];
      const lbl=$(`[data-vl="${i}"]`), val=$(`[data-vv="${i}"]`), sw=$(`[data-vsw="${i}"]`), pk=$(`.pk[data-v="${i}"]`);
      if(lbl){ lbl.textContent=c?c.label:""; lbl.style.color=c?(c.color||SC.mut):SC.mut; }
      if(val) val.textContent=c?c.val:"";
      if(pk){ const ring=pk.querySelector('.ring'); if(ring&&c)ring.style.setProperty('--led',c.color||'#ff9a2e'); if(c)setPK(pk,c.def,c.get()); }
      if(sw){ if(c&&c.sw){ const on=!!c.sw.on(); sw.classList.remove('blank'); sw.classList.toggle('on',on); sw.textContent=on?(c.sw.tOn||"IN"):(c.sw.tOff||"OUT"); }
        else { sw.classList.add('blank'); sw.classList.remove('on'); sw.textContent="·"; } }
    }
    const vh=$("#vhint"); if(vh){ const nm={selected:"CANAL",overview:"CANAL",eq:"D-EQ",gate:"DINÂMICA",comp:"DINÂMICA",sends:"BUS SENDS"};
      vh.textContent="VISTONICS II · "+(nm[state.mode]||"CANAL")+" — os 16 encoders na tela ajustam as células (toque um bloco p/ reatribuir)"; }
  }
  // draw the on-glass Vistonics II control zone (16 encoder tiles printed on the screen glass,
  // each aligned exactly above its physical encoder; ring colour + label follow the touched section)
  function drawVistRibbon(y0){ const cells=vistCells(), cw=W/NVENC;
    const g=ctx.createLinearGradient(0,y0,0,H); g.addColorStop(0,"#0e1013"); g.addColorStop(1,"#050608");
    ctx.fillStyle=g; ctx.fillRect(0,y0,W,H-y0);
    ctx.strokeStyle="#ff8a1e55"; ctx.lineWidth=1; ctx.beginPath();ctx.moveTo(0,y0+.5);ctx.lineTo(W,y0+.5);ctx.stroke();
    ctx.textBaseline="alphabetic";
    for(let i=0;i<NVENC;i++){ const c=cells[i], x=i*cw;
      if(i>0){ ctx.strokeStyle="#00000088"; ctx.beginPath();ctx.moveTo(x+.5,y0+2);ctx.lineTo(x+.5,H-2);ctx.stroke(); }
      if(!c)continue; const col=c.color||SC.mut, cxm=x+cw/2;
      // on-glass encoder ring graphic
      const val=c.get(); const d=c.def; let p=d.log?(Math.log(Math.max(d.min,val)/d.min)/Math.log(d.max/d.min)):((val-d.min)/(d.max-d.min)); p=clamp(p,0,1);
      const ry=y0+21, rr=8.5; ctx.lineWidth=2.4;
      ctx.strokeStyle="#1c1f25"; ctx.beginPath(); ctx.arc(cxm,ry,rr,Math.PI*0.75,Math.PI*0.75+Math.PI*1.5); ctx.stroke();
      ctx.strokeStyle=col; ctx.beginPath(); ctx.arc(cxm,ry,rr,Math.PI*0.75,Math.PI*0.75+Math.PI*1.5*p); ctx.stroke();
      ctx.fillStyle="#0b0d10"; ctx.beginPath(); ctx.arc(cxm,ry,rr-3,0,7); ctx.fill();
      // label (top) + value (in ring)
      ctx.textAlign="center"; ctx.fillStyle=SC.mut; ctx.font="700 7px Inter"; ctx.fillText(c.label,cxm,y0+10);
      ctx.fillStyle=SC.ink; ctx.font="800 9px Inter"; ctx.fillText(c.val,cxm,y0+42);
      // on-glass push-switch indicator
      if(c.sw){ const on=!!c.sw.on(); ctx.fillStyle=on?col:"#2a2e35"; roundRect(x+cw-13,y0+3,10,7,2); ctx.fill();
        ctx.fillStyle=on?"#08110a":"#6a7482"; ctx.font="700 5px Inter"; ctx.fillText(on?c.sw.tOn:c.sw.tOff,x+cw-8,y0+9); }
      reg({x,y:y0,w:cw,h:H-y0,onDown:()=>{ if(c.sw){ c.sw.tgl(); vistCommit(); } }});
    }
    ctx.textAlign="left"; ctx.textBaseline="alphabetic";
  }

  /* ================= INPUT VISTONICS SCREENS (bays 1-3) =================
     Each of the three top-left screens shows its bay's 8 input channels as tiles
     (name / meter / fader / ON) with a row of 8 encoders rendered ON the glass
     (HA GAIN per channel). Tap a tile → SEL that channel; drag its rail → fader;
     drag an on-glass encoder → gain. Fully self-contained (own ctx/hit-regions).  */
  function makeInputScreen(canvasId, bay){
    const cel=document.getElementById(canvasId); if(!cel) return null;
    const cx=cel.getContext("2d"); let w=0,h=0,dpr=1; const regs=[];
    function rrect(x,y,ww,hh,r){ cx.beginPath();cx.moveTo(x+r,y);cx.arcTo(x+ww,y,x+ww,y+hh,r);cx.arcTo(x+ww,y+hh,x,y+hh,r);cx.arcTo(x,y+hh,x,y,r);cx.arcTo(x,y,x+ww,y,r);cx.closePath(); }
    function imeter(x,y,ww,hh,dbfs){ cx.fillStyle="#0a0c10"; cx.fillRect(x,y,ww,hh);
      const t=clamp((dbfs+60)/60,0,1),vh=hh*t; const g=cx.createLinearGradient(0,y+hh,0,y);
      g.addColorStop(0,"#2ea85a");g.addColorStop(.6,"#37c86a");g.addColorStop(.82,"#e8c33a");g.addColorStop(1,"#e0483f");
      cx.fillStyle=g; cx.fillRect(x,y+hh-vh,ww,vh); }

      w=r.width; h=r.height; cel.width=w*dpr; cel.height=h*dpr; cx.setTransform(dpr,0,0,dpr,0,0); draw(); }

      cx.fillStyle=g; cx.fillRect(0,0,w,h);
      cx.fillStyle=SC.mut; cx.font="700 8px Inter,system-ui"; cx.textAlign="left"; cx.textBaseline="alphabetic";
      const _bo=state.chBank*24; cx.fillText("INPUTS · BAY "+(bay+1)+"  ·  CH "+(_bo+bay*8+1)+"-"+(_bo+bay*8+8),8,11);
      const ribH=VBAND, tTop=16, tBot=h-ribH-3, n=8, cw=w/n;
      for(let s=0;s<n;s++){ const ci=state.chBank*24+bay*8+s, ch=CH[ci]; if(!ch) continue;
        const x=s*cw, tx=x+2.5, tw=cw-5, sel=state.sel===ci;

    [30,100,300,1000,3000,10000].forEach(f=>{ const x=gx+fx(f)*gw; ctx.strokeStyle=SC.grid; ctx.lineWidth=1; ctx.beginPath();ctx.moveTo(x,gy);ctx.lineTo(x,gy+gh);ctx.stroke();
      ctx.fillStyle=SC.dim; ctx.fillText(f>=1000?(f/1000)+"k":f,x,gy+gh-3); });
    for(let d=-18;d<=18;d+=6){ const yy=gy+gh/2-d/24*gh/2; ctx.strokeStyle=d===0?"#5a5048":"#2b2621"; ctx.beginPath();ctx.moveTo(gx,yy);ctx.lineTo(gx+gw,yy);ctx.stroke();

      ctx.strokeStyle=SC.band[bi]+"55"; ctx.lineWidth=1; ctx.stroke(); });

    ctx.beginPath();
    for(let px=0;px<=gw;px+=2){ const f=fInv(px/gw),gg=eqMag(ch,f),yy=gy+gh/2-gg/24*gh/2; px===0?ctx.moveTo(gx,yy):ctx.lineTo(gx+px,yy); }

    n.lpf.frequency.setTargetAtTime(c.lpfOn?c.lpf:20000,t,0.02);
    const kf=eqTypeFactor(c.eqType);
    c.eq.forEach((b,bi)=>{ const f=n.eq[bi]; if(f.type!==b.type)f.type=b.type; f.frequency.setTargetAtTime(clamp(b.f,20,20000),t,0.02); f.gain.setTargetAtTime(b.g,t,0.02); f.Q.setTargetAtTime(clamp(b.q*kf,0.05,18),t,0.02); });
    if(c.compOn){ n.comp.threshold.value=c.compThr; n.comp.ratio.value=(c.compRatio>=40?20:Math.max(1,c.compRatio)); n.comp.attack.value=clamp(c.compAtk/1000,0,0.12); n.comp.release.value=clamp(c.compRel/1000,0.005,1.5); n.comp.knee.value=(c.compKnee==='HARD'||c.compKnee===0)?0:clamp(c.compKnee*4,0,30); n.mk.gain.setTargetAtTime(dbToLin(c.compGain),t,0.02); }
    else { n.comp.threshold.value=0; n.comp.ratio.value=1; n.mk.gain.setTargetAtTime(1,t,0.02); }
    n.pan.pan.setTargetAtTime(clamp(c.pan/63,-1,1),t,0.02);
    let dcaLin=1,muted=false;
    for(let g=0;g<N_DCA;g++){ if(c.dca[g]){ if(!state.dcaOn[g])muted=true; dcaLin*=dbToLin(state.dcaGain[g]); } }
    if(!c.muteSafe) for(let g=0;g<N_MUTE;g++){ if(c.mute[g]&&state.muteActive[g])muted=true; }
    const soloMuted = anyCue() && !c.cue;
    const audible=c.on&&!muted&&!soloMuted&&c.fader>FMIN&&c.hasAudio;
    n.fdr.gain.setTargetAtTime(audible?dbToLin(c.fader)*dcaLin:0,t,0.02);
    n.revSend.gain.setTargetAtTime((c.hasAudio&&c.fxRev>FMIN)?dbToLin(c.fxRev):0,t,0.02);
    n.dlySend.gain.setTargetAtTime((c.hasAudio&&c.fxDly>FMIN)?dbToLin(c.fxDly):0,t,0.02);
  };
  function applyFX(){ if(!ac||!fxRack)return; const t=ac.currentTime; fxRack.revRet.gain.setTargetAtTime(state.fx.revOn?state.fx.revMix:0,t,0.03); fxRack.dly.delayTime.setTargetAtTime(clamp(state.fx.dlyTime,0,1.5),t,0.03); fxRack.dfb.gain.setTargetAtTime(clamp(state.fx.dlyFb,0,0.9),t,0.03); fxRack.dlyRet.gain.setTargetAtTime(state.fx.dlyOn?state.fx.dlyMix:0,t,0.03); }
  function processGates(){ if(!ac)return; const t=ac.currentTime;
    for(let i=0;i<MAXCH;i++){ const n=aNodes[i],c=CH[i]; if(!n)continue;
      if(!c.gateOn||!playing||!c.hasAudio){ n.gate.gain.setTargetAtTime(1,t,0.01); c._gr=0; continue; }
      n.preAn.getFloatTimeDomainData(n.preBuf); let s=0; for(let k=0;k<n.preBuf.length;k++)s+=n.preBuf[k]*n.preBuf[k];
      const rms=Math.sqrt(s/n.preBuf.length),db=rms>1e-5?20*Math.log10(rms):-90; const open=db>c.gateThr,target=open?1:dbToLin(c.gateRange);
      const tc=Math.max(0.004,(open?c.gateAtk:c.gateDecay)/1000/3); n.gate.gain.setTargetAtTime(target,t,tc); c._gr=open?0:Math.max(0,-c.gateRange); }
  }
  function applyMasterAudio(){ if(ac&&masterGain){ masterGain.gain.setTargetAtTime(dbToLin(state.master),ac.currentTime,0.02); monoTrim.gain.setTargetAtTime(dbToLin(state.mono),ac.currentTime,0.02); } }
  applyMonitor=function(){ /* monitor bus is didactic; dim lowers master monitor feel */ };
  function snapCh(c){ return JSON.parse(JSON.stringify({gain:c.gain,phase:c.phase,phantom:c.phantom,hpfOn:c.hpfOn,hpf:c.hpf,lpfOn:c.lpfOn,lpf:c.lpf,eq:c.eq,eqType:c.eqType,gateOn:c.gateOn,gateThr:c.gateThr,gateRange:c.gateRange,gateAtk:c.gateAtk,gateHold:c.gateHold,gateDecay:c.gateDecay,compOn:c.compOn,compThr:c.compThr,compRatio:c.compRatio,compAtk:c.compAtk,compRel:c.compRel,compKnee:c.compKnee,compGain:c.compGain,pan:c.pan,fader:c.fader,on:c.on,sends:c.sends,sendOn:c.sendOn,sendPre:c.sendPre,dca:c.dca,mute:c.mute,fxRev:c.fxRev,fxDly:c.fxDly})); }
  function storeScene(slot){ scenes[slot]={ ch:CH.map(snapCh), master:state.master, mono:state.mono, dcaGain:state.dcaGain.slice(), dcaOn:state.dcaOn.slice(), muteActive:state.muteActive.slice(), fx:JSON.parse(JSON.stringify(state.fx)), ts:Date.now() }; toast("Cue "+(slot+1)+" <b>armazenada</b> ✔"); }
  function recallScene(slot){ const s=scenes[slot]; if(!s){ toast("Cue "+(slot+1)+" vazia"); return; }
    s.ch.forEach((sc,i)=>Object.assign(CH[i],JSON.parse(JSON.stringify(sc)))); state.master=s.master; if(s.mono!=null)state.mono=s.mono;
    state.dcaGain=s.dcaGain.slice(); state.dcaOn=s.dcaOn.slice(); state.muteActive=s.muteActive.slice(); state.fx=JSON.parse(JSON.stringify(s.fx));
    if(fxRack)fxRack.conv.buffer=makeImpulse(state.fx.revSize);
    for(let i=0;i<MAXCH;i++)applyChanAudio(i); applyMasterAudio(); applyFX();
    paintBay(); paintSelected(); paintRightRack(); drawScreen(); toast("Cue "+(slot+1)+" <b>recuperada</b> ▸ faders atualizados"); }
  function chLevelDb(i){ if(!ac||!aNodes[i])return -90; const n=aNodes[i]; n.an.getFloatTimeDomainData(n.buf); let s=0; for(let k=0;k<n.buf.length;k++)s+=n.buf[k]*n.buf[k]; const rms=Math.sqrt(s/n.buf.length); return rms>1e-5?20*Math.log10(rms):-90; }
  function masterLevelDb(){ if(!masterAn)return -90; masterAn.getFloatTimeDomainData(masterAn._buf); let s=0; for(let k=0;k<masterAn._buf.length;k++)s+=masterAn._buf[k]*masterAn._buf[k]; const rms=Math.sqrt(s/masterAn._buf.length); return rms>1e-5?20*Math.log10(rms):-90; }
  async function loadBuf(url){ if(bufCache[url])return bufCache[url]; const r=await fetch(url); if(!r.ok)throw new Error("HTTP "+r.status); const ab=await r.arrayBuffer(); const b=await ac.decodeAudioData(ab); bufCache[url]=b; return b; }
  function setStatus(txt,col){ const el=$("#audioStatus"); if(el){ el.textContent="áudio: "+txt; el.style.color=col||"var(--muted)"; } }
  function loadSong(idx){ curSong=idx; const song=SONGS[idx];
    for(let i=0;i<MAXCH;i++){ const st=song.stems[i],c=CH[i];
      if(st){ c.name=st.n; c.color=st.c; c.file=st.f; c.pan=st.p; c.hpfOn=st.h; c.hpf=st.h?100:80; c.hasAudio=true; c.on=true; c.fader=-3; c.gain=16; c.phase=false; c.phantom=false; }
      else { c.name="—"; c.color="#334155"; c.file=null; c.hasAudio=false; c.on=false; } }
    buildBay(); paintBay(); paintSelected(); paintRightRack(); drawScreen(); if(ac){ for(let i=0;i<MAXCH;i++)applyChanAudio(i); } }
  function setPlayBtn(on){ const b=$("#playBtn"); if(b){ b.disabled=false; b.style.color="#04121a"; b.textContent=on?"⏸ Parar":"► Tocar base"; b.style.background=on?"#e0483f":"#22b866"; } }
  function setPlayLoading(n,total){ const b=$("#playBtn"); if(b){ b.disabled=true; b.style.background="#f4a02a"; b.style.color="#0b0f14"; b.textContent="⏳ CARREGANDO "+n+"/"+total; } setStatus("baixando stems "+n+"/"+total+"…","#f4a02a"); }
  function preloadSong(){ try{ if(!ac)buildAudioGraph(); }catch(e){ return; } if(!ac)return; const song=SONGS[curSong],base=SB+song.folder+"/"; song.stems.forEach(st=>{ try{ loadBuf(base+st.f).catch(()=>{}); }catch(e){} }); }
  async function playSong(){ if(loadingSong)return;
    if(!ac)buildAudioGraph(); if(ac.state==="suspended"){ try{await ac.resume();}catch(e){} }
    const song=SONGS[curSong],base=SB+song.folder+"/",tok=++loadTok; loadingSong=true; let done=0; setPlayLoading(0,song.stems.length);
    let bufs; try{ bufs=await Promise.all(song.stems.map(st=>loadBuf(base+st.f).then(b=>{ done++; if(tok===loadTok)setPlayLoading(done,song.stems.length); return b; }))); }
    catch(e){ loadingSong=false; setPlayBtn(false); setStatus("erro ao baixar stem — "+e.message+" (tente de novo)","#e0483f"); return; }
    loadingSong=false; if(tok!==loadTok){ setPlayBtn(playing); return; }
    stopSong(true); const t0=ac.currentTime+0.12;
    song.stems.forEach((st,i)=>{ if(i>=MAXCH||!aNodes[i])return; const src=ac.createBufferSource(); src.buffer=bufs[i]; src.loop=true; if(bufs.__le===undefined){var _m=1e9;for(var _k=0;_k<bufs.length;_k++){if(bufs[_k]&&bufs[_k].duration<_m)_m=bufs[_k].duration;}bufs.__le=_m;} if(bufs.__le>0.5&&bufs.__le<1e8){src.loopStart=0;src.loopEnd=bufs.__le;} src.connect(aNodes[i].trim); src.start(t0); realSources.push(src); });
    for(let i=0;i<MAXCH;i++)applyChanAudio(i); playing=true; setPlayBtn(true); setStatus("tocando ♪ "+song.label,"#3ad07a"); }
  function stopSong(keep){ realSources.forEach(s=>{try{s.stop();}catch(e){}}); realSources=[]; playing=false; setPlayBtn(false); if(!keep)setStatus("parado"); }

  /* ================= LOOP / METERS ================= */
  function loop(){ const now=perf(); processGates();
    // bay meters
    for(let i=0;i<bayStrips.length;i++){ const o=bayStrips[i]; if(!o.ctl){continue;} let db=o.ctl.meter?o.ctl.meter():-90; let t;
      if(playing){ t=clamp((db+48)/48,0,1); if(o.ctl.kind!=='ch'&&o.ctl.kind!=='st'&&o.ctl.kind!=='mono')t=0; }
      else { if(o.ctl.kind==='ch'&&o.ctl.hasAudio()){ const c=CH_fromCtl(o.ctl); const env=0.5+0.5*Math.sin(now/(260+(c?c.i*23:0))+(c?c.i:0)); let post=(c?c.src+c.gain:-60)+(o.ctl.on?(o.ctl.fdb<=FMIN?-90:o.ctl.fdb):-90)+env*8-4; t=clamp((post+50)/50,0,1); } else t=0; }
      o.meter.style.height=(t*100)+"%"; }
    if(playing||state.mode!=="overview") drawScreen();
    if(playing) drawInputScreens();
    drawBridge();
    requestAnimationFrame(loop);
  }
  function CH_fromCtl(ctl){ // find channel index by name match (ch only)
    for(let i=0;i<MAXCH;i++) if(CH[i].name===ctl.name) return CH[i]; return null; }

  /* ================= INIT ================= */
  buildEqBands(); wireSelectedKnobs(); buildVist(); buildRightRack();
  inputScreens=[ makeInputScreen("iscr0",0), makeInputScreen("iscr1",1), makeInputScreen("iscr2",2) ];
  (function initAudioUI(){ const sel=$("#songSel"); if(sel){ SONGS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.label; sel.appendChild(o); }); sel.value=0; sel.onchange=()=>{ if(loadingSong)return; const w=playing; stopSong(true); loadSong(+sel.value); preloadSong(); if(w)playSong(); }; }
    const pb=$("#playBtn"); if(pb){ pb.onclick=()=>{ if(loadingSong)return; if(playing)stopSong(); else playSong(); }; } })();
  buildBay(); loadSong(0); try{ buildAudioGraph(); }catch(e){}
  try{ preloadSong(); }catch(e){}
  document.addEventListener("pointerdown",function(){ try{ preloadSong(); }catch(e){} },{once:true,capture:true});
  updateSofUi(); paintMission(); paintRightRack();
  try{ const _m=new URLSearchParams(location.search).get('mode'); if(_m){ const tb=[...document.querySelectorAll('#tabs .tab')].find(b=>b.dataset.mode===_m); if(tb)setTimeout(()=>tb.click(),60); } }catch(e){}
  window.addEventListener("resize",sizeCanvas); setTimeout(sizeCanvas,30); requestAnimationFrame(loop);
  // lightweight debug hook (for automated verification; no UI impact)
  window.__vi={ CH, state, MAXCH, chLevelDb, masterLevelDb, selectChannel, vistCells, apply:i=>applyChanAudio(i),
    isPlaying:()=>playing, isLoading:()=>loadingSong, ac:()=>ac, aN:i=>aNodes[i], masterDb:()=>masterLevelDb(), setMode:m=>setMode(m),
    applyFX:()=>applyFX(), tap:()=>tapDelay(),
    fdrGain:i=>{ return (ac&&aNodes[i])?aNodes[i].fdr.gain.value:0; },
    revSendGain:i=>{ return (ac&&aNodes[i])?aNodes[i].revSend.gain.value:0; },
    revRetGain:()=>{ return fxRack?fxRack.revRet.gain.value:0; }, dlyTime:()=>{ return fxRack?fxRack.dly.delayTime.value:0; },
    setCue:(i,v)=>{CH[i].cue=v;applyCue();}, play:()=>playSong(), stop:()=>stopSong(),
    songs:()=>SONGS, setSongs:a=>{SONGS=a;}, curSong:()=>curSong, loadSong:i=>loadSong(i),
    grOf:i=>{ return (ac&&aNodes[i])?-aNodes[i].comp.reduction:0; }, gateGain:i=>{ return (ac&&aNodes[i])?aNodes[i].gate.gain.value:1; },
    pump:()=>processGates(),
    nStrips:()=>bayStrips.length, nVenc:()=>NVENC, layer:()=>FBLAYERS[curLayer].id,
    nInputScreens:()=>inputScreens.filter(Boolean).length };
  setInterval(()=>{ const l=$("#danteLed"); if(l){ l.classList.toggle("warn"); setTimeout(()=>l.classList.remove("warn"),120); } },4000);

  /* ================= FIT (preserved) ================= */
  function fitConsole(){ const con=document.querySelector('.console'); if(!con)return;
    const vw=window.innerWidth,vh=window.innerHeight;
    if(vw<560){ document.body.classList.add('stacked'); con.classList.add('stacked'); con.style.zoom=''; document.body.style.alignItems='flex-start';
      // NÃO dar zoom-para-caber: o antigo (vw-6)/cw encolhia o console inteiro a ~0,38 e deixava
      // fader/botão a ~12px (impossível tocar). Agora o console é capado à largura da tela por CSS
      // e a bay de faders rola horizontalmente em TAMANHO CHEIO (.console.stacked .bay overflow-x). }
    }
    else{ document.body.classList.remove('stacked'); con.classList.remove('stacked'); con.style.zoom=''; const _DW=con.offsetWidth, _DH=con.offsetHeight;
      con.style.zoom=''; const DW=con.offsetWidth||1520, DH=con.offsetHeight||940;   // mede o tamanho REAL
      const scrH=(window.screen&&screen.height)||vh; const iframeTaller=vh>scrH+8; const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6); const effVh=Math.max(240,visH-headerAllow);
      document.body.style.alignItems=(iframeTaller||vh>700)?'flex-start':'center';
      let s=Math.min((vw-16)/DW,effVh/DH); s=Math.max(0.3,Math.min(s,2.4)); con.style.zoom=s; }
    try{ sizeCanvas(); }catch(e){}
  }
  window.addEventListener('resize',fitConsole); setTimeout(fitConsole,45);
})();
</script>
