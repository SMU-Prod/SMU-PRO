<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<link rel="icon" href="data:,">
<title>Soundcraft Signature 22 MTK — Simulador fiel (SMU)</title>
<style>
  :root{
    --ink:#e9edf2; --muted:#9aa6b4; --red:#d81f2a; --gold:#e8b53a; --green:#3fbf6a; --blue:#3f8fd8;
    --char0:#3a3d42; --char1:#2c2f34; --char2:#232529; --char3:#1a1c20;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%}
  body{
    background:radial-gradient(1200px 700px at 50% -10%,#1c1e22,#0c0d0f 60%),#0a0b0c;
    color:var(--ink);
    font-family:"Inter",system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    -webkit-font-smoothing:antialiased; user-select:none; overflow:hidden;
    display:flex; align-items:flex-start; justify-content:center;
  }
  /* ===== CONSOLE ===== */
  .console{position:relative;flex:0 0 auto;transform-origin:top center;width:fit-content;
    display:flex;flex-direction:column;gap:8px;padding:12px;
    background:linear-gradient(180deg,#42454b,#303337 7%,#26282c 60%,#1d1f22);
    border:1px solid #050506;border-radius:14px;
    box-shadow:0 30px 80px #000a, inset 0 1px 0 #ffffff12, inset 0 -2px 0 #0008;}

  /* top bar */
  .top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;
    background:linear-gradient(180deg,#26282c,#17181b);border:1px solid #070708;border-radius:10px;padding:7px 12px}
  .brand{display:flex;align-items:baseline;gap:9px}
  .brand .sc{font-size:19px;font-weight:900;letter-spacing:2px;color:#fff;text-transform:uppercase}
  .brand .sc b{color:var(--red)}
  .brand .m{font-size:10px;letter-spacing:2px;color:#8f99a6;text-transform:uppercase}
  .pill{font-size:10.5px;color:var(--muted);background:#0c0e11;border:1px solid #2a2f36;border-radius:16px;padding:4px 9px;display:flex;align-items:center;gap:6px;letter-spacing:.4px}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 8px var(--green)}
  .btnp{font:inherit;font-size:11.5px;font-weight:700;border:0;border-radius:8px;padding:7px 13px;cursor:pointer}
  .spacer{flex:1}
  select.pill{cursor:pointer;color:var(--ink);font:inherit;font-size:11px;max-width:240px}
  .hint{font-size:11px;color:var(--muted);letter-spacing:.2px}
  .hint b{color:var(--gold)}

  /* meter bridge */
  .bridge{background:linear-gradient(180deg,#101216,#0a0b0d);border:1px solid #070708;border-radius:9px;padding:5px 9px;
    box-shadow:inset 0 2px 6px #000a}
  #mbridge{display:block;width:100%;height:44px}

  /* surface layout */
  .surface{display:flex;gap:8px;align-items:stretch}
  .bay{display:flex;gap:0;background:linear-gradient(180deg,#26282c,#1b1d20);border:1px solid #070708;border-radius:10px;padding:8px 6px;
    box-shadow:inset 0 1px 0 #ffffff0c,0 6px 16px #0006}

  /* channel strip */
  .strip{width:74px;flex:0 0 auto;display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 3px 5px;
    border-right:1px solid #0c0d0f;position:relative}
  .strip:last-child{border-right:0}
  .strip .snum{font-size:9px;font-weight:800;color:#c7cfdb;letter-spacing:.5px;line-height:1}
  .xlr{width:14px;height:14px;border-radius:50%;border:2px solid #6b7280;position:relative;margin:1px 0 0}
  .xlr::before,.xlr::after,.xlr i{content:"";position:absolute;width:2.4px;height:2.4px;border-radius:50%;background:#9aa6b4}
  .xlr::before{top:2px;left:50%;transform:translateX(-50%)}
  .xlr::after{bottom:2.5px;left:3px}.xlr i{bottom:2.5px;right:3px}
  .seclbl{font-size:6.5px;letter-spacing:.8px;color:#7f8a98;text-transform:uppercase;font-weight:700;margin-top:2px}

  /* knob unit */
  .ku{display:flex;flex-direction:column;align-items:center;gap:1px}
  .krow{display:flex;gap:5px;justify-content:center;align-items:flex-end}
  .kl{font-size:6.5px;letter-spacing:.2px;color:#8a94a2;text-transform:uppercase;line-height:1;text-align:center}
  .kv{font-size:7.5px;font-weight:700;color:#dfe5ee;line-height:1}
  .pk{--sz:30px;--led:#8ab4d8;width:var(--sz);height:var(--sz);position:relative;touch-action:none;cursor:ns-resize}
  .pk.sm{--sz:22px}.pk.xs{--sz:19px}
  .pk .ring{position:absolute;inset:-3px;border-radius:50%;
    background:conic-gradient(from 215deg, var(--led) calc(var(--p,0)*270deg), #0c0e11 0 270deg, #14161a 0);
    -webkit-mask:radial-gradient(farthest-side,#0000 calc(100% - 4px),#000 calc(100% - 3.5px));
            mask:radial-gradient(farthest-side,#0000 calc(100% - 4px),#000 calc(100% - 3.5px))}
  .pk .cap{position:absolute;inset:2px;border-radius:50%;
    background:radial-gradient(circle at 50% 30%,var(--capc,#5a5f68),#2c2f35 62%,#202226);
    border:1px solid #0d0f12;box-shadow:inset 0 2px 4px #0009,0 1px 1px #ffffff10}
  .pk .cap::after{content:"";position:absolute;left:50%;top:50%;width:2.6px;height:2.6px;border-radius:2px;background:#f2f5fa;
    box-shadow:0 0 3px #fff8;transform:translate(-50%,-50%) rotate(var(--rot,0deg)) translateY(calc(var(--sz)*-0.30))}

  /* small buttons */
  .sw{font:inherit;font-size:6.5px;font-weight:800;letter-spacing:.2px;color:#aeb9c7;cursor:pointer;text-align:center;
    background:linear-gradient(180deg,#3a3e45,#24262b);border:1px solid #0c0d10;border-radius:4px;padding:3px 2px;line-height:1;
    box-shadow:inset 0 1px 0 #ffffff12,0 1px 2px #0007}
  .sw:active{transform:translateY(1px)}
  .sw.lit{color:#160607;background:linear-gradient(180deg,#ff8a8f,var(--red));border-color:#5e0d12;box-shadow:0 0 7px #d81f2a99}
  .sw.gold.lit{color:#1a1405;background:linear-gradient(180deg,#ffdf8a,var(--gold));border-color:#6b5410;box-shadow:0 0 7px #e8b53a99}
  .sw.blue.lit{color:#04121a;background:linear-gradient(180deg,#9fd0ff,var(--blue));border-color:#0d466e;box-shadow:0 0 7px #3f8fd899}
  .swrow{display:flex;gap:3px;width:100%;justify-content:center}
  .swrow .sw{flex:1;min-width:0}
  .dbx{font-size:6px;font-weight:900;letter-spacing:.3px;color:#7f8a98;border:1px solid #3a3e45;border-radius:3px;padding:1px 3px}
  .dbx.on{color:#160607;background:var(--gold);border-color:#6b5410}

  /* fader zone */
  .fz{display:flex;gap:4px;align-items:stretch;justify-content:center;height:150px;margin-top:2px}
  .meter{width:6px;border-radius:2px;background:#05070a;position:relative;overflow:hidden;border:1px solid #14171d}
  .meter i{position:absolute;left:0;right:0;bottom:0;height:0;background:linear-gradient(0deg,#37c86a,#37c86a 62%,#e8c33a 84%,#e0483f);transition:height .05s linear}
  .fader{width:22px;flex:0 0 auto;position:relative;background:linear-gradient(90deg,#0a0b0d,#141519,#0a0b0d);border-radius:4px;border:1px solid #0b0c0e;cursor:ns-resize;touch-action:none}
  .fader .trk{position:absolute;left:50%;top:8px;bottom:8px;width:2px;transform:translateX(-50%);background:#000}
  .fader .u{position:absolute;left:2px;right:2px;height:1px;background:#39414f}
  .cap2{position:absolute;left:-4px;right:-4px;height:20px;border-radius:3px;cursor:grab;
    background:linear-gradient(180deg,#26292f,#0e0f12 48%,#050506 52%,#181a1f);border:1px solid #000;box-shadow:0 2px 4px #000a,inset 0 1px 0 #ffffff14}
  .cap2::after{content:"";position:absolute;left:3px;right:3px;top:50%;height:2px;transform:translateY(-50%);background:#d7deea;border-radius:1px}
  .cap2 b{position:absolute;left:2px;right:2px;top:50%;transform:translateY(-50%);height:2px;background:var(--stc,#d81f2a);border-radius:1px;opacity:.85}
  .nlcd{width:100%;height:20px;border-radius:4px;margin-top:2px;display:flex;align-items:center;justify-content:center;
    border:1px solid #000;box-shadow:inset 0 2px 4px #0008;overflow:hidden}
  .nlcd span{font-size:7.5px;font-weight:800;color:#12100a;padding:0 2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%}
  .fdb{font-size:7px;font-weight:700;color:#c9d2e0}

  /* master */
  .master{width:284px;flex:0 0 auto;background:linear-gradient(180deg,#2b2d31,#1c1e21);border:1px solid #070708;border-radius:10px;
    padding:8px;display:flex;flex-direction:column;gap:7px;box-shadow:inset 0 1px 0 #ffffff0c,0 6px 16px #0006}
  .mtitle{font-size:8px;letter-spacing:2px;color:#8b95a3;text-transform:uppercase;font-weight:800;margin:0 0 3px}
  .mtitle b{color:var(--red)}
  .mpanel{background:linear-gradient(180deg,#232529,#191b1e);border:1px solid #0b0c0e;border-radius:8px;padding:7px 8px}
  .lex{display:flex;gap:8px}
  .lexeng{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .lcd{width:100%;height:26px;border-radius:5px;background:linear-gradient(180deg,#07240f,#04160a);border:1px solid #000;
    box-shadow:inset 0 2px 6px #000c;display:flex;align-items:center;justify-content:center}
  .lcd span{font-family:"DS-Digital","Courier New",monospace;font-size:12px;font-weight:800;color:#46e88a;letter-spacing:1px;text-shadow:0 0 7px #46e88a66}
  .lexbtns{display:flex;gap:4px;width:100%}
  .lexbtns .sw{flex:1}
  .amast{display:flex;gap:6px;justify-content:space-between}
  .aux1{display:flex;flex-direction:column;align-items:center;gap:2px}
  .monrow{display:flex;gap:10px;align-items:flex-end;justify-content:space-around}
  .mainwrap{flex:1;display:flex;gap:12px;align-items:stretch}
  .maincol{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px}
  .mainfz{flex:1;display:flex;gap:6px;justify-content:center;min-height:150px}
  .mainfz .fader{width:26px}.mainfz .cap2{height:24px}
  .mainfz .meter{width:8px}
  .leds{display:flex;flex-direction:column;gap:8px;justify-content:center;align-items:center;padding:0 4px}
  .led{display:flex;flex-direction:column;align-items:center;gap:3px;font-size:6.5px;color:#8a94a2;letter-spacing:.5px}
  .led i{width:10px;height:10px;border-radius:50%;background:#123;border:1px solid #000}
  .led i.on{background:var(--green);box-shadow:0 0 8px var(--green)}
  .led i.red.on{background:var(--red);box-shadow:0 0 8px var(--red)}

  .toast{position:fixed;left:50%;bottom:16px;transform:translateX(-50%) translateY(20px);
    background:#131519;border:1px solid var(--gold);color:var(--ink);padding:9px 15px;border-radius:10px;
    font-size:12px;opacity:0;transition:.25s;pointer-events:none;z-index:50;box-shadow:0 8px 30px #000a}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
  .toast b{color:var(--gold)}
  .console.stacked{transform:none!important}
  body.stacked{overflow:auto}
  /* ===== PHONE (<560px) =====
     The Signature desk is a fixed ~1664px analog surface. Scaling it to fit a 390px phone
     needs zoom ~0.23, which is unreadable, and the old 0.30 floor made the PAGE scroll
     sideways (strips clipped off the right edge). Instead: stack bay over master and let
     each scroll horizontally INSIDE its own container — page never scrolls sideways,
     every knob stays full size and reachable. */
  body.stacked .console{width:100vw;max-width:100vw;box-sizing:border-box;padding:8px;border-radius:0}
  body.stacked .surface{flex-direction:column;gap:8px;align-items:stretch}
  body.stacked .bay{overflow-x:auto;max-width:100%;-webkit-overflow-scrolling:touch}
  body.stacked .master{width:100%;max-width:100%;box-sizing:border-box;overflow-x:auto;-webkit-overflow-scrolling:touch}
  body.stacked .top{max-width:100%;box-sizing:border-box}
</style>
</head>
<body>
<div class="console" id="console">
  <div class="top">
    <div class="brand"><span class="sc">SOUND<b>CRAFT</b></span><span class="m">Signature 22 MTK · Simulador SMU</span></div>
    <div class="pill"><span class="dot"></span> ANALOG</div>
    <div class="pill">Ghost mic pre</div>
    <button class="btnp" id="playBtn" style="background:#22b866;color:#04121a">► Tocar base</button>
    <select id="songSel" class="pill"></select>
    <span class="pill" id="audioStatus" style="color:var(--muted)">áudio: —</span>
    <div class="spacer"></div>
    <div class="hint">Mesa <b>analógica</b> — sem tela, sem cenas. Ajuste GAIN, EQ britânico, AUX/FX, PAN, PFL e faders 100 mm.</div>
  </div>

  <div class="bridge"><canvas id="mbridge"></canvas></div>

  <div class="surface">
    <div class="bay" id="bay"></div>
    <div class="master" id="master"></div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
"use strict";
(function(){
  /* ================= HELPERS ================= */
  const $=s=>document.querySelector(s);
  const clamp=(v,a,b)=>Math.max(a,Math.min(b,v));
  const FMIN=-90, FMAX=10;
  const dbToLin=db=>db<=FMIN?0:Math.pow(10,db/20);
  const perf=()=>performance.now();
  function faderTxt(db){ return db<=-59?"−∞":(db>0?"+":"")+db.toFixed(0); }
  function panTxt(p){ if(Math.abs(p)<3)return"C"; return (p<0?"L"+Math.round(-p):"R"+Math.round(p)); }
  function balTxt(b){ if(Math.abs(b)<4)return"C"; return (b<0?"L"+Math.round(-b):"R"+Math.round(b)); }
  function sendTxt(db){ return db<=-59?"OFF":(db>0?"+":"")+db.toFixed(0); }
  function fmtFreq(f){ return f>=1000?(f/1000).toFixed(f>=10000?0:1)+"k":Math.round(f); }
  function pos2db(p){ if(p<=0.008)return FMIN; return clamp(-60+p*70,FMIN,FMAX); }
  function db2pos(db){ if(db<=FMIN)return 0; return clamp((db+60)/70,0,1); }

  /* ================= EQ magnitude (for meter bridge only) ================= */
  const FS=48000;
  function biquadDb(type,f0,gainDb,Q,f){
    f0=clamp(f0,10,FS/2-10);Q=Math.max(0.05,Q);
    const w0=2*Math.PI*f0/FS,cw=Math.cos(w0),sw=Math.sin(w0),A=Math.pow(10,gainDb/40),alpha=sw/(2*Q);
    let b0,b1,b2,a0,a1,a2;
    if(type==='peaking'){b0=1+alpha*A;b1=-2*cw;b2=1-alpha*A;a0=1+alpha/A;a1=-2*cw;a2=1-alpha/A;}
    else if(type==='lowshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)-(A-1)*cw+s2);b1=2*A*((A-1)-(A+1)*cw);b2=A*((A+1)-(A-1)*cw-s2);a0=(A+1)+(A-1)*cw+s2;a1=-2*((A-1)+(A+1)*cw);a2=(A+1)+(A-1)*cw-s2;}
    else if(type==='highshelf'){const s2=2*Math.sqrt(A)*alpha;b0=A*((A+1)+(A-1)*cw+s2);b1=-2*A*((A-1)+(A+1)*cw);b2=A*((A+1)+(A-1)*cw-s2);a0=(A+1)-(A-1)*cw+s2;a1=2*((A-1)-(A+1)*cw);a2=(A+1)-(A-1)*cw-s2;}
    else if(type==='highpass'){b0=(1+cw)/2;b1=-(1+cw);b2=(1+cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    else {b0=(1-cw)/2;b1=1-cw;b2=(1-cw)/2;a0=1+alpha;a1=-2*cw;a2=1-alpha;}
    const w=2*Math.PI*f/FS,phi=Math.pow(Math.sin(w/2),2);
    const num=Math.pow(b0+b1+b2,2)-4*(b0*b1+4*b0*b2+b1*b2)*phi+16*b0*b2*phi*phi;
    const den=Math.pow(a0+a1+a2,2)-4*(a0*a1+4*a0*a2+a1*a2)*phi+16*a0*a2*phi*phi;
    return 10*Math.log10(Math.max(1e-9,num)/Math.max(1e-9,den));
  }

  /* ================= CHANNEL MODEL (24 engine channels; 22 used) ================= */
  function mkCh(i){ return { i, name:"—", color:"#334155", file:null, hasAudio:false,
    gain:16, phase:false, hpfOn:false, hpf:100,
    eq:[{type:'lowshelf',f:60,g:0,q:0.7},{type:'peaking',f:250,g:0,q:1.0},{type:'peaking',f:2500,g:0,q:1.0},{type:'highshelf',f:12000,g:0,q:0.7}],
    compOn:false, compThr:-6, compRatio:7,
    pan:0, fader:-3, on:true, cue:false, fxRev:FMIN, fxDly:FMIN, src:-42 }; }
  const CH=Array.from({length:24},(_,i)=>mkCh(i));
  const REV_TYPES=[{n:"HALL",size:2.8},{n:"ROOM",size:1.2},{n:"PLATE",size:0.7},{n:"CHAMBER",size:3.6}];
  const DLY_TYPES=[{n:"1/4 DLY",time:0.40,fb:0.32},{n:"1/8 DLY",time:0.20,fb:0.28},{n:"ECHO",time:0.50,fb:0.48},{n:"SLAP",time:0.09,fb:0.12}];
  // Lexicon dual engine: each effect exposes TWO variable params (decay/time+fb) + wet RETURN + on/off; delay tappable.
  const state={ master:-3, fx:{ rev:{type:0,mix:0.9,on:true,decay:REV_TYPES[0].size},
    dly:{type:0,mix:0.9,on:true,time:DLY_TYPES[0].time,fb:DLY_TYPES[0].fb} }, auxPre:[false,false,false], phones:-14 };
  let lastTap=0;

  /* ================= STRIP DEFINITIONS (14 mono + 4 stereo = 22 inputs) ================= */
  const STRIPS=[];
  for(let m=0;m<14;m++) STRIPS.push({ kind:'mono', chans:[m], num:String(m+1), dbx:(m<8), bands:4 });
  STRIPS.push({ kind:'stereo', chans:[14,15], num:"15/16", dbx:false, bands:4 });
  STRIPS.push({ kind:'stereo', chans:[16,17], num:"17/18", dbx:false, bands:4 });
  STRIPS.push({ kind:'stereo', chans:[18,19], num:"19/20", dbx:false, bands:3 });
  STRIPS.push({ kind:'stereo', chans:[20,21], num:"21/22", dbx:false, bands:3 });
  function stripDefaults(s){
    s.gain=16; s.phase=false; s.phantom=(s.kind==='mono'); s.hpfOn=false; s.dbxOn=false;
    s.lf=0; s.lomid={f:250,g:0}; s.himid={f:2500,g:0}; s.hf=0; s.mid={f:800,g:0};
    s.aux=[-60,-60,-60]; s.fx1=-60; s.fx2=-60;
    s.pan=0; s.bal=0; s.fader=-3; s.on=true; s.cue=false;
  }
  STRIPS.forEach(stripDefaults);

  /* ================= WEB AUDIO ENGINE (adapted from CL5 template) ================= */
  let ac=null,masterGain=null,lim=null,masterAn=null,playing=false,curSong=0,loadTok=0,realSources=[];
  let fxRack=null,auxBus=null; const bufCache={},aNodes=[];

  /* ===================== P() — automação que TERMINA =====================
     Um AudioParam com automação pendente sai do caminho rápido do navegador: o
     parâmetro passa a ser calculado amostra por amostra e, num BiquadFilter, isso
     obriga a recalcular TODO o coeficiente (com seno/cosseno) 48.000 vezes por
     segundo — por filtro.

     setTargetAtTime é exponencial: matematicamente nunca chega ao alvo, então o
     evento NUNCA termina. Um fader encostado uma única vez deixava aquele parâmetro
     caro para sempre, e a mesa parada seguia pesada.

     MEDIDO na CL5 (Queen, 42 canais): 34,5% do áudio deixava de ser renderizado
     (199 engasgos em 20 s); depois de congelar os parâmetros já assentados, 0,7%.

     P() faz o que uma mesa faz: rampa suave enquanto o operador move, valor fixo
     quando parou. */
  const _emRampa=[];
  function P(p,alvo,t,tc){
    if(!p) return;
    if(p._alvo===alvo) return;                       // já está indo para lá: não reagenda
    p._alvo=alvo;
    if(Math.abs((p.value||0)-alvo)<1e-7){ try{p.cancelScheduledValues(0);}catch(e){} p.value=alvo; return; }
    p.setTargetAtTime(alvo,t,tc);
    p._congelaEm=t+Math.max(tc,0.002)*6;             // 6 constantes de tempo ≈ 99,8% do caminho
    if(_emRampa.indexOf(p)<0)_emRampa.push(p);
  }
  function congelarParados(){
    if(!ac)return; const t=ac.currentTime;
    for(let i=_emRampa.length-1;i>=0;i--){ const p=_emRampa[i];
      if(t>=p._congelaEm){ const v=p._alvo; try{p.cancelScheduledValues(0);}catch(e){} p.value=v; _emRampa.splice(i,1); } }
  }
  /* varre também fora do quadro: aba em segundo plano congela o requestAnimationFrame */
  setInterval(congelarParados,250);
  const SB="https://pshynylvvkhhohftouoe.supabase.co/storage/v1/object/public/media/";
  const sg=(n,c,f,p,h)=>({n,c,f,p,h});
  const SONGS_FALLBACK=[
    {label:"Pagodão — Tá Sozinha", folder:"mix-pagodao-tasozinha", stems:[

    pk.addEventListener('pointermove',e=>{ if(!drag)return; const dy=ly-e.clientY; ly=e.clientY; let v=opt.get();
      if(opt.log){ let pp=clamp(p(v)+dy/160,0,1); v=opt.min*Math.pow(opt.max/opt.min,pp); }
      else v=v+dy*(opt.max-opt.min)/160;
      opt.set(clamp(v,opt.min,opt.max)); render(); if(opt.after)opt.after(); e.preventDefault(); });
    const up=()=>drag=false; pk.addEventListener('pointerup',up); pk.addEventListener('pointercancel',up); pk.addEventListener('lostpointercapture',up);
    parent.appendChild(wrap); render(); renderers.push(render); return {render,el:pk};
  }
  function makeFader(parent,opt){
    // opt:{get,set,color,after}
    const fz=document.createElement('div'); fz.className=opt.zoneClass||'fz';
    fz.innerHTML=`<div class="meter"><i></i></div><div class="fader"><div class="trk"></div><div class="u"></div><div class="cap2"><b style="--stc:${opt.color||'#d81f2a'}"></b></div></div>`;
    const fader=fz.querySelector('.fader'), cap=fz.querySelector('.cap2'), uMark=fz.querySelector('.u'), meterI=fz.querySelector('.meter i');
    function render(){ const pos=db2pos(opt.get()); const h=fader.clientHeight||150; const top=8,bot=h-8; const y=bot-(bot-top)*pos-10; cap.style.top=y+'px'; uMark.style.top=(bot-(bot-top)*db2pos(0)-1)+'px'; }
    let drag=false;
    function toDb(clientY){ const r=fader.getBoundingClientRect(); const z=(window.__zoom||1); const top=8,bot=r.height/z-8; const y=(clientY-r.top)/z; const pos=clamp(1-(y-top)/(bot-top),0,1); return pos2db(pos); }
    fader.addEventListener('pointerdown',e=>{drag=true;try{fader.setPointerCapture(e.pointerId);}catch(_){}opt.set(toDb(e.clientY));render();if(opt.after)opt.after();e.preventDefault();});
    fader.addEventListener('pointermove',e=>{ if(!drag)return; opt.set(toDb(e.clientY)); render(); if(opt.after)opt.after(); e.preventDefault(); });
    const up=()=>drag=false; fader.addEventListener('pointerup',up); fader.addEventListener('pointercancel',up); fader.addEventListener('lostpointercapture',up);
    parent.appendChild(fz); renderers.push(render); setTimeout(render,0); return {render,meterI};
  }

  /* ================= SONG LOAD / TRANSPORT ================= */
  function setStatus(txt,col){ const el=$("#audioStatus"); if(el){ el.textContent="áudio: "+txt; el.style.color=col||"var(--muted)"; } }
  // A mesa expõe MAXCH (22) canais; stems além disso são ignorados (console sem patch extra).
  function loadSong(idx){
    curSong=idx; const song=SONGS[idx];
    for(let ci=0;ci<24;ci++){ const st=(ci<MAXCH)?song.stems[ci]:null, c=CH[ci];
      if(st){ c.name=st.n; c.color=st.c; c.file=st.f; c.hasAudio=true; c.src=-42; }
      else { c.name="—"; c.color="#334155"; c.file=null; c.hasAudio=false; c.on=false; } }
    // reset strips to defaults, seed pan from stems (mono) & label
    STRIPS.forEach(s=>{ stripDefaults(s);
      const p0=CH[s.chans[0]];
      if(s.kind==='mono') s.pan=clamp(p0.pan!=null?SONGpan(song,s.chans[0]):0,-63,63);
      s.on=p0.hasAudio; });
    // seed mono pans from stem
    STRIPS.forEach(s=>{ if(s.kind==='mono'){ const st=(s.chans[0]<MAXCH)?song.stems[s.chans[0]]:null; s.pan=st?clamp(st.p,-63,63):0; } });
    buildBay();
    applyAll();
    if(ac) for(let ci=0;ci<24;ci++) applyChanAudio(ci);
  }
  function SONGpan(song,ci){ const st=(ci<MAXCH)?song.stems[ci]:null; return st?st.p:0; }
  let loadingSong=false;
  function setPlayLoading(n,total){ const b=$("#playBtn"); if(b){ b.disabled=true; b.style.background="#f4a02a"; b.style.color="#04121a"; b.textContent="⏳ CARREGANDO BASE… "+n+"/"+total; } setStatus("baixando stems "+n+"/"+total+"…","#f4a02a"); }
  function setPlayBtn(on){ const b=$("#playBtn"); if(b){ b.disabled=false; b.textContent=on?"⏸ Parar":"► Tocar base"; b.style.background=on?"#e0483f":"#22b866"; b.style.color="#04121a"; } }
  async function playSong(){ if(loadingSong)return;
    if(!ac){ try{buildAudioGraph();}catch(e){ setStatus("erro áudio","#e0483f"); return; } }
    if(ac.state==="suspended"){ try{await ac.resume();}catch(e){} }
    const song=SONGS[curSong],base=SB+song.folder+"/",tok=++loadTok;
    const useStems=song.stems.slice(0,MAXCH);
    loadingSong=true; let done=0; setPlayLoading(0,useStems.length);
    /* Carga em LOTES, não todas de uma vez: baixar tudo em paralelo mantém dezenas de
       arquivos comprimidos na memória enquanto o navegador ainda decodifica os anteriores.
       Cada faixa tem direito a UMA segunda tentativa — a primeira falha costuma ser só
       o coletor de lixo ainda não ter devolvido a base anterior. */
    let bufs=[];
    const LOTE=6;
    try{
      for(let k=0;k<useStems.length;k+=LOTE){
        const fatia=useStems.slice(k,k+LOTE);
        const parte=await Promise.all(fatia.map(st=>loadBuf(base+st.f)
          .catch(()=>new Promise(r=>setTimeout(r,120)).then(()=>loadBuf(base+st.f)))
          .then(b=>{ done++; if(tok===loadTok)setPlayLoading(done,useStems.length); return b; })
          .catch(err=>{ err.stem=st.f; throw err; })));
        bufs=bufs.concat(parte);
        if(tok!==loadTok){ loadingSong=false; setPlayBtn(playing); return; }
      }
    }catch(e){ loadingSong=false; loadTok++;   /* invalida: impede que faixas atrasadas apaguem o erro da tela */
      setPlayBtn(false); setStatus("ERRO ao baixar "+(e.stem||"stem")+" — "+e.message+" (aperte Tocar de novo)","#e0483f"); return; }
    loadingSong=false;
    if(tok!==loadTok){ setPlayBtn(playing); return; }
    stopSong(true); const t0=ac.currentTime+0.12;
    /* Base de ENSAIO (todos os stems do mesmo tamanho) roda em LOOP. MÚSICA INTEIRA
       (stems de tamanhos diferentes) toca até o fim, como um multitrack de verdade.
       Antes eu igualava os tamanhos copiando cada stem curto para um buffer novo do
       tamanho do maior — no Queen isso alocava ~1,8 GB à toa e estourava a aba. */
    let durMax=0,durMin=Infinity,iLongo=0;
    bufs.forEach((b,i)=>{ if(!b)return; if(b.duration>durMax){durMax=b.duration;iLongo=i;} if(b.duration<durMin)durMin=b.duration; });
    const emLoop=(durMax-durMin)<0.02;
    useStems.forEach((st,i)=>{ if(i>=MAXCH||!aNodes[i])return; const src=ac.createBufferSource();
      src.buffer=bufs[i]; src.loop=emLoop; src.connect(aNodes[i].trim); src.start(t0); realSources.push(src); });
    if(!emLoop){ const fim=realSources.find(s=>s.buffer===bufs[iLongo]); if(fim) fim.onended=()=>{ stopSong(); setStatus("fim da música","#7fb2c8"); }; }
    for(let i=0;i<24;i++)applyChanAudio(i); playing=true; setPlayBtn(true); setStatus("tocando ♪ "+song.label,"#3fbf6a"); }
  function stopSong(keep){ realSources.forEach(s=>{try{s.onended=null;s.stop();s.disconnect();}catch(e){}}); realSources=[]; playing=false; setPlayBtn(false); if(!keep)setStatus("parado"); }

  /* ================= METERS / LOOP ================= */
  const mbridge=$("#mbridge"); const mctx=mbridge.getContext('2d'); let DPR=1;
  function sizeBridge(){ DPR=Math.min(2,window.devicePixelRatio||1); const w=mbridge.clientWidth,h=mbridge.clientHeight; mbridge.width=w*DPR; mbridge.height=h*DPR; mctx.setTransform(DPR,0,0,DPR,0,0); }
  function drawBridge(){ const w=mbridge.clientWidth,h=mbridge.clientHeight; if(!w)return; mctx.clearRect(0,0,w,h);
    const n=STRIPS.length; const gap=3, bw=(w-gap*(n+1))/n;
    for(let i=0;i<n;i++){ const s=STRIPS[i]; const ci=s.chans[0]; let db=(playing&&CH[ci].hasAudio)?chLevelDb(ci):-90;
      if(s.chans.length>1){ const d2=(playing&&CH[s.chans[1]].hasAudio)?chLevelDb(s.chans[1]):-90; db=Math.max(db,d2); }
      const t=clamp((db+54)/54,0,1); const x=gap+i*(bw+gap); const bh=(h-8)*t;
      mctx.fillStyle="#0c0f13"; mctx.fillRect(x,4,bw,h-8);
      const grad=mctx.createLinearGradient(0,h-4,0,4); grad.addColorStop(0,'#37c86a'); grad.addColorStop(0.62,'#37c86a'); grad.addColorStop(0.84,'#e8c33a'); grad.addColorStop(1,'#e0483f');
      mctx.fillStyle=grad; mctx.fillRect(x,h-4-bh,bw,bh); }
  }
  function loop(){ congelarParados();
    for(const o of stripMeters){ const s=o.s; const ci=s.chans[0]; let db;
      if(playing){ db=CH[ci].hasAudio?chLevelDb(ci):-90; if(s.chans.length>1&&CH[s.chans[1]].hasAudio)db=Math.max(db,chLevelDb(s.chans[1])); }
      else db=-90;
      const t=clamp((db+48)/48,0,1); o.meterI.style.height=(t*100)+"%"; }
    if(masterMeterI){ const db=playing?masterLevelDb():-90; masterMeterI.style.height=(clamp((db+48)/48,0,1)*100)+"%"; if(clipLed)clipLed.classList.toggle('on',db>-1.5); }
    drawBridge();
    requestAnimationFrame(loop);
  }

  /* ================= TOAST ================= */
  let toastT; function toast(msg){ const el=$("#toast"); el.innerHTML=msg; el.classList.add("show"); clearTimeout(toastT); toastT=setTimeout(()=>el.classList.remove("show"),1700); }

  /* ================= INIT ================= */
  (function initUI(){ const sel=$("#songSel"); SONGS.forEach((s,i)=>{ const o=document.createElement("option"); o.value=i; o.textContent=s.label; sel.appendChild(o); }); sel.value=0;
    sel.onchange=()=>{ if(loadingSong)return; const w=playing; stopSong(true); loadSong(+sel.value); freeOutrasBases(); if(w)playSong(); };
    $("#playBtn").onclick=()=>{ if(loadingSong)return; if(playing)stopSong(); else playSong(); };
  })();
  buildMaster();
  loadSong(0);
  /* sem AudioContext e sem pré-carga no load: só no PLAY */
  sizeBridge(); window.addEventListener('resize',sizeBridge);
  requestAnimationFrame(loop);

  /* ================= DEBUG HOOK (verification only) ================= */
  window.__sig={ CH, STRIPS, state, aNodes, get fxRack(){return fxRack;}, applyStrip, applyAll, applyChanAudio, applyFX,
    chLevelDb, masterLevelDb, anyCue, playSong, stopSong, get playing(){return playing;}, get ac(){return ac;},
    applyAux, auxLevelDb, get auxBus(){return auxBus;},
    auxSendGain:(i,a)=>{ const n=aNodes[i]; if(!n||!n.auxPreG)return 0; return state.auxPre[a]?n.auxPreG[a].gain.value:n.auxPostG[a].gain.value; },
    auxPreGain:(i,a)=>(aNodes[i]&&aNodes[i].auxPreG)?aNodes[i].auxPreG[a].gain.value:0,
    auxPostGain:(i,a)=>(aNodes[i]&&aNodes[i].auxPostG)?aNodes[i].auxPostG[a].gain.value:0,
    auxMasterGain:a=>(auxBus&&auxBus[a])?auxBus[a].g.gain.value:0 };

  /* ================= FIT (preserved from template) ================= */
  function fitConsole(){ const con=document.querySelector('.console'); if(!con)return;
    const vw=window.innerWidth,vh=window.innerHeight;
    if(vw<560){ // PHONE: bay e master empilhados, cada um com rolagem horizontal PRÓPRIA.
      // Não aplicamos zoom aqui: o CSS body.stacked já limita a mesa a 100vw, então a PÁGINA
      // nunca rola de lado e os controles continuam no tamanho legível (antes: zoom 0.30 => vazava).
      document.body.classList.add('stacked'); con.classList.remove('stacked');
      con.style.zoom=''; window.__zoom=1;
      document.body.style.alignItems='flex-start';
    }
    else{ document.body.classList.remove('stacked'); con.classList.remove('stacked');
      con.style.zoom=''; const DW=con.offsetWidth||1600, DH=con.offsetHeight||860;
      const scrH=(window.screen&&screen.height)||vh; const iframeTaller=vh>scrH+8; const visH=Math.min(vh,scrH);
      const headerAllow=iframeTaller?84:(vh>700?40:6); const effVh=Math.max(240,visH-headerAllow);
      document.body.style.alignItems=(iframeTaller||vh>700)?'flex-start':'center';
      let s=Math.min((vw-16)/DW,effVh/DH); s=Math.max(0.3,Math.min(s,2.4)); con.style.zoom=s; window.__zoom=s; }
    renderers.forEach(r=>{try{r();}catch(_){}}); try{sizeBridge();}catch(e){}
  }
  window.__zoom=1;
  window.addEventListener('resize',fitConsole); setTimeout(fitConsole,45); setTimeout(fitConsole,300);
})();
</script>
</body>
