<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMU PRO · Escolhendo a Tela</title>
<style>
  *{box-sizing:border-box;margin:0;padding:0;}
  :root{--bg:#0c1017;--panel:#161c26;--panel2:#1d2431;--line:#2a3444;--ink:#e7edf5;--dim:#8794a8;--accent:#3b82f6;--ok:#22c55e;--err:#ef4444;}
  html,body{background:var(--bg);color:var(--ink);font-family:'Segoe UI',system-ui,Arial,sans-serif;}
  body{padding:12px;}
  .app{max-width:880px;margin:0 auto;display:flex;flex-direction:column;gap:12px;}
  .card{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:14px;}
  h1{font-size:15px;margin-bottom:3px;} .sub{font-size:12px;color:var(--dim);margin-bottom:12px;}
  .scen{background:#101826;border:1px solid #24405f;border-radius:10px;padding:12px;}
  .scen .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--accent);margin-bottom:5px;}
  .scen .txt{font-size:13.5px;line-height:1.5;} .scen .txt b{color:#fff;}
  .facts{display:flex;gap:6px;flex-wrap:wrap;margin-top:9px;}
  .fact{font-size:10.5px;background:#0c1119;border:1px solid var(--line);border-radius:14px;padding:3px 9px;color:var(--dim);}
  .fact b{color:var(--ink);}
  .opts{display:grid;grid-template-columns:1fr;gap:8px;margin-top:12px;}
  @media(min-width:640px){ .opts{grid-template-columns:repeat(3,1fr);} }
  .opt{background:var(--panel2);border:1px solid var(--line);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:.12s;}
  .opt:hover{border-color:var(--accent);}
  .opt.right{border-color:var(--ok);background:#0e2018;} .opt.wrong{border-color:var(--err);background:#2a0e0e;}
  .opt .ic{font-size:26px;} .opt .nm{font-size:13px;font-weight:800;margin-top:4px;} .opt .ds{font-size:10.5px;color:var(--dim);margin-top:3px;line-height:1.35;}
  .verdict{font-size:13px;font-weight:700;padding:10px;border-radius:9px;text-align:center;margin-top:12px;}
  .verdict.ok{background:#14532d;color:#bbf7d0;} .verdict.bad{background:#450a0a;color:#fca5a5;} .verdict.idle{background:var(--panel2);color:var(--dim);}
  .note{font-size:12px;color:var(--dim);line-height:1.55;margin-top:10px;} .note b{color:var(--ink);}
  .bar{display:flex;align-items:center;gap:10px;margin-top:12px;} .score{font-size:13px;font-weight:800;color:var(--ok);} .sp{flex:1;}
  .btn{font-size:11.5px;padding:7px 12px;border:1px solid var(--line);border-radius:7px;background:#0c1119;color:var(--ink);cursor:pointer;}
</style>
</head>
<body>
<div class="app">
  <div class="card">
    <h1>Qual tela para cada trabalho?</h1>
    <div class="sub">Leia o caso e os fatos (luz do ambiente, tamanho, público, orçamento) e escolha entre <b>TV/monitor</b>, <b>telão de LED</b> ou <b>projetor</b>.</div>
    <div class="scen">
      <div class="lbl">Caso <span id="idx"></span></div>
      <div class="txt" id="scenTxt"></div>
      <div class="facts" id="facts"></div>
    </div>
    <div class="opts" id="opts"></div>
    <div class="verdict idle" id="verdict">Escolha a tela.</div>
    <div class="note" id="note"></div>
    <div class="bar"><span class="score" id="score">0 / 4</span><span class="sp"></span><button class="btn" id="reset">Recomeçar</button></div>
  </div>
</div>
<script>
(function(){
var $=function(s){return document.querySelector(s);};
var TELAS=[
  {id:'tv', ic:'🖥️', nm:'TV / Monitor', ds:'até ~85", público perto, barato e fácil'},
  {id:'led', ic:'🟦', nm:'Telão de LED', ds:'brilho altíssimo, funciona com luz/sol, modular'},
  {id:'proj', ic:'📽️', nm:'Projetor', ds:'área grande barata, precisa de luz controlada'}
];
var CASES=[
  {txt:'<b>Stand de feira</b>: mostrar um vídeo institucional para quem passa em frente, a 2-3 metros. O pavilhão é <b>bem iluminado</b>.', facts:['Ambiente: <b>claro</b>','Público: <b>a 2-3 m</b>','Tamanho: <b>pequeno</b>','Orçamento: <b>enxuto</b>'], a:'tv',
   why:'Público perto + imagem pequena + ambiente claro = <b>TV/monitor</b>. Projetor lavaria com a luz do pavilhão e um LED seria caro demais para essa necessidade.'},
  {txt:'<b>Show ao ar livre</b>, começa às 17h ainda com <b>sol</b>, telão de fundo do palco de 8 metros, público a 30 m.', facts:['Ambiente: <b>sol direto</b>','Público: <b>30 m</b>','Tamanho: <b>8 m</b>','Outdoor'], a:'led',
   why:'Com <b>sol</b>, só o <b>telão de LED</b> tem brilho (nits) para vencer a luz. Projetor sumiria completamente e não existe TV desse tamanho.'},
  {txt:'<b>Congresso em auditório escuro</b>: projetar slides numa tela de 6 metros para 400 pessoas. Orçamento apertado.', facts:['Ambiente: <b>escuro/controlado</b>','Público: <b>400 pessoas</b>','Tamanho: <b>6 m</b>','Orçamento: <b>apertado</b>'], a:'proj',
   why:'Área grande + <b>luz controlada</b> + orçamento apertado = <b>projetor</b>. É a forma mais barata de cobrir 6 metros; o escuro do auditório garante contraste.'},
  {txt:'<b>Casamento indoor</b>: telão atrás dos noivos que aparece o tempo todo <b>nas fotos e no vídeo</b>, com a iluminação cênica acesa.', facts:['Ambiente: <b>luz cênica acesa</b>','Aparece na <b>câmera</b>','Tamanho: <b>3 m</b>','Qualidade: <b>alta</b>'], a:'led',
   why:'Com luz cênica acesa e <b>câmera filmando</b>, o <b>LED</b> mantém brilho e cor firmes na imagem. O projetor ficaria lavado pela luz do ambiente e apagado no vídeo.'}
];
var i=0, score=0, locked=false;
function build(){ i=0; score=0; show(); }
function show(){
  locked=false;
  if(i>=CASES.length){ $('#scenTxt').innerHTML='<b>Você fechou os 4 casos.</b> A regra que fica: decida pela <b>luz do ambiente</b>, pela <b>distância do público</b>, pelo <b>tamanho</b> e pelo <b>orçamento</b> — nessa ordem.'; $('#facts').innerHTML=''; $('#opts').innerHTML=''; var v=$('#verdict'); v.className='verdict ok'; v.textContent='✓ Concluído — '+score+'/'+CASES.length; $('#note').innerHTML=''; return; }
  var c=CASES[i];
  $('#idx').textContent=(i+1)+'/'+CASES.length;
  $('#scenTxt').innerHTML=c.txt;
  $('#facts').innerHTML=c.facts.map(function(f){return '<span class="fact">'+f+'</span>';}).join('');
  var oe=$('#opts'); oe.innerHTML='';
  TELAS.forEach(function(t){ var b=document.createElement('div'); b.className='opt'; b.id='o-'+t.id;
    b.innerHTML='<div class="ic">'+t.ic+'</div><div class="nm">'+t.nm+'</div><div class="ds">'+t.ds+'</div>';
    b.onclick=function(){ pick(t.id); }; oe.appendChild(b); });
  $('#verdict').className='verdict idle'; $('#verdict').textContent='Escolha a tela.';
  $('#note').innerHTML=''; $('#score').textContent=score+' / '+CASES.length;
}
function pick(id){
  if(locked)return; var c=CASES[i];
  if(id===c.a){ locked=true; score++; $('#o-'+id).classList.add('right');
    var v=$('#verdict'); v.className='verdict ok'; v.textContent='✓ Certo!'; $('#note').innerHTML=c.why; $('#score').textContent=score+' / '+CASES.length;
    setTimeout(function(){ i++; show(); },2800);
  } else { $('#o-'+id).classList.add('wrong'); var v2=$('#verdict'); v2.className='verdict bad'; v2.textContent='✗ Reveja os fatos — principalmente a LUZ do ambiente.'; }
}
$('#reset').onclick=build;
window.__et={build:build, pick:pick, get score(){return score;}};
build();
})();
</script>
</body>
</html>
