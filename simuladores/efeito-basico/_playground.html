<!DOCTYPE html>
<html lang="pt-BR"><head><meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Playground · StageFX</title>
<style>
  html,body{margin:0;height:100%;background:#000;font-family:system-ui,Arial;overflow:hidden}
  #wrap{position:absolute;inset:0}
  canvas{width:100%;height:100%;display:block}
  #panel{position:absolute;left:10px;top:10px;display:flex;flex-wrap:wrap;gap:6px;max-width:60%}
  button{background:#161b22;color:#cbd5e1;border:1px solid #2d3748;border-radius:7px;padding:8px 10px;font-size:12px;cursor:pointer}
  button:hover{background:#222b38}
  #haze{position:absolute;right:14px;top:14px;color:#9fb;font-size:12px;background:#0009;padding:6px 8px;border-radius:6px}
  input[type=range]{width:120px}
</style></head>
<body>
<div id="wrap"><canvas id="c"></canvas></div>
<div id="panel">
  <button data-fx="fog">Fumaça</button>
  <button data-fx="haze">Haze +</button>
  <button data-fx="lowfog">Low Fog</button>
  <button data-fx="co2">CO₂ Jet</button>
  <button data-fx="cryo">Cryo blast</button>
  <button data-fx="spark">Faísca fria</button>
  <button data-fx="gerb">Gerb</button>
  <button data-fx="airburst">Airburst</button>
  <button data-fx="flame">Chama</button>
  <button data-fx="confetti">Confete</button>
  <button data-fx="streamer">Serpentina</button>
  <button data-fx="bubbles">Bolhas</button>
  <button data-fx="snow">Neve</button>
  <button id="beamsBtn">Feixes: ON</button>
  <button id="fireCO2L">CO₂ Duplo (drop)</button>
</div>
<div id="haze">haze <input id="hz" type="range" min="0" max="100" value="14"> <span id="hzv">0.14</span></div>
<script src="_engine.js"></script>
<script>
  const cv = document.getElementById('c');
  const fx = new StageFX(cv, { haze: 0.14, ledWall: 0.6, label: "SMU · Playground de Efeitos" });
  window.__fx = fx;
  document.querySelectorAll('button[data-fx]').forEach(b=>{
    b.onclick=()=>{
      const n=b.dataset.fx;
      if(n==='confetti'){ fx.trigger('confetti',{side:'L'}); fx.trigger('confetti',{side:'R'}); }
      else if(n==='co2'){ fx.trigger('co2',{x:520,power:1}); }
      else fx.trigger(n,{});
    };
  });
  let beams=true;
  document.getElementById('beamsBtn').onclick=(e)=>{ beams=!beams; fx.setBeams(beams); e.target.textContent="Feixes: "+(beams?"ON":"OFF"); };
  document.getElementById('fireCO2L').onclick=()=>{ fx.trigger('co2',{x:420}); fx.trigger('co2',{x:860}); fx.setHaze(0.4); };
  const hz=document.getElementById('hz'), hzv=document.getElementById('hzv');
  hz.oninput=()=>{ const v=hz.value/100; fx.setHaze(v); hzv.textContent=v.toFixed(2); };
</script>
</body></html>
