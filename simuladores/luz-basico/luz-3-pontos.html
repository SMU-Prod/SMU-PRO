<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Simulador — Iluminação de 3 Pontos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#0b0e14;color:#e7ecf3;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.console{width:1000px;height:620px;background:linear-gradient(180deg,#121722,#0d111a);border:1px solid #223049;border-radius:14px;padding:18px;display:grid;grid-template-columns:1.2fr .8fr;gap:16px;box-shadow:0 10px 40px #0008}
.stage{position:relative;background:#04060a;border:1px solid #1c2740;border-radius:12px;overflow:hidden}
.stage canvas{width:100%;height:100%;display:block}
.panel{display:flex;flex-direction:column;gap:11px;min-width:0}
h1{font-size:15px;font-weight:700;color:#cfe0ff}
.sub{font-size:11.5px;color:#8aa0c2;line-height:1.45}
.lamp{display:flex;align-items:center;gap:10px;background:#0e1421;border:1px solid #22314c;border-radius:9px;padding:8px 10px}
.lamp .sw{width:40px;height:22px;border-radius:999px;background:#2a3550;position:relative;flex:none;cursor:pointer;transition:.15s}
.lamp .sw.on{background:#39d98a}
.lamp .sw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:#fff;transition:.15s}
.lamp .sw.on i{left:20px}
.lamp .nm{font-size:12px;font-weight:700;flex:none;width:74px}
.lamp .desc{font-size:10.5px;color:#8298bd;flex:1;line-height:1.3}
.lamp input[type=range]{width:80px}
.mission{background:#0e1626;border:1px solid #24406e;border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5}
.mrow{display:flex;align-items:center;gap:8px;margin-top:4px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #37507a;flex:none}.dot.ok{background:#39d98a;border-color:#39d98a}
.btns{display:flex;gap:8px}
button{background:#1b2740;color:#dce7fb;border:1px solid #33507f;border-radius:8px;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer}
button:hover{background:#233459}
.read{font-size:11px;color:#88a; }
</style></head>
<body>
<div class="console" id="console">
  <div class="stage"><canvas id="cv"></canvas></div>
  <div class="panel">
    <div><h1>Iluminação de 3 Pontos</h1>
      <div class="sub">Acenda e regule cada luz e veja como o artista aparece. Só contra-luz = silhueta; só frontal = chapado. O equilíbrio dá volume.</div></div>
    <div id="lamps"></div>
    <div class="mission" id="mission"></div>
    <div class="btns"><button id="reset">Apagar tudo</button><button id="next">Próxima missão ▸</button></div>
  </div>
</div>
<script>
const L=[
 {k:'front',nm:'FRONTAL / Key',desc:'À frente, ~45°. A plateia vê o rosto.',on:false,v:75,col:'#fff2d8'},
 {k:'fill', nm:'FILL',        desc:'Lado oposto ao key. Suaviza a sombra.',on:false,v:45,col:'#eef4ff'},
 {k:'back', nm:'CONTRA-LUZ',  desc:'Atrás/acima. Separa do fundo, dá brilho.',on:false,v:80,col:'#dceaff'},
 {k:'cyc',  nm:'FUNDO / Cyc', desc:'Colore o ciclorama atrás.',on:false,v:60,col:'#3a6bff'},
];
const lampsEl=document.getElementById('lamps');
L.forEach(l=>{const el=document.createElement('div');el.className='lamp';el.dataset.k=l.k;
 el.innerHTML=`<div class="sw" data-sw></div><div class="nm" style="color:${l.col}">${l.nm}</div><div class="desc">${l.desc}</div><input type="range" min="0" max="100" value="${l.v}" data-r>`;
 lampsEl.appendChild(el);
 el.querySelector('[data-sw]').onclick=()=>{l.on=!l.on;render();};
 el.querySelector('[data-r]').oninput=e=>{l.v=+e.target.value;render();};
});
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
function sizeCanvas(){const r=cv.getBoundingClientRect();const dpr=Math.min(2,devicePixelRatio||1);cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);draw();}
function lampByK(k){return L.find(x=>x.k===k);}
function amt(k){const l=lampByK(k);return l.on?l.v/100:0;}
function draw(){
 const r=cv.getBoundingClientRect();const W=r.width,H=r.height;ctx.clearRect(0,0,W,H);
 // ciclorama (fundo)
 const cyc=amt('cyc');const cl=lampByK('cyc');
 ctx.fillStyle='#05070c';ctx.fillRect(0,0,W,H);
 if(cyc>0){const gr=ctx.createLinearGradient(0,0,0,H*0.82);gr.addColorStop(0,hex(cl.col,cyc*0.9));gr.addColorStop(1,hex(cl.col,cyc*0.25));ctx.fillStyle=gr;ctx.fillRect(0,0,W,H*0.82);}
 // chão
 ctx.fillStyle='#0a0d15';ctx.fillRect(0,H*0.82,W,H*0.18);
 const cx=W*0.5, groundY=H*0.82, headY=H*0.30;
 const front=amt('front'),fill=amt('fill'),back=amt('back');
 // sombra no chão (só com frontal/fill)
 const frontish=Math.max(front,fill*0.7);
 if(frontish>0){ctx.fillStyle=`rgba(0,0,0,${0.35*frontish})`;ctx.beginPath();ctx.ellipse(cx+18*frontish,groundY+4,60,12,0,0,7);ctx.fill();}
 // brilho de contra no chão
 if(back>0){const bg=ctx.createRadialGradient(cx,headY,4,cx,headY,H*0.5);bg.addColorStop(0,hex(lampByK('back').col,back*0.28));bg.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);}
 // ── artista ──
 // luz total no corpo: soma frontal+fill principalmente; back contorna
 const bodyLight=Math.min(1,front*0.9+fill*0.6);
 const fc=lampByK('front'),flc=lampByK('fill');
 // cor de corpo = mistura key/fill ponderada
 let br= front>0||fill>0 ? mix(fc.col,front,flc.col,fill) : {r:16,g:20,b:32};
 const baseL=0.12+0.88*bodyLight;
 const bodyCol=`rgb(${Math.round(br.r*baseL)},${Math.round(br.g*baseL)},${Math.round(br.b*baseL)})`;
 // corpo
 ctx.fillStyle=bodyCol;
 ctx.beginPath();ctx.moveTo(cx-26,groundY);ctx.lineTo(cx-16,headY+34);ctx.lineTo(cx+16,headY+34);ctx.lineTo(cx+26,groundY);ctx.closePath();ctx.fill();
 // cabeça
 ctx.beginPath();ctx.ellipse(cx,headY,17,20,0,0,7);ctx.fillStyle=bodyCol;ctx.fill();
 // rim light (contra) — contorno claro
 if(back>0){ctx.lineWidth=3;ctx.strokeStyle=hex(lampByK('back').col,Math.min(1,back));
  ctx.beginPath();ctx.ellipse(cx,headY,17,20,0,-1.9,-0.2);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx+26,groundY);ctx.lineTo(cx+16,headY+34);ctx.stroke();
  ctx.beginPath();ctx.moveTo(cx-26,groundY);ctx.lineTo(cx-16,headY+34);ctx.stroke();}
 // rosto: só aparece com frontal/fill
 if(bodyLight>0.15){ctx.fillStyle=`rgba(0,0,0,${0.5})`;ctx.beginPath();ctx.arc(cx-6,headY-2,1.6,0,7);ctx.arc(cx+6,headY-2,1.6,0,7);ctx.fill();}
 // rótulo de diagnóstico
 let msg='',mc='#7f96bb';
 if(back>0.1&&bodyLight<0.15){msg='⚠ Só contra-luz: o artista virou SILHUETA — a plateia não vê o rosto.';mc='#ffcf6b';}
 else if(bodyLight>0.15&&back<0.1){msg='Rosto visível, mas sem contra-luz ele “gruda” no fundo (chapado).';mc='#cfe0ff';}
 else if(bodyLight>0.15&&back>0.1&&fill>0.05){msg='✓ Frontal + fill + contra = imagem tridimensional e legível.';mc='#39d98a';}
 else if(bodyLight<0.05&&back<0.05&&cyc<0.05){msg='Palco escuro — acenda alguma luz.';}
 ctx.fillStyle=mc;ctx.font='11.5px system-ui';ctx.fillText(msg,12,H-14);
}
function hex(h,a){const c=h.replace('#','');const r=parseInt(c.substr(0,2),16),g=parseInt(c.substr(2,2),16),b=parseInt(c.substr(4,2),16);return `rgba(${r},${g},${b},${a})`;}
function mix(h1,w1,h2,w2){const p=x=>({r:parseInt(x.substr(1,2),16),g:parseInt(x.substr(3,2),16),b:parseInt(x.substr(5,2),16)});const a=p(h1),b=p(h2);const t=w1+w2||1;return {r:(a.r*w1+b.r*w2)/t,g:(a.g*w1+b.g*w2)/t,b:(a.b*w1+b.b*w2)/t};}
function render(){L.forEach(l=>{const el=lampsEl.querySelector(`[data-k="${l.k}"]`);el.querySelector('[data-sw]').classList.toggle('on',l.on);});draw();checkMission();}
// missões
const M=[
 {t:'Acenda <b>só o contra-luz</b> e veja o problema da silhueta.',ok:()=>amt('back')>0.3&&amt('front')<0.05&&amt('fill')<0.05},
 {t:'Agora acenda a <b>luz frontal (key)</b> para a plateia ver o rosto.',ok:()=>amt('front')>0.4&&amt('back')>0.2},
 {t:'Monte os <b>3 pontos</b>: frontal + fill + contra-luz, todos acesos.',ok:()=>amt('front')>0.4&&amt('fill')>0.2&&amt('back')>0.3},
 {t:'Acrescente cor no <b>fundo (cyc)</b> sem apagar o artista.',ok:()=>amt('cyc')>0.3&&amt('front')>0.3&&amt('back')>0.2},
];
let mi=0;
function drawMission(){document.getElementById('mission').innerHTML=`<div><b>Missão ${mi+1}/${M.length}:</b> ${M[mi].t}</div><div class="mrow"><span class="dot" id="mdot"></span><span id="mstat">…</span></div>`;}
function checkMission(){const dot=document.getElementById('mdot');if(!dot)return;if(M[mi].ok()){dot.classList.add('ok');document.getElementById('mstat').textContent='✓ Feito! Próxima missão.';}else{dot.classList.remove('ok');document.getElementById('mstat').textContent='Ajuste as luzes…';}}
document.getElementById('next').onclick=()=>{mi=(mi+1)%M.length;drawMission();render();};
document.getElementById('reset').onclick=()=>{L.forEach(l=>l.on=false);render();};
function fit(){const DW=1000,DH=620;const vw=innerWidth,vh=innerHeight;const scrH=(window.screen&&screen.height)||vh;const iframeTaller=vh>scrH+8;const visH=Math.min(vh,scrH);const headerAllow=iframeTaller?84:(vh>700?24:6);const effVh=Math.max(240,visH-headerAllow);const z=Math.min(vw/DW,effVh/DH);document.getElementById('console').style.zoom=z;requestAnimationFrame(sizeCanvas);}
addEventListener('resize',fit);drawMission();render();fit();setTimeout(fit,60);
</script></body></html>
