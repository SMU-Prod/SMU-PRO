<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulador — Qual console para cada trabalho?</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0c10;color:#e9edf2}body{padding:10px}
.app{max-width:1000px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
h1{font-size:clamp(15px,4vw,20px);font-weight:800;color:#eaf0ff}
.t{font-size:12px;color:#9daecb;line-height:1.45}
.mission{background:#0e1626;border:1px solid #24406e;border-radius:11px;padding:10px 12px;font-size:12.5px;line-height:1.5}
.mission b{color:#8fd0ff}
.mrow{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #37507a;flex:none}.dot.ok{background:#39d98a;border-color:#39d98a}
.btn{background:#1b2740;color:#dce7fb;border:1px solid #33507f;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer}
.btn.go{background:#1e5a3a;border-color:#2f8f5b}
.gt{font-size:10px;font-weight:800;color:#8aa0c2;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.box{background:#10141d;border:1px solid #222c40;border-radius:12px;padding:10px}
.job{background:#0d1421;border:1px solid #26314a;border-radius:10px;padding:11px 13px;font-size:12.5px;color:#cfe0ff;line-height:1.6}
.job .cli{font-size:10px;font-weight:800;color:#7fb2ff;text-transform:uppercase;letter-spacing:.6px}
.job .req{font-size:11px;color:#9daecb;margin-top:5px}
.job .req b{color:#ffd24d}
.cons{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:7px;margin-top:8px}
.cs{background:#0d1119;border:2px solid #26314a;border-radius:10px;padding:9px 8px;cursor:pointer;text-align:left}
.cs:hover{border-color:#3a4a6a}
.cs.pick{border-color:#ffcf5a;background:#2a2415}
.cs.right{border-color:#2f8f5b;background:#0d2016}
.cs.wrong{border-color:#8f2f3f;background:#200d10}
.cs .n{font-size:12px;font-weight:800;color:#eaf0ff}
.cs .m{font-size:9.5px;color:#7fa0d0;font-weight:700;margin:2px 0}
.cs .sp{font-size:9.5px;color:#7487a8;line-height:1.4}
.fb{font-size:11.5px;line-height:1.6;margin-top:8px;padding:9px 11px;border-radius:9px;display:none}
.fb.show{display:block}
.fb.ok{background:#0d2016;border:1px solid #2f8f5b;color:#a8e6c0}
.fb.no{background:#200d10;border:1px solid #8f2f3f;color:#ffb8c0}
.prog{font-size:11px;color:#8aa0c2;font-weight:700}
.prog b{color:#ffd24d}

/* ── tela cheia numa tela larga: 2 colunas (o player avisa por mensagem) ── */
@media (min-width:1250px){
  html.smu-fs .app{max-width:1900px;display:block;columns:2;column-gap:14px}
  html.smu-fs .app > *{break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:10px}
  html.smu-fs .app > h1,html.smu-fs .app > .t{column-span:all}
}
</style></head><body>
<div class="app">
 <h1>🎛 Qual console para cada trabalho?</h1>
 <div class="t">Não existe "melhor console" — existe o <b>certo para o trabalho</b>. Orçamento, nº de universos, tipo de show (teatro × banda), se vai ter cuelist ou busking, e o que a casa já tem. Leia o job, escolha e veja o veredito de um LD experiente.</div>
 <div class="mission" id="mission"></div>
 <div class="box"><div class="gt">O trabalho <span class="prog" id="prog"></span></div>
  <div class="job" id="job"></div>
  <div class="cons" id="cons"></div>
  <div class="fb" id="fb"></div>
  <div class="mrow"><button class="btn go" id="next" style="display:none">Próximo trabalho ▸</button></div>
 </div>
</div>
<script>
'use strict';
const CONS=[
 {id:'ma3',n:'grandMA3 full-size',m:'MA Lighting',sp:'Topo de linha · dezenas de universos · padrão de festival · caríssimo'},
 {id:'ma3onpc',n:'grandMA3 onPC + wing',m:'MA Lighting',sp:'Software grátis + wing barato · poucos universos · mesma linguagem do MA3'},
 {id:'avo',n:'Avolites Tiger Touch',m:'Avolites',sp:'Rei do busking · muitos playbacks físicos · rápido no improviso'},
 {id:'eos',n:'ETC Eos / Ion',m:'ETC',sp:'Padrão de TEATRO · cuelist e GO impecáveis · linguagem de canal'},
 {id:'magicq',n:'Chamsys MagicQ PC',m:'Chamsys',sp:'Software GRÁTIS e completo · roda em PC comum · ótimo custo-benefício'},
 {id:'2cenas',n:'Mesa 2 cenas analógica',m:'genérica',sp:'Só dimmers · sem memória · barata e à prova de falha'},
];
const JOBS=[
 {cli:'Igreja de bairro',txt:'Culto semanal. O rig é <b>12 PAR 64 no rack de dimmer</b> e mais nada. Quem opera é um voluntário diferente a cada semana, sem treino. Orçamento: quase zero. Não pode travar.',
  req:'Precisa: simples · sem memória · à prova de falha · barato',
  a:'2cenas',
  fb:{ok:'Exato. Só há dimmers, o operador muda toda semana e não pode travar: a <b>mesa de 2 cenas</b> é simples, barata e não tem computador para dar pau. Console digital aqui é canhão para matar mosca.',
      no:'Pense: só existem <b>dimmers</b> (nada de moving), o voluntário muda toda semana e não pode travar. Um console digital é complexo demais e caro — a resposta é a mesa mais simples possível.'}},
 {cli:'Banda de rock — turnê média',txt:'Setlist muda a cada casa e o vocalista improvisa. O operador precisa <b>reagir ao vivo</b>, com dezenas de looks na mão. 8 movings + 12 PAR LED (2 universos).',
  req:'Precisa: busking · muitos playbacks físicos · agilidade no improviso',
  a:'avo',
  fb:{ok:'É isso. Setlist que muda + improviso = <b>busking</b>, e a Avolites é feita para isso: playbacks físicos à mão e velocidade. Cuelist rígida morreria na primeira mudança.',
      no:'A pista é "setlist muda" e "reagir ao vivo" — isso é <b>busking</b>. O console certo é o que tem muitos playbacks físicos e agilidade: a Avolites. Uma mesa de cuelist rígida trava quando a banda muda.'}},
 {cli:'Teatro municipal — peça em cartaz',txt:'Espetáculo <b>ensaiado e repetido</b> 30 sessões. 80 cenas na ordem exata, com tempos de fade precisos. O operador aperta <b>GO</b> na deixa do contrarregra. Rig: refletores convencionais + alguns LEDs.',
  req:'Precisa: cuelist longa · GO preciso · repetibilidade',
  a:'eos',
  fb:{ok:'Perfeito. Show repetido, 80 cues em ordem, GO na deixa: é o mundo do <b>teatro</b> e a ETC Eos é o padrão da casa — cuelist e tempos impecáveis.',
      no:'Repare: 80 cenas <b>na ordem exata</b>, repetidas 30 vezes, GO na deixa. Isso é teatro puro — o padrão é a <b>ETC Eos/Ion</b>, feita para cuelist e repetibilidade, não para improviso.'}},
 {cli:'Festival — palco principal',txt:'12 bandas em 2 dias, cada uma com seu operador e <b>seu show file</b>. Rig gigante: <b>16 universos</b>, pixel mapping no telão de LED, timecode. Todos os LDs convidados já chegam sabendo operar.',
  req:'Precisa: muitos universos · padrão que todo LD sabe · show file por banda',
  a:'ma3',
  fb:{ok:'Correto. <b>16 universos</b>, pixel, timecode e LDs convidados que já dominam a plataforma: é grandMA3 full-size — o padrão de festival. Cada banda chega com seu show file e roda.',
      no:'Olhe a escala: <b>16 universos</b>, pixel mapping, timecode e 12 LDs diferentes que precisam chegar e operar. Só o padrão de festival resolve: <b>grandMA3 full-size</b>. Software em PC não aguenta esse porte.'}},
 {cli:'Você, estudante',txt:'Quer <b>aprender a programar</b> em casa, sem hardware, para chegar preparado no mercado. Orçamento: <b>R$ 0</b>. Quer treinar a linguagem que mais aparece nos grandes palcos.',
  req:'Precisa: grátis · roda em PC · linguagem do mercado grande',
  a:'ma3onpc',
  fb:{ok:'É o caminho. O <b>grandMA3 onPC é gratuito</b> e é exatamente a linguagem dos grandes palcos — você treina em casa e chega sabendo. (O MagicQ PC também é grátis e excelente; mas se o alvo é a linguagem dos festivais, é o MA.)',
      no:'Duas opções são grátis (MagicQ PC e grandMA3 onPC). Como o objetivo é <b>a linguagem que domina os grandes palcos</b>, o certo é o <b>grandMA3 onPC</b> — de graça e igual ao console real.'}},
 {cli:'Produtora pequena — corporativo',txt:'Eventos corporativos e festas. Rig médio (4 movings + LEDs, 2 universos). A produtora <b>não tem verba</b> para console, mas o operador é técnico e tem um notebook bom. Precisa de moving, cor, cena e alguns efeitos.',
  req:'Precisa: controla moving · custo ZERO de software · roda em notebook',
  a:'magicq',
  fb:{ok:'Boa. Precisa de moving/cena/efeito mas <b>não há verba</b> e há um bom notebook: o <b>MagicQ PC</b> é grátis, completo e roda em PC comum — melhor custo-benefício do mercado.',
      no:'Repare: precisa controlar <b>movings</b> (a mesa de 2 cenas não serve), mas o orçamento é <b>zero</b> e há um notebook. O <b>Chamsys MagicQ PC</b> é grátis e completo — feito para esse caso.'}},
];
let ji=0, picked=null, answered=false, score=0, done=[];
const consEl=document.getElementById('cons'),fbEl=document.getElementById('fb');
function buildJob(){
 const j=JOBS[ji];
 document.getElementById('job').innerHTML='<div class="cli">'+j.cli+'</div>'+j.txt+'<div class="req">'+j.req+'</div>';
 document.getElementById('prog').innerHTML='· trabalho <b>'+(ji+1)+'</b> de '+JOBS.length+' · acertos: <b>'+score+'</b>';
 consEl.innerHTML='';
 CONS.forEach(c=>{const d=document.createElement('div');d.className='cs'+(picked===c.id?' pick':'')+
   (answered?(c.id===j.a?' right':(picked===c.id?' wrong':'')):'');
  d.innerHTML='<div class="n">'+c.n+'</div><div class="m">'+c.m+'</div><div class="sp">'+c.sp+'</div>';
  d.onclick=()=>{if(answered)return;picked=c.id;answered=true;
   const ok=c.id===j.a; if(ok&&!done.includes(ji)){score++;done.push(ji);}
   fbEl.className='fb show '+(ok?'ok':'no');
   fbEl.innerHTML=(ok?'✓ <b>Certo.</b> ':'✗ <b>Não é a melhor escolha.</b> ')+(ok?j.fb.ok:j.fb.no);
   document.getElementById('next').style.display='';
   buildJob();check();};
  consEl.appendChild(d);});
}
document.getElementById('next').onclick=()=>{
 ji=(ji+1)%JOBS.length;picked=null;answered=false;fbEl.className='fb';
 document.getElementById('next').style.display='none';buildJob();check();};
const M=[
 {t:'<b>Leia e decida:</b> passe pelos 6 trabalhos e escolha o console certo para cada um. Não existe melhor console — existe o certo para o job. Acerte pelo menos <b>4 de 6</b>.',
  ok:()=>score>=4},
 {t:'<b>Gabarito de LD:</b> acerte <b>os 6</b> trabalhos. Dica: procure sempre as pistas — "setlist muda" = busking · "80 cues repetidas" = teatro · "16 universos" = festival · "orçamento zero" = software grátis · "só dimmer + voluntário" = 2 cenas.',
  ok:()=>score===6},
];
let mi=0;
function drawM(){document.getElementById('mission').innerHTML='<div><b>Cenário '+(mi+1)+'/'+M.length+':</b> '+M[mi].t+'</div><div class="mrow"><span class="dot" id="mdot"></span><span id="mstat">Decida…</span><button class="btn" id="mreset">Recomeçar</button><button class="btn go" id="mnext">Próximo ▸</button></div>';
 document.getElementById('mreset').onclick=()=>{ji=0;score=0;done=[];picked=null;answered=false;fbEl.className='fb';document.getElementById('next').style.display='none';buildJob();check();};
 document.getElementById('mnext').onclick=()=>{mi=(mi+1)%M.length;drawM();check();};check();}
function check(){const dot=document.getElementById('mdot');if(!dot)return;let ok=false;try{ok=M[mi].ok();}catch(e){}
 dot.classList.toggle('ok',ok);document.getElementById('mstat').textContent=ok?'✓ Decisão de profissional!':'Decida…';}
buildJob();drawM();
</script></body></html>
