<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Simulador — Chamsys MagicQ (réplica funcional)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
html,body{height:100%;background:#0a0b0d;color:#e9edf2;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.console{width:1280px;height:720px;background:#14161a;border:1px solid #2a2e36;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 48px #000a}
.brand{height:30px;background:linear-gradient(90deg,#1c2029,#14161a);display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #2a2e36}
.brand b{font-size:13px;letter-spacing:1px;color:#cdd6e4;font-weight:800}.brand b span{color:#37c0e0}
.brand .s{font-size:10px;color:#6b7382}
.top{flex:1;display:grid;grid-template-columns:1.05fr 1fr;gap:2px;background:#0a0b0d;min-height:0}
.pane{background:#181a20;display:flex;flex-direction:column;min-height:0}
.ph{font-size:10px;letter-spacing:1px;color:#7683a0;padding:5px 10px;background:#1e222b;border-bottom:1px solid #282d37;text-transform:uppercase;font-weight:700}
.heads{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:10px;align-content:start;overflow:auto}
.head{background:#1a1d24;border:1px solid #2a2f39;border-radius:8px;padding:8px 6px;text-align:center;cursor:pointer}
.head.sel{border-color:#37c0e0;box-shadow:0 0 0 1px #37c0e0;background:#12252c}
.head .hn{font-size:14px;font-weight:800;color:#dfe4ea}.head .hd{font-size:9px;color:#8b93a1;margin-top:1px}
.head .hsw{height:6px;border-radius:3px;margin-top:6px;background:#000}
.plan{flex:1;position:relative}.plan canvas{width:100%;height:100%;display:block}
.plan .st{position:absolute;bottom:6px;left:10px;font-size:10px;color:#7683a0}
.mid{height:140px;background:#181a20;border-top:1px solid #282d37;display:grid;grid-template-columns:150px 1fr 200px}
.windows{display:flex;flex-direction:column;background:#15171c}
.win{flex:1;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:#94a0b4;cursor:pointer;border-bottom:1px solid #21252e;letter-spacing:.5px}
.win.on{color:#0a0b0d}
.win[data-w="Intensity"].on{background:#d9d38a}.win[data-w="Position"].on{background:#5aa0e0}.win[data-w="Colour"].on{background:#e06a9a}.win[data-w="Beam"].on{background:#5ad0a8}
.wheels{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#0a0b0d}
.wheel{background:#181a20;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;cursor:ns-resize;touch-action:none;padding:6px}
.wheel .wl{font-size:10px;color:#8b93a1;text-transform:uppercase;font-weight:700}
.wheel .wd{width:54px;height:54px;border-radius:50%;background:conic-gradient(#282d37 0 25%,#1e222b 0 50%,#282d37 0 75%,#1e222b 0);border:2px solid #3a404c;position:relative}
.wheel .wd i{position:absolute;left:50%;top:5px;width:2px;height:16px;background:#37c0e0;margin-left:-1px;transform-origin:50% 22px}
.wheel .wv{font-size:12px;font-weight:700}
.palette{background:#181a20;border-left:1px solid #282d37;padding:6px;display:flex;flex-direction:column;gap:4px}
.palette .pl{font-size:9px;color:#7683a0;text-transform:uppercase;font-weight:700}
.palette .sw{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.palette .sw div{border-radius:4px;cursor:pointer;border:1px solid #333}
.bottom{height:250px;display:grid;grid-template-columns:1fr 240px;gap:2px;background:#0a0b0d}
.pbwrap{background:#181a20;display:flex;flex-direction:column;min-height:0}
.pbrow{flex:1;display:grid;grid-template-columns:repeat(10,1fr);gap:5px;padding:8px}
.pb{background:#1a1d24;border:1px solid #2a2f39;border-radius:6px;display:flex;flex-direction:column;align-items:center;padding:5px 3px;gap:4px}
.pb.armed{border-color:#e0b45a;box-shadow:0 0 0 1px #e0b45a}
.pb.has{border-color:#37c0e0}
.pb .pn{font-size:8px;color:#7683a0;height:24px;text-align:center;overflow:hidden;line-height:1.05}
.pb .pt{position:relative;width:20px;flex:1;min-height:64px;background:#101216;border:1px solid #2a2f39;border-radius:4px;touch-action:none;cursor:pointer}
.pb .pf{position:absolute;left:0;right:0;bottom:0;background:linear-gradient(0deg,#1f6a7a,#2ea8c0);border-radius:0 0 3px 3px}
.pb .pk{position:absolute;left:-2px;right:-2px;height:8px;background:#cfd6e0;border-radius:2px}
.pb .pgo{font-size:8px;font-weight:800;color:#06222a;background:#37c0e0;border:none;border-radius:3px;padding:3px 0;width:100%;cursor:pointer}
.pb .pfl{font-size:8px;font-weight:700;color:#0a0b0d;background:#8b93a1;border:none;border-radius:3px;padding:2px 0;width:100%;cursor:pointer}
.pb .num{font-size:8px;color:#5b6472}
.ctrl{background:#181a20;display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:1fr;gap:6px;padding:8px}
.ck{border-radius:7px;font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;background:#232833;border:1px solid #333a46;color:#dfe6f0;flex-direction:column;line-height:1.1;text-align:center}
.ck:active{background:#3a4150}.ck small{font-size:8px;color:#7683a0;font-weight:500;margin-top:2px}
.ck.locate{background:#173341;color:#7fd0e6}.ck.rec{background:#3a2e18;color:#e0b45a}.ck.rec.on{background:#7a5a20;color:#fff}.ck.clear{background:#2a2030;color:#e08ac0}.ck.num{font-size:14px}
.mbar{height:40px;background:#0e1626;border-top:1px solid #24406e;display:flex;align-items:center;gap:10px;padding:0 12px;font-size:11.5px}
.mbar .dot{width:12px;height:12px;border-radius:50%;border:2px solid #37507a;flex:none}.mbar .dot.ok{background:#39d98a;border-color:#39d98a}
.mbar b{color:#7fd0e6}.mbar button{margin-left:auto;background:#13303a;color:#a6e2f0;border:1px solid #235a6a;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
</style></head>
<body>
<div class="console" id="console">
  <div class="brand"><b>Chamsys · MagicQ<span> ▸ free software</span></b><span class="s">réplica funcional de estudo · SMU</span></div>
  <div class="top">
    <div class="pane"><div class="ph">Heads — toque para selecionar (ou nº + Enter)</div><div class="heads" id="heads"></div></div>
    <div class="pane"><div class="ph">Visualiser</div><div class="plan"><canvas id="cv"></canvas><div class="st" id="st"></div></div></div>
  </div>
  <div class="mid">
    <div class="windows" id="windows"></div>
    <div class="wheels" id="wheels"></div>
    <div class="palette"><div class="pl">Colour palette</div><div class="sw" id="pal"></div></div>
  </div>
  <div class="bottom">
    <div class="pbwrap"><div class="ph">Playbacks (PB) — cada um é uma cue stack: Record grava um cue; GO avança; fader toca</div><div class="pbrow" id="pbrow"></div></div>
    <div class="ctrl" id="ctrl"></div>
  </div>
  <div class="mbar"><span class="dot" id="mdot"></span><span id="mtext"></span><button id="mnext">Próxima ▸</button></div>
</div>
<script>
const N=8;
const hd=[]; for(let i=0;i<N;i++)hd.push({id:i+1,name:(i<4?'PAR ':'Moving ')+(i+1),dim:0,pan:128,tilt:128,r:0,g:0,b:0,sel:false,prog:{}});
const pbs=[]; for(let i=0;i<10;i++)pbs.push({cues:[],pos:-1,fader:0});
let win='Intensity', recArm=false, numBuf='';
const selected=()=>hd.filter(h=>h.sel);
function flash(m){document.getElementById('st').textContent=m;}

// heads
const headsEl=document.getElementById('heads');
function buildHeads(){headsEl.innerHTML='';hd.forEach(h=>{const el=document.createElement('div');el.className='head'+(h.sel?' sel':'');
 const on=h.dim>4;const col=on?`rgb(${h.r},${h.g},${h.b})`:'#000';
 el.innerHTML=`<div class="hn">${h.id}</div><div class="hd">${h.name}</div><div class="hsw" style="background:${col};opacity:${on?(0.25+0.75*h.dim/255):1}"></div>`;
 el.onclick=()=>{h.sel=!h.sel;render();};headsEl.appendChild(el);});}

// windows + wheels
const WIN={Intensity:[{k:'dim',l:'Dimmer',d:v=>Math.round(v/2.55)+'%'}],
 Position:[{k:'pan',l:'Pan',d:v=>Math.round(v/255*540-270)+'°'},{k:'tilt',l:'Tilt',d:v=>Math.round(v/255*270-135)+'°'}],
 Colour:[{k:'r',l:'Red',d:v=>''+v},{k:'g',l:'Green',d:v=>''+v},{k:'b',l:'Blue',d:v=>''+v}],
 Beam:[{k:'dim',l:'Dimmer',d:v=>Math.round(v/2.55)+'%'}]};
const winsEl=document.getElementById('windows');
function buildWins(){winsEl.innerHTML='';Object.keys(WIN).forEach(w=>{const el=document.createElement('div');el.className='win'+(w===win?' on':'');el.dataset.w=w;el.textContent=w;el.onclick=()=>{win=w;render();};winsEl.appendChild(el);});}
function avg(k){const s=selected();return s.length?s.reduce((a,h)=>a+h[k],0)/s.length:0;}
function setAttr(k,v){const s=selected();if(!s.length){flash('Selecione heads');return;}v=Math.max(0,Math.min(255,Math.round(v)));s.forEach(h=>{h[k]=v;if(k==='dim')h.prog.dim=true;else if(k==='pan')h.prog.pan=true;else if(k==='tilt')h.prog.tilt=true;else h.prog.colour=true;});render();}
const wheelsEl=document.getElementById('wheels');
function buildWheels(){wheelsEl.innerHTML='';const attrs=WIN[win];for(let i=0;i<3;i++){const a=attrs[i];const w=document.createElement('div');w.className='wheel';
 if(a){const cur=avg(a.k);w.innerHTML=`<div class="wl">${a.l}</div><div class="wd"><i style="transform:rotate(${cur/255*300-150}deg)"></i></div><div class="wv">${a.d(cur)}</div>`;
  w.addEventListener('pointerdown',e=>{const sy=e.clientY,sv=avg(a.k);const mv=ev=>{if(!ev.buttons){cl();return;}setAttr(a.k,sv+(sy-ev.clientY)*2);};const cl=()=>{removeEventListener('pointermove',mv);removeEventListener('pointerup',cl);};addEventListener('pointermove',mv);addEventListener('pointerup',cl);});}
 else{w.style.opacity=.25;w.innerHTML='<div class="wl">—</div><div class="wd"></div><div class="wv"></div>';}
 wheelsEl.appendChild(w);}}
const palEl=document.getElementById('pal');
function buildPal(){palEl.innerHTML='';[['Vermelho',255,0,0],['Verde',0,255,0],['Azul',0,0,255],['Branco',255,255,255],['Âmbar',255,150,0],['Magenta',255,0,255],['Ciano',0,255,255],['Rosa',255,80,160]].forEach(([nm,r,g,b])=>{const d=document.createElement('div');d.style.background=`rgb(${r},${g},${b})`;d.title=nm;d.onclick=()=>{const s=selected();if(!s.length){flash('Selecione heads');return;}s.forEach(h=>{h.r=r;h.g=g;h.b=b;h.prog.colour=true;});render();};palEl.appendChild(d);});}

// playbacks (cue stacks)
const pbrow=document.getElementById('pbrow');
function recordTo(i){const snap=hd.map(h=>({dim:h.dim,pan:h.pan,tilt:h.tilt,r:h.r,g:h.g,b:h.b}));pbs[i].cues.push(snap);pbs[i].pos=pbs[i].cues.length-1;pbs[i].fader=1;recArm=false;flash('Cue '+pbs[i].cues.length+' gravado no PB '+(i+1));}
function pbGo(i){const p=pbs[i];if(!p.cues.length)return;p.pos=(p.pos+1)%p.cues.length;if(p.fader===0)p.fader=1;flash('PB '+(i+1)+' → Cue '+(p.pos+1)+'/'+p.cues.length);render();}
function buildPBs(){pbrow.innerHTML='';pbs.forEach((p,i)=>{const el=document.createElement('div');el.className='pb'+(recArm?' armed':'')+(p.cues.length?' has':'');
 el.innerHTML=`<div class="pn">${p.cues.length?('PB '+(i+1)+'<br>Cue '+(p.pos+1)+'/'+p.cues.length):'vazio'}</div><div class="pt" data-pb="${i}"><div class="pf" style="height:${p.fader*100}%"></div><div class="pk" style="bottom:${p.fader*100}%"></div></div><button class="pgo" data-go="${i}">GO</button><button class="pfl" data-fl="${i}">FL</button><div class="num">${i+1}</div>`;
 pbrow.appendChild(el);
 el.querySelector('.pt').addEventListener('pointerdown',function(e){ if(recArm){recordTo(i);render();return;} const r=this.getBoundingClientRect(); const set=cy=>{let v=1-(cy-r.top)/r.height;v=Math.max(0,Math.min(1,v));p.fader=v;if(v>0&&p.pos<0&&p.cues.length)p.pos=0;render();}; set(e.clientY); const mv=ev=>{if(!ev.buttons){cl();return;}set(ev.clientY);};const cl=()=>{removeEventListener('pointermove',mv);removeEventListener('pointerup',cl);};addEventListener('pointermove',mv);addEventListener('pointerup',cl);});
 el.querySelector('[data-go]').onclick=()=>{if(recArm){recordTo(i);render();return;}pbGo(i);};
 el.querySelector('[data-fl]').onclick=()=>{if(!p.cues.length){flash('PB vazio');return;}p.fader=p.fader>0.5?0:1;if(p.pos<0)p.pos=0;render();};
});}

// control keys
const ctrlEl=document.getElementById('ctrl');
const CK=[['7','num'],['8','num'],['9','num'],['4','num'],['5','num'],['6','num'],['1','num'],['2','num'],['3','num'],['Locate|abre','locate'],['0','num'],['Enter|sel nº','ent'],['Clear|prog','clear'],['Record|→ PB','rec'],['All|tudo','all']];
function buildCtrl(){ctrlEl.innerHTML='';CK.forEach(([t,cls])=>{const el=document.createElement('div');el.className='ck '+cls;const p=t.split('|');el.innerHTML=p[0]+(p[1]?`<small>${p[1]}</small>`:'');el.onclick=()=>ck(p[0]);ctrlEl.appendChild(el);});}
function ck(t){
 if(/^\d$/.test(t)){numBuf+=t;flash('Head '+numBuf+' …');return;}
 if(t==='Enter'){if(numBuf){const n=parseInt(numBuf);hd.forEach(h=>h.sel=false);const h=hd.find(x=>x.id===n);if(h)h.sel=true;numBuf='';render();}return;}
 if(t==='All'){hd.forEach(h=>h.sel=true);render();return;}
 if(t==='Locate'){const s=selected();if(!s.length){flash('Selecione heads');return;}s.forEach(h=>{h.dim=255;h.pan=128;h.tilt=128;h.r=255;h.g=255;h.b=255;h.prog.dim=h.prog.colour=h.prog.pan=h.prog.tilt=true;});flash('Locate — heads abertos (branco)');render();return;}
 if(t==='Clear'){hd.forEach(h=>{h.prog={};h.sel=false;h.dim=0;});numBuf='';flash('Programmer limpo');render();return;}
 if(t==='Record'){recArm=!recArm;flash(recArm?'REC armado — toque num PB (fader ou GO)':'Record cancelado');render();return;}
}
document.addEventListener('keydown',e=>{if(/^\d$/.test(e.key))ck(e.key);else if(e.key==='Enter')ck('Enter');else return;});

// output & plan
function output(){const out=hd.map(h=>({dim:0,r:h.r,g:h.g,b:h.b,pan:h.pan,tilt:h.tilt}));
 pbs.forEach(p=>{if(p.cues.length&&p.pos>=0&&p.fader>0){const c=p.cues[p.pos];c.forEach((s,i)=>{const d=Math.round(s.dim*p.fader);if(d>out[i].dim){out[i].dim=d;out[i].r=s.r;out[i].g=s.g;out[i].b=s.b;out[i].pan=s.pan;out[i].tilt=s.tilt;}});}});
 hd.forEach((h,i)=>{if(h.prog.dim)out[i].dim=Math.max(out[i].dim,h.dim);if(h.prog.colour){out[i].r=h.r;out[i].g=h.g;out[i].b=h.b;}if(h.prog.pan)out[i].pan=h.pan;if(h.prog.tilt)out[i].tilt=h.tilt;});
 return out;}
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
function sizeCanvas(){const r=cv.getBoundingClientRect();const dpr=Math.min(2,devicePixelRatio||1);cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);drawPlan();}
function drawPlan(){const r=cv.getBoundingClientRect();const W=r.width,H=r.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#0b0d10';ctx.fillRect(0,0,W,H);
 const out=output();const cols=4,rows=2,mx=W/(cols+1),my=H/(rows+1);
 hd.forEach((h,i)=>{const cx=mx*((i%cols)+1),cy=my*(Math.floor(i/cols)+1);const o=out[i];const d=o.dim/255;
  if(d>0.02){const bg=ctx.createRadialGradient(cx,cy,2,cx,cy,50);bg.addColorStop(0,`rgba(${o.r},${o.g},${o.b},${Math.min(0.9,d)})`);bg.addColorStop(1,`rgba(${o.r},${o.g},${o.b},0)`);ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy,50,0,7);ctx.fill();}
  ctx.fillStyle=h.sel?'#123039':'#1a1d24';ctx.strokeStyle=h.sel?'#37c0e0':'#2a2f39';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,13,0,7);ctx.fill();ctx.stroke();
  ctx.globalAlpha=0.35+0.65*d;ctx.fillStyle=`rgb(${o.r},${o.g},${o.b})`;ctx.beginPath();ctx.arc(cx,cy,7,0,7);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#6b7382';ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText(h.name,cx,cy+26);});
 ctx.textAlign='left';}

// missões
const M=[
 {t:'Selecione os heads <b>1 a 4</b> e aperte <b>Locate</b> para abrir em branco.',ok:()=>[0,1,2,3].every(i=>hd[i].sel&&hd[i].dim>240&&hd[i].r>240)},
 {t:'Vá na window <b>Colour</b> e escolha uma cor na paleta.',ok:()=>selected().some(h=>h.prog.colour)&&hd.some(h=>h.prog.colour&&(h.b>150||h.r>150||h.g>150))},
 {t:'Aperte <b>Record</b> e toque no <b>PB 1</b> (grava o Cue 1). Mude a cor e grave de novo no PB 1 (Cue 2) — isso é uma <b>cue stack</b>.',ok:()=>pbs[0].cues.length>=2},
 {t:'Suba o <b>fader do PB 1</b> e aperte o <b>GO</b> dele para avançar os cues.',ok:()=>pbs[0].fader>0.1&&pbs[0].pos>=0},
];
let mi=0;
function drawM(){document.getElementById('mtext').innerHTML='<b>Missão '+(mi+1)+'/'+M.length+':</b> '+M[mi].t;}
function checkM(){const dot=document.getElementById('mdot');let ok=false;try{ok=M[mi].ok();}catch(e){}dot.classList.toggle('ok',ok);}
document.getElementById('mnext').onclick=()=>{mi=(mi+1)%M.length;drawM();render();};

let _raf=0;function render(){if(_raf)return;_raf=requestAnimationFrame(()=>{_raf=0;renderNow();});}
function renderNow(){buildHeads();buildWins();buildWheels();buildPBs();drawPlan();checkM();
 [...document.querySelectorAll('.ck.rec')].forEach(el=>el.classList.toggle('on',recArm));}
function fit(){const DW=1280,DH=720;const vw=innerWidth,vh=innerHeight;const scrH=(window.screen&&screen.height)||vh;const iframeTaller=vh>scrH+8;const visH=Math.min(vh,scrH);const headerAllow=iframeTaller?84:(vh>700?24:6);const effVh=Math.max(240,visH-headerAllow);const z=Math.min(vw/DW,effVh/DH);document.getElementById('console').style.zoom=z;requestAnimationFrame(sizeCanvas);}
addEventListener('resize',fit);
buildCtrl();buildPal();drawM();renderNow();fit();setTimeout(fit,60);
</script></body></html>
