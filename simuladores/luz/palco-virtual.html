<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<title>Palco Virtual SMU вЂ” Treinamento de IluminaГ§ГЈo</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
html,body{background:#0a0c10;color:#e9edf2}
body{padding:10px}
.app{max-width:1040px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
.hdr h1{font-size:clamp(15px,4vw,20px);font-weight:800;color:#eaf0ff}
.hdr .t{font-size:12px;color:#9daecb;line-height:1.4}
.stage{position:relative;width:100%;aspect-ratio:16/8.2;background:#04060a;border:1px solid #1c2740;border-radius:12px;overflow:hidden}
@media(max-width:560px){.stage{aspect-ratio:4/2.9}}
.stage canvas{width:100%;height:100%;display:block}
.tabs{display:flex;gap:6px;flex-wrap:wrap}
.tabs button{flex:1;min-width:110px;background:#141926;border:1px solid #26314a;border-radius:9px;color:#b9c6de;font-size:12px;font-weight:800;padding:10px 6px;cursor:pointer;letter-spacing:.3px}
.tabs button.on{background:#22304e;border-color:#4d86e0;color:#fff}
.tabs button .sub{display:block;font-size:9px;font-weight:600;color:#7d8db0;margin-top:2px}
.panel{background:#10141d;border:1px solid #222c40;border-radius:12px;padding:10px}
.row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.btn{background:#1b2740;color:#dce7fb;border:1px solid #33507f;border-radius:8px;padding:8px 11px;font-size:12px;font-weight:700;cursor:pointer}
.btn:active{background:#283a5e}.btn.on{background:#7a2740;border-color:#c04d6e}
.btn.go{background:#1e5a3a;border-color:#2f8f5b}
.btn.warn{background:#5a2020;border-color:#8f2f2f}
.grp{background:#0d1119;border:1px solid #1f2839;border-radius:9px;padding:8px;margin-top:8px}
.grp .gt{font-size:10px;font-weight:800;color:#8aa0c2;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.fxsel{display:grid;grid-template-columns:repeat(auto-fit,minmax(86px,1fr));gap:6px}
.fxsel button{background:#171d2b;border:1px solid #2a3550;border-radius:8px;color:#c6d2ea;font-size:10.5px;font-weight:700;padding:8px 4px;cursor:pointer;line-height:1.25}
.fxsel button small{display:block;font-size:8.5px;color:#7487a8;font-weight:600}
.fxsel button.sel{border-color:#ffcf5a;box-shadow:0 0 0 1px #ffcf5a;background:#2a2415}
.sl{display:flex;flex-direction:column;gap:4px;min-width:130px;flex:1}
.sl label{display:flex;justify-content:space-between;font-size:10.5px;font-weight:700;color:#cfe0ff}
.sl label span{color:#8aa0c2;font-variant-numeric:tabular-nums}
input[type=range]{width:100%;height:24px;-webkit-appearance:none;background:transparent}
input[type=range]::-webkit-slider-runnable-track{height:6px;background:#26303f;border-radius:4px}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:20px;height:20px;border-radius:50%;background:#e7ecf3;margin-top:-7px}
input[type=range]::-moz-range-track{height:6px;background:#26303f;border-radius:4px}
input[type=range]::-moz-range-thumb{width:20px;height:20px;border:none;border-radius:50%;background:#e7ecf3}
.pal{display:flex;gap:5px;flex-wrap:wrap}
.pal div{width:30px;height:30px;border-radius:6px;border:1px solid #333;cursor:pointer}
.execs{display:grid;grid-template-columns:repeat(auto-fit,minmax(74px,1fr));gap:6px}
.exec{background:#131826;border:1px solid #263149;border-radius:8px;padding:6px;display:flex;flex-direction:column;gap:5px;align-items:center}
.exec .en{font-size:9px;color:#7d8db0;height:12px}
.exec input[type=range]{transform:none}
.exec .fl{width:100%;background:#2b3550;border:none;border-radius:5px;color:#fff;font-size:9px;font-weight:800;padding:4px 0;cursor:pointer}
.exec.has{border-color:#39d98a}
.scenes2{display:grid;grid-template-columns:1fr;gap:8px}
.srow{display:grid;grid-template-columns:repeat(12,1fr);gap:4px;background:#0d1119;border:1px solid #1f2839;border-radius:9px;padding:8px 6px}
.srow .cell{display:flex;flex-direction:column;align-items:center;gap:3px}
.vslider{writing-mode:vertical-lr;direction:rtl;width:22px!important;height:74px!important;-webkit-appearance:slider-vertical}
.srow .cn{font-size:8px;color:#7487a8;font-weight:700}
.xfrow{display:flex;gap:12px;align-items:center}
.patch{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:6px}
.pr{display:flex;justify-content:space-between;align-items:center;background:#0d1119;border:1px solid #1f2839;border-radius:8px;padding:6px 8px;font-size:11px}
.pr input{width:56px;background:#131a28;border:1px solid #2b3852;border-radius:6px;color:#ffd24d;font-weight:700;text-align:center;padding:4px;font-size:11px}
.pr .nm{color:#c6d2ea;font-weight:700}.pr .ft{color:#7487a8;font-size:9px;display:block}
.mission{background:#0e1626;border:1px solid #24406e;border-radius:12px;padding:11px 13px;font-size:12.5px;line-height:1.5}
.mission b{color:#8fd0ff}
.mrow{display:flex;align-items:center;gap:8px;margin-top:6px}
.dot{width:15px;height:15px;border-radius:50%;border:2px solid #37507a;flex:none}.dot.ok{background:#39d98a;border-color:#39d98a}
.mnav{display:flex;gap:8px;margin-top:8px;flex-wrap:wrap}
.prog{font-size:10.5px;color:#7fd0a0;font-weight:700}
.hint{font-size:11px;color:#8296b8;margin-top:4px}

/* в”Ђв”Ђ tela cheia numa tela larga: 2 colunas (o player avisa por mensagem) в”Ђв”Ђ */
@media (min-width:1250px){
  html.smu-fs .app{max-width:1900px;display:block;columns:2;column-gap:14px}
  html.smu-fs .app > *{break-inside:avoid;-webkit-column-break-inside:avoid;margin-bottom:10px}
  html.smu-fs .app > h1,html.smu-fs .app > .t{column-span:all}
}
</style></head>
<body>
<div class="app">
  <div class="hdr"><h1>рџЋ› Palco Virtual SMU вЂ” treine como no trabalho real</h1>
  <div class="t">Um rig completo (ribalta, PAR 64 no dimmer, COB, PAR LED, 2 beams Sharpy e 2 washes Aura вЂ” perfis oficiais) operado por <b>3 consoles reais</b>: anГЎlogico e digital. Cumpra os cenГЎrios como num show de verdade.</div></div>
  <div class="stage"><canvas id="cv"></canvas></div>
  <div class="mission" id="mission"></div>
  <div class="tabs" id="tabs">
    <button data-c="ma" class="on">grandMA<span class="sub">comando В· executors</span></button>
    <button data-c="avo">Avolites<span class="sub">locate В· wheels В· playbacks</span></button>
    <button data-c="dmx">Mesa DMX 2 cenas<span class="sub">analГіgica В· sГі dimmers</span></button>
    <button data-c="patch">Patch<span class="sub">endereГ§os do rig</span></button>
  </div>
  <div class="panel" id="panel"></div>
</div>
<script>
'use strict';
// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ RIG вЂ” perfis oficiais/clГЎssicos в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
// Sharpy 16ch oficial MA: 1 Cor,2 Shutter,3 Dim,4 Gobo,5 Prisma,6 RotPrisma,7 Pos,8 Frost,9 Foco,10/11 Pan,12/13 Tilt,14 Func,15 Reset,16 Lamp
// Aura XB 14ch oficial: 1 Shutter,2 Dim,3 Zoom,4/5 Pan,6/7 Tilt,8 Ctl,9 Macro,10 R,11 G,12 B,13 -,14 CTC
// PAR64(generic@parcan)=1ch dim В· Ribalta(sunstrip)=10ch 1/cГ©lula В· COB=2ch dim+strobe В· PAR LED RGBW=8ch dim,R,G,B,W,strobe,macro,vel
const FIX=[
 {id:'RIB', nome:'Ribalta 10 cГ©lulas', tipo:'ribalta', foot:10, addr:1,  dimCh:0, kind:'dimmer'},
 {id:'P64L',nome:'PAR 64 L (dimmer)',  tipo:'par64',   foot:1,  addr:11, dimCh:0, kind:'dimmer'},
 {id:'P64R',nome:'PAR 64 R (dimmer)',  tipo:'par64',   foot:1,  addr:12, dimCh:0, kind:'dimmer'},
 {id:'COB', nome:'COB 200W frontal',   tipo:'cob',     foot:2,  addr:13, dimCh:0, kind:'led'},
 {id:'PLL', nome:'PAR LED RGBW L',     tipo:'parled',  foot:8,  addr:17, dimCh:0, kind:'led'},
 {id:'PLR', nome:'PAR LED RGBW R',     tipo:'parled',  foot:8,  addr:25, dimCh:0, kind:'led'},
 {id:'SHL', nome:'Sharpy L (beam)',    tipo:'sharpy',  foot:16, addr:33, dimCh:2, kind:'mov'},
 {id:'SHR', nome:'Sharpy R (beam)',    tipo:'sharpy',  foot:16, addr:49, dimCh:2, kind:'mov'},
 {id:'AUL', nome:'MAC Aura L (wash)',  tipo:'aura',    foot:14, addr:65, dimCh:1, kind:'mov'},
 {id:'AUR', nome:'MAC Aura R (wash)',  tipo:'aura',    foot:14, addr:79, dimCh:1, kind:'mov'},
];
const SHARPY_COLORS=[['Aberto',255,255,255],['Red',230,30,30],['Orange',255,140,0],['Aquamarine',80,220,190],['Green',30,200,60],['Light green',120,230,120],['Lavender',180,160,255],['Pink',255,120,170],['Yellow',240,220,40],['Magenta',220,30,180],['Cyan',30,200,220],['CTO',255,205,150]];
// DMX universo (buffer persistente: fixtures seguram Гєltimo valor)
const DMX=new Uint8Array(513);
const patchAddr={}; FIX.forEach(f=>patchAddr[f.id]=f.addr);
const fx=(id)=>FIX.find(f=>f.id===id);
const A=(id)=>patchAddr[id]; // endereГ§o atual (patch editГЎvel)
function setCh(id,off,v){const a=A(id)+off; if(a>=1&&a<=512)DMX[a]=Math.max(0,Math.min(255,Math.round(v)));}
function getCh(id,off){const a=A(id)+off; return (a>=1&&a<=512)?DMX[a]:0;}
// GM por console (aplica na SAГЌDA final)
let console_='ma'; let gm={ma:255,avo:255,dmx:255}; let blackout=false;
function outCh(id,off){const v=getCh(id,off);return blackout?0:Math.round(v*(gm[console_==='patch'?'ma':console_]/255));}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ helpers de fixture (escrevem no DMX pelos canais REAIS) в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
function ledSet(id,{dim,r,g,b,w,strobe}){ if(dim!=null)setCh(id,0,dim);
 if(fx(id).tipo==='parled'){ if(r!=null)setCh(id,1,r); if(g!=null)setCh(id,2,g); if(b!=null)setCh(id,3,b); if(w!=null)setCh(id,4,w); if(strobe!=null)setCh(id,5,strobe); }
 if(fx(id).tipo==='cob'&&strobe!=null)setCh(id,1,strobe); }
function sharpySet(id,{color,shutter,dim,gobo,prism,prismRot,focus,pan,tilt}){
 if(color!=null)setCh(id,0,Math.round(color*(255/SHARPY_COLORS.length)));
 if(shutter!=null)setCh(id,1,shutter); if(dim!=null)setCh(id,2,dim);
 if(gobo!=null)setCh(id,3,Math.round(gobo*32)); if(prism!=null)setCh(id,4,prism?32:0); if(prismRot!=null)setCh(id,5,prismRot);
 if(focus!=null)setCh(id,8,focus); if(pan!=null){setCh(id,9,pan);setCh(id,10,0);} if(tilt!=null){setCh(id,11,tilt);setCh(id,12,0);} }
function auraSet(id,{shutter,dim,zoom,pan,tilt,r,g,b}){
 if(shutter!=null)setCh(id,0,shutter); if(dim!=null)setCh(id,1,dim); if(zoom!=null)setCh(id,2,zoom);
 if(pan!=null)setCh(id,3,pan); if(tilt!=null)setCh(id,5,tilt);
 if(r!=null)setCh(id,9,r); if(g!=null)setCh(id,10,g); if(b!=null)setCh(id,11,b); }
function fxColorOut(id){const t=fx(id).tipo;
 if(t==='parled')return {r:outCh(id,1),g:outCh(id,2),b:outCh(id,3),w:outCh(id,4)};
 if(t==='cob')return {r:255,g:220,b:170,w:0};
 if(t==='par64'||t==='ribalta')return {r:255,g:200,b:130,w:0};
 if(t==='sharpy'){const i=Math.min(SHARPY_COLORS.length-1,Math.floor(outCh(id,0)/(255/SHARPY_COLORS.length)));const c=SHARPY_COLORS[i];return {r:c[1],g:c[2],b:c[3],w:0,name:c[0],idx:i};}
 if(t==='aura')return {r:outCh(id,9),g:outCh(id,10),b:outCh(id,11),w:0};
 return {r:255,g:255,b:255,w:0}; }
function fxDimOut(id){const t=fx(id).tipo;
 if(t==='ribalta'){let s=0;for(let i=0;i<10;i++)s+=outCh(id,i);return s/10;}
 return outCh(id,fx(id).dimCh); }

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ seleГ§ГЈo (MA / Avolites) в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
let sel=new Set();
function selected(){return [...sel];}
function applyToSel(fn){selected().forEach(id=>fn(id));draw();checkM();}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ PAINГ‰IS DE CONSOLE в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const panel=document.getElementById('panel');
function swatches(el,onpick){[['Branco',255,255,255],['Vermelho',255,0,0],['Verde',0,255,0],['Azul',0,0,255],['Г‚mbar',255,150,0],['Magenta',255,0,255],['Ciano',0,255,255],['Rosa',255,90,160]].forEach(c=>{const d=document.createElement('div');d.style.background='rgb('+c[1]+','+c[2]+','+c[3]+')';d.title=c[0];d.onclick=()=>onpick(c);el.appendChild(d);});}
function fxButtons(el,filter){FIX.filter(filter||(()=>true)).forEach(f=>{const b=document.createElement('button');b.dataset.fx=f.id;b.innerHTML=f.id+'<small>'+f.nome+'</small>';b.classList.toggle('sel',sel.has(f.id));
 b.onclick=()=>{sel.has(f.id)?sel.delete(f.id):sel.add(f.id);b.classList.toggle('sel',sel.has(f.id));draw();};el.appendChild(b);});}
function slider(el,label,val,fmt,oninput){const d=document.createElement('div');d.className='sl';
 d.innerHTML='<label>'+label+' <span></span></label><input type="range" min="0" max="255" value="'+val+'">';
 const inp=d.querySelector('input'),sp=d.querySelector('span');const u=v=>sp.textContent=fmt?fmt(v):v;u(val);
 inp.addEventListener('input',()=>{u(+inp.value);oninput(+inp.value);});el.appendChild(d);return d;}

// ---- MA (comando + executors) ----
const maExecs=[null,null,null,null];
function buildMA(){panel.innerHTML='';
 const g1=grp('1 В· Selecione as fixtures (toque)');const fs=document.createElement('div');fs.className='fxsel';fxButtons(fs);g1.appendChild(fs);
 const g2=grp('2 В· Intensidade (At) вЂ” grava no canal de dimmer REAL de cada uma');
 const r2=document.createElement('div');r2.className='row';
 [['At 0',0],['At 25',64],['At 50',128],['At 75',191],['Full',255]].forEach(([t,v])=>{const b=document.createElement('button');b.className='btn';b.textContent=t;b.onclick=()=>applyToSel(id=>{const f=fx(id);
   if(f.tipo==='ribalta'){for(let i=0;i<10;i++)setCh(id,i,v);}
   else if(f.tipo==='sharpy')sharpySet(id,{dim:v,shutter:255});
   else if(f.tipo==='aura')auraSet(id,{dim:v,shutter:255});
   else ledSet(id,{dim:v});});r2.appendChild(b);});
 g2.appendChild(r2);
 const g3=grp('3 В· Cor (LEDs e movings) e atributos');
 const p=document.createElement('div');p.className='pal';swatches(p,(c)=>applyToSel(id=>{const f=fx(id);
   if(f.tipo==='parled')ledSet(id,{r:c[1],g:c[2],b:c[3],w:0});
   if(f.tipo==='aura')auraSet(id,{r:c[1],g:c[2],b:c[3]});
   if(f.tipo==='sharpy'){const map={'Branco':0,'Vermelho':1,'Г‚mbar':2,'Verde':4,'Rosa':7,'Magenta':9,'Ciano':10,'Azul':10};sharpySet(id,{color:map[c[0]]??0});}
 }));g3.appendChild(p);
 const r3=document.createElement('div');r3.className='row';r3.style.marginTop='8px';
 slider(r3,'Pan (movings)',128,v=>Math.round(v/255*540-270)+'В°',v=>applyToSel(id=>{if(fx(id).tipo==='sharpy')sharpySet(id,{pan:v});if(fx(id).tipo==='aura')auraSet(id,{pan:v});}));
 slider(r3,'Tilt (movings)',128,v=>Math.round(v/255*270-135)+'В°',v=>applyToSel(id=>{if(fx(id).tipo==='sharpy')sharpySet(id,{tilt:v});if(fx(id).tipo==='aura')auraSet(id,{tilt:v});}));
 slider(r3,'Strobo',0,v=>v<8?'off':'on',v=>applyToSel(id=>{const f=fx(id);const sh=v<8?255:Math.round(64+v/2);
   if(f.tipo==='sharpy')sharpySet(id,{shutter:sh}); if(f.tipo==='aura')auraSet(id,{shutter:sh}); if(f.tipo==='parled')ledSet(id,{strobe:v<8?0:v}); if(f.tipo==='cob')ledSet(id,{strobe:v<8?0:v});}));
 g3.appendChild(r3);
 const r4=document.createElement('div');r4.className='row';r4.style.marginTop='6px';
 [['Gobo Sharpy',id=>{if(fx(id).tipo==='sharpy')sharpySet(id,{gobo:(getCh(id,3)>0?0:2)});}],['Prisma Sharpy',id=>{if(fx(id).tipo==='sharpy')sharpySet(id,{prism:getCh(id,4)===0});}]].forEach(([t,fn])=>{const b=document.createElement('button');b.className='btn';b.textContent=t;b.onclick=()=>applyToSel(fn);r4.appendChild(b);});
 g3.appendChild(r4);
 const g4=grp('4 В· Store в†’ Executors (grava o palco; fader toca) В· Clear В· Grand Master');
 const ex=document.createElement('div');ex.className='execs';
 maExecs.forEach((e,i)=>{const d=document.createElement('div');d.className='exec'+(maExecs[i]?' has':'');
  d.innerHTML='<div class="en">'+(maExecs[i]?'Cue '+(i+1):'vazio')+'</div>';
  const st=document.createElement('button');st.className='fl';st.textContent='STORE';st.onclick=()=>{maExecs[i]=DMX.slice();buildMA();flashM('Cue gravado no Exec '+(i+1));};
  const fdw=document.createElement('div');fdw.className='sl';fdw.innerHTML='<input type="range" min="0" max="255" value="0">';
  fdw.querySelector('input').addEventListener('input',(e2)=>{if(!maExecs[i])return;const lv=+e2.target.value/255;const snap=maExecs[i];
    for(let c=1;c<=512;c++){DMX[c]=Math.max(DMX[c]===snap[c]?0:DMX[c]*0, Math.round(snap[c]*lv));}
    draw();checkM();});
  d.appendChild(st);d.appendChild(fdw);ex.appendChild(d);});
 g4.appendChild(ex);
 const r5=document.createElement('div');r5.className='row';r5.style.marginTop='8px';
 const bc=document.createElement('button');bc.className='btn';bc.textContent='Clear (limpa DMX ao vivo)';bc.onclick=()=>{DMX.fill(0);sel.clear();buildMA();draw();checkM();};r5.appendChild(bc);
 slider(r5,'Grand Master',gm.ma,v=>Math.round(v/2.55)+'%',v=>{gm.ma=v;draw();checkM();});
 const bo=document.createElement('button');bo.className='btn'+(blackout?' on':'');bo.textContent='BLACKOUT';bo.onclick=()=>{blackout=!blackout;buildMA();draw();checkM();};r5.appendChild(bo);
 g4.appendChild(r5);
}
// ---- Avolites (locate + wheels + playbacks) ----
const avoPBs=Array.from({length:6},()=>({cue:null,fader:0}));
let avoRec=false;
function buildAVO(){panel.innerHTML='';
 const g1=grp('1 В· Selecione e dГЄ LOCATE (abre em branco, centro)');
 const fs=document.createElement('div');fs.className='fxsel';fxButtons(fs);g1.appendChild(fs);
 const r1=document.createElement('div');r1.className='row';r1.style.marginTop='8px';
 const bl=document.createElement('button');bl.className='btn go';bl.textContent='LOCATE';bl.onclick=()=>applyToSel(id=>{const f=fx(id);
  if(f.tipo==='ribalta'){for(let i=0;i<10;i++)setCh(id,i,255);}
  else if(f.tipo==='sharpy')sharpySet(id,{dim:255,shutter:255,color:0,gobo:0,prism:false,pan:128,tilt:128});
  else if(f.tipo==='aura')auraSet(id,{dim:255,shutter:255,r:255,g:255,b:255,pan:128,tilt:128});
  else if(f.tipo==='parled')ledSet(id,{dim:255,r:255,g:255,b:255,w:255});
  else ledSet(id,{dim:255});});r1.appendChild(bl);
 const ba=document.createElement('button');ba.className='btn';ba.textContent='All';ba.onclick=()=>{FIX.forEach(f=>sel.add(f.id));buildAVO();draw();};r1.appendChild(ba);
 const bc=document.createElement('button');bc.className='btn';bc.textContent='Clear';bc.onclick=()=>{DMX.fill(0);sel.clear();buildAVO();draw();checkM();};r1.appendChild(bc);
 g1.appendChild(r1);
 const g2=grp('2 В· Wheels вЂ” Dimmer В· Pan В· Tilt');
 const r2=document.createElement('div');r2.className='row';
 slider(r2,'Dimmer',0,v=>Math.round(v/2.55)+'%',v=>applyToSel(id=>{const f=fx(id);
  if(f.tipo==='ribalta'){for(let i=0;i<10;i++)setCh(id,i,v);}
  else if(f.tipo==='sharpy')sharpySet(id,{dim:v,shutter:255}); else if(f.tipo==='aura')auraSet(id,{dim:v,shutter:255}); else ledSet(id,{dim:v});}));
 slider(r2,'Pan',128,v=>Math.round(v/255*540-270)+'В°',v=>applyToSel(id=>{if(fx(id).tipo==='sharpy')sharpySet(id,{pan:v});if(fx(id).tipo==='aura')auraSet(id,{pan:v});}));
 slider(r2,'Tilt',128,v=>Math.round(v/255*270-135)+'В°',v=>applyToSel(id=>{if(fx(id).tipo==='sharpy')sharpySet(id,{tilt:v});if(fx(id).tipo==='aura')auraSet(id,{tilt:v});}));
 g2.appendChild(r2);
 const g3=grp('3 В· Palette de cor');
 const p=document.createElement('div');p.className='pal';swatches(p,(c)=>applyToSel(id=>{const f=fx(id);
  if(f.tipo==='parled')ledSet(id,{r:c[1],g:c[2],b:c[3],w:0}); if(f.tipo==='aura')auraSet(id,{r:c[1],g:c[2],b:c[3]});
  if(f.tipo==='sharpy'){const map={'Branco':0,'Vermelho':1,'Г‚mbar':2,'Verde':4,'Rosa':7,'Magenta':9,'Ciano':10,'Azul':10};sharpySet(id,{color:map[c[0]]??0});}}));
 g3.appendChild(p);
 const g4=grp('4 В· Record в†’ Playbacks (fader toca В· FLASH 100%)');
 const r4=document.createElement('div');r4.className='row';
 const br=document.createElement('button');br.className='btn'+(avoRec?' on':'');br.textContent=avoRec?'REC armado вЂ” toque num PB':'Record';br.onclick=()=>{avoRec=!avoRec;buildAVO();};r4.appendChild(br);
 slider(r4,'Grand Master',gm.avo,v=>Math.round(v/2.55)+'%',v=>{gm.avo=v;draw();checkM();});
 g4.appendChild(r4);
 const ex=document.createElement('div');ex.className='execs';ex.style.marginTop='8px';
 avoPBs.forEach((pb,i)=>{const d=document.createElement('div');d.className='exec'+(pb.cue?' has':'');
  d.innerHTML='<div class="en">'+(pb.cue?'PB '+(i+1):'vazio')+'</div>';
  const fdw=document.createElement('div');fdw.className='sl';fdw.innerHTML='<input type="range" min="0" max="255" value="'+Math.round(pb.fader*255)+'">';
  fdw.querySelector('input').addEventListener('input',(e2)=>{ if(avoRec){pb.cue=DMX.slice();avoRec=false;buildAVO();return;} if(!pb.cue)return; pb.fader=+e2.target.value/255; for(let c=1;c<=512;c++)DMX[c]=Math.round(pb.cue[c]*pb.fader); draw();checkM();});
  const fl=document.createElement('button');fl.className='fl';fl.textContent='FLASH';fl.onclick=()=>{ if(avoRec){pb.cue=DMX.slice();avoRec=false;buildAVO();return;} if(!pb.cue)return; for(let c=1;c<=512;c++)DMX[c]=pb.cue[c]; pb.fader=1;buildAVO();draw();checkM();};
  d.appendChild(fdw);d.appendChild(fl);ex.appendChild(d);});
 g4.appendChild(ex);
}
// ---- Mesa DMX 2 cenas (analГіgica вЂ” SГ“ canais 1вЂ“12 do rack de dimmer) ----
const scA=new Array(12).fill(0), scB=new Array(12).fill(0); let xf=0;
function apply2S(){ for(let c=1;c<=12;c++){ const v=scA[c-1]*(1-xf)+scB[c-1]*xf; DMX[c]=Math.round(v); } }
function build2S(){panel.innerHTML='';
 const info=grp('Mesa analГіgica: controla APENAS o rack de dimmer (canais 1вЂ“12: ribalta + 2Г— PAR 64). LEDs e movings NГѓO respondem a ela вЂ” Г© a diferenГ§a analГіgico Г— digital.');
 function row(arr,label,color){const g=grp(label);const sr=document.createElement('div');sr.className='srow';
  for(let i=0;i<12;i++){const c=document.createElement('div');c.className='cell';
   const inp=document.createElement('input');inp.type='range';inp.min=0;inp.max=255;inp.value=arr[i];inp.className='vslider';
   inp.addEventListener('input',()=>{arr[i]=+inp.value;apply2S();draw();checkM();});
   const cn=document.createElement('div');cn.className='cn';cn.textContent=(i+1);
   c.appendChild(inp);c.appendChild(cn);sr.appendChild(c);}
  g.appendChild(sr);}
 row(scA,'CENA A (Preset X) вЂ” canais 1вЂ“12');
 row(scB,'CENA B (Preset Y) вЂ” canais 1вЂ“12');
 const g3=grp('Crossfade A в†” B В· Grand Master');
 const r=document.createElement('div');r.className='row';
 slider(r,'Crossfade (A в†’ B)',Math.round(xf*255),v=>v<128?('A '+Math.round((1-v/255)*100)+'%'):('B '+Math.round(v/255*100)+'%'),v=>{xf=v/255;apply2S();draw();checkM();});
 slider(r,'Grand Master',gm.dmx,v=>Math.round(v/2.55)+'%',v=>{gm.dmx=v;draw();checkM();});
 g3.appendChild(r);
}
// ---- Patch ----
function buildPatch(){panel.innerHTML='';
 const g=grp('Patch do universo 1 вЂ” o endereГ§o aqui TEM que bater com o da fixture. (CenГЎrio 7 tem um defeito para vocГЄ achar!)');
 const pd=document.createElement('div');pd.className='patch';
 FIX.forEach(f=>{const d=document.createElement('div');d.className='pr';
  d.innerHTML='<div><span class="nm">'+f.id+'</span><span class="ft">'+f.nome+' В· '+f.foot+'ch</span></div>';
  const inp=document.createElement('input');inp.type='number';inp.min=1;inp.max=512;inp.value=patchAddr[f.id];
  inp.addEventListener('change',()=>{patchAddr[f.id]=Math.max(1,Math.min(512,+inp.value||1));draw();checkM();});
  d.appendChild(inp);pd.appendChild(d);});
 g.appendChild(pd);
 const ok=grp('Mapa correto de fГЎbrica: RIB=1 В· P64L=11 В· P64R=12 В· COB=13 В· PLL=17 В· PLR=25 В· SHL=33 В· SHR=49 В· AUL=65 В· AUR=79');
}
function grp(title){const g=document.createElement('div');g.className='grp';g.innerHTML='<div class="gt">'+title+'</div>';panel.appendChild(g);return g;}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ CENГЃRIOS (missГµes de prova) в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const CEN=[
 {t:'<b>Passagem de luz:</b> teste os convencionais вЂ” suba os <b>2 PAR 64</b> (canais 11 e 12) a 100%. Vale qualquer console (na mesa analГіgica sГЈo os faders 11 e 12 da Cena A).',
  ok:()=>outCh('P64L',0)>240&&outCh('P64R',0)>240},
 {t:'<b>Boca de cena:</b> acenda a <b>ribalta inteira</b> (10 cГ©lulas в‰Ґ80%) banhando o ciclorama, e o <b>COB</b> frontal a 100% no apresentador.',
  ok:()=>{let all=true;for(let i=0;i<10;i++)if(outCh('RIB',i)<200)all=false;return all&&outCh('COB',0)>240;}},
 {t:'<b>Banho de cor:</b> os dois <b>PAR LED</b> em <b>magenta</b> (R e B altos, G baixo), dimmer 100%. Use MA ou Avolites.',
  ok:()=>['PLL','PLR'].every(id=>outCh(id,0)>240&&outCh(id,1)>180&&outCh(id,3)>180&&outCh(id,2)<60)},
 {t:'<b>Contra dramГЎtico:</b> os 2 <b>Sharpy em azul</b> com dimmer 100% <b>mirando o centro</b> (tilt 60вЂ“75%). Detalhe de profissional: a roda REAL do Sharpy nГЈo tem azul puro вЂ” use o <b>Cyan/Aquamarine</b>, como no equipamento.',
  ok:()=>['SHL','SHR'].every(id=>{const c=fxColorOut(id);const tilt=outCh(id,11);return outCh(id,2)>240&&c.name!=='Aberto'&&c.b>180&&c.r<100&&tilt>150&&tilt<200;})},
 {t:'<b>Wash aГ©reo:</b> as 2 <b>MAC Aura em ciano</b> (G+B), dimmer в‰Ґ80%, shutter aberto.',
  ok:()=>['AUL','AUR'].every(id=>outCh(id,1)>200&&outCh(id,10)>180&&outCh(id,11)>180&&outCh(id,9)<80)},
 {t:'<b>RefrГЈo explosivo:</b> Sharpys com <b>gobo + prisma</b> inseridos e <b>strobo</b> nos PAR LED вЂ” tudo aceso. (MA: botГµes Gobo/Prisma + slider Strobo.)',
  ok:()=>['SHL','SHR'].every(id=>getCh(id,3)>0&&getCh(id,4)>0&&outCh(id,2)>150)&&['PLL','PLR'].every(id=>getCh(id,5)>7&&outCh(id,0)>150)},
 {t:'<b>Defeito no rig!</b> O Sharpy R foi endereГ§ado ERRADO (aperte o botГЈo para injetar o defeito) вЂ” a mesa manda no 49 e ele nГЈo responde. VГЎ no <b>Patch</b> e conserte para <b>49</b>.',
  setup:()=>{patchAddr['SHR']=51;flashM('Defeito injetado: SHR agora responde no 51 вЂ” conserte o patch!');},
  ok:()=>patchAddr['SHR']===49},
 {t:'<b>Modo analГіgico raiz:</b> na <b>mesa 2 cenas</b>, monte a Cena A (ribalta + PARs 64 fortes), zere a B, e faГ§a o <b>crossfade completo para B</b> вЂ” blackout suave dos convencionais, como antigamente.',
  ok:()=>xf>0.92&&scA.slice(0,12).filter(v=>v>150).length>=6&&scB.every(v=>v<20)},
];
let mi=0;
function flashM(m){const el=document.getElementById('mhint');if(el)el.textContent=m;}
function drawM(){const c=CEN[mi];
 document.getElementById('mission').innerHTML='<div><b>CenГЎrio '+(mi+1)+'/'+CEN.length+':</b> '+c.t+'</div><div class="mrow"><span class="dot" id="mdot"></span><span id="mstat">Trabalhe no consoleвЂ¦</span><span class="prog" id="mprog"></span></div><div class="hint" id="mhint"></div><div class="mnav">'+(c.setup?'<button class="btn warn" id="msetup">вљЎ Injetar defeito</button>':'')+'<button class="btn" id="mprev">в—‚</button><button class="btn go" id="mnext">PrГіximo cenГЎrio в–ё</button></div>';
 document.getElementById('mnext').onclick=()=>{mi=(mi+1)%CEN.length;drawM();checkM();};
 document.getElementById('mprev').onclick=()=>{mi=(mi-1+CEN.length)%CEN.length;drawM();checkM();};
 const ms=document.getElementById('msetup');if(ms)ms.onclick=()=>{c.setup();checkM();};
 checkM();}
function checkM(){const dot=document.getElementById('mdot');if(!dot)return;let ok=false;try{ok=CEN[mi].ok();}catch(e){}
 dot.classList.toggle('ok',ok);document.getElementById('mstat').textContent=ok?'вњ“ CenГЎrio cumprido!':'Trabalhe no consoleвЂ¦';
 document.getElementById('mprog').textContent='';}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ RENDER DO PALCO в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
function sizeCanvas(){const r=cv.getBoundingClientRect();const dpr=Math.min(2,devicePixelRatio||1);cv.width=Math.max(1,r.width*dpr);cv.height=Math.max(1,r.height*dpr);ctx.setTransform(dpr,0,0,dpr,0,0);render();}
let _raf=0;function draw(){if(_raf)return;_raf=requestAnimationFrame(()=>{_raf=0;render();});}
function render(){const r=cv.getBoundingClientRect();const W=r.width,H=r.height;ctx.clearRect(0,0,W,H);
 // cyc (fundo) вЂ” recebe ribalta (uplight Гўmbar) e Auras
 ctx.fillStyle='#05070c';ctx.fillRect(0,0,W,H);
 const cycY=H*0.78;
 // ribalta banha o cyc de baixo pra cima, cГ©lula a cГ©lula
 for(let i=0;i<10;i++){const v=outCh('RIB',i)/255;if(v<=0.02)continue;const x=W*0.14+i*(W*0.72/9);
  const g=ctx.createLinearGradient(0,cycY,0,H*0.1);g.addColorStop(0,'rgba(255,200,130,'+(0.5*v)+')');g.addColorStop(1,'rgba(255,200,130,0)');
  ctx.fillStyle=g;ctx.beginPath();ctx.moveTo(x-W*0.035,cycY);ctx.lineTo(x-W*0.06,H*0.1);ctx.lineTo(x+W*0.06,H*0.1);ctx.lineTo(x+W*0.035,cycY);ctx.closePath();ctx.fill();}
 // truss
 ctx.strokeStyle='#2a3242';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(W*0.06,H*0.12);ctx.lineTo(W*0.94,H*0.12);ctx.stroke();
 for(let x=W*0.08;x<W*0.93;x+=W*0.045){ctx.beginPath();ctx.moveTo(x,H*0.105);ctx.lineTo(x+W*0.02,H*0.135);ctx.stroke();}
 // movings na truss: SHL, AUL, AUR, SHR
 const hang=[['SHL',0.22],['AUL',0.4],['AUR',0.6],['SHR',0.78]];
 hang.forEach(([id,px])=>{const x=W*px,y=H*0.15;const dim=fxDimOut(id)/255;const c=fxColorOut(id);
  ctx.fillStyle='#1b212e';ctx.fillRect(x-9,y-4,18,16);
  const t=fx(id).tipo;
  if(dim>0.02){
   const panN=(outCh(id,t==='sharpy'?9:3)/255-0.5);const tiltN=outCh(id,t==='sharpy'?11:5)/255;
   const tx=x+panN*W*0.35, ty=H*0.3+tiltN*H*0.52;
   const isBeam=t==='sharpy';const w1=isBeam?W*0.012:W*0.06;
   const prism=t==='sharpy'&&getCh(id,4)>0;
   const paint=(txx,mult)=>{const g=ctx.createLinearGradient(x,y,txx,ty);
    g.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+','+Math.min(0.9,(isBeam?0.75:0.4)*dim*mult)+')');g.addColorStop(1,'rgba('+c.r+','+c.g+','+c.b+',0)');
    ctx.beginPath();ctx.moveTo(x-3,y+10);ctx.lineTo(txx-w1,ty);ctx.lineTo(txx+w1,ty);ctx.lineTo(x+3,y+10);ctx.closePath();ctx.fillStyle=g;ctx.fill();
    const pg=ctx.createRadialGradient(txx,ty,1,txx,ty,w1*2.4);pg.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+','+0.5*dim+')');pg.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=pg;ctx.beginPath();ctx.arc(txx,ty,w1*2.4,0,7);ctx.fill();};
   if(prism){paint(tx-W*0.04,0.6);paint(tx,0.8);paint(tx+W*0.04,0.6);}else paint(tx,1);
  }
  ctx.fillStyle='rgb('+c.r+','+c.g+','+c.b+')';ctx.globalAlpha=0.3+0.7*dim;ctx.beginPath();ctx.arc(x,y+13,4,0,7);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#68809f';ctx.font='8.5px system-ui';ctx.textAlign='center';ctx.fillText(id,x,y-8);});
 // frontais no chГЈo: P64L, COB, P64R + PAR LED L/R (hastes)
 const front=[['P64L',0.13],['PLL',0.3],['COB',0.5],['PLR',0.7],['P64R',0.87]];
 front.forEach(([id,px])=>{const x=W*px,y=H*0.9;const dim=fxDimOut(id)/255;const c=fxColorOut(id);
  ctx.fillStyle='#161b26';ctx.fillRect(x-8,y,16,10);
  if(dim>0.02){const g=ctx.createLinearGradient(0,y,0,H*0.3);
   g.addColorStop(0,'rgba('+c.r+','+c.g+','+c.b+','+0.45*dim+')');g.addColorStop(1,'rgba('+c.r+','+c.g+','+c.b+',0)');
   ctx.beginPath();ctx.moveTo(x-6,y);ctx.lineTo(x-W*0.075,H*0.3);ctx.lineTo(x+W*0.075,H*0.3);ctx.lineTo(x+6,y);ctx.closePath();ctx.fillStyle=g;ctx.fill();}
  ctx.fillStyle='#68809f';ctx.font='8.5px system-ui';ctx.textAlign='center';ctx.fillText(id,x,y+22>H?y-4:y+20);});
 // ribalta hardware (barra na boca de cena)
 ctx.fillStyle='#141a26';ctx.fillRect(W*0.1,cycY+H*0.02,W*0.8,H*0.035);
 for(let i=0;i<10;i++){const x=W*0.14+i*(W*0.72/9);const v=outCh('RIB',i)/255;
  ctx.fillStyle=v>0.02?'rgba(255,200,130,'+(0.35+0.65*v)+')':'#0a0d13';ctx.beginPath();ctx.arc(x,cycY+H*0.037,Math.max(2.5,W*0.008),0,7);ctx.fill();}
 // artista
 const litFace=(fxDimOut('COB')+fxDimOut('P64L')*0.5+fxDimOut('P64R')*0.5)/255;
 const cx=W*0.5,gy=cycY+H*0.005;
 ctx.fillStyle='rgba('+Math.round(40+180*litFace)+','+Math.round(35+160*litFace)+','+Math.round(35+150*litFace)+',1)';
 ctx.beginPath();ctx.ellipse(cx,gy-H*0.14,W*0.011,H*0.026,0,0,7);ctx.fill();
 ctx.beginPath();ctx.moveTo(cx-W*0.017,gy);ctx.lineTo(cx-W*0.011,gy-H*0.115);ctx.lineTo(cx+W*0.011,gy-H*0.115);ctx.lineTo(cx+W*0.017,gy);ctx.closePath();ctx.fill();
 // legenda
 ctx.fillStyle='#5f7392';ctx.font='9.5px system-ui';ctx.textAlign='left';
 const gmv=Math.round((console_==='patch'?gm.ma:gm[console_])/2.55);
 ctx.fillText('Console: '+(console_==='ma'?'grandMA':console_==='avo'?'Avolites':console_==='dmx'?'Mesa 2 cenas (analГіgica)':'Patch')+' В· GM '+gmv+'%'+(blackout?' В· BLACKOUT':''),10,H-8);
}

// в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ tabs / init в•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђв•ђ
document.getElementById('tabs').addEventListener('click',(e)=>{const b=e.target.closest('button');if(!b)return;
 console_=b.dataset.c;[...document.querySelectorAll('#tabs button')].forEach(x=>x.classList.toggle('on',x===b));
 if(console_==='ma')buildMA(); else if(console_==='avo')buildAVO(); else if(console_==='dmx'){build2S();apply2S();} else buildPatch();
 draw();});
buildMA();drawM();sizeCanvas();
addEventListener('resize',sizeCanvas);
