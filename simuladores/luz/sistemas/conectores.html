<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Simulador — Conectores de Palco (jogo de ligação)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{background:#0a0c10;color:#e9edf2}body{padding:10px}
.app{max-width:980px;margin:0 auto;display:flex;flex-direction:column;gap:10px}
h1{font-size:clamp(15px,4vw,20px);font-weight:800;color:#eaf0ff}
.t{font-size:12px;color:#9daecb;line-height:1.45}
.mission{background:#0e1626;border:1px solid #24406e;border-radius:11px;padding:10px 12px;font-size:12.5px;line-height:1.5}
.mission b{color:#8fd0ff}
.mrow{display:flex;align-items:center;gap:8px;margin-top:6px}
.dot{width:14px;height:14px;border-radius:50%;border:2px solid #37507a;flex:none}.dot.ok{background:#39d98a;border-color:#39d98a}
.btn{background:#1b2740;color:#dce7fb;border:1px solid #33507f;border-radius:8px;padding:8px 12px;font-size:12px;font-weight:700;cursor:pointer;margin-top:8px}
.gt{font-size:10px;font-weight:800;color:#8aa0c2;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px}
.conns{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px}
.conn{background:#10141d;border:2px solid #26314a;border-radius:10px;padding:9px 8px;text-align:center;cursor:pointer}
.conn.sel{border-color:#ffcf5a;box-shadow:0 0 0 1px #ffcf5a;background:#201a0d}
.conn .ic{font-size:20px}
.conn .nm{font-size:11px;font-weight:800;margin-top:3px}
.conn .k{font-size:9px;color:#7487a8;font-weight:700}
.conn .k.dados{color:#6db9e8}.conn .k.energia{color:#e8a45a}.conn .k.multi{color:#c78ae0}
.tasks{display:flex;flex-direction:column;gap:6px}
.task{display:grid;grid-template-columns:1fr auto;gap:8px;align-items:center;background:#10141d;border:1px solid #222c40;border-radius:10px;padding:9px 11px;font-size:12px;cursor:pointer}
.task.tgt{border-color:#ffcf5a}
.task .q{color:#cfe0ff;line-height:1.4}
.task .ans{font-size:11px;font-weight:800;min-width:110px;text-align:right}
.task.right{border-color:#2f8f5b}.task.right .ans{color:#7fd0a0}
.task.wrong{border-color:#8f2f2f}.task.wrong .ans{color:#ff9a9a}
.score{font-size:12px;font-weight:800;color:#8fd0ff}
</style></head><body>
<div class="app">
 <h1>🔌 Conectores de Palco — ligue certo (energia × dados)</h1>
 <div class="t">Toque num <b>conector</b> e depois na <b>tarefa</b> onde ele é o correto. Errar conector no palco real = equipamento queimado ou show parado — aqui você só perde ponto.</div>
 <div class="mission" id="mission"></div>
 <div><div class="gt">Conectores disponíveis</div><div class="conns" id="conns"></div></div>
 <div><div class="gt">Tarefas do dia de montagem <span class="score" id="score"></span></div><div class="tasks" id="tasks"></div></div>
</div>
<script>
'use strict';
const CONNS=[
 {id:'xlr5',ic:'🎚',nm:'XLR 5 pinos',k:'dados'},
 {id:'xlr3',ic:'🎚',nm:'XLR 3 pinos',k:'dados'},
 {id:'ethercon',ic:'🌐',nm:'etherCON (RJ45)',k:'dados'},
 {id:'true1',ic:'⚡',nm:'powerCON TRUE1',k:'energia'},
 {id:'soca',ic:'🐍',nm:'Socapex 19p',k:'multi'},
 {id:'cee-r',ic:'🔴',nm:'CEE vermelho 32A',k:'energia'},
 {id:'cee-b',ic:'🔵',nm:'CEE azul 16A',k:'energia'},
 {id:'harting',ic:'🔳',nm:'Harting multipino',k:'multi'},
];
const TASKS=[
 {q:'Levar a linha <b>DMX</b> da mesa até o primeiro moving (padrão do modelo, 5 pinos)',a:'xlr5'},
 {q:'Alimentar os <b>moving heads</b> em cadeia (link de energia que pode plugar sob carga)',a:'true1'},
 {q:'Levar <b>6 circuitos do rack de dimmer</b> de uma vez até o breakout dos PAR 64',a:'soca'},
 {q:'Ligar o <b>node</b> na rede do console (cabo de rede robusto de palco)',a:'ethercon'},
 {q:'Alimentar o <b>main distro</b> com a rede trifásica da casa',a:'cee-r'},
 {q:'Alimentar a <b>régua monofásica</b> da mesa e dos monitores no FOH',a:'cee-b'},
 {q:'Linha <b>DMX</b> entre fixtures nacionais mais simples (3 pinos)',a:'xlr3'},
 {q:'Conectar o <b>quadro do motor controller</b> das talhas (multipino industrial)',a:'harting'},
];
let picked=null, answers={}, locked={};
const connsEl=document.getElementById('conns'),tasksEl=document.getElementById('tasks');
function build(){
 connsEl.innerHTML='';
 CONNS.forEach(c=>{const d=document.createElement('div');d.className='conn'+(picked===c.id?' sel':'');
  d.innerHTML='<div class="ic">'+c.ic+'</div><div class="nm">'+c.nm+'</div><div class="k '+c.k+'">'+(c.k==='dados'?'DADOS':c.k==='energia'?'ENERGIA':'MULTI')+'</div>';
  d.onclick=()=>{picked=picked===c.id?null:c.id;build();};connsEl.appendChild(d);});
 tasksEl.innerHTML='';
 TASKS.forEach((t,i)=>{const st=answers[i];const d=document.createElement('div');
  d.className='task'+(picked&&!locked[i]?' tgt':'')+(st?(st===t.a?' right':' wrong'):'');
  const ansNm=st?CONNS.find(c=>c.id===st).nm:'—';
  d.innerHTML='<div class="q">'+t.q+'</div><div class="ans">'+(st?(st===t.a?'✓ ':'✗ ')+ansNm:'toque p/ ligar')+'</div>';
  d.onclick=()=>{ if(picked==null)return; if(locked[i])return;
   answers[i]=picked; if(picked===t.a)locked[i]=true;
   picked=null;build();check();};
  tasksEl.appendChild(d);});
 const right=TASKS.filter((t,i)=>answers[i]===t.a).length;
 document.getElementById('score').textContent=' · acertos: '+right+'/'+TASKS.length;
}
const M=[
 {t:'<b>Monte o dia:</b> ligue as 8 tarefas com o conector certo. Regra de ouro: <b>energia e dados NUNCA se misturam</b> — olhe a etiqueta de cada conector.',
  ok:()=>TASKS.every((t,i)=>answers[i]===t.a)},
 {t:'<b>Gabarito perfeito:</b> zere os erros — completa as 8 SEM nenhuma resposta errada registrada (recomece se precisar).',
  ok:()=>TASKS.every((t,i)=>answers[i]===t.a)&&Object.keys(answers).length===TASKS.length&&TASKS.every((t,i)=>answers[i]===t.a)},
];
let mi=0;
function drawM(){document.getElementById('mission').innerHTML='<div><b>Cenário '+(mi+1)+'/'+M.length+':</b> '+M[mi].t+'</div><div class="mrow"><span class="dot" id="mdot"></span><span id="mstat">Ligue as tarefas…</span></div><button class="btn" id="mreset">Recomeçar</button> <button class="btn" id="mnext">Próximo ▸</button>';
 document.getElementById('mreset').onclick=()=>{answers={};locked={};picked=null;build();check();};
 document.getElementById('mnext').onclick=()=>{mi=(mi+1)%M.length;drawM();check();};check();}
function check(){const dot=document.getElementById('mdot');if(!dot)return;let ok=false;try{ok=M[mi].ok();}catch(e){}
 dot.classList.toggle('ok',ok);document.getElementById('mstat').textContent=ok?'✓ Montagem aprovada — nada queimou!':'Ligue as tarefas…';}
build();drawM();
</script></body></html>
