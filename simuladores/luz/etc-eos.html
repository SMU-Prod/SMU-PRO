<!doctype html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Simulador — ETC Eos (réplica funcional)</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;font-family:system-ui,Segoe UI,Roboto,Arial,sans-serif}
html,body{height:100%;background:#0a0c10;color:#e9edf2;overflow:hidden}
body{display:flex;align-items:center;justify-content:center}
.console{width:1280px;height:720px;background:#12151b;border:1px solid #283040;border-radius:10px;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 12px 48px #000a}
.brand{height:30px;background:linear-gradient(90deg,#1a2130,#12151b);display:flex;align-items:center;justify-content:space-between;padding:0 14px;border-bottom:1px solid #283040}
.brand b{font-size:13px;letter-spacing:1px;color:#cdd8ec;font-weight:800}.brand b span{color:#3fb6d6}
.brand .s{font-size:10px;color:#6b7688}
.live{height:22px;background:#101722;display:flex;align-items:center;gap:12px;padding:0 12px;border-bottom:1px solid #22304a;font-size:10px;color:#8ba0c0;letter-spacing:1px;font-weight:700}
.live .lv{color:#ffcf5a}
.top{flex:1;display:grid;grid-template-columns:1.05fr .95fr;gap:2px;background:#0a0c10;min-height:0}
.pane{background:#151922;display:flex;flex-direction:column;min-height:0}
.ph{font-size:10px;letter-spacing:1px;color:#7688a0;padding:5px 10px;background:#1a2130;border-bottom:1px solid #26303f;text-transform:uppercase;font-weight:700}
.chans{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:min-content;gap:7px;padding:10px;align-content:start;overflow:auto}
.chan{background:#111722;border:1px solid #26303f;border-radius:7px;padding:6px 4px 5px;text-align:center;cursor:pointer;position:relative}
.chan.sel{border-color:#ffcf5a;box-shadow:0 0 0 1px #ffcf5a}
.chan .cn{font-size:11px;color:#8ba0c0;font-weight:700}
.chan .ci{font-size:19px;font-weight:800;color:#fff;line-height:1.1}
.chan .ci.zero{color:#3a465c}
.chan .cc{height:5px;border-radius:3px;margin-top:4px;background:#0a0c10}
.plan{flex:1;position:relative}.plan canvas{width:100%;height:100%;display:block}
.plan .st{position:absolute;bottom:6px;left:10px;font-size:10px;color:#7688a0}
.mid{height:96px;background:#151922;border-top:1px solid #26303f;display:grid;grid-template-columns:1fr 200px}
.encs{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:#0a0c10}
.enc{background:#151922;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;cursor:ns-resize;touch-action:none}
.enc .el{font-size:10px;color:#8ba0c0;text-transform:uppercase;font-weight:700}
.enc .ed{width:46px;height:46px;border-radius:50%;background:radial-gradient(circle at 50% 40%,#26303f,#141a24);border:2px solid #3a4658;position:relative}
.enc .ed i{position:absolute;left:50%;top:5px;width:2px;height:15px;background:#3fb6d6;margin-left:-1px;transform-origin:50% 18px}
.enc .ev{font-size:12px;font-weight:700}
.cpal{background:#151922;padding:6px;display:flex;flex-direction:column;gap:4px;border-left:1px solid #26303f}
.cpal .cl{font-size:9px;color:#7688a0;text-transform:uppercase;font-weight:700}
.cpal .sw{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:4px}
.cpal .sw div{border-radius:4px;cursor:pointer;border:1px solid #333}
.bottom{height:250px;display:grid;grid-template-columns:250px 1fr 300px;gap:2px;background:#0a0c10}
.cuelist{background:#151922;display:flex;flex-direction:column;min-height:0}
.cues{flex:1;overflow:auto}
.cuerow{display:grid;grid-template-columns:36px 1fr 44px;gap:4px;padding:5px 8px;font-size:11px;border-bottom:1px solid #1c2432;color:#a9b6c8}
.cuerow.cur{background:#1e2a3e;color:#fff}
.cuerow .cq{font-weight:800;color:#ffcf5a}
.go{background:#151922;display:flex;flex-direction:column;gap:8px;padding:12px;justify-content:center}
.gobtn{background:#1e5a3a;border:1px solid #2f8f5b;border-radius:8px;color:#eafff2;font-size:22px;font-weight:800;padding:22px 0;cursor:pointer;letter-spacing:2px}
.gobtn:active{background:#256e47}
.backbtn{background:#2a2f3a;border:1px solid #3a4250;border-radius:8px;color:#cdd8ec;font-size:13px;font-weight:700;padding:9px 0;cursor:pointer}
.keypad{background:#151922;display:grid;grid-template-columns:repeat(4,1fr);grid-auto-rows:1fr;gap:5px;padding:8px}
.key{background:#212a38;border:1px solid #313b4c;border-radius:6px;color:#dfe6f0;font-size:12px;font-weight:700;display:flex;align-items:center;justify-content:center;cursor:pointer;user-select:none;text-align:center;line-height:1.05}
.key:active{background:#2f3a4c}
.key.fn{background:#1a2634;color:#7fc6e6}.key.rec{background:#2a2030;color:#e08ac0}.key.ent{background:#25344e;color:#bcd8ff}
.cmdline{height:34px;background:#0c1420;border-top:1px solid #22304a;display:flex;align-items:center;padding:0 12px;gap:8px;font-family:Consolas,monospace}
.cmdline .pr{color:#ffcf5a;font-weight:800;font-size:12px}
.cmdline .bf{flex:1;color:#e9edf2;font-size:13px}.cmdline .bf .cur{color:#3fb6d6}
.mbar{height:40px;background:#0e1626;border-top:1px solid #24406e;display:flex;align-items:center;gap:10px;padding:0 12px;font-size:11.5px}
.mbar .dot{width:12px;height:12px;border-radius:50%;border:2px solid #37507a;flex:none}.mbar .dot.ok{background:#39d98a;border-color:#39d98a}
.mbar b{color:#7fc6e6}.mbar button{margin-left:auto;background:#16283e;color:#bcd8ff;border:1px solid #2a466e;border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer}
</style></head>
<body>
<div class="console" id="console">
  <div class="brand"><b>ETC · Eos<span> ●</span></b><span class="s">réplica funcional de estudo · SMU</span></div>
  <div class="live"><span class="lv">LIVE</span><span>Cue atual: <b id="curcue">—</b></span><span id="selinfo">Nada selecionado</span></div>
  <div class="top">
    <div class="pane"><div class="ph">Channels (Live)</div><div class="chans" id="chans"></div></div>
    <div class="pane"><div class="ph">Stage</div><div class="plan"><canvas id="cv"></canvas><div class="st" id="st"></div></div></div>
  </div>
  <div class="mid">
    <div class="encs" id="encs"></div>
    <div class="cpal"><div class="cl">Color (encoders/paleta)</div><div class="sw" id="cpal"></div></div>
  </div>
  <div class="bottom">
    <div class="cuelist"><div class="ph">Cue List</div><div class="cues" id="cues"></div></div>
    <div class="go">
      <button class="gobtn" id="gobtn">GO</button>
      <button class="backbtn" id="backbtn">◂ BACK</button>
    </div>
    <div class="keypad" id="keypad"></div>
  </div>
  <div class="cmdline"><span class="pr">LIVE:</span><span class="bf" id="buf"></span></div>
  <div class="mbar"><span class="dot" id="mdot"></span><span id="mtext"></span><button id="mnext">Próxima ▸</button></div>
</div>
<script>
const N=8;
const ch=[]; for(let i=0;i<N;i++)ch.push({id:i+1,i:0,r:255,g:255,b:255,sel:false});
const cues=[]; let curCue=-1;
let buf=''; // command tokens as string

// ── Channel grid ──
const chansEl=document.getElementById('chans');
function buildChans(){chansEl.innerHTML='';ch.forEach(c=>{const el=document.createElement('div');el.className='chan'+(c.sel?' sel':'');
 const on=c.i>0;const col=on?`rgb(${c.r},${c.g},${c.b})`:'#0a0c10';
 el.innerHTML=`<div class="cn">${c.id}</div><div class="ci ${on?'':'zero'}">${on?Math.round(c.i):''}</div><div class="cc" style="background:${col};opacity:${on?(0.3+0.7*c.i/100):1}"></div>`;
 el.onclick=()=>{c.sel=!c.sel;render();};chansEl.appendChild(el);});}
const selected=()=>ch.filter(c=>c.sel);

// ── Command parsing (Eos subset) ──
function tok(){return buf.trim().split(/\s+/).filter(Boolean);}
function selRange(a,b){ch.forEach(c=>c.sel=false);const lo=Math.min(a,b),hi=Math.max(a,b);ch.forEach(c=>{if(c.id>=lo&&c.id<=hi)c.sel=true;});}
function setLevel(v){selected().forEach(c=>c.i=Math.max(0,Math.min(100,v)));}
function flash(m){document.getElementById('st').textContent=m;}
function enter(){
 const t=tok();if(!t.length){return;}
 const up=t.map(x=>x.toLowerCase());
 try{
 // Record Cue N
 if(up[0]==='record'){const ci=up.indexOf('cue');const n=parseInt(t[ci+1]);if(!isNaN(n)){recordCue(n);flash('Cue '+n+' gravado');}buf='';return render();}
 // Channel / Group / número (seleciona e CONTINUA para o At)
 let i=0;
 if(up[0]==='group'||up[0]==='grp'){const g=parseInt(t[1]);ch.forEach(c=>c.sel=false);if(g===1)ch.forEach(c=>{if(c.id<=4)c.sel=true;});else if(g===2)ch.forEach(c=>{if(c.id>4)c.sel=true;});else if(g===3)ch.forEach(c=>c.sel=true);i=2;}
 else { if(up[0]==='channel'||up[0]==='chan')i=1; if(/^\d+$/.test(t[i]||'')){const a=parseInt(t[i]);let b=a;if(up[i+1]==='thru'){b=parseInt(t[i+2])||N;}selRange(a,b);} }
 // At value / Full / Out
 const ai=up.indexOf('at');
 if(ai>=0){const nx=up[ai+1];if(nx==='full')setLevel(100);else if(nx==='out')setLevel(0);else{const v=parseInt(t[ai+1]);if(!isNaN(v))setLevel(v);}}
 else if(up.includes('full'))setLevel(100); else if(up.includes('out'))setLevel(0);
 buf='';render();
 }catch(e){buf='';render();}
}
function recordCue(n){const snap=ch.map(c=>({i:c.i,r:c.r,g:c.g,b:c.b}));const ex=cues.findIndex(q=>q.num===n);const cue={num:n,snap,fade:3};if(ex>=0)cues[ex]=cue;else{cues.push(cue);cues.sort((a,b)=>a.num-b.num);}}
function goCue(dir){ if(!cues.length)return; curCue+=dir; if(curCue<0)curCue=0; if(curCue>=cues.length)curCue=cues.length-1; const q=cues[curCue]; q.snap.forEach((s,idx)=>{ch[idx].i=s.i;ch[idx].r=s.r;ch[idx].g=s.g;ch[idx].b=s.b;}); ch.forEach(c=>c.sel=false); flash('Go → Cue '+q.num); render(); }

// ── Encoders (Color) ──
const COLA=[{k:'r',l:'Red'},{k:'g',l:'Green'},{k:'b',l:'Blue'}];
const encsEl=document.getElementById('encs');
function avg(k){const s=selected();return s.length?s.reduce((a,c)=>a+c[k],0)/s.length:0;}
function setC(k,v){const s=selected();if(!s.length){flash('Selecione channels');return;}v=Math.max(0,Math.min(255,Math.round(v)));s.forEach(c=>c[k]=v);render();}
function buildEncs(){encsEl.innerHTML='';COLA.forEach(a=>{const cur=avg(a.k);const w=document.createElement('div');w.className='enc';
 w.innerHTML=`<div class="el">${a.l}</div><div class="ed"><i style="transform:rotate(${cur/255*300-150}deg)"></i></div><div class="ev">${Math.round(cur)}</div>`;
 w.addEventListener('pointerdown',e=>{const sy=e.clientY,sv=avg(a.k);const mv=ev=>{if(!ev.buttons){cl();return;}setC(a.k,sv+(sy-ev.clientY)*2);};const cl=()=>{removeEventListener('pointermove',mv);removeEventListener('pointerup',cl);};addEventListener('pointermove',mv);addEventListener('pointerup',cl);});
 encsEl.appendChild(w);});}
const cpalEl=document.getElementById('cpal');
function buildPal(){cpalEl.innerHTML='';[['Vermelho',255,0,0],['Verde',0,255,0],['Azul',0,0,255],['Branco',255,255,255],['Âmbar',255,150,0],['Magenta',255,0,255],['Ciano',0,255,255],['Rosa',255,80,160]].forEach(([nm,r,g,b])=>{const d=document.createElement('div');d.style.background=`rgb(${r},${g},${b})`;d.title=nm;d.onclick=()=>{const s=selected();if(!s.length){flash('Selecione channels');return;}s.forEach(c=>{c.r=r;c.g=g;c.b=b;});render();};cpalEl.appendChild(d);});}

// ── Cue list ──
const cuesEl=document.getElementById('cues');
function buildCues(){cuesEl.innerHTML='';if(!cues.length){cuesEl.innerHTML='<div style="padding:10px;font-size:11px;color:#5b6678">Nenhum cue. Use Record Cue 1 Enter.</div>';return;}
 cues.forEach((q,idx)=>{const el=document.createElement('div');el.className='cuerow'+(idx===curCue?' cur':'');
  const lv=Math.round(q.snap.reduce((a,s)=>a+s.i,0)/q.snap.length);
  el.innerHTML=`<div class="cq">${q.num}</div><div>Cue ${q.num} · int. média ${lv}%</div><div>${q.fade}s</div>`;cuesEl.appendChild(el);});}

// ── Keypad ──
const KEYS=[['Channel','fn'],['Group','fn'],['Thru','fn'],['Record','rec'],
 ['7'],['8'],['9'],['At','fn'],
 ['4'],['5'],['6'],['Full','fn'],
 ['1'],['2'],['3'],['Out','fn'],
 ['0'],['Cue','fn'],['Clear','fn'],['Enter','ent']];
const keypadEl=document.getElementById('keypad');
function buildKeypad(){keypadEl.innerHTML='';KEYS.forEach(([t,cls])=>{const el=document.createElement('div');el.className='key'+(cls?' '+cls:'');el.textContent=t;el.onclick=()=>press(t);keypadEl.appendChild(el);});}
function press(t){
 if(t==='Enter')return enter();
 if(t==='Clear'){buf='';ch.forEach(c=>c.sel=false);render();return;}
 const map={Channel:'Channel ',Group:'Group ',Thru:' Thru ',At:' At ',Full:' Full',Out:' Out',Record:'Record ',Cue:'Cue '};
 buf+=(map[t]!==undefined?map[t]:t);render();
}
document.addEventListener('keydown',e=>{if(/^[0-9]$/.test(e.key))buf+=e.key;else if(e.key==='Enter')return enter();else if(e.key==='Backspace')buf=buf.slice(0,-1);else if(e.key===' '){buf+=' ';e.preventDefault();}else return;render();});
document.getElementById('gobtn').onclick=()=>goCue(+1);
document.getElementById('backbtn').onclick=()=>goCue(-1);

// ── Plan ──
const cv=document.getElementById('cv');const ctx=cv.getContext('2d');
function sizeCanvas(){const r=cv.getBoundingClientRect();const dpr=Math.min(2,devicePixelRatio||1);cv.width=r.width*dpr;cv.height=r.height*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);drawPlan();}
function drawPlan(){const r=cv.getBoundingClientRect();const W=r.width,H=r.height;ctx.clearRect(0,0,W,H);ctx.fillStyle='#0b0f16';ctx.fillRect(0,0,W,H);
 const cols=4,rows=2,mx=W/(cols+1),my=H/(rows+1);
 ch.forEach((c,idx)=>{const cx=mx*((idx%cols)+1),cy=my*(Math.floor(idx/cols)+1);const d=c.i/100;
  if(d>0.02){const bg=ctx.createRadialGradient(cx,cy,2,cx,cy,50);bg.addColorStop(0,`rgba(${c.r},${c.g},${c.b},${Math.min(0.9,d)})`);bg.addColorStop(1,`rgba(${c.r},${c.g},${c.b},0)`);ctx.fillStyle=bg;ctx.beginPath();ctx.arc(cx,cy,50,0,7);ctx.fill();}
  ctx.fillStyle=c.sel?'#3a3115':'#151b26';ctx.strokeStyle=c.sel?'#ffcf5a':'#2a3446';ctx.lineWidth=2;ctx.beginPath();ctx.arc(cx,cy,13,0,7);ctx.fill();ctx.stroke();
  ctx.globalAlpha=0.35+0.65*d;ctx.fillStyle=`rgb(${c.r},${c.g},${c.b})`;ctx.beginPath();ctx.arc(cx,cy,7,0,7);ctx.fill();ctx.globalAlpha=1;
  ctx.fillStyle='#6b7688';ctx.font='9px system-ui';ctx.textAlign='center';ctx.fillText('Ch '+c.id,cx,cy+26);});
 ctx.textAlign='left';}

// ── Missões ──
const M=[
 {t:'Digite <b>Channel 1 Thru 4</b>, depois <b>At Full</b> e <b>Enter</b> (ou use as teclas). Os canais 1–4 vão a 100%.',ok:()=>[0,1,2,3].every(i=>ch[i].i>=100)},
 {t:'Selecione alguns canais e dê uma <b>cor</b> (paleta ou encoders).',ok:()=>ch.some(c=>c.i>0&&(c.b<200||c.r<200||c.g<200))},
 {t:'Grave o look atual como cue: <b>Record Cue 1 Enter</b>.',ok:()=>cues.some(q=>q.num===1)},
 {t:'Mude o look (ex.: Channel 5 Thru 8 At Full), grave <b>Record Cue 2 Enter</b>, depois use <b>GO</b> e <b>BACK</b> para rodar a lista.',ok:()=>cues.length>=2&&curCue>=0},
];
let mi=0;
function drawM(){document.getElementById('mtext').innerHTML='<b>Missão '+(mi+1)+'/'+M.length+':</b> '+M[mi].t;}
function checkM(){const dot=document.getElementById('mdot');let ok=false;try{ok=M[mi].ok();}catch(e){}dot.classList.toggle('ok',ok);}
document.getElementById('mnext').onclick=()=>{mi=(mi+1)%M.length;drawM();render();};

let _raf=0;function render(){if(_raf)return;_raf=requestAnimationFrame(()=>{_raf=0;renderNow();});}
function renderNow(){buildChans();buildEncs();buildCues();drawPlan();checkM();
 document.getElementById('buf').innerHTML=(buf.replace(/</g,'&lt;')||'')+'<span class="cur">▋</span>';
 document.getElementById('curcue').textContent=curCue>=0&&cues[curCue]?('Cue '+cues[curCue].num):'—';
 const s=selected();document.getElementById('selinfo').textContent=s.length?('Selecionado: Ch '+s.map(c=>c.id).join(', ')):'Nada selecionado';}
function fit(){const DW=1280,DH=720;const vw=innerWidth,vh=innerHeight;const scrH=(window.screen&&screen.height)||vh;const iframeTaller=vh>scrH+8;const visH=Math.min(vh,scrH);const headerAllow=iframeTaller?84:(vh>700?24:6);const effVh=Math.max(240,visH-headerAllow);const z=Math.min(vw/DW,effVh/DH);document.getElementById('console').style.zoom=z;requestAnimationFrame(sizeCanvas);}
addEventListener('resize',fit);
buildKeypad();buildPal();drawM();renderNow();fit();setTimeout(fit,60);
</script></body></html>
