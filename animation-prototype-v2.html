<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMU PRO — Animation Engine v2 (High Quality)</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;600&display=swap');
  *{margin:0;padding:0;box-sizing:border-box}
  :root{
    --bg:#06060c;--s1:#0c0c16;--s2:#13132a;--s3:#1e1e3a;
    --border:rgba(255,255,255,0.06);--amber:#f59e0b;--amber2:#fbbf24;
    --blue:#3b82f6;--green:#22c55e;--purple:#a855f7;--red:#ef4444;
    --cyan:#06b6d4;--pink:#ec4899;--text:#eef;--dim:#667;
  }
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);overflow-x:hidden}

  /* ── Layout ── */
  .app{max-width:1440px;margin:0 auto;padding:20px}
  .header{text-align:center;padding:32px 0 20px}
  .header h1{font-size:26px;font-weight:800;background:linear-gradient(135deg,#f59e0b,#fbbf24,#f59e0b);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .header .sub{color:var(--dim);font-size:13px;margin-top:6px}
  .badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase}

  /* ── Pipeline ── */
  .pipeline{display:flex;align-items:center;justify-content:center;gap:8px;margin:24px 0;flex-wrap:wrap}
  .pip{padding:8px 16px;border-radius:10px;background:var(--s1);border:1px solid var(--border);font-size:12px;font-weight:500;transition:all .5s;display:flex;align-items:center;gap:6px}
  .pip.active{border-color:var(--amber);background:rgba(245,158,11,0.08);color:var(--amber);box-shadow:0 0 24px rgba(245,158,11,0.12)}
  .pip.done{border-color:var(--green);color:var(--green)}
  .pip .dot{width:6px;height:6px;border-radius:50%;background:currentColor}
  .parr{color:#333;font-size:16px}

  /* ── Main Area ── */
  .main{display:grid;grid-template-columns:320px 1fr;gap:20px;margin-top:20px}
  @media(max-width:900px){.main{grid-template-columns:1fr}}

  /* ── Sidebar ── */
  .sidebar{display:flex;flex-direction:column;gap:16px}
  .card{background:var(--s1);border:1px solid var(--border);border-radius:14px;overflow:hidden}
  .card-head{padding:12px 16px;background:var(--s2);border-bottom:1px solid var(--border);font-size:13px;font-weight:600;display:flex;align-items:center;gap:8px}
  .card-body{padding:14px 16px}

  .scene-list{max-height:420px;overflow-y:auto;display:flex;flex-direction:column;gap:6px}
  .scene-item{padding:10px 12px;border-radius:10px;border:1px solid transparent;cursor:pointer;transition:all .25s;background:rgba(255,255,255,0.015)}
  .scene-item:hover{background:rgba(255,255,255,0.03);border-color:rgba(255,255,255,0.06)}
  .scene-item.active{background:rgba(245,158,11,0.06);border-color:rgba(245,158,11,0.3)}
  .scene-item .num{font-size:10px;font-weight:700;color:var(--amber);margin-right:6px}
  .scene-item .stitle{font-size:12px;font-weight:600}
  .scene-item .stype{font-size:9px;color:var(--dim);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
  .scene-item .snarr{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .scene-item .tags{display:flex;flex-wrap:wrap;gap:3px;margin-top:6px}
  .tag{font-size:8px;padding:2px 6px;border-radius:3px;font-weight:600}
  .tag.el{background:rgba(59,130,246,0.12);color:var(--blue)}
  .tag.an{background:rgba(168,85,247,0.12);color:var(--purple)}
  .tag.fx{background:rgba(6,182,212,0.12);color:var(--cyan)}

  /* ── Canvas ── */
  .canvas-area{display:flex;flex-direction:column;gap:12px}
  .canvas-wrap{position:relative;width:100%;aspect-ratio:16/9;background:#04040a;border-radius:14px;overflow:hidden;border:1px solid var(--border);box-shadow:0 8px 40px rgba(0,0,0,0.5)}
  .canvas-wrap canvas{width:100%;height:100%}
  .canvas-overlay{position:absolute;top:12px;left:12px;display:flex;gap:6px;pointer-events:none}
  .canvas-badge{padding:4px 10px;border-radius:6px;font-size:10px;font-weight:600;backdrop-filter:blur(8px)}

  /* ── Controls ── */
  .ctrl{display:flex;align-items:center;gap:10px;padding:12px 16px;background:var(--s1);border-radius:12px;border:1px solid var(--border)}
  .btn{padding:8px 20px;border-radius:8px;border:none;cursor:pointer;font-family:'Inter';font-weight:600;font-size:12px;display:flex;align-items:center;gap:6px;transition:all .2s}
  .btn-p{background:var(--amber);color:#000}.btn-p:hover{background:var(--amber2);transform:translateY(-1px)}
  .btn-p:disabled{opacity:.4;cursor:not-allowed;transform:none}
  .btn-s{background:var(--s3);color:var(--text);border:1px solid var(--border)}.btn-s:hover{border-color:rgba(255,255,255,0.15)}
  .pbar{flex:1;height:3px;background:var(--s3);border-radius:2px;overflow:hidden;cursor:pointer;position:relative}
  .pbar:hover{height:6px}
  .pfill{height:100%;background:linear-gradient(90deg,var(--amber),var(--amber2));border-radius:2px;transition:width .05s linear}
  .time{font-size:11px;color:var(--dim);font-variant-numeric:tabular-nums;font-family:'JetBrains Mono';min-width:44px;text-align:right}
  .scene-label{font-size:11px;color:var(--amber);font-weight:600;min-width:90px}

  /* ── Analysis ── */
  .analysis{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:16px}
  .acard{background:var(--s1);border-radius:10px;padding:12px;border:1px solid var(--border);text-align:center}
  .acard .al{font-size:9px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:6px}
  .acard .av{font-size:22px;font-weight:800;color:var(--amber)}
  .acard .ad{font-size:10px;color:var(--dim);margin-top:4px;line-height:1.4}
  @media(max-width:700px){.analysis{grid-template-columns:1fr 1fr}}

  /* ── Scrollbar ── */
  ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:var(--s3);border-radius:2px}

  /* ── Generate CTA ── */
  .cta-area{text-align:center;margin:28px 0}
  .cta-btn{padding:14px 48px;border-radius:12px;border:2px solid var(--amber);background:rgba(245,158,11,0.08);color:var(--amber);cursor:pointer;font-family:'Inter';font-weight:700;font-size:15px;transition:all .3s;display:inline-flex;align-items:center;gap:10px}
  .cta-btn:hover{background:var(--amber);color:#000;box-shadow:0 0 40px rgba(245,158,11,0.2);transform:translateY(-2px)}
  .cta-btn:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}

  .hidden{display:none!important}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>SMU PRO — Animation Engine v2</h1>
    <div class="sub">Alta qualidade · Física real · Efeitos cinematográficos · Animações precisas</div>
  </div>

  <div class="pipeline">
    <div class="pip" id="p1"><div class="dot"></div>Conteúdo</div><div class="parr">›</div>
    <div class="pip" id="p2"><div class="dot"></div>IA Analisa</div><div class="parr">›</div>
    <div class="pip" id="p3"><div class="dot"></div>Roteiro</div><div class="parr">›</div>
    <div class="pip" id="p4"><div class="dot"></div>Animação HD</div>
  </div>

  <div id="analysisRow" class="hidden">
    <div class="analysis" id="analysisGrid"></div>
  </div>

  <div class="main">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="card">
        <div class="card-head">🎬 Roteiro (10 cenas · 65s)</div>
        <div class="card-body">
          <div class="scene-list" id="sceneList"></div>
        </div>
      </div>
    </div>

    <!-- Canvas -->
    <div class="canvas-area" id="canvasArea">
      <div class="canvas-wrap" id="canvasWrap">
        <canvas id="c"></canvas>
      </div>
      <div class="ctrl">
        <button class="btn btn-p" id="playBtn" onclick="toggle()">▶ Play</button>
        <button class="btn btn-s" onclick="reset()">⟲</button>
        <div class="scene-label" id="sLabel">Cena 1/10</div>
        <div class="pbar" id="pbar" onclick="seekGlobal(event)"><div class="pfill" id="pfill"></div></div>
        <div class="time" id="tDisp">0:00</div>
      </div>
    </div>
  </div>

  <div class="cta-area">
    <button class="cta-btn" id="ctaBtn" onclick="generate()">🧠 Gerar Animação com IA</button>
  </div>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// SMU PRO — Animation Engine v2 — HIGH QUALITY
// Physically-accurate waves, cinematic transitions, particle systems
// ══════════════════════════════════════════════════════════════

const S = [
  {n:1,tipo:"abertura",dur:6,titulo:"Frequências e Equalização",sub:"Domine o espectro sonoro nos seus eventos",narr:"Nesta aula, vamos mergulhar no mundo das frequências sonoras e aprender a usar o equalizador como um verdadeiro profissional de eventos.",tags:["particles","typewriter","wave_bg","glow"]},
  {n:2,tipo:"conceito",dur:7,titulo:"O que é o Som?",sub:"Onda mecânica: compressões e rarefações",narr:"O som é uma onda que viaja pelo ar comprimindo e expandindo as moléculas. A frequência dessa onda determina se o som é grave ou agudo.",tags:["sine_wave","molecules","physics","labels"]},
  {n:3,tipo:"espectro",dur:8,titulo:"O Espectro de Frequências",sub:"20 Hz até 20.000 Hz — o que o ouvido capta",narr:"Nosso ouvido percebe de 20 Hz a 20 kHz. Cada faixa tem um papel específico no som ao vivo.",tags:["spectrum_bars","range_labels","ear_icon","gradient"]},
  {n:4,tipo:"subgraves",dur:6,titulo:"Sub-Graves: O que você SENTE",sub:"20–60 Hz · Subwoofers 18\" e 21\"",narr:"Abaixo de 60 Hz, você não apenas ouve — sente no peito. Os subwoofers dos festivais de eletrônica criam essa experiência visceral.",tags:["low_wave","body_pulse","speaker_cone","impact"]},
  {n:5,tipo:"vozes",dur:6,titulo:"Médios: A Voz Humana",sub:"500–2000 Hz · Inteligibilidade em eventos",narr:"A faixa dos médios carrega a voz humana e a maioria dos instrumentos. Fundamental para palestras e corporativos.",tags:["waveform","voice_pattern","instruments","split"]},
  {n:6,tipo:"perigo",dur:5,titulo:"⚠ Zona Crítica: 3 kHz",sub:"Máxima sensibilidade · Risco de feedback",narr:"Em 3 kHz nosso ouvido é hipersensível. É a frequência onde o feedback mais acontece. Cuidado redobrado!",tags:["sensitivity_curve","alert_flash","feedback_loop","danger"]},
  {n:7,tipo:"eq",dur:8,titulo:"O Equalizador",sub:"Paramétrico · Gráfico · Shelving",narr:"O EQ é seu bisturi sonoro. O paramétrico dá controle total, o gráfico corrige a sala, e o shelving ajusta brilho geral.",tags:["eq_curve","knobs","faders","drag_demo"]},
  {n:8,tipo:"regra",dur:6,titulo:"Regra de Ouro",sub:"Cortar > Reforçar — sempre",narr:"A regra mais importante: é sempre melhor CORTAR frequências problemáticas do que adicionar o que falta. Mantém o sinal limpo.",tags:["comparison","boost_cut","signal_meter","golden"]},
  {n:9,tipo:"pratica",dur:7,titulo:"Passagem de Som",sub:"RTA + EQ Gráfico + Refinamento",narr:"Na prática: ligue o RTA, identifique ressonâncias da sala, aplique cortes no gráfico, e refine canal por canal.",tags:["rta_live","venue","resonance","workflow"]},
  {n:10,tipo:"fim",dur:6,titulo:"Resumo & Próxima Aula",sub:"Simulação de Passagem de Som",narr:"Você dominou o espectro, os tipos de EQ e a regra do corte. Na próxima aula: simulação prática completa!",tags:["recap_cards","cta","logo","fade"]}
];

let cv,cx,W,H,playing=false,scene=0,st=0,lt=0,raf=null,ready=false;
const TWO_PI=Math.PI*2;

// ── Easing functions ──
const ease={
  out3:t=>1-Math.pow(1-t,3),
  out4:t=>1-Math.pow(1-t,4),
  inOut3:t=>t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2,
  elastic:t=>t===0?0:t===1?1:Math.pow(2,-10*t)*Math.sin((t*10-0.75)*TWO_PI/3)+1,
  bounce:t=>{const n1=7.5625,d1=2.75;if(t<1/d1)return n1*t*t;if(t<2/d1)return n1*(t-=1.5/d1)*t+.75;if(t<2.5/d1)return n1*(t-=2.25/d1)*t+.9375;return n1*(t-=2.625/d1)*t+.984375}
};
function lerp(a,b,t){return a+(b-a)*t}
function clamp(v,a=0,b=1){return Math.max(a,Math.min(b,v))}
function prog(t,delay,dur){return clamp((t-delay)/dur)}

// ── Particle system ──
class Particles{
  constructor(n,w,h){this.ps=[];this.w=w;this.h=h;
    for(let i=0;i<n;i++)this.ps.push({x:Math.random()*w,y:Math.random()*h,vx:(Math.random()-.5)*.3,vy:(Math.random()-.5)-.1,size:Math.random()*2+.5,alpha:Math.random()*.4+.1,hue:30+Math.random()*20})
  }
  update(dt){this.ps.forEach(p=>{p.x+=p.vx;p.y+=p.vy;if(p.x<0)p.x=this.w;if(p.x>this.w)p.x=0;if(p.y<0)p.y=this.h;if(p.y>this.h)p.y=0})}
  draw(cx,t){this.ps.forEach(p=>{const a=p.alpha*(0.5+Math.sin(t*2+p.x*.01)*0.5);cx.beginPath();cx.arc(p.x,p.y,p.size,0,TWO_PI);cx.fillStyle=`hsla(${p.hue},80%,60%,${a})`;cx.fill()})}
}

let particles;

// ── Setup ──
function setup(){
  cv=document.getElementById('c');
  const r=cv.parentElement.getBoundingClientRect();
  const dpr=Math.min(window.devicePixelRatio||1,2);
  W=r.width;H=r.height;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx=cv.getContext('2d');cx.scale(dpr,dpr);
  particles=new Particles(60,W,H);
}

// ── Render dispatcher ──
function render(){
  if(!cx)return;
  cx.clearRect(0,0,W,H);
  const s=S[scene],t=st;

  // BG
  drawBG(s.tipo,t);
  particles.update(1/60);
  particles.draw(cx,t);

  // Scene
  switch(s.tipo){
    case'abertura':rAbertura(t);break;
    case'conceito':rConceito(t);break;
    case'espectro':rEspectro(t);break;
    case'subgraves':rSubgraves(t);break;
    case'vozes':rVozes(t);break;
    case'perigo':rPerigo(t);break;
    case'eq':rEQ(t);break;
    case'regra':rRegra(t);break;
    case'pratica':rPratica(t);break;
    case'fim':rFim(t);break;
  }

  // HUD
  drawHUD(s,t);
}

function drawBG(tipo,t){
  const g=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);
  switch(tipo){
    case'abertura':g.addColorStop(0,'#0f1535');g.addColorStop(1,'#06060c');break;
    case'perigo':g.addColorStop(0,`rgba(40,8,8,${.7+Math.sin(t*3)*.15})`);g.addColorStop(1,'#06060c');break;
    case'regra':g.addColorStop(0,'#0a1a0f');g.addColorStop(1,'#06060c');break;
    case'fim':g.addColorStop(0,'#1a150a');g.addColorStop(1,'#06060c');break;
    default:g.addColorStop(0,'#0a0e20');g.addColorStop(1,'#06060c');
  }
  cx.fillStyle=g;cx.fillRect(0,0,W,H);

  // Subtle grid
  cx.strokeStyle='rgba(255,255,255,0.015)';cx.lineWidth=.5;
  for(let x=0;x<W;x+=50){cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,H);cx.stroke()}
  for(let y=0;y<H;y+=50){cx.beginPath();cx.moveTo(0,y);cx.lineTo(W,y);cx.stroke()}
}

function drawHUD(s,t){
  // Scene badge
  cx.save();
  cx.fillStyle='rgba(0,0,0,0.6)';cx.beginPath();rr(10,10,110,28,8);cx.fill();
  cx.fillStyle='rgba(245,158,11,0.9)';cx.font='700 11px Inter';cx.textAlign='left';
  cx.fillText(`CENA ${s.n}/10  ·  ${s.tipo.toUpperCase()}`,20,28);

  // Progress dots
  const dy=H-14;
  for(let i=0;i<10;i++){
    cx.beginPath();cx.arc(W/2-90+i*20,dy,i===scene?4:2,0,TWO_PI);
    cx.fillStyle=i===scene?'#f59e0b':i<scene?'rgba(245,158,11,0.35)':'rgba(255,255,255,0.1)';cx.fill();
  }

  // Narration bar
  const np=clamp(t/S[scene].dur);
  cx.fillStyle='rgba(0,0,0,0.5)';cx.beginPath();rr(W*.1,H-40,W*.8,18,4);cx.fill();
  cx.fillStyle='rgba(245,158,11,0.2)';cx.beginPath();rr(W*.1,H-40,W*.8*np,18,4);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.5)';cx.font='400 9px Inter';cx.textAlign='center';
  const narrText=s.narr.length>100?s.narr.substring(0,Math.floor(t/s.dur*s.narr.length))+'…':s.narr.substring(0,Math.floor(t/s.dur*s.narr.length));
  cx.fillText(narrText.substring(Math.max(0,narrText.length-80)),W/2,H-28);
  cx.restore();
}

// ══════════════════════════════════════════════════════════════
// SCENE RENDERERS — High Quality
// ══════════════════════════════════════════════════════════════

function rAbertura(t){
  // Ambient glow
  const glowR=150+Math.sin(t*.8)*50;
  const glow=cx.createRadialGradient(W/2,H/2,0,W/2,H/2,glowR);
  glow.addColorStop(0,'rgba(245,158,11,0.06)');glow.addColorStop(1,'transparent');
  cx.fillStyle=glow;cx.fillRect(0,0,W,H);

  // Multiple wave layers
  for(let layer=0;layer<3;layer++){
    cx.beginPath();cx.strokeStyle=`rgba(245,158,11,${0.06-layer*0.015})`;cx.lineWidth=2-layer*0.5;
    for(let x=0;x<W;x+=1){
      const freq=0.008+layer*0.003;const amp=25+layer*15;const speed=1.5-layer*0.3;
      const y=H/2+Math.sin(x*freq+t*speed)*amp+Math.sin(x*freq*2.3+t*speed*1.7)*amp*0.4;
      x===0?cx.moveTo(x,y):cx.lineTo(x,y);
    }cx.stroke();
  }

  // Title with typewriter + glow
  const p=ease.out4(prog(t,0.3,1.5));
  const title=S[0].titulo;
  const chars=Math.floor(p*title.length);
  cx.save();cx.textAlign='center';

  // Text glow
  if(p>0){
    cx.shadowColor='rgba(245,158,11,0.4)';cx.shadowBlur=30;
    cx.fillStyle=`rgba(245,158,11,${p})`;cx.font='800 36px Inter';
    cx.fillText(title.substring(0,chars),W/2,H/2-8);
    cx.shadowBlur=0;
  }

  // Subtitle
  const sp=ease.out3(prog(t,2,0.8));
  if(sp>0){
    const sy=H/2+28+(1-sp)*30;
    cx.fillStyle=`rgba(255,255,255,${sp*0.45})`;cx.font='300 16px Inter';
    cx.fillText(S[0].sub,W/2,sy);
  }

  // Badge
  const bp=ease.elastic(prog(t,3,0.6));
  if(bp>0){
    cx.save();cx.translate(W/2,H/2+65);cx.scale(bp,bp);
    cx.fillStyle='rgba(245,158,11,0.1)';cx.beginPath();rr(-52,-14,104,28,8);cx.fill();
    cx.strokeStyle='rgba(245,158,11,0.3)';cx.lineWidth=1;cx.beginPath();rr(-52,-14,104,28,8);cx.stroke();
    cx.fillStyle='#f59e0b';cx.font='700 12px Inter';cx.fillText('SMU PRO',0,4);
    cx.restore();
  }
  cx.restore();
}

function rConceito(t){
  cx.save();
  // Title
  const tp=ease.out3(prog(t,0,0.6));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 22px Inter';cx.fillText(S[1].titulo,W*.07,H*.1);
  cx.fillStyle=`rgba(255,255,255,${tp*0.3})`;cx.font='400 12px Inter';cx.fillText(S[1].sub,W*.07,H*.1+20);

  // Physically-accurate sine wave propagation
  const waveProgress=ease.out3(prog(t,0.3,2));
  const waveLen=W*0.85*waveProgress;
  const startX=W*.075;

  // Wave glow
  cx.save();cx.shadowColor='rgba(59,130,246,0.3)';cx.shadowBlur=15;
  cx.beginPath();cx.strokeStyle='#3b82f6';cx.lineWidth=2.5;
  for(let x=0;x<waveLen;x+=1){
    const px=startX+x;
    const envelope=Math.sin(Math.PI*x/waveLen);
    const y=H*.35+Math.sin(x*0.025+t*3)*35*envelope+Math.sin(x*0.06+t*2)*12*envelope;
    x===0?cx.moveTo(px,y):cx.lineTo(px,y);
  }cx.stroke();cx.restore();

  // Compression/rarefaction visualization
  if(t>1){
    const mp=ease.out3(prog(t,1,1));
    const rows=5,cols=20;
    for(let r=0;r<rows;r++){
      for(let c=0;c<cols;c++){
        const bx=startX+c*(W*.042);
        const by=H*.55+r*16;
        const phase=c*0.4-t*4;
        const compression=Math.sin(phase)*10;
        const density=0.5+Math.sin(phase)*0.3;
        const px=bx+compression*mp;
        const sz=2+density*2;
        cx.beginPath();cx.arc(px,by,sz,0,TWO_PI);
        cx.fillStyle=`rgba(100,160,255,${(0.15+density*0.2)*mp})`;cx.fill();
      }
    }

    // Labels
    if(t>2){
      const lp=ease.out3(prog(t,2,0.5));
      cx.textAlign='center';cx.font='500 10px Inter';
      const labels=[{x:.25,l:'Compressão',c:'rgba(59,130,246,0.7)'},{x:.5,l:'Rarefação',c:'rgba(100,160,255,0.5)'},{x:.75,l:'Compressão',c:'rgba(59,130,246,0.7)'}];
      labels.forEach(lb=>{cx.fillStyle=lb.c.replace(')',`,${lp})`).replace('rgba','rgba');cx.fillText(lb.l,W*lb.x,H*.78)});
      cx.textAlign='left';
    }
  }

  // Propagation arrow
  if(t>1.5){
    const ap=prog(t,1.5,1);
    const ax=startX+ap*waveLen*.6;
    cx.fillStyle=`rgba(59,130,246,${0.5*Math.min(1,ap*2)})`;
    cx.beginPath();cx.moveTo(ax,H*.35-50);cx.lineTo(ax+12,H*.35-42);cx.lineTo(ax,H*.35-34);cx.fill();
    cx.font='500 9px Inter';cx.fillStyle='rgba(59,130,246,0.5)';cx.fillText('→ propagação',ax+16,H*.35-40);
  }
  cx.restore();
}

function rEspectro(t){
  cx.save();
  const tp=ease.out3(prog(t,0,0.5));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 22px Inter';cx.fillText(S[2].titulo,W*.07,H*.08);

  const faixas=[
    {nome:'Sub-graves',range:'20-60 Hz',cor:'#ef4444',h:.85},
    {nome:'Graves',range:'60-250 Hz',cor:'#f97316',h:.72},
    {nome:'Médios-graves',range:'250-500 Hz',cor:'#f59e0b',h:.58},
    {nome:'Médios',range:'500-2k Hz',cor:'#22c55e',h:.68},
    {nome:'Médios-agudos',range:'2-5 kHz',cor:'#3b82f6',h:.55},
    {nome:'Agudos',range:'5-20 kHz',cor:'#a855f7',h:.42}
  ];

  const bw=(W*.78)/faixas.length;
  const sx=W*.11;
  const maxH=H*.48;
  const baseY=H*.78;

  faixas.forEach((f,i)=>{
    const delay=0.3+i*0.35;
    const p=ease.elastic(prog(t,delay,0.8));
    if(p<=0)return;

    const x=sx+i*bw+4;
    const bh=maxH*f.h*p;
    const y=baseY-bh;

    // Bar gradient
    const g=cx.createLinearGradient(x,y,x,baseY);
    g.addColorStop(0,f.cor);g.addColorStop(0.7,f.cor+'88');g.addColorStop(1,f.cor+'11');
    cx.fillStyle=g;cx.beginPath();rr(x,y,bw-8,bh,6);cx.fill();

    // Animated shimmer
    const shimmer=0.15+Math.sin(t*3+i*1.2)*0.1;
    cx.fillStyle=`rgba(255,255,255,${shimmer*p})`;cx.beginPath();rr(x+2,y+2,bw-12,8,4);cx.fill();

    // Glow on top
    cx.save();cx.shadowColor=f.cor;cx.shadowBlur=12;
    cx.beginPath();cx.arc(x+(bw-8)/2,y,4,0,TWO_PI);cx.fillStyle=f.cor;cx.fill();
    cx.restore();

    // Live animation bars inside
    for(let j=0;j<3;j++){
      const bby=y+15+j*(bh-20)/3;
      const bw2=(bw-16)*(0.5+Math.sin(t*4+i+j*2)*0.3);
      cx.fillStyle=`rgba(255,255,255,${0.04*p})`;
      cx.fillRect(x+4,bby,bw2,3);
    }

    // Labels
    if(p>0.5){
      cx.textAlign='center';cx.fillStyle='#fff';cx.font='600 10px Inter';
      cx.fillText(f.nome,x+(bw-8)/2,baseY+14);
      cx.fillStyle='rgba(255,255,255,0.35)';cx.font='400 9px Inter';
      cx.fillText(f.range,x+(bw-8)/2,baseY+26);
      cx.textAlign='left';
    }
  });

  // Range label
  if(t>3.5){
    const rp=ease.out3(prog(t,3.5,0.5));
    cx.textAlign='center';cx.fillStyle=`rgba(245,158,11,${rp*0.5})`;cx.font='500 12px Inter';
    cx.fillText('‹ 20 Hz ——————————————— 20.000 Hz ›',W/2,baseY+44);
    cx.textAlign='left';
  }
  cx.restore();
}

function rSubgraves(t){
  cx.save();
  const tp=ease.out3(prog(t,0,0.5));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 22px Inter';cx.fillText(S[3].titulo,W*.07,H*.1);
  cx.fillStyle=`rgba(255,255,255,${tp*0.3})`;cx.font='400 12px Inter';cx.fillText(S[3].sub,W*.07,H*.1+20);

  // Massive low-frequency wave
  for(let layer=0;layer<4;layer++){
    cx.beginPath();
    const a=.04-layer*.008;cx.strokeStyle=`rgba(239,68,68,${a})`;cx.lineWidth=3-layer*0.5;
    for(let x=0;x<W;x+=1){
      const freq=0.005+layer*0.002;
      const amp=50+layer*20+Math.sin(t*0.5)*10;
      const y=H*.42+Math.sin(x*freq+t*(1.2-layer*0.2))*amp;
      x===0?cx.moveTo(x,y):cx.lineTo(x,y);
    }cx.stroke();
  }

  // Main wave with glow
  cx.save();cx.shadowColor='rgba(239,68,68,0.4)';cx.shadowBlur=20;
  cx.beginPath();cx.strokeStyle='#ef4444';cx.lineWidth=3;
  for(let x=0;x<W;x+=1){
    const y=H*.42+Math.sin(x*0.005+t*1.5)*55+Math.sin(x*0.012+t*0.8)*20;
    x===0?cx.moveTo(x,y):cx.lineTo(x,y);
  }cx.stroke();cx.restore();

  // Body silhouette with chest pulse
  if(t>1){
    const bp=ease.out3(prog(t,1,0.8));
    const bx=W*.78,by=H*.4;
    const pulse=Math.sin(t*5)*0.08;

    // Body outline
    cx.save();cx.translate(bx,by);cx.scale(bp*(1+pulse),bp*(1+pulse));
    cx.fillStyle='rgba(239,68,68,0.05)';cx.beginPath();cx.ellipse(0,0,40,65,0,0,TWO_PI);cx.fill();
    cx.strokeStyle='rgba(239,68,68,0.2)';cx.lineWidth=1.5;cx.stroke();
    // Chest glow
    cx.fillStyle=`rgba(239,68,68,${0.15+Math.sin(t*5)*0.1})`;
    cx.beginPath();cx.ellipse(0,-18,22,16,0,0,TWO_PI);cx.fill();
    // Ripple rings
    for(let r=0;r<3;r++){
      const rp2=(t*2+r*0.8)%2.4;
      if(rp2<2){
        cx.beginPath();cx.arc(0,-18,15+rp2*25,0,TWO_PI);
        cx.strokeStyle=`rgba(239,68,68,${(1-rp2/2)*0.15})`;cx.lineWidth=1;cx.stroke();
      }
    }
    cx.restore();

    // Label
    cx.fillStyle=`rgba(239,68,68,${bp*0.6})`;cx.font='500 10px Inter';cx.textAlign='center';
    cx.fillText('Você SENTE no peito',bx,by+80);cx.textAlign='left';
  }

  // Speaker
  if(t>2){
    const sp=ease.bounce(prog(t,2,0.6));
    const sx=W*.22,sy=H*.75;
    cx.save();cx.translate(sx,sy);cx.scale(sp,sp);
    const pump=Math.sin(t*8)*3;
    // Outer ring
    cx.strokeStyle='rgba(239,68,68,0.4)';cx.lineWidth=2;
    cx.beginPath();cx.arc(0,0,28+pump,0,TWO_PI);cx.stroke();
    // Inner ring
    cx.beginPath();cx.arc(0,0,16+pump*.5,0,TWO_PI);cx.stroke();
    // Center
    cx.beginPath();cx.arc(0,0,5,0,TWO_PI);cx.fillStyle='rgba(239,68,68,0.5)';cx.fill();
    // Sound waves
    for(let w=0;w<3;w++){
      const wp=(t*3+w)%2;
      if(wp<1.5){
        cx.beginPath();cx.arc(0,0,32+wp*25,-.4,.4);
        cx.strokeStyle=`rgba(239,68,68,${(1-wp/1.5)*0.3})`;cx.lineWidth=1.5;cx.stroke();
      }
    }
    cx.restore();
    cx.fillStyle=`rgba(255,255,255,${sp*0.4})`;cx.font='500 10px Inter';cx.textAlign='center';
    cx.fillText('Subwoofer 18" / 21"',sx,sy+45);cx.textAlign='left';
  }
  cx.restore();
}

function rVozes(t){
  cx.save();
  const tp=ease.out3(prog(t,0,0.5));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 22px Inter';cx.fillText(S[4].titulo,W*.07,H*.1);

  // Voice waveform
  const wp=ease.out3(prog(t,0.5,1.5));
  if(wp>0){
    cx.save();cx.shadowColor='rgba(34,197,94,0.3)';cx.shadowBlur=10;
    cx.beginPath();cx.strokeStyle=`rgba(34,197,94,${wp*0.8})`;cx.lineWidth=2;
    for(let x=W*.1;x<W*.9;x+=1){
      const n=(x-W*.1)/(W*.8);
      // Realistic voice-like pattern
      const env=Math.sin(n*Math.PI);
      const voice=Math.sin(x*.15+t*6)*env*18+Math.sin(x*.4+t*8)*env*6+Math.sin(x*.08+t*3)*env*10;
      const y=H*.35+voice*wp;
      x===W*.1?cx.moveTo(x,y):cx.lineTo(x,y);
    }cx.stroke();cx.restore();

    // Frequency label
    cx.fillStyle=`rgba(34,197,94,${wp*0.5})`;cx.font='500 11px Inter';cx.textAlign='center';
    cx.fillText('500 — 2000 Hz',W/2,H*.35+45);
  }

  // Instruments
  if(t>2.5){
    const ip=ease.out3(prog(t,2.5,0.8));
    // Kick
    const kick=Math.max(0,Math.sin(t*5))*Math.exp(-((t*5)%(Math.PI*2))*0.4);
    cx.beginPath();cx.arc(W*.2,H*.7,20+kick*10,0,TWO_PI);
    cx.strokeStyle=`rgba(245,158,11,${ip*(0.3+kick*0.4)})`;cx.lineWidth=2;cx.stroke();
    cx.fillStyle=`rgba(245,158,11,${ip*0.4})`;cx.font='500 10px Inter';cx.textAlign='center';
    cx.fillText('Kick 60-100 Hz',W*.2,H*.7+38);

    // Bass
    const bassVib=Math.sin(t*12)*3;
    cx.strokeStyle=`rgba(245,158,11,${ip*0.3})`;cx.lineWidth=2;
    cx.beginPath();cx.moveTo(W*.45,H*.66+bassVib);cx.lineTo(W*.55,H*.66+bassVib);cx.stroke();
    cx.fillText('Baixo 80-250 Hz',W*.5,H*.7+38);

    // Mic
    cx.beginPath();cx.arc(W*.78,H*.65,6,0,TWO_PI);cx.fillStyle=`rgba(59,130,246,${ip*0.4})`;cx.fill();
    cx.strokeStyle=`rgba(59,130,246,${ip*0.3})`;cx.beginPath();cx.moveTo(W*.78,H*.65+6);cx.lineTo(W*.78,H*.65+20);cx.stroke();
    cx.fillStyle=`rgba(59,130,246,${ip*0.4})`;
    cx.fillText('Voz 500-2k Hz',W*.78,H*.7+38);
    cx.textAlign='left';
  }
  cx.restore();
}

function rPerigo(t){
  cx.save();
  // Red pulse overlay
  const flash=Math.max(0,Math.sin(t*6))*0.04;
  cx.fillStyle=`rgba(239,68,68,${flash})`;cx.fillRect(0,0,W,H);

  const tp=ease.out3(prog(t,0,0.4));
  cx.textAlign='center';cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 24px Inter';
  cx.fillText(S[5].titulo,W/2,H*.1);

  // Fletcher-Munson curve
  const cp=ease.out3(prog(t,0.3,1.5));
  if(cp>0){
    cx.beginPath();cx.strokeStyle=`rgba(255,255,255,${cp*0.25})`;cx.lineWidth=2;
    const curveW=W*.8,sx2=W*.1;
    for(let x=0;x<curveW*cp;x+=1){
      const n=x/curveW;
      // Approximate equal-loudness contour
      const curve=0.7-0.5*Math.exp(-Math.pow((n-0.15)*4,2))+0.3*Math.exp(-Math.pow((n-0.65)*6,2))-0.6*Math.exp(-Math.pow((n-0.65)*8,2));
      const y=H*.35+curve*H*.3;
      x===0?cx.moveTo(sx2+x,y):cx.lineTo(sx2+x,y);
    }cx.stroke();

    // Peak highlight at 3kHz
    if(t>1.5){
      const pp=ease.elastic(prog(t,1.5,0.6));
      const peakX=sx2+curveW*0.65;
      const peakY=H*.35-0.6*Math.exp(0)*H*.3+H*.3*0.3;

      // Pulsing glow
      cx.save();cx.shadowColor='rgba(239,68,68,0.6)';cx.shadowBlur=20*pp;
      cx.beginPath();cx.arc(peakX,peakY-15,8+Math.sin(t*5)*3,0,TWO_PI);
      cx.fillStyle=`rgba(239,68,68,${pp*0.5})`;cx.fill();
      cx.restore();

      // Label
      cx.fillStyle=`rgba(239,68,68,${pp})`;cx.font='800 16px Inter';
      cx.fillText('3 kHz',peakX,peakY-35);
      cx.fillStyle=`rgba(239,68,68,${pp*0.6})`;cx.font='400 11px Inter';
      cx.fillText('MÁXIMA SENSIBILIDADE',peakX,peakY-5);
    }
  }

  // Feedback loop visualization
  if(t>2.5){
    const fp=ease.out3(prog(t,2.5,0.8));
    const fcx2=W/2,fcy=H*.75;

    // Circular arrows
    cx.strokeStyle=`rgba(239,68,68,${fp*0.5})`;cx.lineWidth=2;
    const angle=t*3;
    cx.beginPath();cx.arc(fcx2,fcy,22,angle,angle+Math.PI*1.5);cx.stroke();
    // Arrow head
    const ax2=fcx2+22*Math.cos(angle+Math.PI*1.5);
    const ay=fcy+22*Math.sin(angle+Math.PI*1.5);
    cx.fillStyle=`rgba(239,68,68,${fp*0.5})`;
    cx.beginPath();cx.arc(ax2,ay,4,0,TWO_PI);cx.fill();

    cx.fillStyle=`rgba(239,68,68,${fp*0.7})`;cx.font='600 11px Inter';
    cx.fillText('⚡ Feedback Loop',fcx2,fcy+42);
  }
  cx.textAlign='left';cx.restore();
}

function rEQ(t){
  cx.save();
  const tp=ease.out3(prog(t,0,0.5));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 22px Inter';cx.fillText(S[6].titulo,W*.07,H*.08);

  const eqL=W*.08,eqR=W*.92,eqY=H*.48,eqH=H*.25;

  // Grid
  cx.strokeStyle='rgba(255,255,255,0.04)';cx.lineWidth=.5;
  for(let y=eqY-eqH;y<=eqY+eqH;y+=eqH/5){cx.beginPath();cx.moveTo(eqL,y);cx.lineTo(eqR,y);cx.stroke()}
  for(let x=eqL;x<=eqR;x+=(eqR-eqL)/10){cx.beginPath();cx.moveTo(x,eqY-eqH);cx.lineTo(x,eqY+eqH);cx.stroke()}

  // Zero line
  cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(eqL,eqY);cx.lineTo(eqR,eqY);cx.stroke();

  // dB labels
  cx.fillStyle='rgba(255,255,255,0.15)';cx.font='400 9px JetBrains Mono';cx.textAlign='right';
  ['+12','+6','0','-6','-12'].forEach((l,i)=>{cx.fillText(l+'dB',eqL-6,eqY-eqH+i*(eqH/2.5)+3)});

  // Freq labels
  cx.textAlign='center';
  ['31','63','125','250','500','1k','2k','4k','8k','16k'].forEach((f,i)=>{
    cx.fillText(f,eqL+i*((eqR-eqL)/9.5),eqY+eqH+14);
  });

  // EQ Curve — animated build
  const points=[
    {x:.08,y:-.15,q:2},{x:.15,y:-.3,q:3}, // Low cut
    {x:.35,y:.12,q:1.5},                     // Slight low boost
    {x:.48,y:-.25,q:2},                      // 400Hz cut
    {x:.65,y:-.45,q:3},                      // 3kHz notch
    {x:.82,y:.15,q:1.2},                     // Air shelf
  ];

  const cp=ease.out3(prog(t,0.5,2.5));
  if(cp>0){
    // Filled area
    cx.beginPath();cx.moveTo(eqL,eqY);
    for(let x=eqL;x<=eqL+(eqR-eqL)*cp;x+=1){
      const n=(x-eqL)/(eqR-eqL);let yOff=0;
      points.forEach(p=>{yOff+=p.y*Math.exp(-Math.pow((n-p.x)*p.q*3,2))});
      cx.lineTo(x,eqY+yOff*eqH*(0.45+Math.sin(t*.3)*0.05));
    }
    cx.lineTo(eqL+(eqR-eqL)*cp,eqY);cx.closePath();
    const fillG=cx.createLinearGradient(0,eqY-eqH,0,eqY+eqH);
    fillG.addColorStop(0,'rgba(245,158,11,0.06)');fillG.addColorStop(0.5,'rgba(245,158,11,0.02)');fillG.addColorStop(1,'rgba(245,158,11,0.06)');
    cx.fillStyle=fillG;cx.fill();

    // Main curve with glow
    cx.save();cx.shadowColor='rgba(245,158,11,0.4)';cx.shadowBlur=8;
    cx.beginPath();cx.strokeStyle='#f59e0b';cx.lineWidth=2.5;
    for(let x=eqL;x<=eqL+(eqR-eqL)*cp;x+=1){
      const n=(x-eqL)/(eqR-eqL);let yOff=0;
      points.forEach(p=>{yOff+=p.y*Math.exp(-Math.pow((n-p.x)*p.q*3,2))});
      const py=eqY+yOff*eqH*0.45;
      x===eqL?cx.moveTo(x,py):cx.lineTo(x,py);
    }cx.stroke();cx.restore();

    // Control points
    if(t>2){
      const colors=['#ef4444','#ef4444','#22c55e','#3b82f6','#a855f7','#06b6d4'];
      points.forEach((p,i)=>{
        const pp=ease.elastic(prog(t,2+i*0.2,0.5));
        if(pp<=0)return;
        const px=eqL+p.x*(eqR-eqL);
        const py=eqY+p.y*eqH*0.45;
        // Ring
        cx.beginPath();cx.arc(px,py,7*pp,0,TWO_PI);
        cx.strokeStyle=colors[i]+'88';cx.lineWidth=1.5;cx.stroke();
        // Center
        cx.beginPath();cx.arc(px,py,3.5*pp,0,TWO_PI);
        cx.fillStyle=colors[i];cx.fill();
      });
    }
  }

  // Equipment labels
  if(t>5){
    const ep=ease.out3(prog(t,5,0.8));
    cx.textAlign='center';cx.fillStyle=`rgba(255,255,255,${ep*0.3})`;cx.font='400 11px Inter';
    cx.fillText('Yamaha CL/QL  ·  DiGiCo SD  ·  Allen & Heath dLive',W/2,H*.92);
  }
  cx.textAlign='left';cx.restore();
}

function rRegra(t){
  cx.save();cx.textAlign='center';
  const tp=ease.out3(prog(t,0,0.4));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 24px Inter';
  cx.fillText(S[7].titulo,W/2,H*.08);

  const hw=W*.38;

  // LEFT — Bad (Boost)
  if(t>0.3){
    const lp=ease.out3(prog(t,0.3,0.8));
    const lx=W*.25;
    cx.fillStyle=`rgba(239,68,68,${lp*0.05})`;cx.beginPath();rr(lx-hw/2,H*.14,hw,H*.6,14);cx.fill();
    cx.strokeStyle=`rgba(239,68,68,${lp*0.15})`;cx.lineWidth=1;cx.beginPath();rr(lx-hw/2,H*.14,hw,H*.6,14);cx.stroke();

    cx.fillStyle=`rgba(239,68,68,${lp})`;cx.font='600 14px Inter';cx.fillText('❌ Boosting +12dB',lx,H*.22);

    // Boost curve
    cx.beginPath();cx.strokeStyle=`rgba(239,68,68,${lp*0.7})`;cx.lineWidth=2.5;
    const bw2=hw*.8,bsx=lx-bw2/2;
    cx.moveTo(bsx,H*.52);
    for(let x=0;x<bw2;x+=1){
      const n=(x-bw2/2)/(bw2/2);
      const boost=0.7*Math.exp(-n*n*2)*lp;
      cx.lineTo(bsx+x,H*.52-boost*H*.18);
    }cx.stroke();

    // Clipping indicator
    if(t>2){
      const cp=Math.sin(t*8)*.5+.5;
      cx.fillStyle=`rgba(239,68,68,${cp*.7})`;cx.font='700 12px Inter';
      cx.fillText('⚡ CLIPPING',lx,H*.66);
      cx.fillStyle=`rgba(239,68,68,${cp*.15})`;cx.beginPath();rr(lx-40,H*.58,80,20,4);cx.fill();
    }
  }

  // RIGHT — Good (Cut)
  if(t>1){
    const rp=ease.out3(prog(t,1,0.8));
    const rx=W*.75;
    cx.fillStyle=`rgba(34,197,94,${rp*0.05})`;cx.beginPath();rr(rx-hw/2,H*.14,hw,H*.6,14);cx.fill();
    cx.strokeStyle=`rgba(34,197,94,${rp*0.15})`;cx.lineWidth=1;cx.beginPath();rr(rx-hw/2,H*.14,hw,H*.6,14);cx.stroke();

    cx.fillStyle=`rgba(34,197,94,${rp})`;cx.font='600 14px Inter';cx.fillText('✅ Cutting -6dB',rx,H*.22);

    // Cut curve
    cx.beginPath();cx.strokeStyle=`rgba(34,197,94,${rp*0.7})`;cx.lineWidth=2.5;
    const cw=hw*.8,csx=rx-cw/2;
    cx.moveTo(csx,H*.48);
    for(let x=0;x<cw;x+=1){
      const n=(x-cw/2)/(cw/2);
      const cut=-0.35*Math.exp(-n*n*2)*rp;
      cx.lineTo(csx+x,H*.48-cut*H*.18);
    }cx.stroke();

    // Clean signal
    if(t>2.5){
      const sp2=ease.out3(prog(t,2.5,0.5));
      cx.fillStyle=`rgba(34,197,94,${sp2*0.7})`;cx.font='600 12px Inter';
      cx.fillText('✓ Sinal limpo',rx,H*.66);
    }
  }

  // VS divider
  if(t>1.5){
    const vp=ease.elastic(prog(t,1.5,0.5));
    cx.fillStyle=`rgba(255,255,255,${vp*0.15})`;cx.font='800 20px Inter';
    cx.fillText('VS',W/2,H*.45);
  }

  // Golden rule
  if(t>3.5){
    const gp=ease.out3(prog(t,3.5,0.8));
    cx.save();cx.shadowColor='rgba(245,158,11,0.4)';cx.shadowBlur=20*gp;
    cx.fillStyle=`rgba(245,158,11,${gp})`;cx.font='700 20px Inter';
    cx.fillText('"Corte antes de reforço"',W/2,H*.85);
    cx.restore();
  }
  cx.textAlign='left';cx.restore();
}

function rPratica(t){
  cx.save();
  const tp=ease.out3(prog(t,0,0.5));
  cx.fillStyle=`rgba(255,255,255,${tp})`;cx.font='700 22px Inter';cx.fillText(S[8].titulo,W*.07,H*.08);

  // RTA — real-time analyzer bars
  const bars=31,bw3=(W*.76)/bars,sx3=W*.12,baseY2=H*.68;

  for(let i=0;i<bars;i++){
    const freq=20*Math.pow(10,i/(bars-1)*3); // 20Hz to 20kHz log scale
    const noise=Math.sin(i*0.8+t*2.5)*0.2+Math.sin(i*2.3+t*4)*0.12+Math.sin(i*0.3+t*1.2)*0.1;
    const base=0.35+Math.sin(i*0.12)*0.1;
    const resonance=0.45*Math.exp(-Math.pow((i-22)*0.4,2)); // Room resonance
    const val=clamp(base+noise+resonance,0,1);
    const bh=val*H*.42;
    const x=sx3+i*bw3;
    const y=baseY2-bh;

    // Gradient based on level
    const g=cx.createLinearGradient(x,y,x,baseY2);
    if(val>0.8){g.addColorStop(0,'#ef4444');g.addColorStop(0.2,'#f59e0b');g.addColorStop(1,'rgba(34,197,94,0.1)')}
    else if(val>0.6){g.addColorStop(0,'#f59e0b');g.addColorStop(1,'rgba(245,158,11,0.1)')}
    else{g.addColorStop(0,'#22c55e');g.addColorStop(1,'rgba(34,197,94,0.05)')}
    cx.fillStyle=g;cx.fillRect(x+1,y,bw3-2,bh);

    // Peak hold
    cx.fillStyle=val>0.8?'#ef4444':val>0.6?'#f59e0b':'#22c55e';
    cx.fillRect(x+1,y-2,bw3-2,2);
  }

  // Resonance arrow
  if(t>2.5){
    const ap=ease.out3(prog(t,2.5,0.5));
    const peakX=sx3+22*bw3+bw3/2;
    cx.strokeStyle=`rgba(239,68,68,${ap*0.8})`;cx.lineWidth=2;
    cx.beginPath();cx.moveTo(peakX,H*.12);cx.lineTo(peakX,H*.2);cx.stroke();
    // Arrowhead
    cx.fillStyle=`rgba(239,68,68,${ap*0.8})`;cx.beginPath();
    cx.moveTo(peakX-6,H*.2);cx.lineTo(peakX+6,H*.2);cx.lineTo(peakX,H*.24);cx.fill();
    cx.textAlign='center';cx.fillStyle=`rgba(239,68,68,${ap})`;cx.font='600 11px Inter';
    cx.fillText('Ressonância da sala!',peakX,H*.1);cx.textAlign='left';
  }

  // Workflow checklist
  if(t>3){
    const steps=['1. RTA ligado','2. Pink noise','3. Identificar picos','4. Cortar no gráfico','5. Refinar por canal'];
    steps.forEach((s2,i)=>{
      const sp2=ease.out3(prog(t,3+i*0.35,0.3));
      if(sp2<=0)return;
      const sx4=W*.06+i*(W*.185);
      cx.fillStyle=`rgba(245,158,11,${sp2*0.15})`;cx.beginPath();rr(sx4-4,H*.78,W*.17,20,4);cx.fill();
      cx.fillStyle=`rgba(245,158,11,${sp2*0.8})`;cx.font='500 10px Inter';
      cx.fillText(s2,sx4,H*.792);
    });
  }
  cx.restore();
}

function rFim(t){
  cx.save();cx.textAlign='center';
  const tp=ease.out3(prog(t,0,0.4));
  cx.fillStyle=`rgba(245,158,11,${tp})`;cx.font='700 24px Inter';cx.fillText(S[9].titulo,W/2,H*.08);

  // Recap cards with flip animation
  const items=['🔊 Espectro: 20 Hz a 20 kHz','📊 6 faixas de frequência','🎛 EQ: Paramétrico · Gráfico · Shelving','✂ Regra: Corte > Reforço','📈 Ferramenta: Analisador RTA'];
  items.forEach((item,i)=>{
    const delay=0.3+i*0.4;
    const p=ease.elastic(prog(t,delay,0.6));
    if(p<=0)return;

    const col=i%2,row=Math.floor(i/2);
    const cw=W*.38,ch=38;
    const cx2=W*.28+col*(cw+12);
    const cy=H*.16+row*(ch+10);

    cx.save();cx.translate(cx2+cw/2,cy+ch/2);cx.scale(p,p);
    cx.fillStyle='rgba(245,158,11,0.06)';cx.beginPath();rr(-cw/2,-ch/2,cw,ch,8);cx.fill();
    cx.strokeStyle='rgba(245,158,11,0.2)';cx.lineWidth=1;cx.beginPath();rr(-cw/2,-ch/2,cw,ch,8);cx.stroke();
    cx.fillStyle=`rgba(255,255,255,0.8)`;cx.font='500 11px Inter';cx.textAlign='left';
    cx.fillText(item,-cw/2+14,4);
    cx.restore();
  });

  // CTA
  if(t>3.5){
    const cp=ease.out3(prog(t,3.5,0.6));
    cx.textAlign='center';
    cx.fillStyle=`rgba(245,158,11,${cp*0.15})`;cx.beginPath();rr(W*.2,H*.72,W*.6,36,10);cx.fill();
    cx.strokeStyle=`rgba(245,158,11,${cp*0.3})`;cx.lineWidth=1;cx.beginPath();rr(W*.2,H*.72,W*.6,36,10);cx.stroke();
    cx.fillStyle=`rgba(245,158,11,${cp})`;cx.font='600 14px Inter';
    cx.fillText('Próxima Aula: Simulação de Passagem de Som →',W/2,H*.745);
  }

  // Logo
  if(t>4.5){
    const lp=ease.out3(prog(t,4.5,0.5));
    cx.save();cx.shadowColor='rgba(245,158,11,0.3)';cx.shadowBlur=20*lp;
    cx.fillStyle=`rgba(245,158,11,${lp*0.6})`;cx.font='800 18px Inter';
    cx.fillText('SMU PRO',W/2,H*.88);
    cx.restore();
  }
  cx.textAlign='left';cx.restore();
}

// ── Rounded rect helper ──
function rr(x,y,w,h,r){cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath()}

// ── Scene list ──
function buildList(){
  const el=document.getElementById('sceneList');
  el.innerHTML='';
  S.forEach((s,i)=>{
    const d=document.createElement('div');
    d.className='scene-item'+(i===0?' active':'');
    d.id='si-'+i;
    d.onclick=()=>goTo(i);
    d.innerHTML=`
      <div style="display:flex;align-items:center"><span class="num">${String(s.n).padStart(2,'0')}</span><span class="stitle">${s.titulo}</span></div>
      <div class="stype">${s.tipo} · ${s.dur}s</div>
      <div class="snarr">"${s.narr}"</div>
      <div class="tags">${s.tags.map(t2=>`<span class="tag ${['el','an','fx'][Math.floor(Math.random()*3)]}">${t2}</span>`).join('')}</div>
    `;
    el.appendChild(d);
  });
}

// ── Playback ──
function toggle(){
  if(!ready)return;
  playing=!playing;
  document.getElementById('playBtn').innerHTML=playing?'⏸ Pause':'▶ Play';
  if(playing){lt=performance.now();tick()}
}

function tick(){
  if(!playing)return;
  const now=performance.now();
  st+=(now-lt)/1000;lt=now;
  if(st>=S[scene].dur){
    if(scene<S.length-1){scene++;st=0;hlScene(scene)}
    else{playing=false;document.getElementById('playBtn').innerHTML='▶ Play';return}
  }
  render();updateCtrl();
  raf=requestAnimationFrame(tick);
}

function reset(){playing=false;scene=0;st=0;document.getElementById('playBtn').innerHTML='▶ Play';render();updateCtrl();hlScene(0)}
function goTo(i){scene=i;st=0;hlScene(i);render();updateCtrl()}

function hlScene(i){
  document.querySelectorAll('.scene-item').forEach((e,j)=>e.classList.toggle('active',j===i));
  document.getElementById('si-'+i)?.scrollIntoView({behavior:'smooth',block:'nearest'});
}

function updateCtrl(){
  const elapsed=S.slice(0,scene).reduce((s2,c)=>s2+c.dur,0)+st;
  const total=S.reduce((s2,c)=>s2+c.dur,0);
  document.getElementById('pfill').style.width=(elapsed/total*100)+'%';
  document.getElementById('sLabel').textContent=`Cena ${scene+1}/10`;
  const m=Math.floor(elapsed/60),s2=Math.floor(elapsed%60);
  document.getElementById('tDisp').textContent=`${m}:${s2.toString().padStart(2,'0')}`;
}

function seekGlobal(e){
  const rect=document.getElementById('pbar').getBoundingClientRect();
  const pct=clamp((e.clientX-rect.left)/rect.width);
  const total=S.reduce((s2,c)=>s2+c.dur,0);
  let target=pct*total,acc=0;
  for(let i=0;i<S.length;i++){
    if(acc+S[i].dur>target){scene=i;st=target-acc;break}
    acc+=S[i].dur;
  }
  hlScene(scene);render();updateCtrl();
}

// ── Generation flow ──
async function generate(){
  const btn=document.getElementById('ctaBtn');
  btn.disabled=true;

  // Step 1
  setPip(1);btn.textContent='📝 Lendo conteúdo...';
  await sleep(800);
  // Step 2
  setPip(2);btn.textContent='🧠 IA analisando...';
  await sleep(1800);

  // Show analysis
  document.getElementById('analysisRow').classList.remove('hidden');
  document.getElementById('analysisGrid').innerHTML=`
    <div class="acard"><div class="al">Conceitos</div><div class="av">7</div><div class="ad">Frequência, EQ, RTA, feedback, shelving, paramétrico, gráfico</div></div>
    <div class="acard"><div class="al">Visuais</div><div class="av">14</div><div class="ad">Ondas, espectros, curvas, instrumentos, equipamentos</div></div>
    <div class="acard"><div class="al">Analogias</div><div class="av">5</div><div class="ad">Pedra na água, bisturi sonoro, faixas como cores</div></div>
    <div class="acard"><div class="al">Narrativa</div><div class="av" style="font-size:15px">Progressiva</div><div class="ad">Conceito → espectro → ferramenta → prática</div></div>
  `;
  await sleep(1000);

  // Step 3
  setPip(3);btn.textContent='🎬 Gerando roteiro...';
  buildList();
  await sleep(1200);

  // Step 4
  setPip(4);btn.textContent='✨ Renderizando...';
  setup();render();
  await sleep(600);

  ready=true;
  btn.textContent='▶ Assistir Animação';
  btn.disabled=false;
  btn.onclick=()=>{ if(!playing){toggle()} };
}

function setPip(n){for(let i=1;i<=4;i++){const e=document.getElementById('p'+i);e.classList.remove('active','done');if(i<n)e.classList.add('done');if(i===n)e.classList.add('active')}}
function sleep(ms){return new Promise(r=>setTimeout(r,ms))}

// Resize handler
window.addEventListener('resize',()=>{if(ready){setup();render()}});
</script>
